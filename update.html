<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Video Yuklash — Yangi video</title>
  <style>
    /* RESET & BASE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* Asosiy karta — header butunlay yo'q (hech qanday header qismi mavjud emas) */
    .video-modal-content {
      background-color: #000;
      width: 100%;
      max-width: 600px;
      border-radius: 24px;
      border: 1px solid #2f3336;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.6);
    }

    /* HEADER TAMOMAN OLIB TASHLANDI: hech qanday header/sarlavha/qator mavjud emas */
    /* video-modal-header va video-cancel-btn CSS i butunlay ishlatilmaydi, faqat eski kod qoldiqlari yo'q */

    .video-form-container {
      padding: 20px 20px 24px;
    }

    /* PREVIEW BOX */
    .video-preview {
      width: 100%;
      background-color: #0a0a0a;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      border: 1.5px solid #2f3336;
      transition: border-color 0.2s;
      aspect-ratio: 16 / 9; /* 16:9 aniq nisbat, padding-bottom usuliga alternativ */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .video-preview:hover {
      border-color: #1da1f2;
    }

    /* video elementi preview ichida */
    .video-preview video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    /* Placeholder (video tanlanmagan) */
    .video-preview-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      color: #8b98a5;
      cursor: pointer;
      gap: 12px;
      transition: background 0.2s;
    }

    .video-preview-placeholder svg {
      width: 56px;
      height: 56px;
      stroke-width: 1.2;
      color: #5e6f7e;
    }

    .video-preview-placeholder span {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }

    .upload-video-btn {
      background-color: #1da1f2;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.05s;
      margin-top: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .upload-video-btn:hover {
      background-color: #0c84d1;
    }

    /* Sarlavha maydoni */
    .video-form-group {
      margin-bottom: 24px;
    }

    .video-form-group input {
      width: 100%;
      background-color: #000;
      border: 1px solid #2f3336;
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
      outline: none;
    }

    .video-form-group input:focus {
      border-color: #1da1f2;
      box-shadow: 0 0 0 2px rgba(29, 161, 242, 0.2);
    }

    .video-form-group input::placeholder {
      color: #6e767d;
      font-weight: 400;
    }

    /* Fayl ma'lumotlari */
    .video-info {
      background-color: #16181c;
      border-radius: 14px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 13px;
      color: #b0b8c0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-name {
      color: #1da1f2;
      font-weight: 500;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-size {
      background: #2f3336;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    /* YUKLASH ASOSIY TUGMA */
    .upload-action-btn {
      background-color: #1da1f2;
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 14px 0;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      width: 100%;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .upload-action-btn:hover:not(:disabled) {
      background-color: #0c84d1;
    }

    .upload-action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: #1da1f2;
    }

    /* Qo'shimcha kichik yozuv */
    .helper-text {
      text-align: center;
      font-size: 12px;
      color: #5b6773;
      margin-top: 20px;
      border-top: 1px solid #1e252b;
      padding-top: 16px;
    }

    @media (max-width: 520px) {
      .video-form-container {
        padding: 16px;
      }
      .upload-action-btn {
        font-size: 15px;
        padding: 12px 0;
      }
      .video-preview {
        border-radius: 18px;
      }
      .video-form-group input {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>

<div class="video-modal-content">
  <!-- HEADER TAMOMAN YO'Q: Bekor qilish tugmasi, sarlavha qatori, hech narsa mavjud emas -->
  <!-- Faqat forma va video yuklash interfeysi -->
  
  <div class="video-form-container">
    <!-- Video preview va tanlash maydoni -->
    <div class="video-form-group">
      <div class="video-preview" id="videoPreview">
        <div class="video-preview-placeholder" id="uploadPlaceholder">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM6 20V4H13V9H18V20H6Z" fill="currentColor"/>
            <path d="M8 12H16V14H8V12ZM8 16H16V18H8V16Z" fill="currentColor"/>
          </svg>
          <span>Video yuklang</span>
          <button type="button" class="upload-video-btn" id="uploadVideoBtn">Fayl tanlash</button>
        </div>
      </div>
      <div id="fileInfo" class="video-info" style="display: none;"></div>
    </div>
    
    <!-- Sarlavha maydoni (majburiy) -->
    <div class="video-form-group">
      <input type="text" id="videoTitle" placeholder="Video sarlavhasi (masalan: Eng zo‘r lavhalar)" autocomplete="off">
    </div>
    
    <!-- Tavsif maydoni butunlay olib tashlandi (textarea yo'q) -->
    
    <!-- Asosiy yuklash tugmasi -->
    <button class="upload-action-btn" id="finalUploadBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 4px;">
        <path d="M19 13H5V11H19V13ZM12 4L7 9H11V15H13V9H17L12 4Z" fill="currentColor"/>
      </svg>
      Yuklash
    </button>
    <div class="helper-text">Maksimal hajm: 500 MB | MP4, MOV va boshqa formatlar</div>
  </div>
</div>

<!-- Yashirin file input -->
<input type="file" id="videoInput" accept="video/*" style="display: none;">

<script>
  (function() {
    // DOM elementlari
    const uploadVideoBtn = document.getElementById('uploadVideoBtn');
    const videoInput = document.getElementById('videoInput');
    const videoPreview = document.getElementById('videoPreview');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');
    const videoTitle = document.getElementById('videoTitle');
    const finalUploadBtn = document.getElementById('finalUploadBtn');
    const fileInfoDiv = document.getElementById('fileInfo');

    // State
    let selectedVideoFile = null;      // tanlangan fayl obyekti
    let videoObjectURL = null;         // blob URL (tozalash uchun)
    
    // Helper: previewni placeholder holatiga qaytarish (header yo'q, faqat vizual)
    function resetToPlaceholder() {
      // Agar videoPreview ichida video elementi mavjud bo'lsa, uni o'chirib placeholder qo'shamiz
      const existingVideo = videoPreview.querySelector('video');
      if (existingVideo) {
        existingVideo.remove();
      }
      // placeholder mavjudmi? agar yo'q yoki buzilgan bo'lsa yaratamiz
      let placeholder = document.getElementById('uploadPlaceholder');
      if (!placeholder || !videoPreview.contains(placeholder)) {
        // agar placeholder mavjud bo'lmasa, yangisini yaratamiz
        if (placeholder && placeholder.parentNode) placeholder.remove();
        const newPlaceholder = document.createElement('div');
        newPlaceholder.className = 'video-preview-placeholder';
        newPlaceholder.id = 'uploadPlaceholder';
        newPlaceholder.innerHTML = `
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM6 20V4H13V9H18V20H6Z" fill="currentColor"/>
            <path d="M8 12H16V14H8V12ZM8 16H16V18H8V16Z" fill="currentColor"/>
          </svg>
          <span>Video yuklang</span>
          <button type="button" class="upload-video-btn" id="uploadVideoBtn">Fayl tanlash</button>
        `;
        videoPreview.innerHTML = '';
        videoPreview.appendChild(newPlaceholder);
        placeholder = newPlaceholder;
      }
      // Tugma va placeholder eventlarini qayta bog'lash
      const btnInside = placeholder.querySelector('#uploadVideoBtn');
      if (btnInside) {
        // eski eventlarni tozalash uchun yangi nusxa yoki clone? oddiy usul: listener qo'shishdan oldin removeEventListener xavfi, lekin yangi element, to'g'ridan to'g'ri qo'shamiz
        btnInside.replaceWith(btnInside.cloneNode(true));
        const freshBtn = placeholder.querySelector('#uploadVideoBtn');
        freshBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          videoInput.click();
        });
      }
      // placeholder ustiga bosganda ham videoInput ochilishi
      placeholder.addEventListener('click', (e) => {
        if (e.target.tagName !== 'BUTTON') {
          videoInput.click();
        }
      });
      // fileInfo yashirish
      if (fileInfoDiv) fileInfoDiv.style.display = 'none';
    }
    
    // Previewda video ko'rsatish (fayl tanlanganda)
    function displayVideoPreview(file) {
      if (!file) return;
      // eski URL ni tozalash
      if (videoObjectURL) {
        URL.revokeObjectURL(videoObjectURL);
        videoObjectURL = null;
      }
      videoObjectURL = URL.createObjectURL(file);
      const videoElement = document.createElement('video');
      videoElement.src = videoObjectURL;
      videoElement.controls = true;
      videoElement.setAttribute('controlslist', 'nodownload');
      videoElement.style.width = '100%';
      videoElement.style.height = '100%';
      videoElement.style.objectFit = 'contain';
      videoElement.style.backgroundColor = '#000';
      // videoPreview ichidagi barcha narsalarni tozalab, videoni joylashtirish
      videoPreview.innerHTML = '';
      videoPreview.appendChild(videoElement);
      videoElement.addEventListener('loadedmetadata', () => {
        // video yuklangan, hech qanday header yo'q, faqat vizual
      });
    }
    
    // Fayl tanlanganda validatsiya va preview
    function handleFileSelect(file) {
      if (!file) {
        selectedVideoFile = null;
        resetToPlaceholder();
        if (fileInfoDiv) fileInfoDiv.style.display = 'none';
        checkForm();
        return;
      }
      // Hajm tekshiruvi (500 MB)
      const maxSize = 500 * 1024 * 1024;
      if (file.size > maxSize) {
        alert('Video hajmi 500 MB dan oshmasligi kerak! Iltimos, kichikroq fayl tanlang.');
        videoInput.value = '';
        selectedVideoFile = null;
        resetToPlaceholder();
        if (fileInfoDiv) fileInfoDiv.style.display = 'none';
        checkForm();
        return;
      }
      
      // Fayl turi (video) qabul qilamiz
      if (!file.type.startsWith('video/')) {
        alert('Faqat video fayllar qabul qilinadi (MP4, MOV, AVI va boshqalar).');
        videoInput.value = '';
        selectedVideoFile = null;
        resetToPlaceholder();
        if (fileInfoDiv) fileInfoDiv.style.display = 'none';
        checkForm();
        return;
      }
      
      selectedVideoFile = file;
      // Videoni preview qilish
      displayVideoPreview(file);
      
      // Fayl hajmi va nomi ma'lumotlarini ko'rsatish
      const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2);
      const fileNameShort = file.name.length > 35 ? file.name.substring(0, 32) + '...' : file.name;
      if (fileInfoDiv) {
        fileInfoDiv.style.display = 'flex';
        fileInfoDiv.innerHTML = `
          <span class="file-name" title="${escapeHtml(file.name)}">📹 ${escapeHtml(fileNameShort)}</span>
          <span class="file-size">${fileSizeMB} MB</span>
        `;
      }
      
      // Agar sarlavha maydoni bo'sh bo'lsa, fayl nomidan (kengaytmasiz) sarlavha qilib qo'yamiz
      if (!videoTitle.value.trim()) {
        let baseName = file.name.replace(/\.[^/.]+$/, "");
        if (baseName.length > 60) baseName = baseName.substring(0, 57) + '...';
        videoTitle.value = baseName;
      }
      
      checkForm();
    }
    
    // XSS oldini olish uchun oddiy escape
    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
      });
    }
    
    // VideoInput o'zgarishi
    videoInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) {
        handleFileSelect(file);
      } else {
        handleFileSelect(null);
      }
    });
    
    // Tugma orqali fayl tanlash (ikkala joy)
    function attachUploadButtonEvents() {
      // Har qanday dinamik tugmaga ishlov berish uchun delegatsiya yoki qayta bog'lash
      const btn = document.querySelector('#uploadVideoBtn');
      if (btn) {
        // oldingi listenerlarni to'xtatish uchun yangi nusxa yoki removeEventListener aniq emas, oddiy usul: clone + event
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          videoInput.click();
        });
      }
    }
    
    // Placeholder va tugmalar uchun umumiy init (DOM o'zgarishlari va dastlabki)
    function initEventDelegation() {
      // videoPreview ustiga bosilganda ham fayl tanlash (agar placeholder ko'rinishda bo'lsa)
      videoPreview.addEventListener('click', (e) => {
        // agar bosilgan element video yoki uning ichidagi tugma bo'lmasa va placeholder ko'rinadigan bo'lsa (video element mavjud emas) -> fayl tanlash
        const hasVideoElem = videoPreview.querySelector('video');
        if (!hasVideoElem) {
          // Agar placeholder ko'rinishda bo'lsa, input ochiladi
          if (e.target.closest('#uploadVideoBtn')) return; // tugma o'z ishini qiladi
          videoInput.click();
        }
      });
      // global uploadVideoBtn mavjud bo'lsa
      attachUploadButtonEvents();
    }
    
    // Form tekshiruvi: video fayl va sarlavha mavjudligi
    function checkForm() {
      const titleValid = videoTitle.value.trim().length > 0;
      const hasFile = selectedVideoFile !== null;
      finalUploadBtn.disabled = !(titleValid && hasFile);
    }
    
    // Sarlavha kiritilganda tugmani yangilash
    videoTitle.addEventListener('input', () => {
      checkForm();
    });
    
    // YUKLASH JARAYONI (localStorage + videopage)
    async function uploadVideoProcess() {
      if (!selectedVideoFile) {
        alert('Iltimos, videoni tanlang!');
        return;
      }
      const titleRaw = videoTitle.value.trim();
      if (!titleRaw) {
        alert('Video sarlavhasini kiriting.');
        videoTitle.focus();
        return;
      }
      
      // Yuklash tugmasini bloklash va matnni o'zgartirish
      finalUploadBtn.disabled = true;
      const originalText = finalUploadBtn.innerHTML;
      finalUploadBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: spin 1s linear infinite; transform-origin: center;"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none" stroke-dasharray="30 30"/><path d="M12 2 L12 6 M12 12 L12 18" stroke="white" stroke-width="2"/></svg> Yuklanmoqda...`;
      finalUploadBtn.style.opacity = '0.9';
      
      try {
        // Faylni base64 ga o'tkazish (katta videolar uchun biroz vaqt talab qiladi, lekin local storage demo uchun)
        const videoBase64 = await fileToBase64(selectedVideoFile);
        
        // Video URL ni tozalash (blob URL)
        if (videoObjectURL) {
          URL.revokeObjectURL(videoObjectURL);
          videoObjectURL = null;
        }
        
        // Yangi video obyekti yaratish (tavsif yo'q, description bo'sh string)
        const newVideo = {
          id: Date.now(),
          title: titleRaw,
          description: "",    // Tavsif maydoni butunlay olib tashlanganligi sababli bo'sh
          videoUrl: videoBase64,
          status: 'uploaded',
          createdAt: new Date().toISOString(),
          views: "0",
          timeAgo: "hozirgina",
          likes: 0,
          comments: 0,
          commentsData: [],
          fileName: selectedVideoFile.name,
          fileSize: (selectedVideoFile.size / (1024 * 1024)).toFixed(2) + ' MB',
          author: "Siz",
          channel: "Shaxsiy kanal"
        };
        
        // LocalStorage dan mavjud videolarni olish
        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        videos.unshift(newVideo);   // yangi videoni eng yuqoriga qo'shish
        localStorage.setItem('videos', JSON.stringify(videos));
        
        // Hozirgi ko'rilayotgan video sifatida saqlash (videopage uchun)
        localStorage.setItem('currentVideo', JSON.stringify(newVideo));
        
        // Muvaffaqiyatli yuklandi, videopage.html ga o'tish
        setTimeout(() => {
          alert('Video muvaffaqiyatli yuklandi! Videopage ochiladi.');
          window.location.href = 'videopage.html';
        }, 600);
        
      } catch (err) {
        console.error('Yuklash xatoligi:', err);
        alert('Video yuklashda xatolik yuz berdi. Internet aloqasini tekshiring yoki qayta urinib ko‘ring.');
        finalUploadBtn.disabled = false;
        finalUploadBtn.innerHTML = originalText;
        finalUploadBtn.style.opacity = '1';
        checkForm(); // tugma holatini tiklash
      }
    }
    
    // Base64 converter
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = (error) => reject(error);
        reader.readAsDataURL(file);
      });
    }
    
    // Final upload tugmasi bosilganda
    finalUploadBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (finalUploadBtn.disabled) return;
      uploadVideoProcess();
    });
    
    // Bekor qilish funksiyasi YO'Q, header butunlay olib tashlangan.
    // Foydalanuvchi sahifadan chiqish uchun brauzer orqasiga o'tishi mumkin yoki biz "Orqaga" opsiyasini bermaymiz,
    // chunki talabda header (bekor qilish tugmasi) yo'q qilingan. 
    // Agar istalmasa, hech qanday navigatsiya tugmasi mavjud emas.
    // Profilga qaytish uchun hech qanday tugma yo'q — bu dizayn to'liq header'siz.
    
    
    // Dastlabki holatni sozlash: placeholder ko'rinishi va eventlar
    function initialize() {
      // agar placeholder mavjud bo'lsa, uning tugmasini bog'lash
      resetToPlaceholder();  // previewni placeholder holatiga keltirish
      attachUploadButtonEvents();
      initEventDelegation();
      // sarlavha bo'sh, video yo'q, tugma disabled
      checkForm();
      // fileInfo dastlab yashirin
      if (fileInfoDiv) fileInfoDiv.style.display = 'none';
      selectedVideoFile = null;
      if (videoObjectURL) {
        URL.revokeObjectURL(videoObjectURL);
        videoObjectURL = null;
      }
    }
    
    // DOMContentLoaded da ishga tushirish
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initialize);
    } else {
      initialize();
    }
  })();
</script>
</body>
</html>
