<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Umumiy sozlamalar */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000000; color: #ffffff; height: 100vh; overflow: hidden; }
    
    .app-wrapper { 
      width: 100%; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      position: relative; 
    }

    /* Header */
    .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .points-badge { background: #fff; color: #000; padding: 6px 14px; border-radius: 20px; font-weight: 800; font-size: 0.9rem; }

    /* Modullar uchun asosiy konteyner */
    .scroll-container { 
      flex: 1; 
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      padding: 10px 20px; 
      gap: 15px; 
      align-items: center; /* Kartalarni vertikal markazlash */
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* MODUL KARTASI - O'lcham rasmdagidek kattalashtirildi */
    .lesson-card { 
      flex: 0 0 85%; 
      height: 65vh; /* Ekran balandligining 65% qismini egallaydi (rasmdagi qizil katak kabi) */
      min-height: 400px;
      border-radius: 45px; 
      padding: 40px; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-start; /* Kontentni yuqoridan boshlash */
      scroll-snap-align: center; 
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a); 
      border: 1px solid rgba(255,255,255,0.05); 
      transition: transform 0.2s; 
      position: relative;
    }
    
    .lesson-card:active { transform: scale(0.97); }

    .modul-label { color: #8e8e93; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 25px; }
    .modul-title { font-size: 2.2rem; font-weight: 700; line-height: 1.2; margin-bottom: auto; }
    .start-btn { color: #007aff; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; margin-top: 20px; }

    /* Bottom Tab Bar */
    .tab-bar { 
      height: 85px; 
      background: rgba(20, 20, 20, 0.8); 
      backdrop-filter: blur(20px); 
      display: flex; 
      align-items: center; 
      justify-content: space-around; 
      padding-bottom: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #8e8e93; text-decoration: none; font-size: 0.7rem; }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header" onclick="openProfile()">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="avatarContainer">
        <span id="avatarText">👤</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" style="font-size: 1rem;">Yuklanmoqda...</h4>
        <p id="userStatus" style="color: #8e8e93; font-size: 0.8rem;">@username</p>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 312</div>
  </div>

  <div class="scroll-container" id="moduleList">
    <div class="lesson-card" onclick="openModule(1, 'Kvant fizikasi asoslari')">
        <span class="modul-label">MODUL 1</span>
        <h2 class="modul-title">Kvant fizikasi<br>asoslari</h2>
        <div class="start-btn">Darsni boshlash →</div>
    </div>
    
    <div class="lesson-card" onclick="openModule(2, 'Algoritmlar')">
        <span class="modul-label">MODUL 2</span>
        <h2 class="modul-title">Algoritmlar va<br>Ma'lumotlar</h2>
        <div class="start-btn">Davom etish →</div>
    </div>
  </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Asosiy</span></a>
    <a href="#" class="tab-item"><svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reyting</span></a>
    <a href="#" class="tab-item"><svg viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg><span>Sovg'a</span></a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  
  // Ilovani to'liq ekranga yoyish
  tg.expand();
  tg.ready();
  tg.headerColor = '#000000';
  tg.backgroundColor = '#000000';

  const user = tg.initDataUnsafe?.user;

  function loadUserData() {
    if (user) {
      document.getElementById('userName').textContent = user.first_name;
      document.getElementById('userStatus').textContent = user.username ? '@' + user.username : 'ID: ' + user.id;
      
      if (user.photo_url) {
        const img = document.getElementById('avatarImage');
        img.src = user.photo_url;
        img.style.display = 'block';
        document.getElementById('avatarText').style.display = 'none';
      }
    }
  }

  function openModule(num, name) {
    tg.HapticFeedback.impactOccurred('medium');
    localStorage.setItem('currentModule', num);
    console.log("Ochilyapti: " + name);
    // location.href = 'modul' + num + '.html';
  }

  loadUserData();
</script>

</body>
</html>
