<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnU | So'zlashuv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1A222B;
            --card-bg: #242F3E;
            --text-main: #FFFFFF;
            --text-secondary: #717F8D;
            --accent-color: #007AFF;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        /* Sarlavha va Profil qatori */
        header {
            max-width: 600px;
            margin: 20px auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .profile-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 24px;
            background: var(--card-bg);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.2s;
        }

        .profile-btn:active {
            transform: scale(0.9);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            background: #2D394A;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        /* Ro'yxat dizayni */
        .modules-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .module-item {
            background: var(--card-bg);
            padding: 12px 16px;
            border-radius: var(--radius);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .module-item:active {
            background: #2D394A;
        }

        .module-image {
            width: 45px;
            height: 45px;
            background: #FFFFFF;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .module-image i, .module-image span {
            font-size: 22px;
            color: #1A222B;
            font-weight: bold;
        }

        .module-title {
            flex-grow: 1;
            font-size: 17px;
            font-weight: 500;
            color: var(--text-main);
        }

        .module-chevron {
            color: var(--text-secondary);
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Soʻzlashuv</h1>
    <a href="profil.html" class="profile-btn">
        <i class="fa-solid fa-circle-user"></i>
    </a>
</header>

<div class="search-container">
    <input type="text" class="search-bar" placeholder="Qidiruv...">
</div>

<main class="modules-list" id="lessonList">
    </main>

<script>
    const lessons = [
        "O'zingizni tanishtiring", "Oila", "Ob-havo", "Hafta kunlari", "Fasllar",
        "Feʼl atvori", "Ranglar", "Raqamlar", "Gapirish", "Kundalik tartib",
        "Sevimli mashg'ulotlar", "Salomlashuv", "Xayrlashuv", "Vaqt", "Rahmat va tashakkur",
        "Kechirim soʻrash", "Rozilik va Norozilik", "Iltimos va istak", "Qiziqishlar", "Oylar",
        "Mevalar", "Sabzavotlar", "Tana aʼzolari", "Fanlar", "Telefon soʻzlashuv 1",
        "Telefon soʻzlashuv 2", "Taom", "Kishilik olmoshlari", "Sifatlar", "Savdo"
    ];

    // Ikonkalar ro'yxati (Maxsus so'ralgan o'zgarishlar bilan)
    const icons = [
        "fa-user-tie", "fa-house-chimney", "fa-cloud-sun", "fa-calendar-days", "fa-leaf",
        "fa-brain", "fa-palette", "fa-5", "fa-comment-dots", "fa-clock",
        "fa-heart", "fa-hand-peace", "fa-door-open", "fa-hourglass-half", "fa-hand-holding-heart",
        "fa-face-frown-open", "fa-thumbs-up", "fa-hand-sparkles", "fa-star", "fa-calendar-check",
        "fa-apple-whole", "fa-carrot", "fa-child", "fa-book-open", "fa-phone",
        "fa-video", "fa-utensils", "fa-users", "fa-wand-magic-sparkles", "fa-cart-shopping"
    ];

    const list = document.getElementById('lessonList');

    lessons.forEach((title, index) => {
        const lessonNum = index + 1;
        const item = document.createElement('a');
        item.href = `d${lessonNum}.html`;
        item.className = 'module-item';

        // 16-dars uchun maxsus emoji ikonka
        let iconContent = `<i class="fas ${icons[index]}"></i>`;
        if(lessonNum === 16) {
            iconContent = `<span>😞</span>`;
        }

        item.innerHTML = `
            <div class="module-image">
                ${iconContent}
            </div>
            <h3 class="module-title">${lessonNum}. ${title}</h3>
            <i class="fas fa-chevron-right module-chevron"></i>
        `;
        list.appendChild(item);
    });
</script>

</body>
</html>
