<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KA7 - Test Tizimi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--tg-theme-button-color, #e94560);
            font-size: 28px;
            letter-spacing: 2px;
        }
        .level-card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--tg-theme-button-color, #e94560);
        }
        .level-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }
        .level-card h2 {
            font-size: 20px;
            margin-bottom: 6px;
        }
        .level-card p {
            color: var(--tg-theme-hint-color, #aaa);
            font-size: 14px;
        }
        .back-btn {
            display: none;
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .question-area {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" id="backBtn">← Orqaga</button>

        <!-- Bosh sahifa -->
        <div id="mainScreen">
            <h1>KA7</h1>
            <div class="level-card" data-level="A1">
                <h2>📗 A1 — Boshlang'ich</h2>
                <p>Asosiy tushunchalar va oddiy testlar</p>
            </div>
            <div class="level-card" data-level="A2">
                <h2>📘 A2 — O'rta boshlang'ich</h2>
                <p>Kengaytirilgan bilimlar</p>
            </div>
            <div class="level-card" data-level="B1">
                <h2>📙 B1 — O'rta</h2>
                <p>Murakkabroq mavzular</p>
            </div>
            <div class="level-card" data-level="B2">
                <h2>📕 B2 — Yuqori o'rta</h2>
                <p>Ilg'or darajadagi testlar</p>
            </div>
        </div>

        <!-- Test sahifasi -->
        <div class="question-area" id="questionArea"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Telegram "Orqaga" tugmasi
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            goBack();
        });

        const mainScreen = document.getElementById('mainScreen');
        const questionArea = document.getElementById('questionArea');
        const backBtn = document.getElementById('backBtn');
        let currentLevel = '';

        // Daraja tanlash
        document.querySelectorAll('.level-card').forEach(card => {
            card.addEventListener('click', () => {
                currentLevel = card.dataset.level;
                showQuestions(currentLevel);
            });
        });

        // Custom orqaga tugmasi
        backBtn.addEventListener('click', () => {
            goBack();
        });

        function goBack() {
            if (questionArea.style.display === 'block') {
                showMain();
            } else {
                tg.close();
            }
        }

        function showMain() {
            questionArea.style.display = 'none';
            mainScreen.style.display = 'block';
            backBtn.style.display = 'none';
            currentLevel = '';
        }

        function showQuestions(level) {
            mainScreen.style.display = 'none';
            backBtn.style.display = 'inline-block';
            questionArea.style.display = 'block';
            questionArea.innerHTML = `
                <h2>${level} darajasi</h2>
                <p style="text-align:center;padding:30px;">Testlar tayyorlanmoqda...</p>
            `;
            // Bu yerga test savollari qo'shiladi
        }

        tg.ready();
    </script>
</body>
</html>
