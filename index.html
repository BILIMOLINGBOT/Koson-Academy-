<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dono - Video Platform</title>
  <!-- Telegram WebApp scripti faqat funksionallik uchun (dizayn o'zgartirilmaydi) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #ffffff;
      --ios-secondary-bg: #f2f2f7;
      --ios-text: #000000;
      --ios-gray: #8e8e93;
      --ios-red: #FF3B30;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--ios-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--ios-text);
      padding-bottom: 0;
      line-height: 1.4;
    }

    /* ===== HEADER (iOS Style with Blur) ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: calc(var(--safe-top) + 10px) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .app-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.8px;
      background: linear-gradient(45deg, #007AFF, #5856D6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-icon {
      position: relative;
      color: var(--ios-text);
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .header-icon:active {
      transform: scale(0.9);
      opacity: 0.6;
    }

    .notification-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 9px;
      height: 9px;
      background-color: var(--ios-red);
      border-radius: 50%;
      border: 1.5px solid white;
    }

    .avatar-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.1);
      background-color: #e1e1e1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .avatar-initial {
      font-size: 14px;
      font-weight: 600;
      color: #007AFF;
      text-transform: uppercase;
    }

    /* ===== SEARCH BAR (Hidden by default) ===== */
    .search-overlay {
      display: none;
      padding: 10px 16px;
      background: var(--ios-bg);
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
    }
    
    .search-input-container {
      background: var(--ios-secondary-bg);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-input-container input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 16px;
      font-family: inherit;
    }

    /* ===== FEED (Video kartalar) ===== */
    .feed {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .video-item {
      width: 100%;
      margin-bottom: 12px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .video-item:active {
      background: var(--ios-secondary-bg);
    }

    .thumbnail-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      background: #e9e9ef;
    }

    .thumbnail-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
    }

    .video-details {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
    }

    .channel-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
      background: #ddd;
    }

    .video-text {
      flex: 1;
    }

    .video-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      font-size: 13px;
      color: var(--ios-gray);
    }
    
    /* Qo'shimcha: pastki bo'shliq */
    .safe-bottom-placeholder {
      height: calc(12px + var(--safe-bottom));
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="app-title">Dono</div>
    <div class="header-right">
      <div class="header-icon" id="search-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <div class="header-icon" id="notification-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notification-badge"></span>
      </div>
      <div class="header-icon avatar-wrapper" id="userAvatarBtn">
        <img id="userAvatarImg" src="https://ui-avatars.com/api/?name=User&background=007AFF&color=fff&bold=true" alt="User">
        <span id="avatarInitialText" class="avatar-initial" style="display: none;"></span>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-bar">
    <div class="search-input-container">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ios-gray)" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="searchInput" placeholder="Video qidirish...">
    </div>
  </div>

  <main class="feed" id="videoFeed">
    <!-- Video kartalar dinamik tarzda JavaScript orqali yuklanadi (asl tarkibni saqlab, 30+ modul mavzusiga mos) -->
  </main>
  
  <div class="safe-bottom-placeholder"></div>

  <script>
    // Telegram WebApp imkoniyatlarini ishga tushirish (dizaynni buzmaydi, funksional integratsiya)
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.expand();
      try {
        tg.setHeaderColor('bg_color');
        tg.setBackgroundColor('bg_color');
      } catch(e) { console.warn(e); }
    }
    
    // ========================
    // 1. MODULLAR / VIDEO MA'LUMOTLARI (30 ta dars / video)
    // Asl LearnU dagi modullar mavzusini saqlab, Dono video platformasiga moslashtirildi.
    // Har bir video: sarlavha, kanal nomi, ko'rishlar soni, vaqt, rasm ID
    // ========================
    const videoModules = [
      { title: "Dasturlash asoslari: Kirish", channel: "IT Academy", views: "23K", time: "2 soat oldin", duration: "12:45", imgId: "1", topic: "Dasturlash" },
      { title: "Algoritmlar: Sorting va Search", channel: "AlgoMaster", views: "18K", time: "1 kun oldin", duration: "08:22", imgId: "2", topic: "Algoritmlar" },
      { title: "Ma'lumotlar tuzilmasi: Linked List", channel: "DataLab", views: "14K", time: "2 kun oldin", duration: "15:10", imgId: "3", topic: "Data Structure" },
      { title: "Veb dasturlash: HTML/CSS asoslari", channel: "WebAcademy", views: "31K", time: "5 soat oldin", duration: "09:45", imgId: "4", topic: "Veb" },
      { title: "Mobil dasturlash: Flutter kirish", channel: "MobileDev", views: "12K", time: "3 kun oldin", duration: "11:30", imgId: "5", topic: "Mobil" },
      { title: "Sun'iy intellekt: Nima?", channel: "AI Hub", views: "45K", time: "1 hafta oldin", duration: "14:20", imgId: "6", topic: "AI" },
      { title: "Ma'lumotlar bazasi: SQL asoslari", channel: "DataBase Pro", views: "9K", time: "4 kun oldin", duration: "10:15", imgId: "7", topic: "DB" },
      { title: "Tarmoq texnologiyalari: TCP/IP", channel: "NetTech", views: "7.2K", time: "6 kun oldin", duration: "13:40", imgId: "8", topic: "Network" },
      { title: "Kiberxavfsizlik: asosiy tushunchalar", channel: "CyberSafe", views: "19K", time: "2 kun oldin", duration: "17:05", imgId: "9", topic: "Security" },
      { title: "Bulutli hisoblash: AWS boshlang'ich", channel: "CloudExpert", views: "11K", time: "1 hafta oldin", duration: "22:10", imgId: "10", topic: "Cloud" },
      { title: "Python dasturlash: OOP", channel: "Python Lab", views: "28K", time: "3 soat oldin", duration: "16:30", imgId: "11", topic: "Python" },
      { title: "JavaScript asoslari: ES6+", channel: "JS Ninja", views: "34K", time: "1 kun oldin", duration: "19:45", imgId: "12", topic: "JavaScript" },
      { title: "React.js: Komponentlar", channel: "React Masters", views: "26K", time: "5 kun oldin", duration: "21:20", imgId: "13", topic: "React" },
      { title: "Node.js: Backend asoslari", channel: "NodeSkills", views: "15K", time: "3 kun oldin", duration: "14:55", imgId: "14", topic: "Node" },
      { title: "Flutter: UI yaratish", channel: "FlutterWay", views: "9.8K", time: "2 hafta oldin", duration: "18:30", imgId: "15", topic: "Flutter" },
      { title: "Kotlin: Android dasturlash", channel: "AndroidDev", views: "13K", time: "4 kun oldin", duration: "12:12", imgId: "16", topic: "Kotlin" },
      { title: "Swift: iOS kirish", channel: "iOS Academy", views: "10K", time: "1 hafta oldin", duration: "20:05", imgId: "17", topic: "Swift" },
      { title: "Java: Spring Boot", channel: "JavaZone", views: "8K", time: "5 kun oldin", duration: "25:00", imgId: "18", topic: "Java" },
      { title: "C++ dasturlash: Pointerlar", channel: "C++ Experts", views: "17K", time: "2 kun oldin", duration: "19:15", imgId: "19", topic: "C++" },
      { title: "Go dasturlash: Concurrency", channel: "GolangHub", views: "6.5K", time: "1 hafta oldin", duration: "15:40", imgId: "20", topic: "Go" },
      { title: "DevOps asoslari: CI/CD", channel: "DevOpsLife", views: "12K", time: "3 kun oldin", duration: "23:10", imgId: "21", topic: "DevOps" },
      { title: "Docker va Kubernetes", channel: "ContainerPro", views: "21K", time: "6 kun oldin", duration: "27:30", imgId: "22", topic: "Docker" },
      { title: "Machine Learning: Regression", channel: "ML Masters", views: "33K", time: "1 kun oldin", duration: "31:20", imgId: "23", topic: "ML" },
      { title: "Deep Learning: Neural Networks", channel: "DeepMind", views: "29K", time: "2 kun oldin", duration: "28:45", imgId: "24", topic: "DL" },
      { title: "Data Science: Pandas", channel: "DataSciLab", views: "16K", time: "4 kun oldin", duration: "18:55", imgId: "25", topic: "Data Science" },
      { title: "Blockchain: Smart Contracts", channel: "BlockchainHub", views: "24K", time: "1 hafta oldin", duration: "22:30", imgId: "26", topic: "Blockchain" },
      { title: "IoT texnologiyalari: Kirish", channel: "IoT World", views: "7K", time: "3 hafta oldin", duration: "14:10", imgId: "27", topic: "IoT" },
      { title: "AR/VR dasturlash: Unity", channel: "XR Creators", views: "5.8K", time: "2 hafta oldin", duration: "26:15", imgId: "28", topic: "AR/VR" },
      { title: "Game Development: Unreal Engine", channel: "GameDevPro", views: "19K", time: "5 kun oldin", duration: "33:20", imgId: "29", topic: "GameDev" },
      { title: "Software Architecture: Microservices", channel: "ArchitectMind", views: "11K", time: "8 kun oldin", duration: "24:40", imgId: "30", topic: "Architecture" }
    ];
    
    // Foydalanuvchi ma'lumotlarini Telegram'dan olish va avatarni yangilash
    function updateUserProfile() {
      const user = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
      const avatarImg = document.getElementById('userAvatarImg');
      const initialSpan = document.getElementById('avatarInitialText');
      
      if (user && user.first_name) {
        let fullName = user.first_name;
        if (user.last_name) fullName = `${user.first_name} ${user.last_name}`;
        // App-title yonida emas, headerda faqat avatar. Lekin qulaylik: title o'zgarishsiz "Dono"
        if (user.photo_url) {
          avatarImg.src = user.photo_url;
          avatarImg.style.display = 'block';
          initialSpan.style.display = 'none';
          avatarImg.onerror = () => {
            avatarImg.style.display = 'none';
            initialSpan.style.display = 'flex';
            initialSpan.textContent = user.first_name.charAt(0).toUpperCase();
          };
        } else {
          avatarImg.style.display = 'none';
          initialSpan.style.display = 'flex';
          initialSpan.textContent = user.first_name.charAt(0).toUpperCase();
        }
      } else {
        // Demo foydalanuvchi: default avatar saqlanadi
        avatarImg.style.display = 'block';
        initialSpan.style.display = 'none';
        avatarImg.src = "https://ui-avatars.com/api/?name=Javlonbek&background=007AFF&color=fff&bold=true";
      }
    }
    
    // Video kartani yaratish funksiyasi (Dono dizayniga mos)
    function renderVideoCards(filterText = "") {
      const feedContainer = document.getElementById('videoFeed');
      if (!feedContainer) return;
      
      // Filtrlash (title yoki channel bo'yicha)
      let filteredVideos = videoModules;
      if (filterText.trim() !== "") {
        const lowerQuery = filterText.toLowerCase();
        filteredVideos = videoModules.filter(video => 
          video.title.toLowerCase().includes(lowerQuery) || 
          video.channel.toLowerCase().includes(lowerQuery) ||
          video.topic.toLowerCase().includes(lowerQuery)
        );
      }
      
      if (filteredVideos.length === 0) {
        feedContainer.innerHTML = `<div style="padding: 40px 20px; text-align: center; color: var(--ios-gray);">Hech qanday video topilmadi 😢</div>`;
        return;
      }
      
      let html = '';
      for (let i = 0; i < filteredVideos.length; i++) {
        const v = filteredVideos[i];
        // Kanali iconsi uchun UI avatarlar (rangli)
        const channelInitial = v.channel.charAt(0).toUpperCase();
        const channelBgColor = getColorFromString(v.channel);
        
        html += `
          <div class="video-item" data-video-idx="${i}" data-video-title="${v.title.replace(/"/g, '&quot;')}">
            <div class="thumbnail-container">
              <img src="https://picsum.photos/id/${v.imgId % 30 + 10}/800/450" alt="${v.title}" loading="lazy">
              <span class="video-duration">${v.duration}</span>
            </div>
            <div class="video-details">
              <img class="channel-icon" src="https://ui-avatars.com/api/?name=${channelInitial}&background=${channelBgColor}&color=fff&bold=true&size=40" alt="${v.channel}">
              <div class="video-text">
                <h2 class="video-title">${v.title}</h2>
                <p class="video-meta">${v.channel} • ${v.views} ko'rildi • ${v.time}</p>
              </div>
            </div>
          </div>
        `;
      }
      feedContainer.innerHTML = html;
      
      // Har bir video-itemga bosish funksiyasini qo'shamiz (LearnU'da openModule o'rnida)
      document.querySelectorAll('.video-item').forEach((el, idx) => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const originalIndex = el.getAttribute('data-video-idx');
          const videoData = filteredVideos[originalIndex];
          if (videoData) {
            if (tg) tg.HapticFeedback?.impactOccurred('light');
            // Real loyihada video player yoki modul sahifasiga o'tish mumkin
            alert(`"${videoData.title}" darsi ochilmoqda (to'liq video player keyingi versiyada).`);
            // localStorage da oxirgi modulni saqlab qo'yish (learnU'dan meros)
            localStorage.setItem('last_module', videoData.title);
            localStorage.setItem(`module_${videoData.title}_status`, 'opened');
            // Ixtiyoriy: window.location = `modul.html?video=${encodeURIComponent(videoData.title)}`;
          }
        });
      });
    }
    
    // Kanal rangi uchun oddiy funksiya
    function getColorFromString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      const colors = ['007AFF', '5856D6', 'FF9500', 'FF3B30', '4CD964', 'AF52DE', 'FF2D55', '5E5CE0', '32ADE6', 'E8432F'];
      return colors[Math.abs(hash) % colors.length];
    }
    
    // Qidiruv funksiyasi
    let searchActive = false;
    const searchBtn = document.getElementById('search-btn');
    const searchBarDiv = document.getElementById('search-bar');
    const searchInputElem = document.getElementById('searchInput');
    
    if (searchBtn && searchBarDiv) {
      searchBtn.addEventListener('click', () => {
        if (searchBarDiv.style.display === 'block') {
          searchBarDiv.style.display = 'none';
          // Qidiruvni tozalab, barcha videolarni qayta ko'rsatish
          if (searchInputElem) searchInputElem.value = '';
          renderVideoCards('');
        } else {
          searchBarDiv.style.display = 'block';
          searchInputElem?.focus();
        }
      });
    }
    
    if (searchInputElem) {
      searchInputElem.addEventListener('input', (e) => {
        const query = e.target.value;
        renderVideoCards(query);
      });
      // Qidiruvni yopish uchun boshqa joyga bosganda emas, lekin ESC bosganda yopish qulay
      searchInputElem.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (searchBarDiv) searchBarDiv.style.display = 'none';
          searchInputElem.value = '';
          renderVideoCards('');
        }
      });
    }
    
    // Scroll header effekti (iOS blur shadow)
    window.addEventListener('scroll', () => {
      const header = document.querySelector('.header');
      if (window.scrollY > 10) {
        header.style.boxShadow = '0 4px 30px rgba(0, 0, 0, 0.05)';
      } else {
        header.style.boxShadow = 'none';
      }
    });
    
    // Bildirishnoma bosilganda (faqat haptic)
    const notifIcon = document.getElementById('notification-icon');
    if (notifIcon) {
      notifIcon.addEventListener('click', () => {
        if (tg) tg.HapticFeedback?.notificationOccurred('warning');
        alert("Bildirishnomalar: Yangi videolar va darslar haqida xabar olasiz.");
      });
    }
    
    // Avatar bosilganda profilga o'tish (ixtiyoriy, LearnU'dagi header navigatsiyasiga o'xshash)
    const avatarBtn = document.getElementById('userAvatarBtn');
    if (avatarBtn) {
      avatarBtn.addEventListener('click', () => {
        if (tg) tg.HapticFeedback?.impactOccurred('light');
        // Profil ma'lumotlari (real loyihada profil.html)
        const user = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
        let nameInfo = "Mehmon";
        if (user && user.first_name) {
          nameInfo = user.first_name + (user.last_name ? ` ${user.last_name}` : '');
        }
        alert(`👤 ${nameInfo}\n🎓 Ballar: ${localStorage.getItem('user_points') || 312}\n🎥 Dono platformasida videolar tomosha qiling.`);
      });
    }
    
    // LocalStorage'dan ballarni o'qish va konsolga chiqarish (dizayn talabi emas, lekin LearnU funksiyasini eslatadi)
    const points = localStorage.getItem('user_points') || 312;
    // Ixtiyoriy: ballni headerda ko'rsatish uchun kichik element qo'shish mumkin, lekin asl Dono dizaynida ball ko'rinmaydi.
    // Shuning uchun faqat internal ishlatamiz.
    
    // Telefon uchun safe area va Telegram back button (faqat moslashuv)
    if (tg && tg.BackButton) {
      tg.BackButton.hide();
    }
    
    // Sahifa yuklanganda videolarni render qilish + profilni yangilash
    updateUserProfile();
    renderVideoCards('');
    
    // Agar modul URL parametrlari orqali qidiruv bo'lsa (ixtiyoriy)
    if (window.location.search.includes('search=')) {
      const urlParams = new URLSearchParams(window.location.search);
      const searchTerm = urlParams.get('search');
      if (searchTerm && searchBarDiv) {
        searchBarDiv.style.display = 'block';
        if (searchInputElem) {
          searchInputElem.value = searchTerm;
          renderVideoCards(searchTerm);
        }
      }
    }
  </script>
</body>
</html>
