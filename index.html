<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnU | Zamonaviy So'zlashuv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Rang palitrasini rasmga moslab o'zgartiramiz (To'q mavzu) */
            --bg-color: #1A222B;    /* To'q fon */
            --card-bg: #242F3E;     /* To'q kulrang kartochka foni */
            --text-main: #FFFFFF;     /* Oq matn */
            --text-secondary: #717F8D; /* Kulrang ikkinchi darajali matn/chevron */
            --radius: 12px;           /* Burchak radiusi rasmga o'xshash (kichikroq) */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        header {
            max-width: 800px;
            margin: 40px auto 20px;
            text-align: center;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main); /* Header sarlavhasini oq qilamiz */
        }

        header p {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .search-container {
            max-width: 800px;
            margin: 20px auto;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            background: #2D394A; /* Qidiruv panelining to'q foni */
            border: none;
            border-radius: 12px;
            font-size: 17px;
            outline: none;
            color: var(--text-main); /* Matn oq */
        }

        /* Qidiruv panelidagi placeholder matn rangini o'zgartiramiz */
        .search-bar::placeholder {
            color: #717F8D;
        }

        /* Grid o'rniga vertikal ro'yxat (list) */
        .modules-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            margin: 30px auto;
        }

        /* Ro'yxat elementi (kartochka) */
        .module-item {
            background: var(--card-bg);
            padding: 16px; /* Rasmga o'xshash joy */
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center; /* Vertikal o'q bo'yicha markazlashtirish */
            justify-content: space-between; /* Elementlarni chetga tarqatish */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .module-item:active {
            transform: scale(0.98);
            background: #2D394A;
        }

        /* Chapdagi rasm/ikonka idishi */
        .module-image {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            background: #FFFFFF; /* Rasm ostidagi oq fon */
            border-radius: 8px; /* Rasm ostidagi burchaklar */
            padding: 5px; /* Ikonka uchun ichki joy */
        }

        /* Ikonkalarning o'zini o'zgartiramiz (chunki ular oq fon ustida bo'ladi) */
        .module-image i {
            font-size: 24px;
            color: #1A222B; /* Ikonkalar to'q rangda oq fon ustida */
        }

        /* Sarlavha matni */
        .module-title {
            flex-grow: 1; /* Matn markazda bo'lishi va o'sib borishi uchun */
            font-size: 18px; /* Rasmga o'xshash shrift o'lchami */
            font-weight: 600;
            line-height: 1.3;
            text-align: left; /* Matn chapda boshlanadi */
            color: var(--text-main); /* Oq matn */
        }

        /* O'ngdagi chevron (strelka) */
        .module-chevron {
            font-size: 16px;
            color: var(--text-secondary); /* Kulrang chevron */
            margin-left: 10px;
        }

        @media (max-width: 480px) {
            .modules-list {
                gap: 12px;
            }
            .module-item {
                padding: 12px;
            }
            .module-image {
                width: 40px;
                height: 40px;
                margin-right: 15px;
            }
            .module-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>LearnU</h1>
    <p>30 kunlik zamonaviy so'zlashuv kursi</p>
</header>

<div class="search-container">
    <input type="text" class="search-bar" placeholder="Mavzularni qidirish...">
</div>

<main class="modules-list" id="lessonList">
    </main>

<script>
    const lessons = [
        "O'zingizni tanishtiring", "Oila", "Ob-havo", "Hafta kunlari", "Fasllar",
        "Feʼl atvori", "Ranglar", "Raqamlar", "Gapirish", "Kundalik tartib",
        "Sevimli mashg'ulotlar", "Salomlashuv", "Xayrlashuv", "Vaqt", "Rahmat va tashakkur",
        "Kechirim soʻrash", "Rozilik va Norozilik", "Iltimos va istak", "Qiziqishlar", "Ijtimoiy tarmoqlar",
        "Mevalar", "Sabzavotlar", "Tana aʼzolari", "Fanlar", "Telefon soʻzlashuv 1",
        "Telefon soʻzlashuv 2", "Taom", "Kishilik olmoshlari", "Sifatlar", "Savdo"
    ];

    const icons = [
        "fa-user-tie", "fa-house-chimney", "fa-cloud-sun", "fa-calendar-days", "fa-leaf",
        "fa-brain", "fa-palette", "fa-arrow-1-9", "fa-comment-dots", "fa-clock",
        "fa-heart", "fa-hand-peace", "fa-door-open", "fa-hourglass-half", "fa-hand-holding-heart",
        "fa-face-smile-upside-down", "fa-thumbs-up", "fa-hand-sparkles", "fa-star", "fa-hashtag",
        "fa-apple-whole", "fa-carrot", "fa-child", "fa-book-open", "fa-phone",
        "fa-video", "fa-utensils", "fa-users", "fa-wand-magic-sparkles", "fa-cart-shopping"
    ];

    const list = document.getElementById('lessonList');

    lessons.forEach((title, index) => {
        const lessonNum = index + 1;
        const item = document.createElement('a');
        item.href = `d${lessonNum}.html`;
        item.className = 'module-item';
        // HTML tuzilishini o'zgartiramiz: Rasm/Ikonka -> Matn -> Chevron
        item.innerHTML = `
            <div class="module-image">
                <i class="fas ${icons[index]}"></i>
            </div>
            <h3 class="module-title">${lessonNum}. ${title}</h3>
            <i class="fas fa-chevron-right module-chevron"></i>
        `;
        list.appendChild(item);
    });
</script>

</body>
</html>
