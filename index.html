<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LearnU · Modern UI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-orange: #FF9500;
      --ios-gray: #8E8E93;
      --card-bg: #1C1C1E;
      --locked-bg: rgba(44, 44, 46, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* HEADER - iOS Blur Style */
    .header {
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: saturate(180%) blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .avatar-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a3a3c, #1c1c1e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      border: 0.5px solid rgba(255, 255, 255, 0.2);
    }

    .points-badge {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
      color: #FFD60A; /* iOS Gold */
    }

    /* SCROLL CONTAINER */
    .vertical-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* MODERN CARD STYLES */
    .lesson-card {
      position: relative;
      border-radius: 24px;
      padding: 20px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }

    /* Ochiq (Available) holati */
    .card-available {
      background: linear-gradient(145deg, #2c2c2e 0%, #1c1c1e 100%);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .card-available:active {
      transform: scale(0.97);
      background: #2c2c2e;
    }

    /* Yopiq (Locked) holati */
    .card-locked {
      background: var(--locked-bg);
      backdrop-filter: blur(5px);
      opacity: 0.6;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .card-locked .card-title, .card-locked .module-badge {
      filter: grayscale(1);
    }

    /* Badge & Labels */
    .module-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 8px;
      width: fit-content;
    }

    .badge-available { background: rgba(52, 199, 89, 0.15); color: var(--ios-green); }
    .badge-locked { background: rgba(255, 255, 255, 0.05); color: var(--ios-gray); }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
      color: #FFFFFF;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }

    .action-link {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .action-link.blue { color: var(--ios-blue); }
    .action-link.gray { color: var(--ios-gray); }

    /* Progress bar (mini) */
    .progress-bar-bg {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      width: 100%;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      background: var(--ios-blue);
      border-radius: 2px;
      width: 0%;
    }

    /* TAB BAR */
    .tab-bar {
      padding-bottom: env(safe-area-inset-bottom, 10px);
      height: calc(65px + env(safe-area-inset-bottom, 0px));
      background: rgba(20, 20, 20, 0.94);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .tab-item {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--ios-gray);
      font-size: 10px;
      font-weight: 500;
    }

    .tab-item.active { color: var(--ios-blue); }
    .tab-item svg { width: 24px; height: 24px; stroke-width: 2; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header" onclick="navigateTo('profil.html')">
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="avatar-circle" id="userAvatar">?</div>
      <div class="gradient-name" id="userName" style="font-weight: 700;">Yuklanmoqda...</div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <div class="vertical-container" id="moduleContainer">
    </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Darslar</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20V10M18 20V4M6 20V14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="5"/><path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const topics = [
    'Dasturlash asoslari', 'Algoritmlar', 'Veb dasturlash', 
    'Ma\'lumotlar bazasi', 'Kiberxavfsizlik', 'Sun\'iy intellekt'
  ];

  function renderModules() {
    const container = document.getElementById('moduleContainer');
    let html = '';

    for (let i = 1; i <= 20; i++) {
      const isLocked = i > 4; // Birinchi 4 ta dars ochiq
      const statusClass = isLocked ? 'card-locked' : 'card-available';
      const badgeClass = isLocked ? 'badge-locked' : 'badge-available';
      const topic = topics[(i-1) % topics.length];
      
      html += `
        <div class="lesson-card ${statusClass}" onclick="${isLocked ? '' : `openModule(${i})`}">
          <div style="display: flex; justify-content: space-between;">
            <span class="module-badge ${badgeClass}">${isLocked ? '🔒 Qulflangan' : '🔓 Ochiq'}</span>
            <span style="font-size: 12px; color: var(--ios-gray); font-weight: 600;">MODUL ${i}</span>
          </div>
          <div class="card-title">${topic}</div>
          
          ${!isLocked ? `
            <div class="progress-bar-bg">
              <div class="progress-fill" style="width: ${Math.random() * 100}%"></div>
            </div>
            <div class="card-footer">
              <span class="action-link blue">Darsni boshlash →</span>
              <span style="font-size: 11px; color: var(--ios-gray);">15 ta dars</span>
            </div>
          ` : `
            <div class="card-footer">
              <span class="action-link gray">Keyingi bosqichda ochiladi</span>
            </div>
          `}
        </div>
      `;
    }
    container.innerHTML = html;
  }

  function openModule(id) {
    tg.HapticFeedback.impactOccurred('medium');
    console.log("Modul ochildi: " + id);
    // window.location.href = 'modul' + id + '.html';
  }

  // Init
  const user = tg.initDataUnsafe?.user;
  if (user) {
    document.getElementById('userName').textContent = user.first_name;
    document.getElementById('userAvatar').textContent = user.first_name.charAt(0);
  }
  
  renderModules();
</script>
</body>
</html>
