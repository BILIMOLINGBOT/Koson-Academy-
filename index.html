<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* CSS o'zgarishsiz qoldi, faqat vertikal skroll uchun kichik qo'shimcha */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { 
      background: #000; 
      color: #fff; 
      min-height: 100vh; 
      overflow-y: auto; /* Vertikal skrollga ruxsat berildi */
      overflow-x: hidden;
    }
    .app-wrapper { 
      width: 100%; 
      max-width: 420px; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column;
      padding-bottom: 100px; /* Tab-bar uchun joy */
    }
    
    .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { 
      width: 45px; 
      height: 45px; 
      background: #222; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      font-size: 1.2rem; 
      border: 1px solid #333; 
      overflow: hidden; 
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Gorizontal skroll konteyneri */
    .scroll-container { 
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      padding: 10px 20px; 
      gap: 15px; 
      align-items: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .lesson-card { 
      flex: 0 0 85%; 
      height: 60vh; 
      border-radius: 30px; 
      padding: 30px; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      scroll-snap-align: center; 
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a); 
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .lesson-card:active { transform: scale(0.98); }

    .section-title {
      padding: 20px 20px 0;
      font-size: 18px;
      font-weight: bold;
      color: #8e8e93;
    }

    .tab-bar { 
      position: fixed; /* Tab-bar doim pastda turishi uchun */
      bottom: 0;
      width: 100%;
      max-width: 420px;
      height: 80px; 
      background: rgba(20, 20, 20, 0.95); 
      backdrop-filter: blur(10px);
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      border-top: 0.5px solid #333; 
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .tab-item { color: #8e8e93; text-decoration: none; text-align: center; font-size: 10px; }
    .tab-item.active { color: #007aff; }
    .tab-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 4px; stroke: currentColor; fill: none; }
    
    .points-badge { background: #fff; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    
    .gradient-name {
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header" onclick="navigateTo('profil.html')">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="userAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <div class="section-title">Asosiy modullar</div>
  <div class="scroll-container" id="moduleContainer"></div>

  <div class="section-title">Maxsus darslar</div>
  <div class="scroll-container" id="extraModuleContainer"></div>

  <nav class="tab-bar">
    <a href="index.html" class="tab-item active" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Asosiy</span>
    </a>
    <a href="reyting.html" class="tab-item" onclick="navigateTo('reyting.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="gift.html" class="tab-item" onclick="navigateTo('gift.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="7" width="20" height="5"/><path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');

  // 30 ta asosiy modul
  const mainModules = Array.from({ length: 30 }, (_, i) => {
    const id = i + 1;
    const topics = ['Dasturlash asoslari','Algoritmlar','Ma\'lumotlar tuzilmasi','Veb dasturlash','Mobil dasturlash','Sun\'iy intellekt','Ma\'lumotlar bazasi','Tarmoq texnologiyalari','Kiberxavfsizlik','Bulutli hisoblash','Python dasturlash','JavaScript asoslari','React.js','Node.js','Flutter','Kotlin','Swift','Java','C++ dasturlash','Go dasturlash','DevOps asoslari','Docker va Kubernetes','Machine Learning','Deep Learning','Data Science','Blockchain','IoT texnologiyalari','AR/VR dasturlash','Game Development','Software Architecture'];
    return {
      id: id,
      title: `${id}-modul: ${topics[i] || 'Dasturlash'}`,
      label: `MODUL ${id}`,
      action: id <= 5 ? 'Darsni boshlash' : (id <= 15 ? 'Davom etish' : 'Tez kunda'),
      url: `modul${id}.html`,
      status: id <= 5 ? 'available' : (id <= 15 ? 'in-progress' : 'coming-soon')
    };
  });

  // 5 ta qo'shimcha modul
  const extraModules = [
    { id: 101, title: 'Portfolio yaratish', label: 'MAXSUS 1', action: 'Boshlash', url: 'extra1.html', status: 'available' },
    { id: 102, title: 'Freelance sirlari', label: 'MAXSUS 2', action: 'Boshlash', url: 'extra2.html', status: 'available' },
    { id: 103, title: 'Intervyuga tayyorlov', label: 'MAXSUS 3', action: 'Tez kunda', url: '#', status: 'coming-soon' },
    { id: 104, title: 'Soft Skills', label: 'MAXSUS 4', action: 'Tez kunda', url: '#', status: 'coming-soon' },
    { id: 105, title: 'Karyera maslahatlari', label: 'MAXSUS 5', action: 'Tez kunda', url: '#', status: 'coming-soon' }
  ];

  function setAvatar(user) {
    const avatarInitial = document.getElementById('avatarInitial');
    const avatarImage = document.getElementById('avatarImage');
    if (user && user.photo_url) {
      avatarImage.src = user.photo_url;
      avatarImage.style.display = 'block';
      avatarInitial.style.display = 'none';
    } else {
      avatarInitial.textContent = user?.first_name ? user.first_name.charAt(0).toUpperCase() : '?';
    }
  }

  function initApp() {
    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('userName').textContent = user.last_name ? `${user.first_name} ${user.last_name}` : user.first_name;
      setAvatar(user);
    }
    
    document.getElementById('userPoints').textContent = `⚡ ${localStorage.getItem('user_points') || 312}`;

    renderModules('moduleContainer', mainModules);
    renderModules('extraModuleContainer', extraModules);
  }

  function renderModules(containerId, data) {
    const container = document.getElementById(containerId);
    container.innerHTML = data.map(m => {
      const actionColor = m.status === 'available' ? '#007aff' : (m.status === 'in-progress' ? '#ff9f0a' : '#8e8e93');
      return `
        <div class="lesson-card" onclick="openModule(${m.id}, '${m.url}')">
          <span style="color: #8e8e93; font-size: 12px; font-weight: 600;">${m.label}</span>
          <h2 style="font-size: 24px; line-height: 1.2;">${m.title}</h2>
          <div style="color: ${actionColor}; font-weight: 600;">${m.action} →</div>
        </div>
      `;
    }).join('');
  }

  window.navigateTo = function(url) {
    tg.HapticFeedback.impactOccurred('light');
    setTimeout(() => { window.location.href = url; }, 100);
  };

  window.openModule = function(id, url) {
    if(url === '#') return;
    tg.HapticFeedback.notificationOccurred('success');
    localStorage.setItem('last_module', id);
    setTimeout(() => { window.location.href = url; }, 100);
  };

  initApp();
</script>
</body>
</html>
