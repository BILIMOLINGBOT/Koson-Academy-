<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LearnU · 30 Kunlik Kurs</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-gray: #8E8E93;
      --card-bg: #1C1C1E;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* HEADER - iOS Style */
    .header {
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }

    .header-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .points-pill {
      background: #1c1c1e;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      color: #FFD60A;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* VERTICAL CONTAINER */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 120px; /* Tab bar uchun joy */
    }

    /* PREMIUM LARGE CARD */
    .day-card {
      position: relative;
      width: 100%;
      min-height: 280px; /* Judayam katta hajm */
      border-radius: 32px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Ochiq kunlar */
    .status-open {
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), 
                  linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .status-open:active {
      transform: scale(0.96);
    }

    /* Yopiq kunlar */
    .status-locked {
      background: #121212;
      opacity: 0.4;
      filter: grayscale(1);
    }

    /* Karta ichidagi kontent */
    .day-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--ios-blue);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .day-title {
      font-size: 34px; /* Juda yirik kun raqami */
      font-weight: 900;
      line-height: 1;
      margin-bottom: 12px;
    }

    .day-info {
      font-size: 16px;
      color: var(--ios-gray);
      font-weight: 500;
    }

    .start-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--ios-blue);
      color: #fff;
      padding: 8px 16px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
    }

    .lock-icon {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 20px;
      opacity: 0.5;
    }

    /* TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 450px;
      height: 85px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(25px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      border-top: 0.5px solid rgba(255, 255, 255, 0.1);
    }

    .tab-item {
      color: var(--ios-gray);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .tab-item.active { color: #fff; }
    .tab-item svg { width: 26px; height: 26px; }

  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header">
    <div class="header-title">LearnU</div>
    <div class="points-pill">⚡ 450</div>
  </div>

  <div class="scroll-container" id="daysList">
    </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Bugun</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20V14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span>Profil</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.headerColor = '#000000';

  const container = document.getElementById('daysList');
  
  // 30 ta darsni yaratish
  for (let i = 1; i <= 30; i++) {
    const isLocked = i > 3; // Namuna uchun birinchi 3 kun ochiq
    const card = document.createElement('div');
    card.className = `day-card ${isLocked ? 'status-locked' : 'status-open'}`;
    
    // Karta mazmuni
    card.innerHTML = `
      ${isLocked ? '<div class="lock-icon">🔒</div>' : '<div class="start-btn">DAVOM ETISH</div>'}
      <div class="day-label">Mavzu: Kirish</div>
      <div class="day-title">${i}-Kun</div>
      <div class="day-info">Ushbu darsda siz asosiy tushunchalar bilan tanishasiz.</div>
    `;

    // Click funksiyasi
    card.onclick = () => {
      if (!isLocked) {
        tg.HapticFeedback.impactOccurred('medium');
        // Sahifaga yo'naltirish: dars1.html, dars2.html...
        window.location.href = `dars${i}.html`;
      } else {
        tg.HapticFeedback.notificationOccurred('error');
        tg.showAlert("Ushbu dars hali qulflangan. Oldingi darslarni yakunlang!");
      }
    };

    container.appendChild(card);
  }

  // Telegram foydalanuvchi ismini chiqarish (agar kerak bo'lsa)
  if (tg.initDataUnsafe?.user) {
    console.log("Salom, " + tg.initDataUnsafe.user.first_name);
  }
</script>
</body>
</html>
