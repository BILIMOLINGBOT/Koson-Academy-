<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .avatar-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-circle {
      width: 45px;
      height: 45px;
      background: #222;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      border: 1px solid #333;
      overflow: hidden;
    }

    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scroll qilish uchun container */
    .scroll-container {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 20px;
      gap: 12px;
      align-items: center;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* 5 ta karta bir ekranda ko'rinishi uchun eni 18% (5*18% = 90%, qolgan 10% gap va padding) */
    .lesson-card {
      flex: 0 0 18%;
      min-width: 140px;  /* Kichik ekranlarda yaxshi ko'rinish uchun minimal eni */
      height: 55vh;
      border-radius: 30px;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: start;
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .lesson-card:active {
      transform: scale(0.97);
    }

    .tab-bar {
      height: 80px;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 0.5px solid #333;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      color: #8e8e93;
      text-decoration: none;
      text-align: center;
      font-size: 10px;
    }

    .tab-item.active {
      color: #007aff;
    }

    .tab-item svg {
      width: 24px;
      height: 24px;
      display: block;
      margin: 0 auto 4px;
      stroke: currentColor;
      fill: none;
    }

    .points-badge {
      background: #fff;
      color: #000;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    .gradient-name {
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }

    .badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: #8e8e93;
      align-self: flex-start;
      margin-bottom: 10px;
    }

    /* Kichik ekranlar uchun moslashuv */
    @media (max-width: 380px) {
      .lesson-card {
        flex: 0 0 40%;
        min-width: 130px;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="header" onclick="navigateTo('profil.html')">
      <div class="avatar-wrapper">
        <div class="avatar-circle" id="userAvatar">
          <span id="avatarInitial">?</span>
          <img id="avatarImage" src="" alt="avatar" style="display: none;" />
        </div>
        <div>
          <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
        </div>
      </div>
      <div class="points-badge" id="userPoints">⚡ 0</div>
    </div>

    <div class="scroll-container" id="moduleContainer"></div>

    <nav class="tab-bar">
      <a href="index.html" class="tab-item active" onclick="navigateTo('index.html')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
        <span>Asosiy</span>
      </a>
      <a href="reyting.html" class="tab-item" onclick="navigateTo('reyting.html')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <line x1="12" y1="20" x2="12" y2="10" />
          <line x1="18" y1="20" x2="18" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span>Reyting</span>
      </a>
      <a href="gift.html" class="tab-item" onclick="navigateTo('gift.html')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <rect x="2" y="7" width="20" height="5" />
          <path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" />
        </svg>
        <span>Sovg'alar</span>
      </a>
    </nav>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor('bg_color');

    // 30 ta modul mavzulari
    const topics = [
      'Dasturlash asoslari',
      'Algoritmlar',
      'Ma\'lumotlar tuzilmasi',
      'Veb dasturlash',
      'Mobil dasturlash',
      'Sun\'iy intellekt',
      'Ma\'lumotlar bazasi',
      'Tarmoq texnologiyalari',
      'Kiberxavfsizlik',
      'Bulutli hisoblash',
      'Python dasturlash',
      'JavaScript asoslari',
      'React.js',
      'Node.js',
      'Flutter',
      'Kotlin',
      'Swift',
      'Java',
      'C++ dasturlash',
      'Go dasturlash',
      'DevOps asoslari',
      'Docker va Kubernetes',
      'Machine Learning',
      'Deep Learning',
      'Data Science',
      'Blockchain',
      'IoT texnologiyalari',
      'AR/VR dasturlash',
      'Game Development',
      'Software Architecture'
    ];

    const modules = Array.from({ length: 30 }, (_, i) => {
      const id = i + 1;
      return {
        id: id,
        title: topics[i] || 'Dasturlash',
        label: `${id}-MODUL`,
        action: id <= 5 ? 'Boshlash' : id <= 15 ? 'Davom et' : 'Tez kunda',
        url: `modul${id}.html`,
        status: id <= 5 ? 'available' : id <= 15 ? 'in-progress' : 'coming-soon',
      };
    });

    function setAvatar(user) {
      const avatarInitial = document.getElementById('avatarInitial');
      const avatarImage = document.getElementById('avatarImage');

      if (user?.photo_url) {
        avatarImage.src = user.photo_url;
        avatarImage.style.display = 'block';
        avatarInitial.style.display = 'none';
        avatarImage.onerror = function () {
          avatarImage.style.display = 'none';
          avatarInitial.style.display = 'block';
          avatarInitial.textContent = user.first_name?.charAt(0).toUpperCase() || '?';
        };
      } else {
        avatarImage.style.display = 'none';
        avatarInitial.style.display = 'block';
        avatarInitial.textContent = user?.first_name?.charAt(0).toUpperCase() || '?';
      }
    }

    function initApp() {
      const user = tg.initDataUnsafe?.user;

      if (user) {
        let fullName = user.first_name || 'Foydalanuvchi';
        if (user.last_name) fullName += ' ' + user.last_name;
        document.getElementById('userName').textContent = fullName;
        setAvatar(user);
      } else {
        document.getElementById('userName').textContent = 'Mehmon';
        setAvatar(null);
      }

      const points = localStorage.getItem('user_points') || 312;
      document.getElementById('userPoints').textContent = `⚡ ${points}`;

      renderModules();
    }

    function renderModules() {
      const container = document.getElementById('moduleContainer');
      container.innerHTML = modules
        .map((m) => {
          const actionColor =
            m.status === 'available'
              ? '#007aff'
              : m.status === 'in-progress'
              ? '#ff9f0a'
              : '#8e8e93';

          return `
          <div class="lesson-card" onclick="openModule(${m.id}, '${m.url}')">
            <span class="badge">${m.label}</span>
            <div>
              <h3 style="font-size: 18px; margin-bottom: 8px;">${m.title}</h3>
              <p style="font-size: 12px; color: #aaa;">${m.action}</p>
            </div>
            <div style="color: ${actionColor}; font-weight: 600; font-size: 14px;">→</div>
          </div>
        `;
        })
        .join('');
    }

    window.navigateTo = function (url) {
      tg.HapticFeedback.impactOccurred('light');
      setTimeout(() => (window.location.href = url), 100);
    };

    window.openModule = function (id, url) {
      tg.HapticFeedback.notificationOccurred('success');
      localStorage.setItem('last_module', id);
      localStorage.setItem(`module_${id}_status`, 'opened');
      setTimeout(() => (window.location.href = url), 100);
    };

    if (window.location.pathname.includes('modul') || window.location.pathname.includes('profil.html')) {
      tg.BackButton.show();
      tg.BackButton.onClick(() => window.history.back());
    } else {
      tg.BackButton.hide();
    }

    initApp();
  </script>
</body>
</html>
