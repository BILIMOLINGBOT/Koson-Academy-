<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dono - Asosiy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #000000;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .app-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(45deg, #007AFF, #5856D6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-icon {
      cursor: pointer;
      transition: transform 0.1s ease;
      color: #000000;
    }

    .header-icon:active {
      transform: scale(0.9);
    }

    .avatar-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
    }

    .avatar-wrapper div {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #007AFF;
      color: white;
      font-weight: 600;
    }

    /* Feed */
    .feed {
      display: flex;
      flex-direction: column;
      padding-bottom: 20px;
    }

    .video-item {
      width: 100%;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .video-item:active {
      background: #f2f2f7;
    }

    .thumbnail-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      background: #e5e5ea;
    }

    .thumbnail-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .video-details {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
    }

    .channel-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }

    .video-text {
      flex: 1;
    }

    .video-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      font-size: 13px;
      color: #8e8e93;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #8e8e93;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 16px calc(env(safe-area-inset-bottom) + 8px) 16px;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
      flex: 1;
    }

    .nav-item:active {
      opacity: 0.6;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: #8e8e93;
    }

    .nav-item.active .nav-label {
      color: #007AFF;
    }

    .nav-item.active .nav-icon {
      stroke: #007AFF;
      fill: #007AFF;
    }

    .main-content {
      padding-bottom: 70px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="app-title">Dono</div>
    <div class="header-right">
      <div class="header-icon" id="search-header-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <div class="header-icon" id="notification-header-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <div class="avatar-wrapper" id="profile-header-btn">
        <div id="header-avatar">U</div>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div class="feed" id="feed">
      <div class="loading">Videolar yuklanmoqda...</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-page="index">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z"/>
      </svg>
      <span class="nav-label">Bosh sahifa</span>
    </div>
    <div class="nav-item" data-page="search">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Qidiruv</span>
    </div>
    <div class="nav-item" data-page="notification">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-label">Bildirish</span>
    </div>
    <div class="nav-item" data-page="profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Profil</span>
    </div>
  </div>

  <script>
    // Video ma'lumotlar
    const videos = [
      {
        id: 1,
        thumbnail: "https://picsum.photos/id/1/800/450",
        duration: "12:45",
        channelIcon: "https://ui-avatars.com/api/?name=IT&background=333&color=fff",
        title: "JavaScript'da Telegram Mini Apps yaratish darsi",
        meta: "IT Academy • 15K ko'rildi • 2 soat oldin"
      },
      {
        id: 2,
        thumbnail: "https://picsum.photos/id/10/800/450",
        duration: "05:20",
        channelIcon: "https://ui-avatars.com/api/?name=N&background=4CD964&color=fff",
        title: "Tabiatning eng sokin burchaklari: 4K manzara",
        meta: "Nature Lab • 8K ko'rildi • 1 kun oldin"
      },
      {
        id: 3,
        thumbnail: "https://picsum.photos/id/20/800/450",
        duration: "08:15",
        channelIcon: "https://ui-avatars.com/api/?name=E&background=FF9500&color=fff",
        title: "Ingliz tili grammatikasini 8 haftada o'rganish",
        meta: "Language Pro • 22K ko'rildi • 3 kun oldin"
      },
      {
        id: 4,
        thumbnail: "https://picsum.photos/id/26/800/450",
        duration: "15:30",
        channelIcon: "https://ui-avatars.com/api/?name=AI&background=5856D6&color=fff",
        title: "Sun'iy intellekt asoslari - to'liq kurs",
        meta: "AI Academy • 45K ko'rildi • 1 hafta oldin"
      }
    ];

    let tg = null;

    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 14px;
        z-index: 3000;
        animation: fadeInOut 2s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function loadVideos() {
      const feed = document.getElementById('feed');
      feed.innerHTML = videos.map(video => `
        <div class="video-item" data-id="${video.id}">
          <div class="thumbnail-container">
            <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
            <span class="video-duration">${video.duration}</span>
          </div>
          <div class="video-details">
            <img class="channel-icon" src="${video.channelIcon}" alt="Channel">
            <div class="video-text">
              <h2 class="video-title">${video.title}</h2>
              <p class="video-meta">${video.meta}</p>
            </div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.video-item').forEach(item => {
        item.addEventListener('click', () => {
          if (tg && tg.showAlert) {
            tg.showAlert('Video player tez orada qo\'shiladi');
          } else {
            showToast('Video player tez orada qo\'shiladi');
          }
        });
      });
    }

    function initTelegram() {
      if (window.Telegram?.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.initDataUnsafe?.user) {
          const user = tg.initDataUnsafe.user;
          const initial = user.first_name ? user.first_name.charAt(0).toUpperCase() : 'U';
          document.getElementById('header-avatar').textContent = initial;
          localStorage.setItem('userData', JSON.stringify(user));
        } else {
          const demoUser = { first_name: 'Mehmon', id: 123, username: 'guest' };
          localStorage.setItem('userData', JSON.stringify(demoUser));
          document.getElementById('header-avatar').textContent = 'M';
        }
      } else {
        const demoUser = { first_name: 'Demo', id: 123456, username: 'demo_user' };
        localStorage.setItem('userData', JSON.stringify(demoUser));
        document.getElementById('header-avatar').textContent = 'D';
      }
      loadVideos();
    }

    // Navigatsiya
    function navigateTo(page) {
      window.location.href = `${page}.html`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTelegram();
      
      // Bottom nav
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const page = item.dataset.page;
          if (page !== 'index') {
            navigateTo(page);
          }
        });
      });
      
      // Header tugmalar
      document.getElementById('search-header-btn')?.addEventListener('click', () => navigateTo('search'));
      document.getElementById('notification-header-btn')?.addEventListener('click', () => navigateTo('notification'));
      document.getElementById('profile-header-btn')?.addEventListener('click', () => navigateTo('profile'));
    });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
