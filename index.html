<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .app-wrapper { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
    
    /* Header qismi */
    .header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 40px; height: 40px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #333; overflow: hidden; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    .gradient-name { background: linear-gradient(135deg, #fff, #aaccff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; font-size: 16px; }
    .points-badge { background: #fff; color: #000; padding: 4px 10px; border-radius: 15px; font-weight: bold; font-size: 13px; }

    /* Asosiy kontent maydoni (Vertical Scroll) */
    .main-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    .main-content::-webkit-scrollbar { display: none; }

    .section-title { padding: 10px 20px 5px; font-size: 14px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Gorizontal skroll konteyneri */
    .scroll-container { 
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      padding: 10px 20px 20px; 
      gap: 12px; 
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* Katta kartochkalar (30 talik uchun) */
    .lesson-card { 
      flex: 0 0 75%; 
      height: 220px; 
      border-radius: 24px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      scroll-snap-align: start; 
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a); 
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.2s;
    }

    /* Kichik kartochkalar (5 talik uchun) */
    .mini-card {
      flex: 0 0 60%;
      height: 140px;
      border-radius: 20px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: start;
      background: linear-gradient(145deg, #2c2c2e, #1c1c1e);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-label { font-size: 10px; font-weight: 700; color: #8e8e93; }
    .card-title { font-size: 18px; font-weight: 600; line-height: 1.2; margin-top: 5px; }
    .mini-card .card-title { font-size: 15px; }
    .card-action { font-size: 13px; font-weight: 600; margin-top: auto; }

    /* Tab Bar */
    .tab-bar { 
      height: 75px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
      display: flex; justify-content: space-around; align-items: center;
      border-top: 0.5px solid #222; padding-bottom: env(safe-area-inset-bottom);
      flex-shrink: 0;
    }
    .tab-item { color: #8e8e93; text-decoration: none; text-align: center; font-size: 10px; transition: 0.2s; }
    .tab-item.active { color: #007aff; }
    .tab-item svg { width: 22px; height: 22px; display: block; margin: 0 auto 4px; stroke: currentColor; fill: none; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header">
    <div class="avatar-wrapper" onclick="window.location.href='profil.html'">
      <div class="avatar-circle" id="userAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div><h4 id="userName" class="gradient-name">Yuklanmoqda...</h4></div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 312</div>
  </div>

  <div class="main-content">
    <div class="section-title">Asosiy kurslar</div>
    <div class="scroll-container" id="mainModules"></div>

    <div class="section-title">Maxsus darslar</div>
    <div class="scroll-container" id="subModules"></div>
  </div>

  <nav class="tab-bar">
    <a href="index.html" class="tab-item active">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Asosiy</span>
    </a>
    <a href="reyting.html" class="tab-item">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="gift.html" class="tab-item">
      <svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="7" width="20" height="5"/><path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  // 30 ta asosiy modul ma'lumotlari
  const mainData = Array.from({ length: 30 }, (_, i) => ({
    id: i + 1,
    title: `${i + 1}-Dars: ${['HTML', 'CSS', 'JS', 'Firebase', 'Logic'][i % 5]} asoslari`,
    label: `MODUL ${i + 1}`,
    color: i < 5 ? '#007aff' : '#8e8e93'
  }));

  // 5 ta qo'shimcha modul ma'lumotlari
  const subData = [
    { id: 's1', title: 'Telegram Mini Apps master', label: 'BONUS' },
    { id: 's2', title: 'UI/UX Dizayn sirlari', label: 'MASTERCLASS' },
    { id: 's3', title: 'Freelance platformalar', label: 'BUSINESS' },
    { id: 's4', title: 'Portfolioga maslahatlar', label: 'CAREER' },
    { id: 's5', title: 'Final Imtihon', label: 'EXAM' }
  ];

  function render() {
    // 30 talikni render qilish
    document.getElementById('mainModules').innerHTML = mainData.map(m => `
      <div class="lesson-card" onclick="tg.HapticFeedback.impactOccurred('medium')">
        <span class="card-label">${m.label}</span>
        <h2 class="card-title">${m.title}</h2>
        <div class="card-action" style="color: ${m.color}">Boshlash →</div>
      </div>
    `).join('');

    // 5 talikni render qilish
    document.getElementById('subModules').innerHTML = subData.map(m => `
      <div class="mini-card" onclick="tg.HapticFeedback.impactOccurred('light')">
        <span class="card-label">${m.label}</span>
        <h3 class="card-title">${m.title}</h3>
        <div class="card-action" style="color: #ff9f0a">Ko'rish →</div>
      </div>
    `).join('');
  }

  // Foydalanuvchi ma'lumotlarini sozlash
  function setupUser() {
    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('userName').textContent = user.first_name + (user.last_name ? ' ' + user.last_name : '');
      if (user.photo_url) {
        const img = document.getElementById('avatarImage');
        img.src = user.photo_url;
        img.style.display = 'block';
        document.getElementById('avatarInitial').style.display = 'none';
      } else {
        document.getElementById('avatarInitial').textContent = user.first_name.charAt(0);
      }
    }
  }

  setupUser();
  render();
</script>
</body>
</html>
