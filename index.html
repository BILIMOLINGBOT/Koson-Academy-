<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Rangli Kartalar</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Inter', sans-serif; }

    body {
      background:#f5f5f5;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }

    /* ── ASOSIY KONTEYNER ── */
    .container {
      width: 100%;
      max-width: 400px;
      height: 100vh;
      background: white;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── STACK MAYDONI ── */
    .stack-scene {
      position: relative;
      width: 100%;
      height: 600px;
      display: flex;
      justify-content: center;
    }

    /* ── KARTA DIZAYNI ── */
    .lesson-card {
      position: absolute;
      width: 100%;
      height: 520px;
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: bottom center;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                  bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                  filter 0.4s ease;
    }

    .card-tag {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(0,0,0,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #222;
      line-height: 1.3;
    }

    /* Karta ranglari - har bir dars uchun alohida */
    .lesson-card:nth-child(1) {
      background: linear-gradient(135deg, #FFE5E5 0%, #FFB8B8 100%);
    }
    .lesson-card:nth-child(2) {
      background: linear-gradient(135deg, #E5F0FF 0%, #B8D4FF 100%);
    }
    .lesson-card:nth-child(3) {
      background: linear-gradient(135deg, #E5FFE5 0%, #B8FFB8 100%);
    }
    .lesson-card:nth-child(4) {
      background: linear-gradient(135deg, #FFF0E5 0%, #FFD4B8 100%);
    }
    .lesson-card:nth-child(5) {
      background: linear-gradient(135deg, #F0E5FF 0%, #D4B8FF 100%);
    }

    /* Matn rangi - quyuqroq va kontrastli */
    .lesson-card:nth-child(1) .card-title { color: #8B3A3A; }
    .lesson-card:nth-child(2) .card-title { color: #1A4C7A; }
    .lesson-card:nth-child(3) .card-title { color: #1A6B1A; }
    .lesson-card:nth-child(4) .card-title { color: #8B5A2E; }
    .lesson-card:nth-child(5) .card-title { color: #4A3B8B; }

    .lesson-card:nth-child(1) .card-tag { color: #8B3A3A; opacity: 0.7; }
    .lesson-card:nth-child(2) .card-tag { color: #1A4C7A; opacity: 0.7; }
    .lesson-card:nth-child(3) .card-tag { color: #1A6B1A; opacity: 0.7; }
    .lesson-card:nth-child(4) .card-tag { color: #8B5A2E; opacity: 0.7; }
    .lesson-card:nth-child(5) .card-tag { color: #4A3B8B; opacity: 0.7; }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">

    <div class="lesson-card">
      <div class="card-tag">1-dars</div>
      <div class="card-title">Algebra asoslari va murakkab tenglamalar</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">2-dars</div>
      <div class="card-title">Ingliz tili: Grammatika va so'zlashuv</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">3-dars</div>
      <div class="card-title">Fizika: Kinematika va dinamika asoslari</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">4-dars</div>
      <div class="card-title">Tarix: Jahon sivilizatsiyasi rivojlanishi</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">5-dars</div>
      <div class="card-title">Kimyo: Organik birikmalar va reaksiyalar</div>
    </div>

  </div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* Layout parametrlari */
  const BOTTOM_START = 0;
  const PEEK         = 35;
  const SCALE_STEP   = 0.04;

  let topIdx = 0;

  function applyLayout() {
    cards.forEach((card, i) => {
      const depth  = (i - topIdx + N) % N;
      const scale  = 1 - (depth * SCALE_STEP);
      const z      = N - depth;

      card.style.bottom    = (depth * PEEK) + 'px';
      card.style.transform = `scale(${scale})`;
      card.style.zIndex    = z;
      card.style.filter    = `brightness(${1 - depth * 0.05})`;
      
      card.style.opacity = depth > 3 ? 0 : 1;
    });
  }

  applyLayout();

  /* ── SWIPE LOGIKASI ── */
  let startY = null;

  function onDown(e) {
    startY = e.touches ? e.touches[0].clientY : e.clientY;
  }

  function onUp(e) {
    if (startY === null) return;
    const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const diff = startY - endY;

    if (Math.abs(diff) > 50) {
      if (diff > 0) {
        topIdx = (topIdx + 1) % N;
      } else {
        topIdx = (topIdx - 1 + N) % N;
      }
      applyLayout();
    }
    startY = null;
  }

  scene.addEventListener('mousedown',  onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup',    onUp);
  scene.addEventListener('touchend',   onUp);
})();
</script>

</body>
</html>
