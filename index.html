<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* CSS o'zgarishsiz qoldi, faqat silliq o'tishlar qo'shildi */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
    .app-wrapper { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
    
    .header { 
      padding: 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      cursor: pointer;
    }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { 
      width: 45px; 
      height: 45px; 
      background: #222; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      font-size: 1.2rem; 
      border: 1px solid #333; 
      overflow: hidden; 
    }
    .avatar-circle img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    .points-badge { background: #fff; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    
    /* Gradient text for full name - oq va kulrang */
    .gradient-name {
      background: linear-gradient(135deg, #fff, #cccccc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }

    /* Bo'sh joy - markazga joylashgan chiroyli xabar */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      color: #8e8e93;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      stroke: #8e8e93;
      stroke-width: 1.5;
      fill: none;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }

    .empty-state p {
      font-size: 16px;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header" onclick="navigateTo('profil.html')">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="userAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <!-- Bo'sh holat uchun chiroyli xabar (kartochkalar olib tashlandi) -->
  <div class="empty-state">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v8M8 12h8"/>
    </svg>
    <h2>Hozircha modullar yo'q</h2>
    <p>Yangi modullar tez orada qo'shiladi. Profil orqali videolaringizni yuklang!</p>
  </div>

  <!-- Tab-bar butunlay olib tashlandi -->
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  
  // Ranglarni Telegram mavzusiga moslash
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');

  function setAvatar(user) {
    const avatarInitial = document.getElementById('avatarInitial');
    const avatarImage = document.getElementById('avatarImage');
    
    if (user && user.photo_url) {
      // Telegram profil rasmi mavjud
      avatarImage.src = user.photo_url;
      avatarImage.style.display = 'block';
      avatarInitial.style.display = 'none';
      
      // Rasm yuklanmasa, initial harfni ko'rsatish
      avatarImage.onerror = function() {
        avatarImage.style.display = 'none';
        avatarInitial.style.display = 'block';
        if (user.first_name) {
          avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
        }
      };
    } else {
      // Profil rasmi yo'q, initial harfni ko'rsatish
      avatarImage.style.display = 'none';
      avatarInitial.style.display = 'block';
      
      if (user && user.first_name) {
        avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
      } else {
        avatarInitial.textContent = '?';
      }
    }
  }

  function initApp() {
    const user = tg.initDataUnsafe?.user;
    
    // Foydalanuvchi ismi va familiyasi
    if (user) {
      // To'liq ismni yaratish (ism + familiya)
      let fullName = user.first_name || 'Foydalanuvchi';
      if (user.last_name) {
        fullName = `${user.first_name} ${user.last_name}`;
      }
      document.getElementById('userName').textContent = fullName;
      
      // Avatar - Telegram profil rasmi yoki initial harf
      setAvatar(user);
      
      // Konsolga ma'lumot chiqarish (test uchun)
      console.log('Telegram user:', user);
      console.log('Photo URL:', user.photo_url);
    } else {
      // Agar user ma'lumoti bo'lmasa
      document.getElementById('userName').textContent = 'Mehmon';
      setAvatar(null);
    }

    // Ballarni yuklash (Haqiqiy loyihada buni Backenddan fetch qilish kerak)
    const points = localStorage.getItem('user_points') || 312;
    document.getElementById('userPoints').textContent = `⚡ ${points}`;
  }

  window.navigateTo = function(url) {
    // Tebranish effekti olib tashlandi
    // Sahifa o'zgarishidan oldin biroz kechikish (visual feedback uchun)
    setTimeout(() => {
      window.location.href = url;
    }, 100);
  };

  // Telegram BackButton boshqarish
  if (window.location.pathname.includes('profil.html')) {
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      window.history.back();
    });
  } else {
    tg.BackButton.hide();
  }

  initApp();
</script>

</body>
</html>
