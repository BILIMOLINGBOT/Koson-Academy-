<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darslar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      background: #000000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h2 {
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stats {
      display: flex;
      gap: 15px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1a1a1a;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #333;
    }

    .coin-icon {
      color: gold;
    }

    /* Main content */
    .container {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 20px;
      border: 2px solid #333;
      transition: 0.3s;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .card-number {
      background: #333;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 18px;
    }

    .percent-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-container {
      margin-top: 15px;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 5px;
    }

    .progress-bg {
      height: 8px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 10px;
      transition: width 0.5s;
    }

    .card.completed {
      border-color: gold;
    }

    .card.in-progress {
      border-color: #4CAF50;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000000;
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      border-top: 2px solid #333;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888;
      text-decoration: none;
      flex: 1;
    }

    .nav-item.active {
      color: white;
    }

    .nav-icon {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .nav-text {
      font-size: 12px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Header with stats -->
  <div class="header">
    <h2><i class="fas fa-book-open"></i> Darslar</h2>
    <div class="stats">
      <div class="stat-item"><i class="fas fa-fire"></i> <span id="streakCount">20</span></div>
      <div class="stat-item"><i class="fas fa-coins coin-icon"></i> <span id="coinCount">33</span></div>
    </div>
  </div>

  <!-- Darslar ro'yxati -->
  <div class="container">
    <div class="cards-grid" id="cardsContainer"></div>
    <div class="footer">Barcha darslar siz uchun ochiq</div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="darslar.html" class="nav-item active">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-text">Darslar</span>
    </a>
    <a href="oyin.html" class="nav-item">
      <i class="fas fa-gamepad nav-icon"></i>
      <span class="nav-text">O'yin</span>
    </a>
  </div>

  <script>
    // Tangalarni localStorage dan o'qish
    let coins = localStorage.getItem('coins') ? parseInt(localStorage.getItem('coins')) : 33;
    let streak = 20;
    
    document.getElementById('coinCount').textContent = coins;
    document.getElementById('streakCount').textContent = streak;

    // Darslar ma'lumotlari
    const lessonsData = [
      { title: "Kirish va asosiy tushunchalar", percent: 100, completed: true },
      { title: "Dasturlash asoslari", percent: 100, completed: true },
      { title: "O'zgaruvchilar va ma'lumot turlari", percent: 80, completed: false },
      { title: "Operatorlar va ifodalar", percent: 45, completed: false },
      { title: "Shartli operatorlar", percent: 20, completed: false },
      { title: "Sikllar va takrorlash", percent: 0, completed: false },
      { title: "Funksiyalar va metodlar", percent: 0, completed: false },
      { title: "Massivlar va kolleksiyalar", percent: 0, completed: false },
      { title: "Ob'ektga yo'naltirilgan dasturlash", percent: 0, completed: false },
      { title: "Xatolarni boshqarish", percent: 0, completed: false },
      { title: "Fayllar bilan ishlash", percent: 0, completed: false },
      { title: "Ma'lumotlar bazasi bilan ishlash", percent: 0, completed: false },
      { title: "Veb-dasturlash asoslari", percent: 0, completed: false },
      { title: "Frontend texnologiyalari", percent: 0, completed: false },
      { title: "Backend texnologiyalari", percent: 0, completed: false },
      { title: "Mobil ilovalarni ishlab chiqish", percent: 0, completed: false },
      { title: "Algoritmlar va ma'lumotlar tuzilmalari", percent: 0, completed: false },
      { title: "Dasturiy ta'minotni sinovdan o'tkazish", percent: 0, completed: false },
      { title: "Version control tizimlari", percent: 0, completed: false },
      { title: "Dasturiy loyihalarni boshqarish", percent: 0, completed: false },
      { title: "Sun'iy intellekt asoslari", percent: 0, completed: false },
      { title: "Ma'shinali o'rganish", percent: 0, completed: false },
      { title: "Kiberxavfsizlik asoslari", percent: 0, completed: false },
      { title: "Bulut texnologiyalari", percent: 0, completed: false },
      { title: "IoT asoslari", percent: 0, completed: false },
      { title: "Blockchain texnologiyalari", percent: 0, completed: false },
      { title: "VR/AR texnologiyalari", percent: 0, completed: false },
      { title: "Loyiha yaratish", percent: 0, completed: false },
      { title: "Portfolio tuzish", percent: 0, completed: false },
      { title: "Yakuniy test va sertifikat", percent: 0, completed: false }
    ];

    // Darslarni yaratish
    function createLessons() {
      const container = document.getElementById('cardsContainer');
      
      lessonsData.forEach((lesson, index) => {
        const card = document.createElement('div');
        card.className = `card ${lesson.completed ? 'completed' : (lesson.percent > 0 ? 'in-progress' : '')}`;
        
        card.innerHTML = `
          <div class="card-header">
            <span class="card-number">${index + 1}-dars</span>
          </div>
          <h3>${lesson.title}</h3>
          <div class="percent-text">
            <i class="fas ${lesson.completed ? 'fa-check-circle' : (lesson.percent > 0 ? 'fa-spinner' : 'fa-lock')}"></i>
            ${lesson.percent}%
          </div>
          <div class="progress-container">
            <div class="progress-info">
              <span>Progress</span>
              <span>${lesson.percent}%</span>
            </div>
            <div class="progress-bg">
              <div class="progress-fill" style="width: ${lesson.percent}%;"></div>
            </div>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    createLessons();

    // Tangalar o'zgarishini kuzatish
    window.addEventListener('storage', function(e) {
      if (e.key === 'coins') {
        document.getElementById('coinCount').textContent = e.newValue;
      }
    });
  </script>

</body>
</html>
