
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Sahifa</title>
    <style>
        /* ... existing styles ... */

        /* YANGI STILLAR */
        .video-player {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .video-player video {
            width: 100%;
            height: auto;
            display: block;
            max-height: 80vh;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-player:hover .video-controls {
            opacity: 1;
        }

        .play-btn {
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255,255,255,0.3);
            margin: 0 20px;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: #ff0000;
            width: 0%;
        }

        .time-display {
            color: white;
            font-size: 14px;
            min-width: 100px;
            text-align: center;
        }

        /* Modal video player */
        .modal-video-player {
            position: relative;
            width: 100%;
            background-color: #000;
            margin-bottom: 16px;
            border-radius: 12px;
            overflow: hidden;
        }

        .modal-video-player video {
            width: 100%;
            height: auto;
            display: block;
            max-height: 70vh;
        }

        /* Yuklanayotgan video uchun */
        .uploading-video {
            position: relative;
            background: #000;
        }

        .uploading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='profil.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Profilga qaytish
        </button>
        
        <div class="main-content">
            <div class="video-section">
                <div class="video-player" id="videoPlayer">
                    <!-- Video bu yerga yuklanadi -->
                </div>
                
                <div class="video-info">
                    <div class="video-title" id="videoTitle">Video sarlavhasi</div>
                    <div class="video-stats">
                        <span id="viewsCount">0</span> namoyish · 
                        <span id="uploadTime">hozirgina</span>
                    </div>
                    
                    <div class="channel-info">
                        <div class="channel-icon">A</div>
                        <div class="channel-details">
                            <div class="channel-name" id="channelName">Foydalanuvchi</div>
                            <div class="video-stats" id="subscriberCount">0 obuna</div>
                        </div>
                        <button class="subscribe-btn" id="subscribe-btn">Obuna bo'lish</button>
                    </div>
                    
                    <div class="actions">
                        <button class="action-item" id="heart-btn">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                            </div>
                            <div class="action-text"><span id="heart-count">0</span></div>
                        </button>
                        <button class="action-item" id="comments-btn">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099 .092 10 10 0 1 0-4.777-4.719"/></svg>
                            </div>
                            <div class="action-text"><span id="comments-main-count">0</span></div>
                        </button>
                        <button class="action-item" id="save-btn">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
                            </div>
                            <div class="action-text">Saqlash</div>
                        </button>
                        <button class="action-item" id="share-btn">
                            <div class="action-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
                            </div>
                            <div class="action-text">Ulashish</div>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="recommended-section">
                <div class="recommended">
                    <div class="recommended-title">Boshqa videolar</div>
                    <div id="recommendedVideos">
                        <!-- Tavsiya etilgan videolar bu yerga yuklanadi -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="commentsModal" class="modal">
        <div class="modal-content">
            <div class="modal-video-section">
                <div class="modal-video-player" id="modalVideoPlayer">
                    <!-- Modal uchun video -->
                </div>
            </div>
            
            <div class="comments-section">
                <!-- ... existing comments section ... -->
            </div>
        </div>
    </div>

    <script>
        // ========== GLOBAL VARIABLES ==========
        let currentVideo = null;
        let currentVideoElement = null;
        let currentVideoUrl = null;
        let isPlaying = false;
        let videoDuration = 0;
        let currentTime = 0;

        // ========== ELEMENT REFERENCES ==========
        const videoPlayerContainer = document.getElementById('videoPlayer');
        const modalVideoContainer = document.getElementById('modalVideoPlayer');
        const videoTitleElement = document.getElementById('videoTitle');
        const viewsCountElement = document.getElementById('viewsCount');
        const uploadTimeElement = document.getElementById('uploadTime');
        const recommendedVideosContainer = document.getElementById('recommendedVideos');

        // ========== VIDEO LOADING FUNCTIONS ==========
        function loadVideo() {
            // LocalStorage'dan video ma'lumotlarini olish
            const videoData = JSON.parse(localStorage.getItem('currentVideo'));
            
            if (!videoData) {
                // Agar video ma'lumoti bo'lmasa, demo video ko'rsatish
                currentVideo = {
                    id: 'demo',
                    title: "Demo Video - O'zbekiston manzaralari",
                    views: "45,2 ming",
                    timeAgo: "2 kun avval",
                    description: "Bu demo video. Yangi video yuklash uchun profil sahifasiga o'ting.",
                    likes: 1245,
                    comments: 89,
                    videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
                };
            } else {
                currentVideo = videoData;
                
                // Agar video URL bo'lmasa, demo URL ni ishlatish
                if (!currentVideo.videoUrl) {
                    currentVideo.videoUrl = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
                }
            }
            
            // Video elementini yaratish
            createVideoElement();
            
            // UI ni yangilash
            updateVideoUI();
            
            // Tavsiya etilgan videolarni yuklash
            loadRecommendedVideos();
        }

        function createVideoElement() {
            // Asosiy video pleerni tozalash
            videoPlayerContainer.innerHTML = '';
            
            // Video elementini yaratish
            const video = document.createElement('video');
            video.id = 'mainVideo';
            video.controls = true;
            video.preload = 'metadata';
            video.style.width = '100%';
            video.style.height = 'auto';
            video.style.borderRadius = '12px';
            
            // Video source qo'shish
            const source = document.createElement('source');
            source.src = currentVideo.videoUrl;
            source.type = 'video/mp4';
            video.appendChild(source);
            
            // Agar video yuklanayotgan bo'lsa
            if (currentVideo.status === 'uploading') {
                const overlay = document.createElement('div');
                overlay.className = 'uploading-overlay';
                overlay.innerHTML = `
                    <div class="spinner"></div>
                    <div>Video yuklanmoqda...</div>
                    <div style="font-size: 12px; margin-top: 10px; opacity: 0.8;">
                        ${currentVideo.fileName} • ${currentVideo.fileSize}
                    </div>
                `;
                videoPlayerContainer.appendChild(overlay);
            }
            
            videoPlayerContainer.appendChild(video);
            currentVideoElement = video;
            
            // Modal uchun ham video yaratish
            createModalVideoElement();
            
            // Video eventlarini qo'shish
            setupVideoEvents();
        }

        function createModalVideoElement() {
            modalVideoContainer.innerHTML = '';
            
            const video = document.createElement('video');
            video.id = 'modalVideo';
            video.controls = true;
            video.preload = 'metadata';
            video.style.width = '100%';
            video.style.height = 'auto';
            video.style.borderRadius = '12px';
            
            const source = document.createElement('source');
            source.src = currentVideo.videoUrl;
            source.type = 'video/mp4';
            video.appendChild(source);
            
            modalVideoContainer.appendChild(video);
        }

        function setupVideoEvents() {
            if (!currentVideoElement) return;
            
            currentVideoElement.addEventListener('loadedmetadata', function() {
                videoDuration = currentVideoElement.duration;
                console.log('Video duration:', videoDuration);
            });
            
            currentVideoElement.addEventListener('timeupdate', function() {
                currentTime = currentVideoElement.currentTime;
            });
            
            currentVideoElement.addEventListener('play', function() {
                isPlaying = true;
            });
            
            currentVideoElement.addEventListener('pause', function() {
                isPlaying = false;
            });
        }

        function updateVideoUI() {
            // Video ma'lumotlarini ko'rsatish
            videoTitleElement.textContent = currentVideo.title || "Nomsiz video";
            viewsCountElement.textContent = currentVideo.views || "0";
            uploadTimeElement.textContent = currentVideo.timeAgo || "hozirgina";
            
            // Video tavsifini qo'shish
            const descriptionDiv = document.createElement('div');
            descriptionDiv.className = 'video-description';
            descriptionDiv.style.marginTop = '16px';
            descriptionDiv.style.color = '#aaa';
            descriptionDiv.style.fontSize = '14px';
            descriptionDiv.style.lineHeight = '1.5';
            descriptionDiv.textContent = currentVideo.description || '';
            
            const videoInfo = document.querySelector('.video-info');
            const existingDesc = videoInfo.querySelector('.video-description');
            if (existingDesc) {
                existingDesc.remove();
            }
            
            const channelInfo = document.querySelector('.channel-info');
            videoInfo.insertBefore(descriptionDiv, channelInfo);
        }

        function loadRecommendedVideos() {
            // LocalStorage'dan barcha videolarni olish
            const allVideos = JSON.parse(localStorage.getItem('videos')) || [];
            
            // Joriy videoni olib tashlash
            const recommendedVideos = allVideos.filter(video => 
                video.id !== currentVideo.id
            ).slice(0, 5); // Faqat 5 ta video
            
            recommendedVideosContainer.innerHTML = '';
            
            if (recommendedVideos.length === 0) {
                recommendedVideosContainer.innerHTML = `
                    <div class="no-videos" style="color: #aaa; text-align: center; padding: 20px;">
                        <p>Hozircha boshqa videolar yo'q</p>
                    </div>
                `;
                return;
            }
            
            // Har bir video uchun element yaratish
            recommendedVideos.forEach(video => {
                const videoElement = document.createElement('div');
                videoElement.className = 'recommended-video';
                videoElement.style.cursor = 'pointer';
                
                videoElement.innerHTML = `
                    <div class="recommended-thumbnail">
                        <img src="${video.thumbnail || 'https://images.unsplash.com/photo-1571330735066-03aaa9429d89?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80'}" alt="Video Thumbnail">
                        <div style="position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px;">
                            ${video.timeAgo || 'yangi'}
                        </div>
                    </div>
                    <div class="recommended-info">
                        <div class="recommended-video-title">${video.title || 'Nomsiz video'}</div>
                        <div class="recommended-channel">${video.author || 'Foydalanuvchi'}</div>
                        <div class="recommended-stats">
                            ${video.views || '0'} koʻrish · ${video.likes || '0'} like
                        </div>
                    </div>
                `;
                
                // Video bosilganda o'sha videoni ochish
                videoElement.addEventListener('click', function() {
                    // Video ma'lumotlarini localStorage ga saqlash
                    localStorage.setItem('currentVideo', JSON.stringify(video));
                    
                    // Sahifani yangilash
                    location.reload();
                });
                
                recommendedVideosContainer.appendChild(videoElement);
            });
        }

        // ========== VIDEO UPLOAD SIMULATION ==========
        function simulateVideoUpload(videoId) {
            const video = getVideoById(videoId);
            if (!video) return;
            
            if (video.status === 'uploading') {
                const now = Date.now();
                const elapsed = now - (video.startTime || now);
                const total = video.totalTime || 30000;
                const progress = Math.min(100, (elapsed / total) * 100);
                
                if (progress >= 100) {
                    video.status = 'uploaded';
                    video.completed = true;
                    
                    // LocalStorage ni yangilash
                    const videos = JSON.parse(localStorage.getItem('videos')) || [];
                    const index = videos.findIndex(v => v.id === videoId);
                    if (index !== -1) {
                        videos[index] = video;
                        localStorage.setItem('videos', JSON.stringify(videos));
                    }
                    
                    // Sahifani yangilash
                    if (video.id === currentVideo.id) {
                        loadVideo();
                    }
                } else {
                    setTimeout(() => simulateVideoUpload(videoId), 1000);
                }
            }
        }

        function getVideoById(id) {
            const videos = JSON.parse(localStorage.getItem('videos')) || [];
            return videos.find(v => v.id === id);
        }

        // ========== INITIALIZATION ==========
        document.addEventListener('DOMContentLoaded', function() {
            // Videoni yuklash
            loadVideo();
            
            // Agar video yuklanayotgan bo'lsa, progressni boshlash
            const videoData = JSON.parse(localStorage.getItem('currentVideo'));
            if (videoData && videoData.status === 'uploading') {
                simulateVideoUpload(videoData.id);
            }
            
            // Boshqa JS kodlarni yuklash (like, comment, subscribe funksiyalari)
            // ... existing initialization code ...
        });

        // ========== EXISTING FUNCTIONS (like, comment, subscribe) ==========
        // ... existing JavaScript code for likes, comments, subscriptions ...
        // (ushbu kod yuqoridagi kabi qoladi, faqat video loading qo'shildi)
    </script>
</body>
</html>
