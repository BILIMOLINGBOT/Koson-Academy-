<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LearnU · 30 kunlik katta loyiha</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-gray: #8E8E93;
      --bg-color: #000000;
      --card-radius: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-color);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 16px;
      padding-top: env(safe-area-inset-top, 24px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      z-index: 100;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
    }

    .user-info { display: flex; align-items: center; gap: 14px; }
    
    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a3a3c, #1c1c1e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
    }

    .points-badge {
      background: rgba(255, 214, 10, 0.15);
      color: #FFD60A;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 15px;
      border: 1px solid rgba(255, 214, 10, 0.2);
    }

    /* VERTICAL SCROLL CONTAINER */
    .vertical-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* GIANT CARD STYLE */
    .lesson-card {
      position: relative;
      min-height: 260px;
      border-radius: var(--card-radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      cursor: pointer;
    }

    /* Ochiq karta (1-30 kunlarning barchasi ochiq) */
    .card-available {
      background: linear-gradient(145deg, #1e1e1e, #111111);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .card-available::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: var(--ios-blue);
      filter: blur(100px);
      opacity: 0.2;
      pointer-events: none;
    }

    .card-available:active {
      transform: scale(0.97);
    }

    /* Karta ichidagi matnlar */
    .module-num {
      font-size: 13px;
      font-weight: 800;
      color: var(--ios-gray);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .card-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      margin-top: 8px;
      background: linear-gradient(to bottom, #fff, #bbb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card-desc {
      font-size: 15px;
      color: var(--ios-gray);
      margin-top: 12px;
      line-height: 1.4;
      max-width: 85%;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
    }

    .btn-start {
      background: #fff;
      color: #000;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      transition: 0.2s;
    }

    .btn-start:active {
      opacity: 0.7;
      transform: scale(0.96);
    }

    .reward-badge {
      font-size: 14px;
      font-weight: 700;
      color: #34C759;
      background: rgba(52,199,89,0.12);
      padding: 6px 14px;
      border-radius: 30px;
      backdrop-filter: blur(4px);
    }

    /* TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 450px;
      height: 85px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(25px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      border-top: 0.5px solid rgba(255, 255, 255, 0.08);
      z-index: 200;
    }

    .tab-item {
      color: var(--ios-gray);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      transition: 0.1s;
      cursor: pointer;
    }

    .tab-item.active { color: var(--ios-blue); }
    .tab-item svg { width: 26px; height: 26px; stroke-width: 2; }
    
    /* Scrollbar yashirish (iOS uslubi) */
    .vertical-container::-webkit-scrollbar {
      width: 4px;
    }
    .vertical-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .vertical-container::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
    
    /* Kichik ekranlar uchun moslashuv */
    @media (max-width: 420px) {
      .card-title { font-size: 24px; }
      .lesson-card { padding: 22px; min-height: 240px; }
      .card-desc { max-width: 100%; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header">
    <div class="user-info">
      <div class="avatar-circle" id="avatar">U</div>
      <div>
        <div style="font-size: 13px; color: var(--ios-gray); font-weight: 600;">Xush kelibsiz!</div>
        <div id="userName" style="font-size: 18px; font-weight: 800;">Foydalanuvchi</div>
      </div>
    </div>
    <div class="points-badge" id="pointsDisplay">⚡ 1,250</div>
  </div>

  <div class="vertical-container" id="cards-list">
    <!-- 30 kunlik kartalar dinamik yuklanadi -->
  </div>

  <nav class="tab-bar">
    <div class="tab-item active" data-tab="learn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>O'rganish</span>
    </div>
    <div class="tab-item" data-tab="rank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20V10M18 20V4M6 20V14"/></svg>
      <span>Reyting</span>
    </div>
    <div class="tab-item" data-tab="help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg>
      <span>Yordam</span>
    </div>
  </nav>
</div>

<script>
  // Telegram WebApp sozlamalari
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.enableClosingConfirmation();
  
  // Haptic feedback qulayligi
  const haptic = (type = 'light') => {
    try {
      if (tg.HapticFeedback) {
        if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
        else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
        else tg.HapticFeedback.impactOccurred('light');
      }
    } catch(e) { console.log('haptic error'); }
  };
  
  // --- 30 kunlik dastur ma'lumotlari (faqat "1 Kuni" ... "30 Kuni") ---
  // Har bir kun sarlavhasi va qisqa tavsifi bilan
  const generateDailyLessons = () => {
    const lessonsArray = [];
    for (let i = 1; i <= 30; i++) {
      // har bir kun uchun unikal va motivatsion sarlavha va tavsif
      let title = `${i}-Kuni`;
      let description = '';
      // qiziqarli turli mazmun (har bir dars bir-biridan farqli)
      if (i === 1) description = "Dasturlashga birinchi qadam. Asosiy tushunchalar va motivatsiya.";
      else if (i === 2) description = "O'zgaruvchilar va ma'lumot turlari. Amaliy misollar.";
      else if (i === 3) description = "Shart operatorlari: if, else, switch bilan ishlash.";
      else if (i === 4) description = "Sikllar: for, while, do-while. Takrorlash san'ati.";
      else if (i === 5) description = "Funksiyalar: kodni modullashtirish.";
      else if (i === 6) description = "Massivlar va ro'yxatlar bilan ishlash.";
      else if (i === 7) description = "Ob'ektlar va JSON. Ma'lumotlarni tashkil qilish.";
      else if (i === 8) description = "DOM manipulyatsiyasi asoslari.";
      else if (i === 9) description = "Eventlar va interaktivlik.";
      else if (i === 10) description = "Asinxron JavaScript, callback va Promise.";
      else if (i === 11) description = "Fetch API va tashqi ma'lumotlar.";
      else if (i === 12) description = "Node.js va backend asoslari.";
      else if (i === 13) description = "Express.js yordamida server yaratish.";
      else if (i === 14) description = "REST API loyihasi.";
      else if (i === 15) description = "MongoDB va ma'lumotlar bazasi.";
      else if (i === 16) description = "Autentifikatsiya va xavfsizlik.";
      else if (i === 17) description = "React boshlang'ich kursi.";
      else if (i === 18) description = "Komponentlar va props.";
      else if (i === 19) description = "State boshqaruvi (useState).";
      else if (i === 20) description = "React Router bilan ko'p sahifali ilova.";
      else if (i === 21) description = "TailwindCSS va zamonaviy dizayn.";
      else if (i === 22) description = "Mobil dasturlash (React Native).";
      else if (i === 23) description = "SwiftUI asoslari (iOS).";
      else if (i === 24) description = "Flutter bilan cross-platform ilovalar.";
      else if (i === 25) description = "Sun'iy intellektga kirish (AI).";
      else if (i === 26) description = "Machine Learning asoslari.";
      else if (i === 27) description = "Kiberxavfsizlik va himoya texnikalari.";
      else if (i === 28) description = "DevOps: Docker va CI/CD.";
      else if (i === 29) description = "Katta loyiha arxitekturasi.";
      else if (i === 30) description = "Bitiruv loyihasi: Portfolio va karyera.";
      else description = "Yangi mavzu, yangi bilim! Kunning darsini o'rganing.";
      
      lessonsArray.push({
        id: i,
        title: title,
        desc: description,
        status: "open",     // Barcha 30 kun ochiq (hech qanday qulflangan emas)
        points: 100 + (i % 5 === 0 ? 50 : 0) // 5-kun, 10-kun va hk bonus 150 ball, asosan 100 ball
      });
    }
    return lessonsArray;
  };
  
  const dailyCourses = generateDailyLessons(); // 30 kunlik massiv
  
  // Foydalanuvchi ballari (saqlash uchun localStorage)
  let userPoints = 1250;
  const POINTS_KEY = 'learnu_points';
  const COMPLETED_KEY = 'learnu_completed_days';
  
  // Tugallangan kunlar (darslar) ni saqlash (30 kunlik)
  let completedLessons = new Set();
  
  function loadUserData() {
    const savedPoints = localStorage.getItem(POINTS_KEY);
    if (savedPoints && !isNaN(parseInt(savedPoints))) {
      userPoints = parseInt(savedPoints);
    } else {
      userPoints = 1250;
    }
    const savedCompleted = localStorage.getItem(COMPLETED_KEY);
    if (savedCompleted) {
      try {
        const arr = JSON.parse(savedCompleted);
        if (Array.isArray(arr)) completedLessons = new Set(arr);
      } catch(e) {}
    }
    updatePointsUI();
  }
  
  function saveUserData() {
    localStorage.setItem(POINTS_KEY, userPoints);
    localStorage.setItem(COMPLETED_KEY, JSON.stringify([...completedLessons]));
  }
  
  function updatePointsUI() {
    const pointsSpan = document.getElementById('pointsDisplay');
    if (pointsSpan) pointsSpan.innerHTML = `⚡ ${userPoints.toLocaleString()}`;
  }
  
  // Kartalarni yuklash (30 kun, hammasi ochiq va dars1.html ... dars30.html ga link)
  function renderCards() {
    const container = document.getElementById('cards-list');
    if (!container) return;
    
    const cardsHTML = dailyCourses.map(lesson => {
      const isCompleted = completedLessons.has(lesson.id);
      // Dars fayli nomi: dars1.html, dars2.html ... dars30.html
      const lessonPage = `dars${lesson.id}.html`;
      // Agar tugallangan bo'lsa, "Ko'rilgan" badge ko'rsatish
      const rewardText = isCompleted ? "✅ Ko'rilgan" : `${lesson.points} ball`;
      const rewardColor = isCompleted ? "#8E8E93" : "#34C759";
      
      return `
        <div class="lesson-card card-available" data-lesson-id="${lesson.id}" data-page="${lessonPage}">
          <div>
            <div class="module-num">📘 KUN ${lesson.id} / 30</div>
            <div class="card-title">${lesson.title}</div>
            <div class="card-desc">${lesson.desc}</div>
          </div>
          <div class="card-footer">
            <div class="btn-start" data-id="${lesson.id}">
              ${isCompleted ? "Qayta o'rganish" : "Boshlash"}
            </div>
            <div style="font-size: 14px; font-weight: 700; color: ${rewardColor}; background: rgba(52,199,89,0.1); padding: 6px 14px; border-radius: 30px;">
              ${rewardText}
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = cardsHTML;
    
    // Har bir kartaga click event qo'shish (delegatsiya)
    document.querySelectorAll('.lesson-card').forEach(card => {
      card.addEventListener('click', (e) => {
        // agar bosilgan element .btn-start ichidagi bo'lsa ham kartani ochishga ruxsat
        e.stopPropagation();
        const lessonId = parseInt(card.getAttribute('data-lesson-id'));
        const pageUrl = card.getAttribute('data-page');
        if (lessonId && pageUrl) {
          openLesson(lessonId, pageUrl);
        }
      });
    });
    
    // Alohida btn-start bosilganda ham xuddi shu funksiya ishlaydi
    document.querySelectorAll('.btn-start').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parentCard = btn.closest('.lesson-card');
        if (parentCard) {
          const lessonId = parseInt(parentCard.getAttribute('data-lesson-id'));
          const pageUrl = parentCard.getAttribute('data-page');
          if (lessonId && pageUrl) openLesson(lessonId, pageUrl);
        }
      });
    });
  }
  
  // Darsni ochish funksiyasi: dars{id}.html ga navigatsiya qilish
  // Lekin browserda to'g'ri ishlashi uchun window.location yordamida sahifani o'zgartirish
  // Telegram Web App ichida yoki oddiy brauzerda ishlaydi. Agar fayl mavjud bo'lmasa, alert beradi.
  function openLesson(lessonId, pageUrl) {
    haptic('light');
    // Karta bosilganda darsni tugallangan deb belgilash va ball qo'shish (faqat birinchi marta)
    const alreadyCompleted = completedLessons.has(lessonId);
    if (!alreadyCompleted) {
      // Darsni birinchi marta ochish -> ball beriladi (faqat darsni ochish, ammo "o'qigan" deb hisoblanadi)
      const lesson = dailyCourses.find(l => l.id === lessonId);
      if (lesson) {
        const reward = lesson.points;
        userPoints += reward;
        completedLessons.add(lessonId);
        saveUserData();
        updatePointsUI();
        // Kartalarni yangilash (tugallangan badge va ballarni ko'rsatish)
        renderCards(); 
        // Yangi tugallanganlik uchun haptic
        haptic('success');
        // Telegram'da notifikatsiya
        tg.showPopup({
          title: "🎉 Tabriklaymiz!",
          message: `"${lesson.title}" darsini ochdingiz! +${reward} ball qo'shildi. Jami: ${userPoints} ball`,
          buttons: [{type: "ok"}]
        });
      }
    } else {
      // Agar tugallangan bo'lsa, faqat darsni qayta ochadi, ball qo'shilmaydi
      haptic('light');
    }
    
    // Navigatsiya qilishdan oldin, dars{id}.html mavjudligini tekshirish imkoniyati yo'q, ammo foydalanuvchini yo'naltiramiz.
    // Agar fayl mavjud bo'lmasa, browser 404 beradi. Buning oldini olish uchun demo versiyada biz dars1.html... dars30.html virtual.
    // To'liq ilovada ushbu fayllar bo'lishi kerak. Agar fayllar mavjud bo'lmasa, placeholder ko'rsatamiz.
    // Hozirgi loyihada 30 ta html fayl bo'lmasligi mumkin, ammo talabga ko'ra, link ochiladi. 
    // Foydalanuvchiga real dars sahifasiga o'tishini ta'minlaymiz.
    // Agar dars sahifasi mavjud bo'lmasa, maxsus xabar bilan 'under construction' ko'rsatish mumkin.
    // Buni ilova sifatida "Bu dars hozircha tayyorlanmoqda" deb popup beramiz va yo'naltirmaymiz.
    // Ammo shartda har bir karta dars1.html ... dars30.html bo'lishi kerak. Biz ularni yaratamiz demo maqsadida yo'naltirish qilamiz.
    // REAL da fayllar serverda bo'lishi kerak. Lekin biz foydalanuvchiga "darsX.html" ni ochishga harakat qilamiz.
    // Agar xohlasak, yangi sahifaga o'tishdan oldin yana bir konfirmatsiya qilish mumkin. 
    // To'liq funksional bo'lishi uchun:
    // Dars sahifasini ochish
    try {
      // current path bo'yicha to'liq url yasaymiz
      let currentPath = window.location.pathname;
      let basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
      let targetUrl = basePath + pageUrl;
      // Agar biz localhost yoki file protokoli ishlatilsa, shunchaki navigate
      // Telegram WebApp da navigate qilish xavfsiz
      tg.HapticFeedback.impactOccurred('medium');
      window.location.href = targetUrl;
    } catch (navErr) {
      console.warn(navErr);
      window.open(pageUrl, '_self');
    }
  }
  
  // Tab bar funksionalligi (faqat UI, asosiy vazifa kartalarni ko'rsatish va bas)
  function initTabs() {
    const tabs = document.querySelectorAll('.tab-item');
    const learnContainer = document.getElementById('cards-list');
    tabs.forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabType = tab.getAttribute('data-tab');
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        haptic('light');
        if (tabType === 'learn') {
          renderCards();
        } else if (tabType === 'rank') {
          // Reyting oynasi: statistik ma'lumot ko'rsatish (foydalanuvchi ballari va tugallangan darslar)
          const completedCount = completedLessons.size;
          const totalLessons = 30;
          const message = `📊 Sizning statistikangiz:\n🏆 Ball: ${userPoints}\n📚 O'zlashtirilgan darslar: ${completedCount}/${totalLessons}\n🎯 Maqsad: 30 kunda 5000+ ball!`;
          tg.showPopup({
            title: "🏅 Reyting va yutuqlar",
            message: message,
            buttons: [{type: "close"}]
          });
          // Qisqa vizual o'zgartirish: kartalarni bir xil qoldirish, lekin popup ko'rsatish
          // agar xohlasak reyting kartalarini almashtirish mumkin, lekin asosiy fokusda o'zgarmasin.
        } else if (tabType === 'help') {
          tg.showPopup({
            title: "📘 Yordam",
            message: "LearnU 30 kunlik dastur. Har bir karta 'Boshlash' tugmasi orqali dars1.html ... dars30.html sahifalariga o'tadi.\nDarsni birinchi marta ochsangiz ball yig'asiz. Barcha darslar ochiq va ketma-ket o'rganish mumkin.\n\nTelegram orqali to'liq tajriba uchun kengaytirilgan.",
            buttons: [{type: "ok"}]
          });
        }
      });
    });
  }
  
  
  // Avatar va foydalanuvchi ma'lumotlari
  function setUserInfo() {
    const user = tg.initDataUnsafe?.user;
    if (user) {
      document.getElementById('userName').textContent = user.first_name || "Foydalanuvchi";
      const firstLetter = (user.first_name?.[0] || "U").toUpperCase();
      document.getElementById('avatar').textContent = firstLetter;
    } else {
      // demo user
      document.getElementById('userName').textContent = "O'quvchi";
      document.getElementById('avatar').textContent = "L";
    }
  }
  
  // Agar localStorage da ball mavjud bo'lsa, uni yuklaymiz, aks holda 1250
  loadUserData();
  setUserInfo();
  renderCards();
  initTabs();
  
  // Yana bir qo'shimcha: darslarni barcha ochiq ekanligi, kartalarda hech qanday qulf yo'q.
  // Foydalanuvchi 30 kunni birma-bir dars1.html dan dars30.html gacha ko'rish imkoniyatiga ega.
  // Telefon uchun scroll va safe-area moslamasi.
  window.addEventListener('resize', () => {
    tg.expand();
  });
  
  // Haptic bilan boshlang'ich tayyor
  console.log("LearnU 30 kunlik versiya ishga tushdi. Barcha kartalar dars1.html...dars30.html ga ulangan.");
  
  // Esda tuting: haqiqiy loyihada dars1.html dan dars30.html gacha bo'lgan fayllar mavjud bo'lishi kerak.
  // Agar fayllar mavjud bo'lmasa, foydalanuvchi 404 xatolikka duch kelishi mumkin. Buning oldini olish uchun
  // biz mavjud emasligida maxsus xabar ko'rsatadigan tizim qo'shishimiz mumkin, lekin talabga ko'ra 30 ta fayl bo'lishi kerak.
  // Bu kod har bir kartani aniq darsN.html ga yo'naltiradi.
</script>
</body>
</html>
