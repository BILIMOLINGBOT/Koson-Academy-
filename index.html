<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* CSS o'zgarishsiz qoldi, faqat silliq o'tishlar qo'shildi */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
    .app-wrapper { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
    
    .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; border: 1px solid #333; overflow: hidden; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

    .scroll-container { 
      flex: 1;
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      padding: 10px 20px; 
      gap: 15px; 
      align-items: center;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .lesson-card { 
      flex: 0 0 85%; 
      height: 60vh; 
      border-radius: 30px; 
      padding: 30px; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      scroll-snap-align: center; 
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a); 
      border: 1px solid rgba(255,255,255,0.1);
    }

    .tab-bar { 
      height: 80px; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px);
      display: flex; justify-content: space-around; align-items: center;
      border-top: 0.5px solid #333; padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-item { color: #8e8e93; text-decoration: none; text-align: center; font-size: 10px; }
    .tab-item.active { color: #007aff; }
    .tab-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 4px; stroke: currentColor; fill: none; }
    
    .points-badge { background: #fff; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header" onclick="navigateTo('profil.html')">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="userAvatar">?</div>
      <div>
        <h4 id="userName">Yuklanmoqda...</h4>
        <p id="userStatus" style="color: #8e8e93; font-size: 12px;">@username</p>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <div class="scroll-container" id="moduleContainer">
    </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Asosiy</span>
    </a>
    <a href="#" class="tab-item" onclick="navigateTo('reyting.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="#" class="tab-item" onclick="navigateTo('gift.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="7" width="20" height="5"/><path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  
  // Ranglarni Telegram mavzusiga moslash
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');

  const modules = [
    { id: 1, title: 'Kvant fizikasi asoslari', label: 'MODUL 1', action: 'Darsni boshlash' },
    { id: 2, title: 'Algoritmlar va Data Structure', label: 'MODUL 2', action: 'Davom etish' },
    { id: 3, title: 'Sun\'iy Intellekt', label: 'MODUL 3', action: 'Tez kunda' }
  ];

  function initApp() {
    const user = tg.initDataUnsafe?.user;
    
    // Foydalanuvchi ismi
    if (user) {
      document.getElementById('userName').textContent = user.first_name;
      document.getElementById('userStatus').textContent = user.username ? `@${user.username}` : `ID: ${user.id}`;
      
      // Avatar
      const avatarEl = document.getElementById('userAvatar');
      if (user.photo_url) {
        avatarEl.innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
      } else {
        avatarEl.textContent = user.first_name.charAt(0).toUpperCase();
      }
    }

    // Ballarni yuklash (Haqiqiy loyihada buni Backenddan fetch qilish kerak)
    const points = localStorage.getItem('user_points') || 312;
    document.getElementById('userPoints').textContent = `⚡ ${points}`;

    renderModules();
  }

  function renderModules() {
    const container = document.getElementById('moduleContainer');
    container.innerHTML = modules.map(m => `
      <div class="lesson-card" onclick="openModule(${m.id})">
        <span style="color: #8e8e93; font-size: 12px; font-weight: 600;">${m.label}</span>
        <h2 style="font-size: 24px; line-height: 1.2;">${m.title}</h2>
        <div style="color: #007aff; font-weight: 600;">${m.action} →</div>
      </div>
    `).join('');
  }

  window.navigateTo = function(url) {
    tg.HapticFeedback.impactOccurred('light');
    // Sahifa o'zgarishidan oldin biroz kechikish (visual feedback uchun)
    setTimeout(() => {
      window.location.href = url;
    }, 100);
  };

  window.openModule = function(id) {
    tg.HapticFeedback.notificationOccurred('success');
    localStorage.setItem('last_module', id);
    window.location.href = `module.html?id=${id}`;
  };

  // Telegram BackButton boshqarish
  if (window.location.pathname.includes('module.html') || window.location.pathname.includes('profil.html')) {
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      window.history.back();
    });
  } else {
    tg.BackButton.hide();
  }

  initApp();
</script>
</body>
</html>
