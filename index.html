<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LearnU | So'zlashuv</title>
    <!-- Font Awesome (Ikonkalar uchun) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root {
            --bg-color: #1A222B;
            --card-bg: #242F3E;
            --text-main: #FFFFFF;
            --text-secondary: #717F8D;
            --accent-color: #007AFF;
            --radius: 12px;
        }

        /* Full Screen sozlamalari */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            /* Telegram balandligiga moslash */
            min-height: 100vh;
            min-height: var(--tg-viewport-stable-height, 100vh);
            overflow-x: hidden;
        }

        header {
            max-width: 600px;
            margin: 10px auto 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 26px;
            font-weight: 700;
        }

        .profile-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 26px;
            background: var(--card-bg);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .profile-btn:active {
            transform: scale(0.9);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .search-bar {
            width: 100%;
            padding: 14px 20px;
            background: #2D394A;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            color: white;
            outline: none;
        }

        .modules-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto 80px; /* Pastdan joy qoldirish */
        }

        .module-item {
            background: var(--card-bg);
            padding: 14px 16px;
            border-radius: var(--radius);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .module-item:active {
            background: #2D394A;
            transform: translateX(5px);
        }

        .module-image {
            width: 44px;
            height: 44px;
            background: #FFFFFF;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .module-image i {
            font-size: 20px;
            color: #1A222B;
        }

        .module-title {
            flex-grow: 1;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
        }

        .module-chevron {
            color: var(--text-secondary);
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <h1>Soʻzlashuv</h1>
    <a href="profil.html" class="profile-btn">
        <i class="fa-solid fa-circle-user"></i>
    </a>
</header>

<div class="search-container">
    <input type="text" class="search-bar" placeholder="Mavzuni qidirish...">
</div>

<main class="modules-list" id="lessonList">
    <!-- Darslar JS orqali yuklanadi -->
</main>

<script>
    // --- 1. TELEGRAM WEB APP SOZLAMALARI ---
    const tg = window.Telegram.WebApp;

    // Ilovani to'liq ekranga yoyish
    tg.expand();
    
    // Orqaga tugmasini yoqish
    tg.BackButton.show();
    
    // Orqaga bosilganda index.html ga qaytarish
    tg.onEvent('backButtonClicked', function() {
        window.location.href = 'index.html';
    });

    // Telegram mavzusiga mos rang berish
    tg.setHeaderColor('#1A222B');

    // --- 2. DARSLAR RO'YXATI ---
    const lessons = [
        "O'zingizni tanishtiring", "Oila", "Ob-havo", "Hafta kunlari", "Fasllar",
        "Feʼl atvori", "Ranglar", "Raqamlar", "Gapirish", "Kundalik tartib",
        "Sevimli mashg'ulotlar", "Salomlashuv", "Xayrlashuv", "Vaqt", "Rahmat va tashakkur",
        "Kechirim soʻrash", "Rozilik va Norozilik", "Iltimos va istak", "Qiziqishlar", "Oylar",
        "Mevalar", "Sabzavotlar", "Tana aʼzolari", "Fanlar", "Telefon soʻzlashuv 1",
        "Telefon soʻzlashuv 2", "Taom", "Kishilik olmoshlari", "Sifatlar", "Savdo"
    ];

    const icons = [
        "fa-user-tie", "fa-house-chimney", "fa-cloud-sun", "fa-calendar-days", "fa-leaf",
        "fa-brain", "fa-palette", "fa-5", "fa-comment-dots", "fa-clock-rotate-left",
        "fa-icons", "fa-handshake", "fa-door-open", "fa-clock", "fa-hand-holding-heart",
        "fa-face-sad-tear", "fa-thumbs-up", "fa-hand-sparkles", "fa-bolt", "fa-calendar-check",
        "fa-apple-whole", "fa-carrot", "fa-accessibility", "fa-book-open", "fa-phone-volume",
        "fa-video", "fa-utensils", "fa-users-rectangle", "fa-wand-magic-sparkles", "fa-cart-shopping"
    ];

    const list = document.getElementById('lessonList');

    // Ro'yxatni chiqarish
    lessons.forEach((title, index) => {
        const lessonNum = index + 1;
        const item = document.createElement('a');
        item.href = `d${lessonNum}.html`;
        item.className = 'module-item';

        item.innerHTML = `
            <div class="module-image">
                <i class="fas ${icons[index]}"></i>
            </div>
            <h3 class="module-title">${lessonNum}. ${title}</h3>
            <i class="fas fa-chevron-right module-chevron"></i>
        `;
        list.appendChild(item);
    });

    // Tayyor bo'lgach bildirish
    tg.ready();
</script>

</body>
</html>
