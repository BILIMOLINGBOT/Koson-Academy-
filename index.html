
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yakshanba • Profil darajasi</title>
  <!-- iOS uchun maxsus moslama: font, ranglar, yumshoq soyalar -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f7; /* iOS uslubidagi och fon */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      /* qo'shimcha iOS qulaylik */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .profile-card {
      max-width: 380px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: #ffffff;
      border-radius: 36px;
      padding: 28px 24px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), 0 8px 16px rgba(0, 0, 0, 0.02);
      transition: all 0.2s ease;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    /* sarlavha va kun */
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .day {
      font-size: 20px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .profile-label {
      font-size: 15px;
      font-weight: 500;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* daraja kartalari uchun container */
    .levels {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .level-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .level-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .level-name {
      font-size: 17px;
      font-weight: 500;
      color: #1d1d1f;
      letter-spacing: -0.3px;
    }

    .percentage {
      font-size: 15px;
      font-weight: 500;
      color: #86868b;
      font-feature-settings: "tnum";
      font-variant-numeric: tabular-nums;
    }

    /* progress bar konteyneri */
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: #e5e5ea;
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #007aff; /* iOS moviy rangi */
      border-radius: 100px;
      transition: width 0.8s cubic-bezier(0.2, 0.9, 0.4, 1);
    }

    /* har bir daraja uchun rang (ixtiyoriy, lekin iOS ruhida) */
    .level-item:nth-child(1) .progress-fill { background: #34c759; } /* A1 - yashil */
    .level-item:nth-child(2) .progress-fill { background: #30b0c7; } /* A2 - moviy-yashil */
    .level-item:nth-child(3) .progress-fill { background: #007aff; } /* B1 - klassik moviy */
    .level-item:nth-child(4) .progress-fill { background: #5856d6; } /* B2 - binafsha */

    /* foizlar uchun qiymatlar (dinamik ko'rinishi uchun) */
    .progress-fill.a1 { width: 24%; }
    .progress-fill.a2 { width: 48%; }
    .progress-fill.b1 { width: 72%; }
    .progress-fill.b2 { width: 89%; }

    /* nozik ajratuvchi chiziq (ixtiyoriy) */
    .divider {
      margin: 16px 0 8px;
      height: 1px;
      background: #f0f0f5;
    }

    /* iOS qurilmalarida teginish effekti yo'q, faqat ko'rinish */
    @media (prefers-color-scheme: dark) {
      /* Agar tizim qorong'u rejimda bo'lsa, avtomatik moslashuv */
      body {
        background: #000000;
      }
      .profile-card {
        background: #1c1c1e;
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .day, .level-name {
        color: #f5f5f7;
      }
      .profile-label, .percentage {
        color: #98989d;
      }
      .progress-bar-bg {
        background: #3a3a3c;
      }
      .divider {
        background: #2c2c2e;
      }
      /* ranglar biroz yorqinroq ko'rinishi uchun sozlash */
      .level-item:nth-child(1) .progress-fill { background: #32d74b; }
      .level-item:nth-child(2) .progress-fill { background: #40c8e0; }
      .level-item:nth-child(3) .progress-fill { background: #0a84ff; }
      .level-item:nth-child(4) .progress-fill { background: #6e6ef4; }
    }

    /* juda kichik ekranlar uchun qo'shimcha noziklik */
    @media (max-width: 320px) {
      .profile-card {
        padding: 20px 18px 24px;
      }
      .level-name {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="header">
      <span class="day">Yakshanba</span>
      <span class="profile-label">Profil</span>
    </div>

    <div class="levels">
      <!-- A1 Beginner -->
      <div class="level-item">
        <div class="level-info">
          <span class="level-name">A1 Beginner</span>
          <span class="percentage">24%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill a1" role="progressbar" aria-valuenow="24" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>

      <!-- A2 Pre-intermediate -->
      <div class="level-item">
        <div class="level-info">
          <span class="level-name">A2 Pre‑intermediate</span>
          <span class="percentage">48%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill a2" role="progressbar" aria-valuenow="48" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>

      <!-- B1 Intermediate -->
      <div class="level-item">
        <div class="level-info">
          <span class="level-name">B1 Intermediate</span>
          <span class="percentage">72%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill b1" role="progressbar" aria-valuenow="72" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>

      <!-- B2 Upper-intermediate -->
      <div class="level-item">
        <div class="level-info">
          <span class="level-name">B2 Upper‑intermediate</span>
          <span class="percentage">89%</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-fill b2" role="progressbar" aria-valuenow="89" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
      </div>
    </div>

    <!-- nozik dekorativ chiziq (charchatmaslik uchun minimal) -->
    <div class="divider"></div>
  </div>

  <!-- iOS qurilmalar uchun qo'shimcha teginish holatini yo'q qilish, 
       faqat vizual ko'rinish. JavaScript shart emas, lekin dinamik progress uchun qo'shish mumkin. -->
</body>
</html>
