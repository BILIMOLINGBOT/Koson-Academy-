<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .post-container {
            width: 100%;
            max-width: 500px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        /* Video qismi */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #111;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Bu erga haqiqiy video URL qo'yiladi */
            background-image: url('https://via.placeholder.com/800x450/222/fff?text=Video+Scene'); 
            background-size: cover;
        }

        /* Subtitr */
        .subtitle {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Video boshqaruvlari */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            font-size: 24px;
            cursor: pointer;
        }

        .progress-container {
            flex-grow: 1;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            position: relative;
        }

        .progress-bar {
            width: 15%; /* 0:04 / 0:41 taxminan */
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        .progress-scrubber {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            left: 15%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .time {
            font-size: 12px;
            font-weight: bold;
        }

        /* Ma'lumotlar qismi (Pastki qism) */
        .info-section {
            padding: 12px 5px;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .profile-pic {
            width: 36px;
            height: 36px;
            background-color: #e50914; /* Netflix qizil */
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }

        .user-names {
            display: flex;
            flex-direction: column;
        }

        .display-name {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .handle {
            color: #71767b;
            font-size: 14px;
        }

        .caption {
            font-size: 15px;
            line-height: 20px;
            margin-bottom: 15px;
        }

        /* Ikonkalar (Like, Comment...) */
        .actions {
            display: flex;
            justify-content: space-between;
            color: #71767b;
            font-size: 13px;
            padding-top: 5px;
        }

        .action-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-item:hover {
            color: #1d9bf0;
        }
    </style>
</head>
<body>

<div class="post-container">
    <div class="video-wrapper">
        <div class="video-placeholder"></div>
        <div class="subtitle">
            Oh, I know quite a bit<br>about Kitty Song Covey.
        </div>
        
        <div class="controls">
            <div class="play-btn">
                <i class="fas fa-pause"></i>
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
                <div class="progress-scrubber"></div>
            </div>
            <div class="time">0:04 / 0:41</div>
        </div>
    </div>

    <div class="info-section">
        <div class="user-header">
            <div class="profile-pic">N</div>
            <div class="user-names">
                <span class="display-name">netflix⁷ <i class="fas fa-check-circle" style="color: #d4af37;"></i></span>
                <span class="handle">@netflix</span>
            </div>
        </div>
        
        <div class="caption">
            Mentally preparing for XO, Kitty Season 3 with the mooncovey rain scene
        </div>

        <div class="actions">
            <div class="action-item"><i class="far fa-comment"></i> 366</div>
            <div class="action-item"><i class="fas fa-retweet"></i> 810</div>
            <div class="action-item"><i class="far fa-heart"></i> 3,5K</div>
            <div class="action-item"><i class="fas fa-chart-simple"></i> 450K</div>
            <div class="action-item"><i class="far fa-bookmark"></i> <i class="fas fa-share-nodes" style="margin-left: 10px;"></i></div>
        </div>
    </div>
</div>

</body>
</html>
