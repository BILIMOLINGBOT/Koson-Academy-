
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dono - Video Platform</title>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #ffffff;
      --ios-secondary-bg: #f2f2f7;
      --ios-text: #000000;
      --ios-gray: #8e8e93;
      --ios-red: #FF3B30;
      --ios-green: #34C759;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--ios-bg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--ios-text);
      padding-bottom: var(--safe-bottom);
      line-height: 1.4;
    }

    /* ===== HEADER (iOS Style with Blur) ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: calc(var(--safe-top) + 10px) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .app-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.8px;
      background: linear-gradient(45deg, #007AFF, #5856D6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header-icon {
      position: relative;
      color: var(--ios-text);
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .header-icon:active {
      transform: scale(0.9);
      opacity: 0.6;
    }

    .notification-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 9px;
      height: 9px;
      background-color: var(--ios-red);
      border-radius: 50%;
      border: 1.5px solid white;
    }

    .avatar-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      border: 0.5px solid rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .avatar-wrapper:active {
      transform: scale(0.95);
    }

    .avatar-wrapper img, .avatar-initial {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== SEARCH BAR (Hidden by default) ===== */
    .search-overlay {
      display: none;
      padding: 10px 16px;
      background: var(--ios-bg);
    }
    
    .search-input-container {
      background: var(--ios-secondary-bg);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-input-container input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 16px;
    }

    /* ===== FEED ===== */
    .feed {
      display: flex;
      flex-direction: column;
    }

    .video-item {
      width: 100%;
      margin-bottom: 12px;
      transition: background 0.2s;
    }

    .video-item:active {
      background: var(--ios-secondary-bg);
    }

    .thumbnail-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      background: #eee;
    }

    .thumbnail-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .video-details {
      padding: 12px 16px;
      display: flex;
      gap: 12px;
    }

    .channel-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      flex-shrink: 0;
      object-fit: cover;
    }

    .video-text {
      flex: 1;
    }

    .video-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      font-size: 13px;
      color: var(--ios-gray);
    }

    /* ===== PROFILE MODAL (iOS Style) ===== */
    .profile-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: flex-end;
      justify-content: center;
    }

    .profile-modal.active {
      display: flex;
    }

    .profile-sheet {
      background: var(--ios-bg);
      width: 100%;
      max-width: 500px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    .profile-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .profile-avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 600;
      color: white;
      overflow: hidden;
    }

    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-username {
      font-size: 15px;
      color: var(--ios-gray);
      margin-bottom: 8px;
    }

    .profile-info {
      background: var(--ios-secondary-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 15px;
    }

    .info-label {
      color: var(--ios-gray);
    }

    .info-value {
      font-weight: 500;
      color: var(--ios-text);
    }

    .profile-buttons {
      display: flex;
      gap: 12px;
    }

    .profile-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.2s;
      border: none;
    }

    .profile-btn:active {
      opacity: 0.6;
    }

    .btn-primary {
      background: var(--ios-blue);
      color: white;
    }

    .btn-secondary {
      background: var(--ios-secondary-bg);
      color: var(--ios-text);
    }

    .close-modal {
      margin-top: 12px;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--ios-gray);
    }

    /* Toast message */
    .toast-message {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 3000;
      animation: fadeInOut 2s ease;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      85% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="app-title">Dono</div>
    <div class="header-right">
      <div class="header-icon" id="search-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <div class="header-icon" id="notification-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notification-badge"></span>
      </div>
      <div class="header-icon avatar-wrapper" id="profile-btn">
        <div id="header-avatar-initial" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #007AFF; color: white; font-weight: 600;">U</div>
      </div>
    </div>
  </header>

  <div class="search-overlay" id="search-bar">
    <div class="search-input-container">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--ios-gray)" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="search-input" placeholder="Video qidirish...">
    </div>
  </div>

  <main class="feed" id="feed">
    <!-- Video items will be loaded dynamically -->
    <div class="loading">Videolar yuklanmoqda...</div>
  </main>

  <!-- Profile Modal -->
  <div class="profile-modal" id="profile-modal">
    <div class="profile-sheet">
      <div class="profile-header">
        <div class="profile-avatar-large" id="modal-avatar">
          <span id="modal-avatar-initial" style="font-size: 48px; font-weight: 600;">U</span>
        </div>
        <h2 class="profile-name" id="profile-name">Yuklanmoqda...</h2>
        <p class="profile-username" id="profile-username">@username</p>
      </div>
      
      <div class="profile-info">
        <div class="info-row">
          <span class="info-label">Telegram ID</span>
          <span class="info-value" id="user-id">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Ism</span>
          <span class="info-value" id="first-name">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Familiya</span>
          <span class="info-value" id="last-name">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Til</span>
          <span class="info-value" id="user-lang">uz</span>
        </div>
      </div>
      
      <div class="profile-buttons">
        <button class="profile-btn btn-secondary" id="close-webapp-btn">❌ Yopish</button>
        <button class="profile-btn btn-primary" id="expand-webapp-btn">🖥️ Kengaytirish</button>
      </div>
      <button class="profile-btn btn-secondary close-modal" id="close-modal-btn">Yopish</button>
    </div>
  </div>

  <script>
    // Video ma'lumotlar
    const videos = [
      {
        id: 1,
        thumbnail: "https://picsum.photos/id/1/800/450",
        duration: "12:45",
        channelIcon: "https://ui-avatars.com/api/?name=IT&background=333&color=fff",
        title: "JavaScript'da Telegram Mini Apps yaratish darsi",
        meta: "IT Academy • 15K ko'rildi • 2 soat oldin"
      },
      {
        id: 2,
        thumbnail: "https://picsum.photos/id/10/800/450",
        duration: "05:20",
        channelIcon: "https://ui-avatars.com/api/?name=N&background=4CD964&color=fff",
        title: "Tabiatning eng sokin burchaklari: 4K manzara",
        meta: "Nature Lab • 8K ko'rildi • 1 kun oldin"
      },
      {
        id: 3,
        thumbnail: "https://picsum.photos/id/20/800/450",
        duration: "08:15",
        channelIcon: "https://ui-avatars.com/api/?name=E&background=FF9500&color=fff",
        title: "Ingliz tili grammatikasini 8 haftada o'rganish",
        meta: "Language Pro • 22K ko'rildi • 3 kun oldin"
      },
      {
        id: 4,
        thumbnail: "https://picsum.photos/id/26/800/450",
        duration: "15:30",
        channelIcon: "https://ui-avatars.com/api/?name=AI&background=5856D6&color=fff",
        title: "Sun'iy intellekt asoslari - to'liq kurs",
        meta: "AI Academy • 45K ko'rildi • 1 hafta oldin"
      }
    ];

    let tg = null;
    let currentUser = null;

    // Toast xabar ko'rsatish
    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast-message';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // Avatar yaratish (ismning birinchi harfidan)
    function updateAvatar(firstName) {
      const initial = (firstName && firstName.length > 0) ? firstName.charAt(0).toUpperCase() : 'U';
      const colors = ['#007AFF', '#5856D6', '#FF3B30', '#34C759', '#FF9500', '#AF52DE'];
      const colorIndex = (firstName?.charCodeAt(0) || 0) % colors.length;
      const bgColor = colors[colorIndex];
      
      // Header avatar
      const headerAvatar = document.getElementById('header-avatar-initial');
      if (headerAvatar) {
        headerAvatar.style.backgroundColor = bgColor;
        headerAvatar.textContent = initial;
      }
      
      // Modal avatar
      const modalAvatar = document.getElementById('modal-avatar-initial');
      if (modalAvatar) {
        modalAvatar.textContent = initial;
        document.getElementById('modal-avatar').style.background = bgColor;
      }
    }

    // Videolarni yuklash
    function loadVideos(searchTerm = '') {
      const feed = document.getElementById('feed');
      const filteredVideos = searchTerm 
        ? videos.filter(v => v.title.toLowerCase().includes(searchTerm.toLowerCase()))
        : videos;
      
      if (filteredVideos.length === 0) {
        feed.innerHTML = '<div class="loading" style="padding: 40px;">Hech qanday video topilmadi</div>';
        return;
      }
      
      feed.innerHTML = filteredVideos.map(video => `
        <div class="video-item" data-id="${video.id}">
          <div class="thumbnail-container">
            <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
            <span class="video-duration">${video.duration}</span>
          </div>
          <div class="video-details">
            <img class="channel-icon" src="${video.channelIcon}" alt="Channel">
            <div class="video-text">
              <h2 class="video-title">${video.title}</h2>
              <p class="video-meta">${video.meta}</p>
            </div>
          </div>
        </div>
      `).join('');
      
      // Video itemlarga click event qo'shish
      document.querySelectorAll('.video-item').forEach(item => {
        item.addEventListener('click', () => {
          if (tg && tg.showAlert) {
            const title = item.querySelector('.video-title')?.textContent || 'Video';
            tg.showAlert(`${title}\n\nBu video hozircha faqat namuna uchun`);
          } else {
            showToast('Video player tez orada qo\'shiladi');
          }
        });
      });
    }

    // Telegram WebApp ni sozlash
    function initTelegramWebApp() {
      if (window.Telegram?.WebApp) {
        tg = window.Telegram.WebApp;
        
        // WebApp tayyor
        tg.ready();
        
        // Oynani kengaytirish
        tg.expand();
        
        // MainButton
        if (tg.MainButton) {
          tg.MainButton.setText("Dono ga xush kelibsiz!");
          tg.MainButton.show();
          tg.MainButton.onClick(() => {
            showToast("Dono video platformasiga xush kelibsiz! 🎬");
          });
        }
        
        // Foydalanuvchi ma'lumotlarini olish
        if (tg.initDataUnsafe?.user) {
          currentUser = tg.initDataUnsafe.user;
          
          const firstName = currentUser.first_name || 'User';
          const lastName = currentUser.last_name || '';
          const username = currentUser.username || 'telegram_user';
          const userId = currentUser.id;
          const languageCode = currentUser.language_code || 'uz';
          
          // Profile modalni to'ldirish
          document.getElementById('profile-name').textContent = `${firstName} ${lastName}`.trim();
          document.getElementById('profile-username').textContent = `@${username}`;
          document.getElementById('user-id').textContent = userId;
          document.getElementById('first-name').textContent = firstName;
          document.getElementById('last-name').textContent = lastName || '-';
          document.getElementById('user-lang').textContent = languageCode.toUpperCase();
          
          // Avatar yaratish
          updateAvatar(firstName);
        } else {
          // Demo user
          currentUser = { first_name: 'Mehmon', last_name: '', username: 'guest' };
          document.getElementById('profile-name').textContent = 'Mehmon Foydalanuvchi';
          document.getElementById('profile-username').textContent = '@guest';
          document.getElementById('user-id').textContent = 'Telegram orqali kiring';
          document.getElementById('first-name').textContent = 'Mehmon';
          document.getElementById('last-name').textContent = '-';
          updateAvatar('Mehmon');
        }
        
        console.log('Telegram WebApp API tayyor');
      } else {
        console.log('Telegram WebApp muhitida emas, demo rejim');
        // Demo rejim
        currentUser = { first_name: 'Demo', last_name: 'User', username: 'demo_user' };
        document.getElementById('profile-name').textContent = 'Demo Foydalanuvchi';
        document.getElementById('profile-username').textContent = '@demo_user';
        document.getElementById('user-id').textContent = '123456789';
        document.getElementById('first-name').textContent = 'Demo';
        document.getElementById('last-name').textContent = 'User';
        updateAvatar('Demo');
      }
      
      // Videolarni yuklash
      loadVideos();
    }

    // Profile modal
    function openProfileModal() {
      document.getElementById('profile-modal').classList.add('active');
      if (tg?.MainButton) tg.MainButton.hide();
    }
    
    function closeProfileModal() {
      document.getElementById('profile-modal').classList.remove('active');
      if (tg?.MainButton) tg.MainButton.show();
    }
    
    function closeWebApp() {
      if (tg) {
        tg.close();
      } else {
        showToast("Bu amal faqat Telegram ichida ishlaydi");
      }
    }
    
    function expandWebApp() {
      if (tg) {
        tg.expand();
        closeProfileModal();
        showToast("Oyna kengaytirildi");
      } else {
        showToast("Kengaytirish faqat Telegram ichida mumkin");
      }
    }

    // Event listenerlar
    document.addEventListener('DOMContentLoaded', () => {
      initTelegramWebApp();
      
      
      // Profile tugmasi
      document.getElementById('profile-btn').addEventListener('click', openProfileModal);
      document.getElementById('close-modal-btn').addEventListener('click', closeProfileModal);
      document.getElementById('close-webapp-btn').addEventListener('click', closeWebApp);
      document.getElementById('expand-webapp-btn').addEventListener('click', expandWebApp);
      
      // Modalni tashqariga bosganda yopish
      document.getElementById('profile-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('profile-modal')) closeProfileModal();
      });
      
      // Qidiruv
      const searchBtn = document.getElementById('search-btn');
      const searchBar = document.getElementById('search-bar');
      const searchInput = document.getElementById('search-input');
      
      searchBtn.addEventListener('click', () => {
        if (searchBar.style.display === 'block') {
          searchBar.style.display = 'none';
          loadVideos('');
        } else {
          searchBar.style.display = 'block';
          searchInput.focus();
        }
      });
      
      searchInput.addEventListener('input', (e) => {
        loadVideos(e.target.value);
      });
      
      // Bildirishnomalar
      document.getElementById('notification-btn').addEventListener('click', () => {
        if (tg?.showAlert) {
          tg.showAlert("📢 Hozircha yangi bildirishnomalar yo'q");
        } else {
          showToast("📢 Hozircha yangi bildirishnomalar yo'q");
        }
      });
      
      // Scroll effekti
      window.addEventListener('scroll', () => {
        const header = document.querySelector('.header');
        header.style.boxShadow = window.scrollY > 10 ? '0 4px 30px rgba(0, 0, 0, 0.05)' : 'none';
      });
    });
  </script>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
