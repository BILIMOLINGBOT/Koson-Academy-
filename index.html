<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Video platforma</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      -webkit-tap-highlight-color: transparent; 
    }
    
    body { 
      background: #000; 
      color: #fff; 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
    }
    
    .app-wrapper { 
      width: 100%; 
      max-width: 480px; 
      min-height: 100vh; 
      background: #000; 
      position: relative; 
    }
    
    /* Header */
    .header { 
      padding: 16px 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background: #000;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    
    .avatar-wrapper { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      cursor: pointer;
    }
    
    .avatar-circle { 
      width: 45px; 
      height: 45px; 
      background: linear-gradient(135deg, #333, #111); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      font-size: 1.2rem; 
      border: 2px solid #007aff; 
      overflow: hidden; 
    }
    
    .avatar-circle img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }
    
    .gradient-name {
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 600;
    }
    
    .points-badge { 
      background: #fff; 
      color: #000; 
      padding: 6px 14px; 
      border-radius: 20px; 
      font-weight: 600; 
      font-size: 14px; 
    }
    
    /* Videolar grid */
    .videos-container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .video-card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s;
      border: 1px solid #222;
    }
    
    .video-card:active {
      transform: scale(0.98);
    }
    
    .video-thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
      overflow: hidden;
    }
    
    .video-thumbnail video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }
    
    .video-info {
      padding: 12px;
    }
    
    .video-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .video-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #888;
      font-size: 13px;
    }
    
    .video-author {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .video-stats {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .empty-state {
      text-align: center;
      color: #666;
      padding: 60px 20px;
      font-size: 16px;
    }
    
    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top: 3px solid #007aff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .upload-prompt {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      border: 1px dashed #333;
      margin: 20px;
    }
    
    .upload-prompt button {
      background: #007aff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      margin-top: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <div class="header" onclick="navigateTo('profil.html')">
      <div class="avatar-wrapper">
        <div class="avatar-circle" id="userAvatar">
          <span id="avatarInitial">?</span>
          <img id="avatarImage" src="" alt="avatar" style="display: none;">
        </div>
        <div>
          <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
        </div>
      </div>
      <div class="points-badge" id="userPoints">⚡ 0</div>
    </div>

    <!-- Videolar ro'yxati -->
    <div class="videos-container" id="videosContainer">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor('bg_color');

    let allVideos = [];

    // Yuklash
    function loadVideos() {
      allVideos = JSON.parse(localStorage.getItem('videos')) || [];
      renderVideos();
    }

    // Videolarni ko'rsatish
    function renderVideos() {
      const container = document.getElementById('videosContainer');
      
      if (allVideos.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5">
              <path d="M14 2H6C4.9 2 4.01 2.9 4.01 4L4 20C4 21.1 4.89 22 5.99 22H18C19.1 22 20 21.1 20 20V8L14 2Z" />
              <path d="M8 12H16V14H8V12ZM8 16H16V18H8V16Z" />
            </svg>
            <p>Hozircha hech qanday video yo'q</p>
            <div class="upload-prompt">
              <p>Birinchi videongizni yuklang!</p>
              <button onclick="navigateTo('videoupdate.html')">Video yuklash</button>
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = allVideos
        .sort((a, b) => b.id - a.id) // Yangilari tepada
        .map(video => `
          <div class="video-card" onclick="openVideo(${video.id})">
            <div class="video-thumbnail">
              <video muted preload="metadata">
                <source src="${video.videoUrl}" type="video/mp4">
              </video>
            </div>
            <div class="video-info">
              <div class="video-title">${video.title || 'Nomsiz video'}</div>
              <div class="video-meta">
                <span class="video-author">${video.author || 'Foydalanuvchi'}</span>
                <span>•</span>
                <span>${video.views || 0} ko'rish</span>
                <span>•</span>
                <span>${video.timeAgo || 'hozirgina'}</span>
              </div>
            </div>
          </div>
        `).join('');

      // Thumbnail videolarni hover effekti
      document.querySelectorAll('.video-card').forEach(card => {
        const video = card.querySelector('video');
        if (video) {
          card.addEventListener('mouseenter', () => {
            video.play().catch(() => {});
          });
          card.addEventListener('mouseleave', () => {
            video.pause();
            video.currentTime = 0;
          });
        }
      });
    }

    // Videoni ochish
    window.openVideo = function(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      if (video) {
        // Ko'rishlar sonini oshirish
        video.views = (parseInt(video.views) || 0) + 1;
        localStorage.setItem('videos', JSON.stringify(allVideos));
        
        // Joriy videoni saqlash
        localStorage.setItem('currentVideo', JSON.stringify(video));
        navigateTo('videoview.html');
      }
    };

    // Telegram ma'lumotlarini olish
    function initTelegramData() {
      const user = tg.initDataUnsafe?.user;
      
      if (user) {
        let fullName = user.first_name || 'Foydalanuvchi';
        if (user.last_name) {
          fullName = `${user.first_name} ${user.last_name}`;
        }
        document.getElementById('userName').textContent = fullName;
        
        // Avatar
        const avatarInitial = document.getElementById('avatarInitial');
        const avatarImage = document.getElementById('avatarImage');
        
        if (user.photo_url) {
          avatarImage.src = user.photo_url;
          avatarImage.style.display = 'block';
          avatarInitial.style.display = 'none';
        } else {
          avatarInitial.textContent = user.first_name?.charAt(0).toUpperCase() || '?';
        }
      }
    }

    // Navigatsiya
    window.navigateTo = function(url) {
      window.location.href = url;
    };

    // BackButton boshqaruvi
    tg.BackButton.hide();

    // Ishga tushirish
    window.addEventListener('load', () => {
      initTelegramData();
      loadVideos();
    });
  </script>
</body>
</html>
