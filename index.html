<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ... oldingi stillar ... */
    .error-fallback {
      display: none;
      color: #ff3b30;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <!-- To'g'ri: body ichida to'g'ridan-to'g'ri kontent -->
  <div class="app-wrapper">
    <!-- ... oldingi kontent ... -->
  </div>

  <div id="errorMessage" class="error-fallback"></div>

  <script>
    (function() {
      try {
        const tg = window.Telegram?.WebApp;
        if (!tg) {
          throw new Error("Telegram WebApp mavjud emas");
        }
        
        tg.expand();
        tg.ready();
        
        // Xavfsizlik: initData ni tekshirish
        if (!tg.initData) {
          console.warn("initData mavjud emas");
          // Demo rejim
          loadDemoData();
        } else {
          loadUserData(tg);
        }
        
        function loadUserData(tg) {
          const user = tg.initDataUnsafe?.user;
          if (!user) {
            loadDemoData();
            return;
          }
          
          // User ma'lumotlarini yuklash
          updateUserUI(user);
          
          // BackButton ni to'g'ri boshqarish
          tg.BackButton.onClick(() => {
            if (document.referrer) {
              window.history.back();
            } else {
              tg.close();
            }
          });
        }
        
        function loadDemoData() {
          document.getElementById('userName').textContent = 'Javlonbek';
          document.getElementById('userStatus').textContent = '@JavlonbekRA';
          document.getElementById('userPoints').innerHTML = '⚡ 312';
          document.getElementById('avatarText').textContent = 'J';
        }
        
        function updateUserUI(user) {
          const firstName = user.first_name || '';
          const lastName = user.last_name || '';
          const userNameEl = document.getElementById('userName');
          const userStatusEl = document.getElementById('userStatus');
          const userPointsEl = document.getElementById('userPoints');
          const avatarText = document.getElementById('avatarText');
          const avatarImage = document.getElementById('avatarImage');
          
          userNameEl.textContent = firstName + (lastName ? ' ' + lastName : '');
          userStatusEl.textContent = user.username ? '@' + user.username : 'ID: ' + user.id;
          
          // Ballarni backend dan olish kerak
          fetchUserPoints(user.id).then(points => {
            userPointsEl.innerHTML = '⚡ ' + points;
          }).catch(() => {
            userPointsEl.innerHTML = '⚡ 0';
          });
          
          // Avatar yuklash
          if (user.username) {
            avatarImage.src = 'https://t.me/i/userpic/320/' + user.username + '.jpg';
            avatarImage.onload = () => {
              avatarText.style.display = 'none';
              avatarImage.style.display = 'block';
            };
            avatarImage.onerror = () => {
              avatarImage.style.display = 'none';
              avatarText.style.display = 'block';
              avatarText.textContent = firstName.charAt(0) || '👤';
            };
          } else {
            avatarText.textContent = firstName.charAt(0) || '👤';
          }
        }
        
        async function fetchUserPoints(userId) {
          // Backend API dan olish kerak
          // Hozircha localStorage
          return localStorage.getItem('userPoints_' + userId) || 0;
        }
        
        function openModule(num, name) {
          if (!num || !name) return;
          
          tg.HapticFeedback?.impactOccurred('light');
          
          // Module mavjudligini tekshirish
          const modulePath = `modul${num}.html`;
          fetch(modulePath, { method: 'HEAD' })
            .then(response => {
              if (response.ok) {
                localStorage.setItem('currentModule', num);
                localStorage.setItem('currentModuleName', name);
                location.href = modulePath;
              } else {
                showError(`${name} moduli hozircha mavjud emas`);
              }
            })
            .catch(() => {
              showError("Modul yuklanmadi");
            });
        }
        
        function showError(message) {
          const errorDiv = document.getElementById('errorMessage');
          errorDiv.style.display = 'block';
          errorDiv.textContent = message;
          setTimeout(() => {
            errorDiv.style.display = 'none';
          }, 3000);
        }
        
        window.openProfile = () => location.href = 'profil.html';
        window.openModule = openModule;
        
      } catch (error) {
        console.error("Xatolik:", error);
        document.body.innerHTML += `<div style="color:red;padding:20px;">Xatolik: ${error.message}</div>`;
      }
    })();
  </script>
</body>
</html>
