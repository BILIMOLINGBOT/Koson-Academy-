<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000000; color: #ffffff; height: 100vh; display: flex; justify-content: center; }
    .app-wrapper { width: 100%; max-width: 420px; height: 100vh; background: #000000; position: relative; }
    .header { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .avatar-wrapper { display: flex; align-items: center; gap: 15px; }
    .avatar-circle { width: 50px; height: 50px; background: linear-gradient(135deg, #333, #111); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #222; overflow: hidden; }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
    
    /* Konteyner ichidagilar markazda turishi uchun align-items qo'shildi */
    .scroll-container { 
      display: flex; 
      overflow-x: auto; 
      scroll-snap-type: x mandatory; 
      padding: 10px 20px; 
      gap: 15px; 
      align-items: center; 
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* Karta o'lchami 65vh ga o'zgartirildi */
    .lesson-card { 
      flex: 0 0 85%; 
      height: 65vh; 
      border-radius: 40px; 
      padding: 35px; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      scroll-snap-align: center; 
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a); 
      border: 1px solid rgba(255,255,255,0.05); 
      cursor: pointer; 
      transition: transform 0.2s; 
    }
    
    .lesson-card:active { transform: scale(0.98); }
    .tab-bar { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; height: 75px; background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-radius: 35px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 100; }
    .tab-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #8e8e93; text-decoration: none; font-size: 0.65rem; font-weight: 600; transition: 0.2s; }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2; }
    .points-badge { background: #fff; color: #000; padding: 6px 12px; border-radius: 15px; font-weight: 800; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="header" onclick="openProfile()">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="avatarContainer">
        <span id="avatarText">👤</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" style="font-size: 1.1rem;">Yuklanmoqda...</h4>
        <p id="userStatus" style="color: #8e8e93; font-size: 0.85rem;">Premium darslar</p>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <div class="scroll-container">
    <div class="lesson-card" onclick="openModule(1, 'Kvant fizikasi asoslari')"><span style="color: #8e8e93; font-size: 0.7rem;">MODUL 1</span><h2 style="font-size: 1.6rem;">Kvant fizikasi asoslari</h2><div style="color: #007aff; font-weight: 600;">Darsni boshlash →</div></div>
    <div class="lesson-card" onclick="openModule(2, 'Algoritmlar')"><span style="color: #8e8e93; font-size: 0.7rem;">MODUL 2</span><h2 style="font-size: 1.6rem;">Algoritmlar</h2><div style="color: #007aff; font-weight: 600;">Davom etish →</div></div>
    </div>

  <nav class="tab-bar">
    <a href="index.html" class="tab-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Asosiy</span></a>
    <a href="reyting.html" class="tab-item"><svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reyting</span></a>
    <a href="gift.html" class="tab-item"><svg viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg><span>Sovg'a</span></a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.ready();
  
  const user = tg.initDataUnsafe?.user;
  const userNameEl = document.getElementById('userName');
  const userStatusEl = document.getElementById('userStatus');
  const userPointsEl = document.getElementById('userPoints');
  const avatarText = document.getElementById('avatarText');
  const avatarImage = document.getElementById('avatarImage');

  function loadUserData() {
    if (user) {
      const firstName = user.first_name || '';
      const lastName = user.last_name || '';
      userNameEl.textContent = firstName + (lastName ? ' ' + lastName : '');
      userStatusEl.textContent = user.username ? '@' + user.username : 'ID: ' + user.id;
      
      let points = localStorage.getItem('userPoints_' + user.id) || 312;
      userPointsEl.innerHTML = '⚡ ' + points;
      
      if (user.username) {
        avatarImage.src = 'https://t.me/i/userpic/320/' + user.username + '.jpg';
        avatarImage.onload = () => { avatarText.style.display = 'none'; avatarImage.style.display = 'block'; };
      } else {
        avatarText.textContent = firstName.charAt(0);
      }
    } else {
      userNameEl.textContent = 'Javlonbek';
      userStatusEl.textContent = '@JavlonbekRA';
      userPointsEl.innerHTML = '⚡ 312';
      avatarText.textContent = 'J';
    }
  }

  function openProfile() { location.href = 'profil.html'; }

  function openModule(num, name) {
    tg.HapticFeedback.impactOccurred('light');
    localStorage.setItem('currentModule', num);
    localStorage.setItem('currentModuleName', name);
    location.href = 'modul' + num + '.html';
  }

  loadUserData();
  tg.BackButton.onClick(() => tg.close());
</script>
</body>
</html>
