<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LearnU · Telegram Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #007aff, #00c6ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-username {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 8px;
        }

        .user-id {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
            background: var(--tg-theme-bg-color, #ffffff);
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .menu-item {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .menu-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .menu-title {
            font-weight: 600;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #e0e0e0);
            display: flex;
            justify-content: space-around;
            padding: 12px 16px 24px;
            max-width: 420px;
            margin: 0 auto;
        }

        .tab-item {
            text-align: center;
            color: var(--tg-theme-hint-color, #8e8e93);
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--tg-theme-button-color, #007aff);
        }

        .tab-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .tab-label {
            font-size: 11px;
        }

        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body {
                background: #1c1c1e;
                color: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="avatar" id="avatar">
                <span id="avatarText">👤</span>
                <img id="avatarImage" src="" alt="avatar" style="display: none;">
            </div>
            <div class="user-info">
                <div class="user-name" id="userName">Yuklanmoqda...</div>
                <div class="user-username" id="userUsername">@yuklanmoqda</div>
                <div class="user-id" id="userId">ID: Yuklanmoqda</div>
            </div>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statLessons">0</div>
                <div class="stat-label">Darslar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statPoints">0</div>
                <div class="stat-label">Ballar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statDays">0</div>
                <div class="stat-label">Kun</div>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="menu-grid">
            <div class="menu-item" onclick="alert('Darslar bo\'limi')">
                <div class="menu-icon">📚</div>
                <div class="menu-title">Darslar</div>
            </div>
            <div class="menu-item" onclick="alert('Reyting bo\'limi')">
                <div class="menu-icon">🏆</div>
                <div class="menu-title">Reyting</div>
            </div>
            <div class="menu-item" onclick="alert('Sovg\'alar bo\'limi')">
                <div class="menu-icon">🎁</div>
                <div class="menu-title">Sovg'alar</div>
            </div>
            <div class="menu-item" onclick="alert('Sozlamalar bo\'limi')">
                <div class="menu-icon">⚙️</div>
                <div class="menu-title">Sozlamalar</div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item active" onclick="switchTab('home')">
                <div class="tab-icon">🏠</div>
                <div class="tab-label">Asosiy</div>
            </div>
            <div class="tab-item" onclick="switchTab('rating')">
                <div class="tab-icon">📊</div>
                <div class="tab-label">Reyting</div>
            </div>
            <div class="tab-item" onclick="switchTab('gift')">
                <div class="tab-icon">🎁</div>
                <div class="tab-label">Sovg'a</div>
            </div>
            <div class="tab-item" onclick="switchTab('profile')">
                <div class="tab-icon">👤</div>
                <div class="tab-label">Profil</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App init
        const tg = window.Telegram.WebApp;
        tg.expand(); // Web App ni to'liq ekran qilish
        tg.ready();

        // Foydalanuvchi ma'lumotlarini olish
        const user = tg.initDataUnsafe?.user;
        
        function loadUserData() {
            if (user) {
                // Avatar
                const avatarDiv = document.getElementById('avatar');
                const avatarText = document.getElementById('avatarText');
                const avatarImage = document.getElementById('avatarImage');
                
                // Agar username bo'lsa, Telegram avatarini yuklash
                if (user.username) {
                    avatarImage.src = `https://t.me/i/userpic/320/${user.username}.jpg`;
                    avatarImage.onload = function() {
                        avatarText.style.display = 'none';
                        avatarImage.style.display = 'block';
                    };
                    avatarImage.onerror = function() {
                        avatarText.style.display = 'block';
                        avatarImage.style.display = 'none';
                        avatarText.textContent = user.first_name?.charAt(0) || '👤';
                    };
                } else {
                    avatarText.textContent = user.first_name?.charAt(0) || '👤';
                }
                
                // Ism
                document.getElementById('userName').textContent = 
                    `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Foydalanuvchi';
                
                // Username
                document.getElementById('userUsername').textContent = 
                    user.username ? `@${user.username}` : '@username_yo\'q';
                
                // ID
                document.getElementById('userId').textContent = `ID: ${user.id}`;
                
                // Statistikalar (misol uchun)
                document.getElementById('statLessons').textContent = '12';
                document.getElementById('statPoints').textContent = '359';
                document.getElementById('statDays').textContent = '7';
                
                // Telegram theme ranglarini qo'llash
                document.body.style.backgroundColor = tg.themeParams.bg_color || '#ffffff';
                document.body.style.color = tg.themeParams.text_color || '#000000';
            } else {
                // Test ma'lumotlari (Telegram'dan tashqari)
                document.getElementById('userName').textContent = 'Javlonbek Rashidov';
                document.getElementById('userUsername').textContent = '@javlon_dev';
                document.getElementById('userId').textContent = 'ID: 774829';
                document.getElementById('statLessons').textContent = '12';
                document.getElementById('statPoints').textContent = '359';
                document.getElementById('statDays').textContent = '7';
            }
        }

        // Tab switcher
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            // Tab bo'yicha amallar
            switch(tab) {
                case 'home':
                    tg.HapticFeedback.impactOccurred('light');
                    break;
                case 'rating':
                    tg.HapticFeedback.impactOccurred('medium');
                    break;
                case 'gift':
                    tg.HapticFeedback.impactOccurred('heavy');
                    break;
                case 'profile':
                    tg.HapticFeedback.notificationOccurred('success');
                    break;
            }
        }

        // Main button
        tg.MainButton.setText("Profilni yangilash");
        tg.MainButton.onClick(function() {
            tg.sendData(JSON.stringify({
                action: 'refresh_profile',
                user_id: user?.id
            }));
        });

        // Yuklash
        loadUserData();

        // Back button
        tg.BackButton.onClick(function() {
            tg.close();
        });

        // Haptic feedback
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                tg.HapticFeedback.impactOccurred('light');
            });
        });
    </script>
</body>
</html>
