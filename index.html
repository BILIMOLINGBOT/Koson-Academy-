<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnU | Zamonaviy So'zlashuv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --accent-color: #007AFF;
            --text-main: #1C1C1E;
            --text-secondary: #8E8E93;
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            line-height: 1.6;
        }

        header {
            max-width: 800px;
            margin: 40px auto 20px;
            text-align: center;
        }

        header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .search-container {
            max-width: 800px;
            margin: 20px auto;
        }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            background: #E3E3E8;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            outline: none;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            max-width: 800px;
            margin: 30px auto;
        }

        .module-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .module-card:active {
            transform: scale(0.95);
            background: #F9F9F9;
        }

        .module-card i {
            font-size: 28px;
            color: var(--accent-color);
            margin-bottom: 12px;
        }

        .module-card span {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .module-card h3 {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.2;
        }

        @media (max-width: 480px) {
            .modules-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<header>
    <h1>LearnU</h1>
    <p>30 kunlik zamonaviy so'zlashuv kursi</p>
</header>

<div class="search-container">
    <input type="text" class="search-bar" placeholder="Mavzularni qidirish...">
</div>

<main class="modules-grid" id="lessonGrid">
    <!-- Mavzular JavaScript orqali generatsiya qilinadi -->
</main>

<script>
    const lessons = [
        "O'zingizni tanishtiring", "Oila", "Ob-havo", "Hafta kunlari", "Fasllar",
        "Feʼl atvori", "Ranglar", "Raqamlar", "Gapirish", "Kundalik tartib",
        "Sevimli mashg'ulotlar", "Salomlashuv", "Xayrlashuv", "Vaqt", "Rahmat va tashakkur",
        "Kechirim soʻrash", "Rozilik va Norozilik", "Iltimos va istak", "Qiziqishlar", "Ijtimoiy tarmoqlar",
        "Mevalar", "Sabzavotlar", "Tana aʼzolari", "Fanlar", "Telefon soʻzlashuv 1",
        "Telefon soʻzlashuv 2", "Taom", "Kishilik olmoshlari", "Sifatlar", "Savdo"
    ];

    const icons = [
        "fa-user-tie", "fa-house-chimney", "fa-cloud-sun", "fa-calendar-days", "fa-leaf",
        "fa-brain", "fa-palette", "fa-arrow-1-9", "fa-comment-dots", "fa-clock",
        "fa-heart", "fa-hand-peace", "fa-door-open", "fa-hourglass-half", "fa-hand-holding-heart",
        "fa-face-smile-upside-down", "fa-thumbs-up", "fa-hand-sparkles", "fa-star", "fa-hashtag",
        "fa-apple-whole", "fa-carrot", "fa-child", "fa-book-open", "fa-phone",
        "fa-video", "fa-utensils", "fa-users", "fa-wand-magic-sparkles", "fa-cart-shopping"
    ];

    const grid = document.getElementById('lessonGrid');

    lessons.forEach((title, index) => {
        const lessonNum = index + 1;
        const card = document.createElement('a');
        card.href = `d${lessonNum}.html`;
        card.className = 'module-card';
        card.innerHTML = `
            <span>MODUL ${lessonNum}</span>
            <i class="fas ${icons[index]}"></i>
            <h3>${title}</h3>
        `;
        grid.appendChild(card);
    });
</script>

</body>
</html>
