<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LearnU · Large UI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-green: #34C759;
      --ios-gray: #8E8E93;
      --bg-color: #000000;
      --card-radius: 32px; /* Yanada yumshoqroq burchaklar */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-color);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      padding: 24px 20px 16px;
      padding-top: env(safe-area-inset-top, 24px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      z-index: 100;
    }

    .user-info { display: flex; align-items: center; gap: 14px; }
    
    .avatar-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a3a3c, #1c1c1e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
      border: 1.5px solid rgba(255, 255, 255, 0.15);
    }

    .points-badge {
      background: rgba(255, 214, 10, 0.15);
      color: #FFD60A;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 15px;
      border: 1px solid rgba(255, 214, 10, 0.2);
    }

    /* KARTALAR KONTEYNERI */
    .vertical-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 24px; /* Kartalar orasidagi masofa kattaroq */
      scroll-behavior: smooth;
    }

    /* KATTA KARTA STILI */
    .lesson-card {
      position: relative;
      min-height: 240px; /* Katta balandlik */
      border-radius: var(--card-radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    /* Ochiq karta - Premium ko'rinish */
    .card-available {
      background: linear-gradient(145deg, #1e1e1e, #111111);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    /* Ochiq kartaga naqsh qo'shish */
    .card-available::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: var(--ios-blue);
      filter: blur(100px);
      opacity: 0.2;
      pointer-events: none;
    }

    .card-available:active {
      transform: scale(0.96);
    }

    /* Yopiq karta - "Muzlatilgan" ko'rinish */
    .card-locked {
      background: rgba(28, 28, 30, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      opacity: 0.5;
    }

    /* Kartadagi matnlar */
    .module-num {
      font-size: 13px;
      font-weight: 800;
      color: var(--ios-gray);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .card-title {
      font-size: 28px; /* Juda katta shrift */
      font-weight: 800;
      line-height: 1.1;
      margin-top: 8px;
      background: linear-gradient(to bottom, #fff, #bbb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card-desc {
      font-size: 15px;
      color: var(--ios-gray);
      margin-top: 10px;
      line-height: 1.4;
      max-width: 80%;
    }

    /* Pastki qism */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .btn-start {
      background: #fff;
      color: #000;
      padding: 12px 24px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
    }

    .lock-icon {
      font-size: 24px;
      color: var(--ios-gray);
    }

    /* TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 450px;
      height: 85px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(25px);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      border-top: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    .tab-item {
      color: var(--ios-gray);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
    }

    .tab-item.active { color: var(--ios-blue); }
    .tab-item svg { width: 26px; height: 26px; }

  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="header">
    <div class="user-info">
      <div class="avatar-circle" id="avatar">U</div>
      <div>
        <div style="font-size: 13px; color: var(--ios-gray); font-weight: 600;">Xush kelibsiz!</div>
        <div id="userName" style="font-size: 18px; font-weight: 800;">Foydalanuvchi</div>
      </div>
    </div>
    <div class="points-badge">⚡ 1,250</div>
  </div>

  <div class="vertical-container" id="cards-list">
    </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>O'rganish</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20V10M18 20V4M6 20V14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg>
      <span>Yordam</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const lessons = [
    { title: "Dasturlash sirlari", desc: "Noldan professional darajagacha yo'llanma.", status: "open" },
    { title: "Swift UI asoslari", desc: "Zamonaviy iPhone interfeyslarini yarating.", status: "open" },
    { title: "Backend mo'jizalari", desc: "Ma'lumotlar bilan ishlashni o'rganing.", status: "locked" },
    { title: "Kiberxavfsizlik", desc: "Tizimlarni himoya qilish sirlari.", status: "locked" }
  ];

  function loadCards() {
    const list = document.getElementById('cards-list');
    list.innerHTML = lessons.map((lesson, index) => `
      <div class="lesson-card ${lesson.status === 'open' ? 'card-available' : 'card-locked'}" 
           onclick="handleCardClick('${lesson.status}', ${index + 1})">
        <div>
          <div class="module-num">MODUL ${index + 1}</div>
          <div class="card-title">${lesson.title}</div>
          <div class="card-desc">${lesson.desc}</div>
        </div>
        
        <div class="card-footer">
          ${lesson.status === 'open' 
            ? '<div class="btn-start">Boshlash</div>' 
            : '<div class="lock-icon">🔒</div>'}
          <div style="font-size: 14px; font-weight: 700; color: ${lesson.status === 'open' ? '#34C759' : '#8E8E93'}">
            ${lesson.status === 'open' ? '100 ball' : 'Yopiq'}
          </div>
        </div>
      </div>
    `).join('');
  }

  function handleCardClick(status, id) {
    if (status === 'open') {
      tg.HapticFeedback.notificationOccurred('success');
      // Keyingi sahifaga o'tish kodi
    } else {
      tg.HapticFeedback.notificationOccurred('error');
    }
  }

  // Foydalanuvchi ma'lumotlari
  const user = tg.initDataUnsafe?.user;
  if (user) {
    document.getElementById('userName').textContent = user.first_name;
    document.getElementById('avatar').textContent = user.first_name.charAt(0);
  }

  loadCards();
</script>
</body>
</html>
