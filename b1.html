<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <title>1-Dars | O'zingizni tanishtiring</title>

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />

  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: #1c1c1e;
      --player-bg: #0a0a0a;
      --accent: #ffffff;
      --blue-active: #007aff;
      --text-secondary: #8e8e93;
      --border-subtle: #2c2c2e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      color: white;
    }

    body {
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }

    /* HEADER */

    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;

      display: flex;
      align-items: center;

      padding: 0 20px;

      background: rgba(0, 0, 0, 0.9);

      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      border-bottom: 1px solid #222;

      z-index: 1000;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* CONTENT */

    .content-scroll {
      flex: 1;

      overflow-y: auto;

      padding:
        84px
        20px
        220px;

      -webkit-overflow-scrolling: touch;

      scroll-behavior: smooth;
    }

    .text-item {
      margin-bottom: 18px;

      padding: 14px;

      border-radius: 18px;

      border: 2px solid transparent;

      background: rgba(255,255,255,0.02);

      transition:
        0.25s ease;
    }

    .text-item.active {
      border-color: white;

      background:
        rgba(255,255,255,0.06);

      transform: scale(1.01);
    }

    .en {
      display: block;

      font-size: 18px;

      font-weight: 700;

      line-height: 1.5;

      margin-bottom: 6px;
    }

    .uz {
      display: block;

      font-size: 15px;

      color: var(--text-secondary);

      line-height: 1.5;
    }

    /* PLAYER */

    .player-fixed {
      position: fixed;

      left: 0;
      bottom: 0;

      width: 100%;

      padding:
        16px
        20px
        28px;

      background:
        rgba(10,10,10,0.92);

      backdrop-filter: blur(20px);

      border-top: 1px solid #222;

      z-index: 1000;
    }

    .progress-box {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 18px;
    }

    .bar-container {
      width: 100%;
      height: 5px;

      background: #333;

      border-radius: 999px;

      overflow: hidden;

      position: relative;
    }

    .bar-fill {
      width: 0%;
      height: 100%;

      background: white;

      border-radius: 999px;

      transition: width 0.15s linear;

      position: relative;
    }

    .bar-dot {
      position: absolute;

      right: -7px;
      top: -5px;

      width: 14px;
      height: 14px;

      background: white;

      border-radius: 50%;
    }

    .time-labels {
      display: flex;

      justify-content: space-between;

      margin-top: 8px;

      font-size: 12px;

      color: var(--text-secondary);
    }

    .player-controls {
      display: flex;

      align-items: center;

      justify-content: center;

      gap: 34px;
    }

    .player-controls i {
      font-size: 24px;

      color: #ddd;

      cursor: pointer;

      transition: 0.2s;
    }

    .player-controls i:active {
      transform: scale(0.9);
    }

    .active-repeat {
      color: #007aff !important;
    }

    .btn-play-pause {
      width: 70px;
      height: 70px;

      border-radius: 50%;

      background: #1c1c1e;

      display: flex;

      align-items: center;

      justify-content: center;

      border: 1px solid #2c2c2e;

      box-shadow:
        0 6px 20px rgba(0,0,0,0.5);

      cursor: pointer;
    }

    .btn-play-pause:active {
      transform: scale(0.95);
    }

    .btn-play-pause i {
      font-size: 28px;
      color: white;
    }

    audio {
      display: none;
    }
  </style>
</head>

<body>

  <!-- HEADER -->

  <div class="header">
    <h1>O'zingizni tanishtiring</h1>
  </div>

  <!-- CONTENT -->

  <main
    class="content-scroll"
    id="contentArea"
  ></main>

  <!-- PLAYER -->

  <div class="player-fixed">

    <div class="progress-box">

      <div
        class="bar-container"
        id="barContainer"
      >
        <div
          class="bar-fill"
          id="progressFill"
        >
          <div class="bar-dot"></div>
        </div>
      </div>

      <div class="time-labels">
        <span id="currentTime">
          00:00
        </span>

        <span id="durationTime">
          00:00
        </span>
      </div>

    </div>

    <div class="player-controls">

      <i
        class="fas fa-arrows-rotate"
        id="repeatBtn"
      ></i>

      <i
        class="fas fa-backward-step"
        id="prevBtn"
      ></i>

      <div
        class="btn-play-pause"
        id="playBtn"
      >
        <i class="fas fa-play"></i>
      </div>

      <i
        class="fas fa-forward-step"
        id="nextBtn"
      ></i>

    </div>

  </div>

  <!-- AUDIO -->

  <audio
    id="audioPlayer"
    src="lesson1.mp3"
  ></audio>

  <script>

    // TELEGRAM WEB APP

    const tg = window.Telegram.WebApp;

    tg.ready();

    tg.expand();

    tg.disableVerticalSwipes();

    tg.BackButton.show();

    tg.BackButton.onClick(() => {
      window.location.href = "index.html";
    });

    // THEME

    if (tg.themeParams.bg_color) {
      document.documentElement.style.setProperty(
        '--bg-dark',
        tg.themeParams.bg_color
      );
    }

    // SENTENCES

    const sentences = [

      {
        en: "My name is Ali.",
        uz: "Mening ismim Ali.",
        start: 0,
        end: 3
      },

      {
        en: "I am 20 years old.",
        uz: "Men 20 yoshdaman.",
        start: 3,
        end: 6
      },

      {
        en: "I live in Tashkent.",
        uz: "Men Toshkentda yashayman.",
        start: 6,
        end: 10
      },

      {
        en: "I study English.",
        uz: "Men ingliz tilini o'rganaman.",
        start: 10,
        end: 14
      },

      {
        en: "I want to be a programmer.",
        uz: "Men dasturchi bo'lmoqchiman.",
        start: 14,
        end: 18
      }

    ];

    // ELEMENTS

    const container =
      document.getElementById('contentArea');

    const audio =
      document.getElementById('audioPlayer');

    const progressFill =
      document.getElementById('progressFill');

    const currentTimeSpan =
      document.getElementById('currentTime');

    const durationTime =
      document.getElementById('durationTime');

    const playBtn =
      document.getElementById('playBtn');

    const playIcon =
      playBtn.querySelector('i');

    const repeatBtn =
      document.getElementById('repeatBtn');

    const prevBtn =
      document.getElementById('prevBtn');

    const nextBtn =
      document.getElementById('nextBtn');

    const barContainer =
      document.getElementById('barContainer');

    let currentIdx = 0;

    let isRepeat = false;

    let textItems = [];

    // RENDER

    function renderTexts() {

      container.innerHTML = '';

      sentences.forEach((sentence, index) => {

        const item =
          document.createElement('div');

        item.className = 'text-item';

        if (index === 0) {
          item.classList.add('active');
        }

        item.innerHTML = `
          <span class="en">
            ${sentence.en}
          </span>

          <span class="uz">
            ${sentence.uz}
          </span>
        `;

        item.addEventListener('click', () => {

          currentIdx = index;

          audio.currentTime =
            sentence.start;

          updateActive(index);

          audio.play();

          updatePlayIcon();

        });

        container.appendChild(item);

        textItems.push(item);

      });

    }

    // ACTIVE

    function updateActive(index) {

      textItems.forEach(item => {
        item.classList.remove('active');
      });

      if (textItems[index]) {

        textItems[index]
          .classList
          .add('active');

        textItems[index]
          .scrollIntoView({
            behavior: 'smooth',
            block: 'center'
          });

      }

    }

    // FORMAT TIME

    function formatTime(seconds) {

      const mins =
        Math.floor(seconds / 60);

      const secs =
        Math.floor(seconds % 60);

      return `
        ${String(mins).padStart(2,'0')}
        :
        ${String(secs).padStart(2,'0')}
      `.replace(/\s/g,'');

    }

    // PLAY ICON

    function updatePlayIcon() {

      if (audio.paused) {

        playIcon.className =
          'fas fa-play';

      } else {

        playIcon.className =
          'fas fa-pause';

      }

    }

    // PLAY BUTTON

    playBtn.addEventListener('click', () => {

      if (audio.paused) {

        audio.play();

      } else {

        audio.pause();

      }

      updatePlayIcon();

    });

    // PREV

    prevBtn.addEventListener('click', () => {

      if (currentIdx > 0) {

        currentIdx--;

        audio.currentTime =
          sentences[currentIdx].start;

        updateActive(currentIdx);

      }

    });

    // NEXT

    nextBtn.addEventListener('click', () => {

      if (
        currentIdx <
        sentences.length - 1
      ) {

        currentIdx++;

        audio.currentTime =
          sentences[currentIdx].start;

        updateActive(currentIdx);

      }

    });

    // REPEAT

    repeatBtn.addEventListener('click', () => {

      isRepeat = !isRepeat;

      repeatBtn.classList.toggle(
        'active-repeat'
      );

    });

    // AUDIO UPDATE

    audio.addEventListener(
      'timeupdate',
      () => {

        const percent =
          (
            audio.currentTime /
            audio.duration
          ) * 100;

        progressFill.style.width =
          percent + '%';

        currentTimeSpan.textContent =
          formatTime(audio.currentTime);

        // AUTO ACTIVE

        sentences.forEach(
          (sentence, index) => {

            if (
              audio.currentTime >= sentence.start &&
              audio.currentTime < sentence.end
            ) {

              if (currentIdx !== index) {

                currentIdx = index;

                updateActive(index);

              }

            }

          }
        );

        // REPEAT SENTENCE

        const currentSentence =
          sentences[currentIdx];

        if (
          isRepeat &&
          audio.currentTime >= currentSentence.end
        ) {

          audio.currentTime =
            currentSentence.start;

        }

      }
    );

    // DURATION

    audio.addEventListener(
      'loadedmetadata',
      () => {

        durationTime.textContent =
          formatTime(audio.duration);

      }
    );

    // SEEK

    barContainer.addEventListener(
      'click',
      (e) => {

        const rect =
          barContainer.getBoundingClientRect();

        const percent =
          (e.clientX - rect.left) /
          rect.width;

        audio.currentTime =
          percent * audio.duration;

      }
    );

    // END

    audio.addEventListener(
      'ended',
      () => {

        updatePlayIcon();

      }
    );

    // INIT

    renderTexts();

  </script>

</body>
</html>
