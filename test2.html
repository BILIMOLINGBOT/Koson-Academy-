<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistik Omad G'ildiragi</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --gold-gradient: radial-gradient(circle, #f3a633 0%, #8b5a00 100%);
            --dark-gold: #5e3d00;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        /* Tepasidagi ko'rsatkich (Pointer) */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ff9d00;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 0 10px #ff9d00);
        }

        /* G'ildirak asosi */
        .wheel-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            border: 5px solid #1a1d24;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* Markazdagi taymer qismi */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #e69c31 0%, #1a1d23 70%);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 4px solid #0b0e14;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .center-circle span {
            font-size: 10px;
            color: #ccc;
            margin-bottom: 5px;
        }

        .timer {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .spin-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #f3a633;
        }
    </style>
</head>
<body>

<div style="text-align: center;">
    <div class="container">
        <div class="pointer"></div>
        <div class="wheel-container" id="wheel">
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        <div class="center-circle">
            <span>Keyingi aylantirish</span>
            <div class="timer" id="countdown">02:54:20</div>
        </div>
    </div>
    <button class="spin-btn" onclick="spinWheel()">AYLANTIRISH</button>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const segments = ["Zehniy", "10%", "20%", "30%", "10 000", "5 000", "Next time"];
    const colors = ["#b37a1a", "#8b5a00", "#b37a1a", "#8b5a00", "#b37a1a", "#8b5a00", "#b37a1a"];
    
    const numSegments = segments.length;
    const anglePerSegment = (2 * Math.PI) / numSegments;

    // G'ildirakni chizish
    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < numSegments; i++) {
            const angle = i * anglePerSegment;
            
            // Segment asosi
            ctx.beginPath();
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 190, angle, angle + anglePerSegment);
            
            // Gradient yaratish
            let grad = ctx.createRadialGradient(200, 200, 50, 200, 200, 200);
            grad.addColorStop(0, '#7a4e00');
            grad.addColorStop(1, '#f3a633');
            
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#0b0e14';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Matnni yozish
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + anglePerSegment / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 18px Arial";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "black";
            ctx.fillText(segments[i], 170, 10);
            ctx.restore();
        }
    }

    drawWheel();

    // Aylantirish funksiyasi
    let currentRotation = 0;
    function spinWheel() {
        const randomSpin = Math.floor(Math.random() * 360) + 1440; // Kamida 4 marta aylanish
        currentRotation += randomSpin;
        document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
    }

    // Taymer funksiyasi (Simulyatsiya)
    function startTimer() {
        let h = 2, m = 54, s = 20;
        setInterval(() => {
            if(s > 0) s--;
            else { s = 59; if(m > 0) m--; else { m = 59; h--; } }
            
            document.getElementById('countdown').innerText = 
                `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }, 1000);
    }
    startTimer();
</script>

</body>
</html>
