<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darslar UI</title>
    <style>
        :root {
            --bg-color: #131417;
            --card-bg: #32353d;
            --card-shadow: #212329;
            --text-color: #ffffff;
            --secondary-text: #9a9ca1;
            --line-color: #0087ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Header qismi */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            margin: 0;
        }

        .stats {
            display: flex;
            gap: 10px;
        }

        .stat-item {
            background: #202227;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #3e4147;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Starter sarlavhasi */
        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        /* Unit yo'li */
        .path-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            position: relative;
            padding: 0 20px;
        }

        .unit-wrapper {
            display: flex;
            width: 100%;
            position: relative;
        }

        /* Juft va toq elementlarni surish (Zigzag effekti) */
        .unit-wrapper:nth-child(even) {
            justify-content: flex-end;
        }

        .unit-card {
            width: 120px;
            height: 120px;
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 8px 0 var(--card-shadow); /* 3D effekt */
            z-index: 2;
        }

        .unit-card .percent {
            font-size: 18px;
            font-weight: bold;
            color: var(--secondary-text);
        }

        .unit-card .unit-name {
            font-size: 18px;
            font-weight: bold;
        }

        /* Chiziqlar (Dashed Lines) */
        .unit-wrapper::after {
            content: "";
            position: absolute;
            border: 4px dashed var(--line-color);
            z-index: 1;
        }

        /* Birinchi elementdan ikkinchisiga chiziq */
        .unit-wrapper:nth-child(1)::after {
            width: 60%;
            height: 80px;
            top: 60px;
            left: 100px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 30px 0 0;
        }

        /* Ikkinchidan uchinchiga chiziq */
        .unit-wrapper:nth-child(2)::after {
            width: 60%;
            height: 80px;
            top: 60px;
            right: 100px;
            border-right: none;
            border-bottom: none;
            border-radius: 30px 0 0 0;
        }

        /* Uchinchidan to'rtinchiga */
        .unit-wrapper:nth-child(3)::after {
            width: 60%;
            height: 80px;
            top: 60px;
            left: 100px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 30px 0 0;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Darslar</h1>
        <div class="stats">
            <div class="stat-item" style="color: #58cc02;">⭐ 359</div>
            <div class="stat-item" style="color: #ffc107;">🟡 56</div>
        </div>
    </div>

    <div class="section-title">Starter</div>

    <div class="path-container">
        <!-- Unit 1.1 -->
        <div class="unit-wrapper">
            <div class="unit-card">
                <div class="percent">0%</div>
                <div class="unit-name">Unit 1.1</div>
            </div>
        </div>

        <!-- Unit 1.2 -->
        <div class="unit-wrapper">
            <div class="unit-card">
                <div class="percent">0%</div>
                <div class="unit-name">Unit 1.2</div>
            </div>
        </div>

        <!-- Unit 1.3 -->
        <div class="unit-wrapper">
            <div class="unit-card">
                <div class="percent">0%</div>
                <div class="unit-name">Unit 1.3</div>
            </div>
        </div>

        <!-- Unit 2.1 -->
        <div class="unit-wrapper">
            <div class="unit-card">
                <div class="percent">0%</div>
                <div class="unit-name">Unit 2.1</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
