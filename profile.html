<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dono - Profil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .back-btn {
      font-size: 28px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .back-btn:active {
      background: #e5e5ea;
    }

    .profile-content {
      padding: 24px 20px;
    }

    .profile-avatar {
      text-align: center;
      margin-bottom: 24px;
    }

    .avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #007AFF, #5856D6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 600;
      color: white;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-username {
      font-size: 15px;
      color: #8e8e93;
      margin-bottom: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      background: #f2f2f7;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      color: #000000;
    }

    .stat-label {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 4px;
    }

    .upload-button {
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: opacity 0.2s;
      border: none;
    }

    .btn:active {
      opacity: 0.6;
    }

    .btn-upload {
      background: #34C759;
      color: white;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 16px calc(env(safe-area-inset-bottom) + 8px) 16px;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
      flex: 1;
    }

    .nav-item:active {
      opacity: 0.6;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: #8e8e93;
    }

    .nav-item.active .nav-label {
      color: #007AFF;
    }

    .main-content {
      padding-bottom: 70px;
    }
  </style>
</head>
<body>

  <div class="main-content">
    <header class="header">
      <div class="back-btn" id="back-btn">←</div>
      <div class="app-title" style="font-size: 20px; font-weight: 600;">Profil</div>
      <div style="width: 32px;"></div>
    </header>

    <div class="profile-content" id="profile-content">
      <div class="profile-avatar">
        <div class="avatar-large" id="avatar-large">
          <span id="avatar-initial">U</span>
        </div>
        <h2 class="profile-name" id="profile-name">Yuklanmoqda...</h2>
        <p class="profile-username" id="profile-username">@username</p>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number" id="videos-count">0</div>
          <div class="stat-label">Videolar</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="followers-count">0</div>
          <div class="stat-label">Obunachilar</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="following-count">0</div>
          <div class="stat-label">Obunalar</div>
        </div>
      </div>
      
      <div class="upload-button">
        <button class="btn btn-upload" id="upload-video-btn">📹 Video yuklash</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" data-page="index">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z"/>
      </svg>
      <span class="nav-label">Bosh sahifa</span>
    </div>
    <div class="nav-item" data-page="search">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Qidiruv</span>
    </div>
    <div class="nav-item" data-page="notification">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-label">Bildirish</span>
    </div>
    <div class="nav-item active" data-page="profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Profil</span>
    </div>
  </div>

  <script>
    let tg = null;
    let userData = null;

    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 14px;
        z-index: 3000;
        animation: fadeInOut 2s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function loadUserProfile() {
      const savedUser = localStorage.getItem('userData');
      if (savedUser) {
        userData = JSON.parse(savedUser);
      } else {
        userData = { first_name: 'Javlonbek', last_name: '', username: 'javlonbek', id: 8028665721, language_code: 'uz' };
      }

      const firstName = userData.first_name || 'User';
      const lastName = userData.last_name || '';
      const username = userData.username || 'telegram_user';
      
      document.getElementById('profile-name').textContent = `${firstName} ${lastName}`.trim() || 'Foydalanuvchi';
      document.getElementById('profile-username').textContent = `@${username}`;
      
      const initial = firstName.charAt(0).toUpperCase();
      document.getElementById('avatar-initial').textContent = initial;
      
      // Statistik ma'lumotlar (demo)
      document.getElementById('videos-count').textContent = Math.floor(Math.random() * 50) + 5;
      document.getElementById('followers-count').textContent = Math.floor(Math.random() * 1000) + 100;
      document.getElementById('following-count').textContent = Math.floor(Math.random() * 200) + 20;
    }

    function initTelegram() {
      if (window.Telegram?.WebApp) {
        tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        if (tg.initDataUnsafe?.user) {
          const user = tg.initDataUnsafe.user;
          localStorage.setItem('userData', JSON.stringify(user));
        }
      }
      loadUserProfile();
    }

    function navigateTo(page) {
      window.location.href = `${page}.html`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTelegram();
      
      document.getElementById('back-btn')?.addEventListener('click', () => navigateTo('index'));
      document.getElementById('upload-video-btn')?.addEventListener('click', () => {
        // update.html sahifasiga o'tish
        navigateTo('update');
      });
      
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const page = item.dataset.page;
          if (page !== 'profile') {
            navigateTo(page);
          }
        });
      });
    });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
