<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tili - Sentence Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-color: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        /* Flashcard Styles */
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        .flashcard { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 32px; padding: 25px; }
        .word-main { font-size: 38px; font-weight: 800; display: flex; align-items: center; gap: 15px; }
        .audio-icon { color: var(--accent-color); cursor: pointer; }

        /* Sentence Builder Styles */
        #sentence-section { display: none; flex: 1; flex-direction: column; justify-content: center; }
        .instruction { color: var(--text-secondary); margin-bottom: 10px; font-weight: 600; }
        .target-sentence { font-size: 24px; font-weight: 700; margin-bottom: 30px; }
        
        .answer-area {
            min-height: 120px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px 0;
            align-content: flex-start;
        }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

        .word-tile {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: 0.2s;
        }
        .word-tile:active { transform: scale(0.95); }
        .word-tile.used { opacity: 0; pointer-events: none; }

        /* Buttons */
        .next-btn {
            width: 100%; height: 65px; background: white; color: black; border: none;
            border-radius: 24px; font-size: 18px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; margin-top: 20px;
        }

        #final-screen { display: none; text-align: center; justify-content: center; }
        .trophy-icon { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="main-app" class="app-container">
    <div class="card-stack">
        <div class="flashcard">
            <div class="word-main">
                <span id="engWord">My</span>
                <i class="fas fa-volume-up audio-icon"></i>
            </div>
            <div style="color:var(--text-secondary)" id="posText">DETERMINER</div>
        </div>
        <div class="flashcard">
            <div class="translation-word" id="uzbWord">mening</div>
        </div>
    </div>
    <button class="next-btn" id="nextBtn">Keyingi <i class="fas fa-arrow-right"></i></button>
</div>

<div id="sentence-app" class="app-container" style="display:none">
    <div id="sentence-section">
        <p class="instruction">Gapni ingliz tiliga tarjima qiling:</p>
        <p class="target-sentence" id="targetUzText">Men Toshkentdanman</p>
        
        <div class="answer-area" id="answerArea">
            </div>

        <div class="word-bank" id="wordBank">
            </div>
    </div>
    <button class="next-btn" id="checkBtn" style="background:var(--accent-color); color:white">Tekshirish</button>
</div>

<div id="final-screen" class="app-container">
    <i class="fas fa-trophy trophy-icon"></i>
    <h1>Ajoyib natija!</h1>
    <p style="margin: 20px 0; color: var(--text-secondary)">Siz so'zlarni o'rgandingiz va gaplarni tuzdingiz.</p>
    <div style="font-size: 24px; font-weight: bold; margin-bottom: 40px;">
        <i class="fas fa-coins" style="color:gold"></i> <span id="coinCount">0</span>
    </div>
    <button class="next-btn" onclick="location.reload()">Qaytadan</button>
</div>

<script>
    // Ma'lumotlar
    const vocabulary = [
        { pos: "PRONOUN", eng: "I", uzb: "men" },
        { pos: "VERB", eng: "am", uzb: "man (bo'lmoq)" },
        { pos: "PREPOSITION", eng: "from", uzb: "dan" },
        { pos: "NOUN", eng: "Tashkent", uzb: "Toshkent" },
        { pos: "NOUN", eng: "student", uzb: "talaba" }
    ];

    const sentenceQuiz = [
        { uz: "Men Toshkentdanman", en: ["I", "am", "from", "Tashkent"] },
        { uz: "Mening ismim Javlon.", en: ["My", "name", "is", "Javlon"] },
        { uz: "Men Toshkentda yashayman.", en: ["I", "live", "in", "Tashkent"] },
        { uz: "Men talabaman", en: ["I", "am", "a", "student"] },
        { uz: "Mening oilam bor.", en: ["I", "have", "a", "family"] }
    ];

    let currentVocabIdx = 0;
    let currentSentIdx = 0;
    let coins = 0;
    let userSentence = [];

    // --- FLASHCARD LOGIKASI ---
    function updateCard() {
        const item = vocabulary[currentVocabIdx];
        document.getElementById('posText').textContent = item.pos;
        document.getElementById('engWord').textContent = item.eng;
        document.getElementById('uzbWord').textContent = item.uzb;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        coins += 5;
        if (currentVocabIdx < vocabulary.length - 1) {
            currentVocabIdx++;
            updateCard();
        } else {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('sentence-app').style.display = 'flex';
            initSentenceQuiz();
        }
    });

    // --- SENTENCE BUILDER LOGIKASI ---
    function initSentenceQuiz() {
        const quiz = sentenceQuiz[currentSentIdx];
        document.getElementById('targetUzText').textContent = quiz.uz;
        document.getElementById('answerArea').innerHTML = '';
        userSentence = [];
        
        // So'zlarni aralashtirish (bank uchun)
        let words = [...quiz.en].sort(() => Math.random() - 0.5);
        
        const bank = document.getElementById('wordBank');
        bank.innerHTML = '';
        words.forEach((word, idx) => {
            const tile = document.createElement('div');
            tile.className = 'word-tile';
            tile.textContent = word;
            tile.onclick = () => selectWord(word, tile);
            bank.appendChild(tile);
        });
    }

    function selectWord(word, tile) {
        userSentence.push(word);
        tile.classList.add('used');
        
        const answerTile = document.createElement('div');
        answerTile.className = 'word-tile';
        answerTile.textContent = word;
        answerTile.onclick = () => {
            answerTile.remove();
            tile.classList.remove('used');
            userSentence = userSentence.filter(w => w !== word);
        };
        document.getElementById('answerArea').appendChild(answerTile);
    }

    document.getElementById('checkBtn').addEventListener('click', () => {
        const correct = sentenceQuiz[currentSentIdx].en.join(' ');
        const user = userSentence.join(' ');

        if (user === correct) {
            coins += 20;
            if (currentSentIdx < sentenceQuiz.length - 1) {
                currentSentIdx++;
                initSentenceQuiz();
            } else {
                showFinal();
            }
        } else {
            alert("Xato! Qaytadan urinib ko'ring.");
            initSentenceQuiz();
        }
    });

    function showFinal() {
        document.getElementById('sentence-app').style.display = 'none';
        document.getElementById('final-screen').style.display = 'flex';
        document.getElementById('coinCount').textContent = coins;
    }

    // Audio
    document.querySelector('.audio-icon').addEventListener('click', () => {
        const text = document.getElementById('engWord').textContent;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        window.speechSynthesis.speak(utterance);
    });

    updateCard();
</script>
</body>
</html>
