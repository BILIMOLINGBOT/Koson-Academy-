<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tilini O'rganish - 3 urinish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-black: #000000;
            --chip-bg: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            display: none;
        }

        .app-container.active { display: flex; }

        /* --- FLASHCARDS STYLE --- */
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        .flashcard { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 32px; padding: 25px; }
        .flag-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .flag-img { width: 45px; height: 30px; border-radius: 4px; object-fit: cover; }
        .part-of-speech { color: var(--text-secondary); font-weight: 700; letter-spacing: 1px; font-size: 16px; text-transform: uppercase; }
        .word-main { font-size: 38px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .audio-icon { color: var(--text-secondary); cursor: pointer; }
        .audio-icon:hover { color: var(--text-primary); }
        .translation-word { font-size: 26px; font-weight: 700; line-height: 1.3; }

        /* --- SHARED BUTTONS --- */
        .next-btn, .check-btn {
            width: 100%; 
            height: 65px; 
            background: white; 
            color: black; 
            border: none;
            border-radius: 24px; 
            font-size: 18px; 
            font-weight: 800; 
            cursor: pointer;
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.2s;
            margin-top: 20px;
        }
        .next-btn:active, .check-btn:active { transform: scale(0.96); }
        .next-btn:disabled, .check-btn:disabled { 
            background: #333; 
            color: #666; 
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- GAME & BUILDER STYLE --- */
        .header { text-align: center; margin-bottom: 30px; }
        .prompt-text { font-size: 28px; font-weight: 700; }
        
        .game-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .zone { 
            min-height: 80px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 30px; 
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 15px;
        }
        
        .bank { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 20px;
        }
        
        .chip {
            background: var(--chip-bg); 
            padding: 12px 18px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color);
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s;
            color: var(--text-primary);
            font-weight: 500;
        }
        .chip:active { transform: scale(0.95); background: #3a3a3a; }
        
        .token {
            background: var(--card-bg); 
            padding: 12px 18px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color);
            font-size: 18px; 
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-primary);
        }
        .token:active { transform: scale(0.95); background: #2a2a2a; }
        .token.disabled { 
            opacity: 0.1; 
            pointer-events: none;
        }

        /* --- URINISH LAMPOCHKA (3 marta) --- */
        .attempt-badge {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .attempt-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #2a2a2a;
            border: 2px solid #444;
            transition: 0.2s;
        }
        .attempt-dot.active {
            background: #4caf50;
            border-color: #8bc34a;
            box-shadow: 0 0 10px #4caf50;
        }

        /* --- RESULT PANEL --- */
        .result-panel {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            color: black;
            border-radius: 30px 30px 0 0; 
            padding: 40px 25px; 
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1000;
        }
        .result-panel.active { transform: translateY(0); }
        .res-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .res-msg { font-size: 18px; margin-bottom: 25px; color: #444; }
        #res-btn {
            background: black !important;
            color: white !important;
        }

        /* --- FINAL SCREEN --- */
        .trophy-icon { font-size: 80px; color: gold; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- 1. FLASHCARDS SCREEN -->
<div id="screen1" class="app-container active">
    <div class="header"></div>
    <div class="card-stack">
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                <span class="part-of-speech" id="f-pos">OLMOSH</span>
            </div>
            <div class="word-main">
                <span id="f-eng">My</span>
                <i class="fas fa-volume-up audio-icon" onclick="speak()"></i>
            </div>
        </div>
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
            </div>
            <div class="translation-word" id="f-uzb">mening</div>
        </div>
    </div>
    <button class="next-btn" onclick="nextFlashcard()">
        Keyingi <i class="fas fa-arrow-right"></i>
    </button>
</div>

<!-- 2. WORD GAME SCREEN (3 urinish) -->
<div id="screen2" class="app-container">
    <div class="header">
        <div class="prompt-text" id="g1-prompt">mening</div>
        <!-- 3 urinish indikatori -->
        <div class="attempt-badge" id="g1-attempts">
            <span class="attempt-dot"></span>
            <span class="attempt-dot"></span>
            <span class="attempt-dot"></span>
        </div>
    </div>
    <div class="game-content">
        <div class="zone" id="g1-zone"></div>
        <div class="bank" id="g1-bank"></div>
    </div>
    <button class="check-btn" id="g1-check" onclick="handleWordGameCheck()" disabled>Tekshirish</button>
</div>

<!-- 3. SENTENCE BUILDER SCREEN (3 urinish) -->
<div id="screen3" class="app-container">
    <div class="header">
        <div class="prompt-text" id="g2-prompt">Mening ismim Aziz.</div>
        <!-- 3 urinish indikatori -->
        <div class="attempt-badge" id="g2-attempts">
            <span class="attempt-dot"></span>
            <span class="attempt-dot"></span>
            <span class="attempt-dot"></span>
        </div>
    </div>
    <div class="game-content">
        <div class="zone" id="g2-zone"></div>
        <div class="bank" id="g2-bank"></div>
    </div>
    <button class="check-btn" id="g2-check" onclick="handleSentenceGameCheck()" disabled>Tekshirish</button>
</div>

<!-- FINAL SCREEN -->
<div id="screen-final" class="app-container" style="text-align: center; justify-content: center;">
    <i class="fas fa-trophy trophy-icon"></i>
    <h1 style="font-size: 32px; margin-bottom: 10px;">Tabriklaymiz!</h1>
    <p style="color: var(--text-secondary); margin-bottom: 40px;">Barcha bosqichlarni muvaffaqiyatli yakunladingiz.</p>
    <button class="next-btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<!-- GLOBAL RESULT PANEL -->
<div class="result-panel" id="res-panel">
    <div id="res-title" class="res-title">Ajoyib!</div>
    <div id="res-msg" class="res-msg">To'g'ri javob topildi.</div>
    <button class="next-btn" id="res-btn">Davom etish</button>
</div>

<script>
    // --- DATA (o'zgarishsiz) ---
    const vocabData = [
        { pos: "OLMOSH", eng: "My", uzb: "mening" },
        { pos: "OT", eng: "Name", uzb: "ism" },
        { pos: "FE'L (to be)", eng: "is", uzb: "bo‘lmoq" },
        { pos: "OLMOSH", eng: "I", uzb: "men" },
        { pos: "FE'L (to be)", eng: "am", uzb: "bo‘lmoq" },
        { pos: "PREDLOG", eng: "from", uzb: "dan" },
        { pos: "FE'L", eng: "live", uzb: "yashaymoq" },
        { pos: "PREDLOG", eng: "in", uzb: "da" },
        { pos: "ARTIKL", eng: "a", uzb: "artikl (bir)" },
        { pos: "OT", eng: "student", uzb: "talaba" },
        { pos: "FE'L", eng: "have", uzb: "ega bo‘lmoq / bor" },
        { pos: "OT", eng: "family", uzb: "oila" }
    ];

    const wordGameData = [
        { uz: "mening", correct: ["My"] },
        { uz: "ism", correct: ["Name"] },
        { uz: "bo‘lmoq (3-shaxs)", correct: ["is"] },
        { uz: "men", correct: ["I"] },
        { uz: "bo‘lmoq (1-shaxs)", correct: ["am"] },
        { uz: "dan", correct: ["from"] },
        { uz: "yashaymoq", correct: ["live"] },
        { uz: "da", correct: ["in"] },
        { uz: "artikl", correct: ["a"] },
        { uz: "talaba", correct: ["student"] },
        { uz: "ega bo‘lmoq / bor", correct: ["have"] },
        { uz: "oila", correct: ["family"] }
    ];

    const sentenceData = [
        { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
        { uz: "Men talabaman.", correct: ["I", "am", "a", "student."] },
        { uz: "Men Toshkentdanman.", correct: ["I", "am", "from", "Tashkent."] },
        { uz: "Men Toshkentda yashayman.", correct: ["I", "live", "in", "Tashkent."] },
        { uz: "Mening oilam bor.", correct: ["I", "have", "a", "family."] }
    ];

    const distractors = ["You", "He", "She", "It", "We", "They", "the", "at", "on", "book", "car", "house", "city", "country"];

    // --- STATE ---
    let currentFlash = 0;
    let g1Idx = 0;
    let g2Idx = 0;
    let builtSeq = [];
    let usedFlags = [];

    // URINISHLAR UCHUN QO'SHIMCHA STATE
    let currentAttempts = 0;          // 0,1,2 (3 - maksimal)
    const MAX_ATTEMPTS = 3;

    // --- UI HELPERS ---
    function showScreen(id) {
        document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function togglePanel(show, title = "", msg = "", callback = null) {
        const panel = document.getElementById('res-panel');
        if (show) {
            document.getElementById('res-title').textContent = title;
            document.getElementById('res-msg').textContent = msg;
            panel.classList.add('active');
            document.getElementById('res-btn').onclick = () => {
                panel.classList.remove('active');
                if (callback) callback();
            };
        } else {
            panel.classList.remove('active');
        }
    }

    // Urinishlarni yangilash (screen2 yoki screen3)
    function updateAttemptsDisplay(screenPrefix) {
        const dots = document.querySelectorAll(`#${screenPrefix}-attempts .attempt-dot`);
        dots.forEach((dot, idx) => {
            if (idx < currentAttempts) {
                dot.classList.add('active');
            } else {
                dot.classList.remove('active');
            }
        });
    }

    // --- 1. FLASHCARDS ---
    function nextFlashcard() {
        if (currentFlash < vocabData.length - 1) {
            currentFlash++;
            const item = vocabData[currentFlash];
            document.getElementById('f-pos').textContent = item.pos;
            document.getElementById('f-eng').textContent = item.eng;
            document.getElementById('f-uzb').textContent = item.uzb;
        } else {
            showScreen('screen2');
            initWordGame();
        }
    }

    function speak() {
        const text = document.getElementById('f-eng').textContent;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-GB';
        window.speechSynthesis.speak(u);
    }

    // --- 2. WORD GAME (3 urinish) ---
    function initWordGame() {
        const curr = wordGameData[g1Idx];
        document.getElementById('g1-prompt').textContent = curr.uz;
        
        // Urinishlarni nolga qaytarish
        currentAttempts = 0;
        updateAttemptsDisplay('g1');

        let words = [curr.correct[0]];
        let availableDistractors = distractors.filter(d => d !== curr.correct[0]);
        
        for (let i = 0; i < 2; i++) {
            if (availableDistractors.length > 0) {
                const randomIndex = Math.floor(Math.random() * availableDistractors.length);
                words.push(availableDistractors[randomIndex]);
                availableDistractors.splice(randomIndex, 1);
            }
        }
        
        // Shuffle
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
        
        builtSeq = [];
        usedFlags = new Array(words.length).fill(false);
        window.currentBank = words;
        renderGame('g1');
    }

    function renderGame(prefix) {
        const zone = document.getElementById(`${prefix}-zone`);
        const bank = document.getElementById(`${prefix}-bank`);
        const btn = document.getElementById(`${prefix}-check`);
        
        zone.innerHTML = '';
        builtSeq.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = 'chip';
            d.textContent = item.word;
            d.onclick = () => {
                usedFlags[item.idx] = false;
                builtSeq.splice(i, 1);
                renderGame(prefix);
            };
            zone.appendChild(d);
        });

        bank.innerHTML = '';
        window.currentBank.forEach((word, i) => {
            if (!usedFlags[i]) {
                const t = document.createElement('div');
                t.className = 'token';
                t.textContent = word;
                t.onclick = () => {
                    usedFlags[i] = true;
                    builtSeq.push({word, idx: i});
                    renderGame(prefix);
                };
                bank.appendChild(t);
            }
        });

        const isComplete = builtSeq.length > 0;
        btn.disabled = !isComplete;
        btn.style.opacity = isComplete ? '1' : '0.5';
    }

    // Maxsus handler word game uchun (3 urinish)
    function handleWordGameCheck() {
        const correct = wordGameData[g1Idx].correct;
        const isCorrect = builtSeq.length === correct.length && builtSeq[0].word === correct[0];

        if (isCorrect) {
            // To'g'ri bo'lsa darhol keyingi bosqichga o'tish
            togglePanel(true, "Barakalla!", "To'g'ri topdingiz.", () => {
                if (g1Idx < wordGameData.length - 1) {
                    g1Idx++; 
                    initWordGame();
                } else {
                    showScreen('screen3');
                    initSentenceGame();
                }
            });
        } else {
            // Xato: urinishlarni oshirish
            currentAttempts++;
            updateAttemptsDisplay('g1');

            if (currentAttempts >= MAX_ATTEMPTS) {
                // 3 marta xato - to'g'ri javobni ko'rsatib, keyingi savolga o'tish
                togglePanel(true, "Xato", "To'g'ri javob: " + correct[0], () => {
                    if (g1Idx < wordGameData.length - 1) {
                        g1Idx++; 
                        initWordGame();
                    } else {
                        showScreen('screen3');
                        initSentenceGame();
                    }
                });
            } else {
                // Urinish hali bor: qayta urinish (panel xato haqida, davom etsa tozalaymiz)
                togglePanel(true, "Xato", `Qayta urinib ko'ring (${currentAttempts}/${MAX_ATTEMPTS})`, () => {
                    // panel yopilganda hech qanday o'zgarishsiz o'yin davom etadi
                    // faqat bank va zone tozalanmaydi — foydalanuvchi qayta tuzadi
                    // Lekin biz builtSeq ni tozalab, qayta boshlashni taklif qilamiz? 
                    // Yaxshi tajriba uchun maydonni tozalab, yangidan boshlatamiz.
                    initWordGame(); // qayta urinish uchun so'zlami qayta aralashtiramiz
                });
            }
        }
    }

    // --- 3. SENTENCE GAME (3 urinish) ---
    function initSentenceGame() {
        const curr = sentenceData[g2Idx];
        document.getElementById('g2-prompt').textContent = curr.uz;
        
        currentAttempts = 0;
        updateAttemptsDisplay('g2');

        let words = [...curr.correct];
        for (let i = words.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [words[i], words[j]] = [words[j], words[i]];
        }
        
        builtSeq = [];
        usedFlags = new Array(words.length).fill(false);
        window.currentBank = words;
        renderGame('g2');
    }

    function handleSentenceGameCheck() {
        const correct = sentenceData[g2Idx].correct;
        const isCorrect = builtSeq.length === correct.length && 
                         builtSeq.every((v, i) => v.word === correct[i]);

        if (isCorrect) {
            togglePanel(true, "Zo'r!", "Gap to'g'ri tuzildi.", () => {
                if (g2Idx < sentenceData.length - 1) {
                    g2Idx++; 
                    initSentenceGame();
                } else {
                    showScreen('screen-final');
                }
            });
        } else {
            currentAttempts++;
            updateAttemptsDisplay('g2');

            if (currentAttempts >= MAX_ATTEMPTS) {
                togglePanel(true, "E'tiborli bo'ling!", "To'g'ri tartib: " + correct.join(' '), () => {
                    if (g2Idx < sentenceData.length - 1) {
                        g2Idx++; 
                        initSentenceGame();
                    } else {
                        showScreen('screen-final');
                    }
                });
            } else {
                togglePanel(true, "Xato", `Qayta urinib ko'ring (${currentAttempts}/${MAX_ATTEMPTS})`, () => {
                    initSentenceGame(); // qayta boshlash
                });
            }
        }
    }

    // --- START ---
    const firstItem = vocabData[0];
    document.getElementById('f-pos').textContent = firstItem.pos;
    document.getElementById('f-eng').textContent = firstItem.eng;
    document.getElementById('f-uzb').textContent = firstItem.uzb;
</script>

</body>
</html>
