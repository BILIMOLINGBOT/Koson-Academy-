<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tilini O'rganish - All-in-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            display: none; /* Default hidden */
        }

        .app-container.active { display: flex; }

        /* --- FLASHCARDS STYLE --- */
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        .flashcard { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 32px; padding: 25px; }
        .flag-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .flag-img { width: 45px; height: 30px; border-radius: 4px; object-fit: cover; }
        .part-of-speech { color: var(--text-secondary); font-weight: 700; letter-spacing: 1px; font-size: 16px; text-transform: uppercase; }
        .word-main { font-size: 38px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .audio-icon { color: var(--accent-blue); cursor: pointer; }
        .translation-word { font-size: 26px; font-weight: 700; line-height: 1.3; }

        /* --- SHARED BUTTONS --- */
        .next-btn {
            width: 100%; height: 65px; background: white; color: black; border: none;
            border-radius: 24px; font-size: 18px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;
        }
        .next-btn:active { transform: scale(0.96); }
        .next-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* --- GAME & BUILDER STYLE --- */
        .header { text-align: center; margin-bottom: 30px; }
        .q-num { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
        .prompt-text { font-size: 28px; font-weight: 700; }
        .zone { min-height: 80px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 40px; }
        .bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        
        .chip {
            background: #1a1a1a; padding: 12px 18px; border-radius: 15px; border: 1px solid #333;
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .token {
            background: #111; padding: 12px 18px; border-radius: 15px; border: 1px solid #222;
            font-size: 18px; cursor: pointer;
        }
        .token.disabled { opacity: 0.1; pointer-events: none; }

        /* --- RESULT PANEL --- */
        .result-panel {
            position: fixed; bottom: 0; left: 0; right: 0; background: white; color: black;
            border-radius: 30px 30px 0 0; padding: 40px 25px; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000;
        }
        .result-panel.active { transform: translateY(0); }
        .res-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .res-msg { font-size: 18px; margin-bottom: 25px; color: #444; }

        /* --- FINAL SCREEN --- */
        .trophy-icon { font-size: 80px; color: gold; margin-bottom: 20px; }
    </style>
</head>
<body>

<!-- 1. FLASHCARDS SCREEN -->
<div id="screen1" class="app-container active">
    <div class="header"><div class="q-num">LUG'AT BOYITISH</div></div>
    <div class="card-stack">
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                <span class="part-of-speech" id="f-pos">PRONOUN</span>
            </div>
            <div class="word-main">
                <span id="f-eng">My</span>
                <i class="fas fa-volume-up audio-icon" onclick="speak()"></i>
            </div>
        </div>
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
            </div>
            <div class="translation-word" id="f-uzb">mening</div>
        </div>
    </div>
    <button class="next-btn" onclick="nextFlashcard()" style="margin-top: 20px;">
        Keyingi <i class="fas fa-arrow-right"></i>
    </button>
</div>

<!-- 2. WORD GAME SCREEN -->
<div id="screen2" class="app-container">
    <div class="header">
        <div class="q-num" id="g1-count">1 / 5</div>
        <div class="prompt-text" id="g1-prompt">Nima?</div>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <div class="zone" id="g1-zone"></div>
        <div class="bank" id="g1-bank"></div>
        <button class="next-btn" id="g1-check" onclick="checkWordGame()" disabled>Tekshirish</button>
    </div>
</div>

<!-- 3. SENTENCE BUILDER SCREEN -->
<div id="screen3" class="app-container">
    <div class="header">
        <div class="q-num" id="g2-count">1 / 5</div>
        <div class="prompt-text" id="g2-prompt">Mening ismim Aziz.</div>
    </div>
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
        <div class="zone" id="g2-zone"></div>
        <div class="bank" id="g2-bank"></div>
        <button class="next-btn" id="g2-check" onclick="checkSentenceGame()" disabled>Tekshirish</button>
    </div>
</div>

<!-- FINAL SCREEN -->
<div id="screen-final" class="app-container" style="text-align: center; justify-content: center;">
    <i class="fas fa-trophy trophy-icon"></i>
    <h1 style="font-size: 32px; margin-bottom: 10px;">Tabriklaymiz!</h1>
    <p style="color: var(--text-secondary); margin-bottom: 40px;">Barcha bosqichlarni muvaffaqiyatli yakunladingiz.</p>
    <button class="next-btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<!-- GLOBAL RESULT PANEL -->
<div class="result-panel" id="res-panel">
    <div id="res-title" class="res-title">Ajoyib!</div>
    <div id="res-msg" class="res-msg">To'g'ri javob topildi.</div>
    <button class="next-btn" id="res-btn" style="background: black; color: white;">Davom etish</button>
</div>

<script>
    // --- DATA ---
    const vocabData = [
        { pos: "PRONOUN", eng: "My", uzb: "mening" },
        { pos: "NOUN", eng: "Name", uzb: "ism" },
        { pos: "VERB", eng: "Live", uzb: "yashaymoq" }
    ];

    const wordGameData = [
        { uz: "Kim?", correct: ["Who"] },
        { uz: "Nima?", correct: ["What"] },
        { uz: "Qachon?", correct: ["When"] }
    ];

    const sentenceData = [
        { uz: "Men talabaman.", correct: ["I", "am", "a", "student."] },
        { uz: "U maktabga boradi.", correct: ["He", "goes", "to", "school."] }
    ];

    const distractors = ["Where", "Is", "The", "Apple", "Big", "They"];

    // --- STATE ---
    let currentFlash = 0;
    let g1Idx = 0;
    let g2Idx = 0;
    let builtSeq = [];
    let usedFlags = [];

    // --- UI HELPERS ---
    function showScreen(id) {
        document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function togglePanel(show, title = "", msg = "", callback = null) {
        const panel = document.getElementById('res-panel');
        if (show) {
            document.getElementById('res-title').textContent = title;
            document.getElementById('res-msg').textContent = msg;
            panel.classList.add('active');
            document.getElementById('res-btn').onclick = () => {
                panel.classList.remove('active');
                if (callback) callback();
            };
        } else {
            panel.classList.remove('active');
        }
    }

    // --- 1. FLASHCARDS LOGIC ---
    function nextFlashcard() {
        if (currentFlash < vocabData.length - 1) {
            currentFlash++;
            const item = vocabData[currentFlash];
            document.getElementById('f-pos').textContent = item.pos;
            document.getElementById('f-eng').textContent = item.eng;
            document.getElementById('f-uzb').textContent = item.uzb;
        } else {
            showScreen('screen2');
            initWordGame();
        }
    }

    function speak() {
        const text = document.getElementById('f-eng').textContent;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-GB';
        window.speechSynthesis.speak(u);
    }

    // --- 2. WORD GAME LOGIC ---
    function initWordGame() {
        const curr = wordGameData[g1Idx];
        document.getElementById('g1-count').textContent = `${g1Idx + 1} / ${wordGameData.length}`;
        document.getElementById('g1-prompt').textContent = curr.uz;
        
        let words = [...curr.correct, distractors[Math.floor(Math.random() * distractors.length)]];
        renderGame('g1', words.sort(() => Math.random() - 0.5));
    }

    function renderGame(prefix, bankWords) {
        const zone = document.getElementById(`${prefix}-zone`);
        const bank = document.getElementById(`${prefix}-bank`);
        const btn = document.getElementById(`${prefix}-check`);
        
        if (builtSeq.length === 0 && usedFlags.length === 0) {
            usedFlags = new Array(bankWords.length).fill(false);
            window.currentBank = bankWords;
        }

        zone.innerHTML = '';
        builtSeq.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = 'chip';
            d.textContent = item.word;
            d.onclick = () => {
                usedFlags[item.idx] = false;
                builtSeq.splice(i, 1);
                renderGame(prefix, window.currentBank);
            };
            zone.appendChild(d);
        });

        bank.innerHTML = '';
        window.currentBank.forEach((word, i) => {
            const t = document.createElement('div');
            t.className = `token ${usedFlags[i] ? 'disabled' : ''}`;
            t.textContent = word;
            t.onclick = () => {
                usedFlags[i] = true;
                builtSeq.push({word, idx: i});
                renderGame(prefix, window.currentBank);
            };
            bank.appendChild(t);
        });

        btn.disabled = builtSeq.length === 0;
        btn.style.background = builtSeq.length > 0 ? 'white' : '#333';
    }

    function checkWordGame() {
        const correct = wordGameData[g1Idx].correct;
        const isCorrect = builtSeq.length === correct.length && builtSeq.every((v, i) => v.word === correct[i]);
        
        togglePanel(true, isCorrect ? "Barakalla!" : "Xato!", isCorrect ? "To'g'ri topdingiz." : "To'g'ri: " + correct.join(' '), () => {
            if (g1Idx < wordGameData.length - 1) {
                g1Idx++; builtSeq = []; usedFlags = []; initWordGame();
            } else {
                showScreen('screen3');
                builtSeq = []; usedFlags = []; initSentenceGame();
            }
        });
    }

    // --- 3. SENTENCE GAME LOGIC ---
    function initSentenceGame() {
        const curr = sentenceData[g2Idx];
        document.getElementById('g2-count').textContent = `${g2Idx + 1} / ${sentenceData.length}`;
        document.getElementById('g2-prompt').textContent = curr.uz;
        renderGame('g2', [...curr.correct].sort(() => Math.random() - 0.5));
    }

    function checkSentenceGame() {
        const correct = sentenceData[g2Idx].correct;
        const isCorrect = builtSeq.length === correct.length && builtSeq.every((v, i) => v.word === correct[i]);

        togglePanel(true, isCorrect ? "Zo'r!" : "E'tiborli bo'ling!", isCorrect ? "Gap to'g'ri tuzildi." : "Aslida: " + correct.join(' '), () => {
            if (g2Idx < sentenceData.length - 1) {
                g2Idx++; builtSeq = []; usedFlags = []; initSentenceGame();
            } else {
                showScreen('screen-final');
            }
        });
    }

    // Start initialization
    const firstItem = vocabData[0];
    document.getElementById('f-pos').textContent = firstItem.pos;
    document.getElementById('f-eng').textContent = firstItem.eng;
    document.getElementById('f-uzb').textContent = firstItem.uzb;
</script>

</body>
</html>
