<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🇬🇧 Ingliz tili: 3-in-1 o‘yin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            height: 100%;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* asosiy konteyner */
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            position: relative;
        }

        /* header – oʻyin tablari */
        .game-tabs {
            display: flex;
            background: #111;
            border-radius: 30px;
            margin: 15px 15px 0;
            padding: 6px;
            border: 1px solid #2a2a2a;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #777;
            font-weight: 700;
            font-size: 15px;
            padding: 12px 0;
            border-radius: 30px;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn i { font-size: 16px; }
        .tab-btn.active {
            background: #2a2a2a;
            color: white;
        }

        /* sahifalar */
        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 10px 20px 30px;
            overflow-y: auto;
        }
        .page.active { display: flex; }

        /* ----- FLASHCARD sahifasi (1) ----- */
        .card-stack {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }
        .flashcard {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 32px;
            padding: 25px;
            width: 100%;
        }
        .flag-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .flag-img {
            width: 45px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
        }
        .part-of-speech {
            color: #a0a0a0;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 18px;
            text-transform: uppercase;
        }
        .word-main {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .audio-icon {
            color: #3b82f6;
            font-size: 24px;
            cursor: pointer;
        }
        .translation-word {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
        }
        .footer-area { padding-bottom: 20px; }
        .next-btn {
            width: 100%;
            height: 65px;
            background: white;
            color: black;
            border: none;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        .next-btn:active { transform: scale(0.96); }
        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            text-align: center;
        }
        .trophy-icon { font-size: 100px; color: white; margin-bottom: 20px; }

        /* ----- SO‘Z O‘YINI (2) ----- */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .question-number {
            font-size: 14px;
            color: #777;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .uzbek-sentence {
            font-size: 28px;
            font-weight: 700;
            color: #eee;
        }
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .sentence-builder {
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 30px;
        }
        .word-chip {
            background: #1a1a1a;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
        }
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
        }
        .bank-token {
            background: #111;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            border: 1px solid #222;
            cursor: pointer;
        }
        .bank-token.disabled {
            opacity: 0.1;
            pointer-events: none;
        }
        .action-btn {
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 25px;
            background: #1e1e1e;
            color: #444;
            font-size: 19px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }
        .action-btn.active {
            background: #ffffff;
            color: #000;
            cursor: pointer;
        }

        /* ----- GAP QURAMIZ (3) ----- */
        /* (uslublar juda o‘xshash, lekin alohida idlar ishlaydi) */

        /* natija paneli (umumiy) */
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-width: 500px; margin: 0 auto;
            background: #fff;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px;
            transform: translateY(100%);
            transition: 0.3s ease;
            color: #000;
            z-index: 1000;
        }
        .result-panel.active { transform: translateY(0); }
        .footer-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .coin-area {
            display: flex; gap: 15px; width: 100%; margin-top: -50px;
        }
        .coin-box {
            flex: 1; border: 3px solid white; border-radius: 20px; padding: 20px; background: black;
        }
        .coin-label {
            background: white; color: black; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; margin-top: -35px; margin-bottom: 10px; display: inline-block;
        }
    </style>
</head>
<body>
<div class="app">

    <!-- TAB TUGMALAR -->
    <div class="game-tabs">
        <button class="tab-btn active" data-page="flashcard"><i class="fas fa-layer-group"></i> 1 Flash</button>
        <button class="tab-btn" data-page="wordgame"><i class="fas fa-puzzle-piece"></i> 2 So‘z</button>
        <button class="tab-btn" data-page="buildgame"><i class="fas fa-arrows-alt-h"></i> 3 Gap</button>
    </div>

    <!-- 1-SAHIFA: FLASHCARD (asl nusxa) -->
    <div id="flashcard-page" class="page active">
        <div id="main-app" class="" style="height:100%; display:flex; flex-direction: column;">
            <div class="card-stack">
                <div class="flashcard">
                    <div class="flag-row">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                        <span class="part-of-speech" id="posText">PRONOUN</span>
                    </div>
                    <div class="word-main">
                        <span id="engWord">My</span>
                        <i class="fas fa-volume-up audio-icon" id="audioIcon"></i>
                    </div>
                </div>
                <div class="flashcard">
                    <div class="flag-row">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
                    </div>
                    <div class="translation-word" id="uzbWord">mening</div>
                </div>
            </div>
            <div class="footer-area">
                <button class="next-btn" id="nextBtn">Keyingi <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- final screen (flashcard yakuni) -->
        <div id="final-screen" style="display: none; flex-direction: column; justify-content: space-between; height:100%;">
            <div style="margin-top: 50px;">
                <i class="fas fa-trophy trophy-icon"></i>
                <h1 style="font-size: 28px;">Mashg'ulot yakunlandi</h1>
            </div>
            <div class="coin-area">
                <div class="coin-box">
                    <div class="coin-label">TANGA</div>
                    <div style="font-size: 24px; font-weight: bold;"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
                </div>
            </div>
            <button class="next-btn" id="restartFlashBtn">Qaytadan boshlash</button>
        </div>
    </div>

    <!-- 2-SAHIFA: SO‘Z O‘YINI -->
    <div id="wordgame-page" class="page">
        <div class="header">
            <div class="question-number" id="levelCounter2">1 / 5</div>
            <div class="uzbek-sentence" id="uzbekPrompt2">...</div>
        </div>
        <div class="builder-area">
            <div class="sentence-builder" id="buildingZone2"></div>
            <div class="word-bank" id="wordBank2"></div>
            <button class="action-btn" id="checkBuilderBtn2" disabled><i class="fas fa-check"></i> Tekshirish</button>
        </div>
        <div class="result-panel" id="resultPanel2">
            <h2 id="resultTitle2" style="font-size:24px;">...</h2>
            <p id="resultMessage2" style="margin:15px 0 30px; font-size:18px; color:#333;"></p>
            <button class="footer-btn" id="continueBtn2">Davom etish</button>
        </div>
    </div>

    <!-- 3-SAHIFA: GAP QURAMIZ -->
    <div id="buildgame-page" class="page">
        <div class="header">
            <div class="question-number" id="levelCounter3">1 / 6</div>
            <div class="uzbek-sentence" id="uzbekPrompt3">...</div>
        </div>
        <div class="builder-area">
            <div class="sentence-builder" id="buildingZone3"></div>
            <div class="word-bank" id="wordBank3"></div>
            <button class="action-btn" id="checkBuilderBtn3" disabled><i class="fas fa-check"></i> Javobni tekshirish</button>
        </div>
        <div class="result-panel" id="resultPanel3">
            <h2 id="resultTitle3" style="font-size:24px;">...</h2>
            <p id="resultMessage3" style="margin:15px 0 30px; font-size:18px;"></p>
            <button class="footer-btn" id="continueBtn3">Davom etish</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // ================== TAB YO‘NALTIRISH ==================
        const tabs = document.querySelectorAll('.tab-btn');
        const pages = document.querySelectorAll('.page');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.dataset.page;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                pages.forEach(p => p.classList.remove('active'));
                document.getElementById(target+'-page').classList.add('active');
            });
        });

        // ================== 1. FLASHCARD LOGIKASI ==================
        const vocabulary = [
            { pos: "DETERMINER", eng: "My", uzb: "mening" },
            { pos: "NOUN", eng: "name", uzb: "ism" },
            { pos: "VERB", eng: "is", uzb: "“bo‘lmoq” fe’li (to be)" },
            { pos: "PRONOUN", eng: "I", uzb: "men" },
            { pos: "VERB", eng: "am", uzb: "“bo‘lmoq” fe’li (to be)" },
            { pos: "PREPOSITION", eng: "from", uzb: "dan" },
            { pos: "VERB", eng: "live", uzb: "yashaymoq" },
            { pos: "PREPOSITION", eng: "in", uzb: "da" },
            { pos: "ARTICLE", eng: "a", uzb: "artikl (bir)" },
            { pos: "NOUN", eng: "student", uzb: "talaba" },
            { pos: "VERB", eng: "have", uzb: "ega bo‘lmoq / bor" },
            { pos: "NOUN", eng: "family", uzb: "oila" }
        ];
        let flashIdx = 0;
        let coins = 0;
        const mainApp = document.getElementById('main-app');
        const finalScreen = document.getElementById('final-screen');
        const posText = document.getElementById('posText');
        const engWord = document.getElementById('engWord');
        const uzbWord = document.getElementById('uzbWord');
        const nextBtn = document.getElementById('nextBtn');
        const coinSpan = document.getElementById('coinCount');
        const audioIcon = document.getElementById('audioIcon');

        function updateFlash() {
            const item = vocabulary[flashIdx];
            posText.textContent = item.pos;
            engWord.textContent = item.eng;
            uzbWord.textContent = item.uzb;
        }
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                coins += 5;
                if (flashIdx < vocabulary.length - 1) {
                    flashIdx++;
                    updateFlash();
                } else {
                    mainApp.style.display = 'none';
                    finalScreen.style.display = 'flex';
                    coinSpan.textContent = coins;
                }
            });
        }
        document.getElementById('restartFlashBtn')?.addEventListener('click', () => {
            flashIdx = 0;
            coins = 0;
            mainApp.style.display = 'flex';
            finalScreen.style.display = 'none';
            updateFlash();
        });
        audioIcon?.addEventListener('click', () => {
            const text = engWord.textContent;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            window.speechSynthesis.speak(utterance);
        });
        updateFlash();

        // ================== 2. SO‘Z O‘YINI (levels) ==================
        const levels2 = [
            { uz: "Nima?", correct: ["What"] },
            { uz: "Vaqt", correct: ["Time"] },
            { uz: "Kim?", correct: ["Who"] },
            { uz: "Sana", correct: ["Date"] },
            { uz: "Yil", correct: ["Year"] }
        ];
        const distractors = ["Where", "Day", "Month", "How", "When"];
        let idx2 = 0, built2 = [], bank2 = [], used2 = [], score2 = 0;

        function initLevel2() {
            const cur = levels2[idx2];
            document.getElementById('uzbekPrompt2').textContent = cur.uz;
            document.getElementById('levelCounter2').textContent = `${idx2+1} / ${levels2.length}`;
            let words = [...cur.correct];
            words.push(distractors[Math.floor(Math.random() * distractors.length)]);
            bank2 = words.sort(() => Math.random() - 0.5);
            used2 = new Array(bank2.length).fill(false);
            built2 = [];
            render2();
        }
        function render2() {
            const zone = document.getElementById('buildingZone2');
            const bankDiv = document.getElementById('wordBank2');
            const btn = document.getElementById('checkBuilderBtn2');
            zone.innerHTML = '';
            built2.forEach((item, i) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.textContent = item.word;
                chip.onclick = () => {
                    used2[item.bankIdx] = false;
                    built2.splice(i,1);
                    render2();
                };
                zone.appendChild(chip);
            });
            bankDiv.innerHTML = '';
            bank2.forEach((w, i) => {
                const token = document.createElement('div');
                token.className = `bank-token ${used2[i] ? 'disabled' : ''}`;
                token.textContent = w;
                token.onclick = () => {
                    if (!used2[i]) {
                        used2[i] = true;
                        built2.push({word:w, bankIdx:i});
                        render2();
                    }
                };
                bankDiv.appendChild(token);
            });
            btn.disabled = built2.length===0;
            btn.classList.toggle('active', built2.length>0);
        }

        document.getElementById('checkBuilderBtn2').onclick = () => {
            const correct = levels2[idx2].correct;
            const isCorrect = built2.length===correct.length && built2.every((v,i)=> v.word === correct[i]);
            const panel = document.getElementById('resultPanel2');
            document.getElementById('resultTitle2').textContent = isCorrect ? "Barakalla! 🌟" : "Xato 😕";
            document.getElementById('resultMessage2').textContent = isCorrect ? "To‘g‘ri tarjima!" : "To‘g‘ri javob: "+correct.join(' ');
            panel.classList.add('active');
            if (isCorrect) score2++;
        };
        document.getElementById('continueBtn2').onclick = () => {
            document.getElementById('resultPanel2').classList.remove('active');
            if (idx2 < levels2.length-1) { idx2++; initLevel2(); }
            else { alert(`So‘z o‘yini tugadi: ${score2}/${levels2.length}`); idx2=0; score2=0; initLevel2(); }
        };
        initLevel2();

        
        // ================== 3. GAP QURAMIZ (sentences) ==================
        const sentences3 = [
            { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
            { uz: "Ular maktabga borishadi.", correct: ["They", "go", "to", "school."] },
            { uz: "Men olma yeyman.", correct: ["I", "eat", "an", "apple."] },
            { uz: "Sizning uyingiz katta.", correct: ["Your", "house", "is", "big."] },
            { uz: "Bugun havo issiq.", correct: ["Today", "the", "weather", "is", "hot."] },
            { uz: "Biz yangi mashina sotib oldik.", correct: ["We", "bought", "a", "new", "car."] }
        ];
        let idx3 = 0, built3 = [], bank3 = [], used3 = [], score3 = 0;

        function initLevel3() {
            const cur = sentences3[idx3];
            document.getElementById('uzbekPrompt3').textContent = cur.uz;
            document.getElementById('levelCounter3').textContent = `${idx3+1} / ${sentences3.length}`;
            bank3 = [...cur.correct].sort(() => Math.random() - 0.5);
            used3 = new Array(bank3.length).fill(false);
            built3 = [];
            render3();
        }
        function render3() {
            const zone = document.getElementById('buildingZone3');
            const bankDiv = document.getElementById('wordBank3');
            const btn = document.getElementById('checkBuilderBtn3');
            zone.innerHTML = '';
            built3.forEach((item, i) => {
                const chip = document.createElement('div');
                chip.className = 'word-chip';
                chip.textContent = item.word;
                chip.onclick = () => {
                    used3[item.bankIdx] = false;
                    built3.splice(i,1);
                    render3();
                };
                zone.appendChild(chip);
            });
            bankDiv.innerHTML = '';
            bank3.forEach((w, i) => {
                const token = document.createElement('div');
                token.className = `bank-token ${used3[i] ? 'disabled' : ''}`;
                token.textContent = w;
                token.onclick = () => {
                    if (!used3[i]) {
                        used3[i] = true;
                        built3.push({word:w, bankIdx:i});
                        render3();
                    }
                };
                bankDiv.appendChild(token);
            });
            btn.disabled = built3.length===0;
            btn.classList.toggle('active', built3.length>0);
        }
        document.getElementById('checkBuilderBtn3').onclick = () => {
            const correct = sentences3[idx3].correct;
            const isCorrect = built3.length===correct.length && built3.every((v,i)=> v.word === correct[i]);
            const panel = document.getElementById('resultPanel3');
            document.getElementById('resultTitle3').textContent = isCorrect ? "Ajoyib! 🎉" : "E'tiborli bo‘ling 💡";
            document.getElementById('resultMessage3').textContent = isCorrect ? "To‘g‘ri topdingiz!" : "To‘g‘ri tartib: "+correct.join(' ');
            panel.classList.add('active');
            if (isCorrect) score3++;
        };
        document.getElementById('continueBtn3').onclick = () => {
            document.getElementById('resultPanel3').classList.remove('active');
            if (idx3 < sentences3.length-1) { idx3++; initLevel3(); }
            else { alert(`Gap qurish tugadi: ${score3}/${sentences3.length}`); idx3=0; score3=0; initLevel3(); }
        };
        initLevel3();
    })();
</script>
</body>
</html>
