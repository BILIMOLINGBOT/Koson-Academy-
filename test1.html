<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ispan Tili: So'z quruvchi | Sentence Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            background: linear-gradient(180deg, #0a0a0a 0%, #141414 100%);
        }

        .question-header {
            padding: 20px 0;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 16px;
            color: #a0a0a0;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .question-title {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.4;
        }

        .uzbek-prompt {
            background: #1e1e1e;
            padding: 16px 20px;
            border-radius: 20px;
            margin: 20px 0 25px;
            border-left: 6px solid #ffffff;
            font-size: 20px;
            font-weight: 500;
            color: #ffffff;
            box-shadow: 0 8px 0 #00000066;
        }

        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .word-bank {
            background: #1a1a1a;
            border-radius: 32px;
            padding: 25px 16px;
            border: 2px solid #2a2a2a;
        }

        .word-bank h3 {
            color: #cccccc;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            margin-left: 8px;
        }

        .word-tiles {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }

        .tile {
            background: #2a2a2a;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            box-shadow: 0 5px 0 #0f0f0f;
            transition: 0.1s ease;
            cursor: pointer;
            user-select: none;
            border: 1px solid #444;
            flex: 0 1 auto;
        }

        .tile:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0f0f0f;
        }

        .tile.used {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.95);
            box-shadow: none;
        }

        .sentence-strip {
            background: #000000;
            border-radius: 40px;
            padding: 18px 16px;
            border: 2px dashed #4a4a4a;
            min-height: 90px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 8px;
        }

        .placed-word {
            background: #ffffff;
            color: #0a0a0a;
            padding: 12px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 0 #b0b0b0;
        }

        .placed-word i {
            color: #555;
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
        }

        .placed-word i:active {
            transform: scale(0.9);
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin: 15px 0 35px;
        }

        .action-btn {
            flex: 1;
            height: 56px;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #2a2a2a;
            color: #a0a0a0;
            cursor: not-allowed;
        }

        .action-btn.active {
            background: #ffffff;
            color: #0a0a0a;
            cursor: pointer;
        }

        .reset-btn {
            width: 56px;
            border-radius: 20px;
            background: #2a2a2a;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #ffffff;
            border-radius: 32px 32px 0 0;
            padding: 30px 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            color: #0a0a0a;
        }

        .result-panel.active { transform: translateY(0); }

        .result-panel h2 { margin-bottom: 10px; }
        .result-panel p { margin-bottom: 24px; font-size: 18px; }

        .footer-btn {
            width: 100%; background: black; color: white; border: none;
            padding: 18px; border-radius: 24px; font-size: 18px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        /* Final screen */
        #final-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            text-align: center;
            background: #000;
        }

        .trophy-icon { font-size: 100px; color: white; margin-bottom: 20px; }
        .stats-container { display: flex; gap: 15px; width: 100%; max-width: 400px; margin-top: -50px; }
        .stat-card {
            flex: 1; border-radius: 20px; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            border: 3px solid white; background: black;
        }
        .stat-label {
            font-weight: bold; padding: 4px 15px; border-radius: 12px;
            margin-top: -28px; margin-bottom: 15px; font-size: 14px;
            background: white; color: black; text-transform: uppercase;
        }
        .footer-btn-final {
            width: 100%; max-width: 400px; background: white; color: black;
            border: none; padding: 20px; border-radius: 20px;
            font-size: 18px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 6px 0px rgba(255, 255, 255, 0.2);
            transition: 0.1s;
        }
        .footer-btn-final:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<!-- Asosiy quruvchi ekrani -->
<div id="quiz-screen" class="app-container">
    <div class="question-header">
        <div class="question-number" id="questionCounter">1 / 5</div>
        <div class="question-title">✨ So'zlarni tartibla</div>
    </div>

    <!-- O'zbekcha prompt (tarjima qilinishi kerak bo'lgan gap) -->
    <div class="uzbek-prompt" id="uzbekPrompt">Men kitobni o'qiyman</div>

    <!-- Quruvchi maydoni -->
    <div class="builder-area">
        <!-- So'zlar banki (variantlar o'rniga) -->
        <div class="word-bank">
            <h3><i class="fa-regular fa-keyboard" style="margin-right: 8px;"></i>So'zlar</h3>
            <div class="word-tiles" id="wordBank"></div>
        </div>

        <!-- Tuzilayotgan gap (drop zone) -->
        <div class="sentence-strip" id="sentenceStrip"></div>

        <!-- Harakat tugmalari -->
        <div class="action-row">
            <button class="reset-btn" id="resetBuilderBtn"><i class="fas fa-undo-alt"></i></button>
            <button class="action-btn" id="checkBuilderBtn" disabled>
                <i class="fas fa-check"></i> Javobni tekshirish
            </button>
        </div>
    </div>

    <!-- Natija paneli (pastdan chiqadi) -->
    <div class="result-panel" id="resultPanel">
        <h2 id="resultTitle">¡Bien hecho! 🎉</h2>
        <p id="resultMessage">To'g'ri tuzdingiz</p>
        <button class="footer-btn" id="continueBtn">Keyingi savol</button>
    </div>
</div>

<!-- Yakuniy ekran -->
<div id="final-screen">
    <div class="trophy-section">
        <i class="fas fa-trophy trophy-icon"></i>
        <h1 style="font-size: 28px; margin-top: 20px;">Mashg'ulot yakunlandi</h1>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-label">Aniqlik</div>
            <div style="display:flex; align-items:center; font-size:24px; font-weight:bold;">
                <i class="fas fa-bullseye" style="margin-right:8px"></i>
                <span id="finalAccuracy">0%</span>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Tanga</div>
            <div style="display:flex; align-items:center; font-size:24px; font-weight:bold;">
                <i class="fas fa-coins" style="margin-right:8px"></i>
                <span id="finalScore">0</span>
            </div>
        </div>
    </div>

    <button class="footer-btn-final" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<script>
    // Yangi ma'lumotlar: o'zbekcha gaplar va ularning ispancha so'zlar to'plami (tartiblangan holda)
    const sentences = [
        { uzbek: "Men kitobni o'qiyman", spanishWords: ["Yo", "leo", "un", "libro"] },
        { uzbek: "Ular bog'da futbol o'ynaydilar", spanishWords: ["Ellos", "juegan", "al fútbol", "en el", "parque"] },
        { uzbek: "Biz ertaga kinoga boramiz", spanishWords: ["Nosotros", "vamos", "al cine", "mañana"] },
        { uzbek: "Siz suv ichasizmi?", spanishWords: ["¿Bebes", "agua", "tú?"] },
        { uzbek: "Katta uy", spanishWords: ["La", "casa", "grande"] }
    ];

    // Joriy holat
    let currentIdx = 0;
    let remainingWords = [];         // bankdagi so'zlar (hali ishlatilmagan)
    let placedWords = [];            // gapga qo'yilgan so'zlar (ketma-ketlik)
    let coins = 0;
    let isAnswered = false;          // bloklash uchun

    // Elementlar
    const quizScreen = document.getElementById('quiz-screen');
    const finalScreen = document.getElementById('final-screen');
    const questionCounter = document.getElementById('questionCounter');
    const uzbekPrompt = document.getElementById('uzbekPrompt');
    const wordBankDiv = document.getElementById('wordBank');
    const sentenceStrip = document.getElementById('sentenceStrip');
    const checkBtn = document.getElementById('checkBuilderBtn');
    const resetBtn = document.getElementById('resetBuilderBtn');
    const resultPanel = document.getElementById('resultPanel');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const continueBtn = document.getElementById('continueBtn');

    // Yangi savolni yuklash
    function loadQuestion() {
        const q = sentences[currentIdx];
        uzbekPrompt.textContent = q.uzbek;
        questionCounter.textContent = `${currentIdx + 1} / ${sentences.length}`;

        // So'zlar bankini aralashtiramiz (challenge)
        const shuffled = [...q.spanishWords].sort(() => Math.random() - 0.5);
        remainingWords = [...shuffled];
        placedWords = []; // boshlang'ich bo'sh

        isAnswered = false;
        checkBtn.disabled = true;
        checkBtn.classList.remove('active');

        render();
    }

    // So'z banki va gap stripini chizish
    function render() {
        // Bankdagi so'zlar
        wordBankDiv.innerHTML = '';
        remainingWords.forEach((word, idx) => {
            const tile = document.createElement('span');
            tile.className = 'tile';
            tile.textContent = word;
            // bosish so'zni gapga o'tkazadi
            tile.onclick = () => !isAnswered && moveWordToSentence(word);
            wordBankDiv.appendChild(tile);
        });

        // Gapdagi so'zlar (placedWords)
        sentenceStrip.innerHTML = '';
        placedWords.forEach((word, idx) => {
            const placedSpan = document.createElement('span');
            placedSpan.className = 'placed-word';
            placedSpan.innerHTML = `${word} <i class="fa-regular fa-circle-xmark" data-word="${word}" data-index="${idx}"></i>`;
            sentenceStrip.appendChild(placedSpan);

            // X belgisi bosilganda so'zni bankga qaytarish
            const removeIcon = placedSpan.querySelector('i');
            removeIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                if (isAnswered) return; // agar tekshirilgan bo'lsa o'zgartirib bo'lmaydi
                const wordToReturn = removeIcon.dataset.word;
                // shu so'zni placed dan olib tashlab, bankka qaytaramiz
                const wordIndex = placedWords.indexOf(wordToReturn);
                if (wordIndex !== -1) {
                    placedWords.splice(wordIndex, 1);
                    remainingWords.push(wordToReturn);
                }
                render();
                updateCheckButtonState();
            });
        });

        updateCheckButtonState();
    }

    // So'zni bankdan gapga ko'chirish
    function moveWordToSentence(word) {
        if (isAnswered) return;
        const idx = remainingWords.indexOf(word);
        if (idx !== -1) {
            remainingWords.splice(idx, 1);
            placedWords.push(word);
        }
        render();
    }

    // Tekshirish tugmasi holati: gapda kamida bitta so'z bo'lsa active
    function updateCheckButtonState() {
        if (isAnswered) {
            checkBtn.disabled = true;
            checkBtn.classList.remove('active');
            return;
        }
        const enabled = placedWords.length > 0;
        checkBtn.disabled = !enabled;
        if (enabled) {
            checkBtn.classList.add('active');
        } else {
            checkBtn.classList.remove('active');
        }
    }

    // Reset (qayta boshlash) — hozirgi savolni tozalab, bankni asl holiga keltirish
    resetBtn.onclick = () => {
        if (isAnswered) return; // agar tekshirilgan bo'lsa reset qilmaslik mumkin, lekin xohlasangiz ruxsat berishingiz mumkin
        const q = sentences[currentIdx];
        // qayta aralashtiramiz
        const shuffled = [...q.spanishWords].sort(() => Math.random() - 0.5);
        remainingWords = [...shuffled];
        placedWords = [];
        isAnswered = false;
        checkBtn.disabled = true;
        checkBtn.classList.remove('active');
        render();
    };

    // Javobni tekshirish
    checkBtn.onclick = () => {
        if (checkBtn.disabled) return;
        if (isAnswered) return;

        const correctWords = sentences[currentIdx].spanishWords;
        const userWords = placedWords;

        // solishtirish
        let isCorrect = (userWords.length === correctWords.length) && 
                        userWords.every((val, idx) => val === correctWords[idx]);

        isAnswered = true;
        checkBtn.disabled = true;
        checkBtn.classList.remove('active');

        // Natija panelini ko'rsatish
        if (isCorrect) {
            coins++; // bitta tanga
            resultTitle.textContent = '¡Perfecto! 🎉';
            resultMessage.textContent = 'Gap to\'g\'ri tuzildi.';
        } else {
            resultTitle.textContent = 'Qayta urunib ko\'ring 📚';
            resultMessage.textContent = `To'g'ri variant: ${correctWords.join(' ')}`;
        }

        // Continue button matni
        const continueSpan = document.getElementById('continueBtnText');
        if (!continueSpan) {
            // mavjud emas, qo'shib qo'yamiz (html da bor)
        }
        continueBtn.innerHTML = currentIdx === sentences.length - 1 ? 'Natijani ko\'rish' : 'Keyingi savol';
        resultPanel.classList.add('active');
    };

    // Davom etish tugmasi
    continueBtn.onclick = () => {
        resultPanel.classList.remove('active');

        if (currentIdx < sentences.length - 1) {
            currentIdx++;
            loadQuestion();
        } else {
            // Yakuniy natija
            showFinalResults();
        }
    };

    function showFinalResults() {
        quizScreen.style.display = 'none';
        finalScreen.style.display = 'flex';

        const accuracy = Math.round((coins / sentences.length) * 100);
        document.getElementById('finalAccuracy').textContent = accuracy + '%';
        document.getElementById('finalScore').textContent = coins;
    }

    // Sayyoh: birinchi savolni yuklash
    loadQuestion();

    // Panel yopilishi (agar tashqariga bosilsa, opsional)
    // Qulaylik uchun panelni yopish imkonini beramiz (ixtiyoriy)
</script>

</body>
</html>
