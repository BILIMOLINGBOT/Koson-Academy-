<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tili Flashcards - Testlar bilan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- QUnit CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/qunit/qunit-2.19.4.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        .card-stack {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .flashcard {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 32px;
            padding: 25px;
            width: 100%;
        }

        .flag-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .flag-img {
            width: 45px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
        }

        .part-of-speech {
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 18px;
            text-transform: uppercase;
        }

        .word-main {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-icon {
            color: #3b82f6;
            font-size: 24px;
            cursor: pointer;
        }

        .translation-word {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
        }

        .footer-area {
            padding-bottom: 20px;
        }

        .next-btn {
            width: 100%;
            height: 65px;
            background: white;
            color: black;
            border: none;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .next-btn:active {
            transform: scale(0.96);
        }

        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            text-align: center;
        }

        .trophy-icon { font-size: 100px; color: white; margin-bottom: 20px; }

        /* QUnit testlar sahifasini yashirish (huddi dasturdek) */
        #qunit {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            color: black;
            z-index: 1000;
            padding: 20px;
            max-height: 300px;
            overflow: auto;
            border-bottom: 5px solid #333;
        }
        #qunit * {
            color: black;
        }
    </style>
</head>
<body>

<!-- QUnit test qismi -->
<div id="qunit"></div>
<div id="qunit-fixture"></div>

<!-- Asosiy ilova -->
<div id="main-app" class="app-container">
    <div class="card-stack">
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                <span class="part-of-speech" id="posText">PRONOUN</span>
            </div>
            <div class="word-main">
                <span id="engWord">My</span>
                <i class="fas fa-volume-up audio-icon"></i>
            </div>
        </div>

        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
            </div>
            <div class="translation-word" id="uzbWord">mening</div>
        </div>
    </div>

    <div class="footer-area">
        <button class="next-btn" id="nextBtn">
            Keyingi <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</div>

<div id="final-screen" class="app-container">
    <div style="margin-top: 50px;">
        <i class="fas fa-trophy trophy-icon"></i>
        <h1 style="font-size: 28px;">Mashg'ulot yakunlandi</h1>
    </div>
    
    <div style="display: flex; gap: 15px; width: 100%; margin-top: -50px;">
        <div style="flex: 1; border: 3px solid white; border-radius: 20px; padding: 20px; background: black;">
            <div style="background: white; color: black; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; margin-top: -35px; margin-bottom: 10px;">TANGA</div>
            <div style="font-size: 24px; font-weight: bold;"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
        </div>
    </div>

    <button class="next-btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<!-- QUnit va test skriptlari -->
<script src="https://code.jquery.com/qunit/qunit-2.19.4.js"></script>
<script>
    // Asosiy ilova kodi
    const vocabulary = [
        { pos: "DETERMINER", eng: "My", uzb: "mening" },
        { pos: "NOUN", eng: "name", uzb: "ism" },
        { pos: "VERB", eng: "is", uzb: "“bo‘lmoq” fe’li (to be)" },
        { pos: "PRONOUN", eng: "I", uzb: "men" },
        { pos: "VERB", eng: "am", uzb: "“bo‘lmoq” fe’li (to be)" },
        { pos: "PREPOSITION", eng: "from", uzb: "dan" },
        { pos: "VERB", eng: "live", uzb: "yashaymoq" },
        { pos: "PREPOSITION", eng: "in", uzb: "da" },
        { pos: "ARTICLE", eng: "a", uzb: "artikl (bir)" },
        { pos: "NOUN", eng: "student", uzb: "talaba" },
        { pos: "VERB", eng: "have", uzb: "ega bo‘lmoq / bor" },
        { pos: "NOUN", eng: "family", uzb: "oila" }
    ];

    let currentIdx = 0;
    let coins = 0;

    const mainApp = document.getElementById('main-app');
    const finalScreen = document.getElementById('final-screen');
    
    function updateCard() {
        const item = vocabulary[currentIdx];
        document.getElementById('posText').textContent = item.pos;
        document.getElementById('engWord').textContent = item.eng;
        document.getElementById('uzbWord').textContent = item.uzb;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        coins += 5; // Har bir so'z uchun 5 tanga
        
        if (currentIdx < vocabulary.length - 1) {
            currentIdx++;
            updateCard();
        } else {
            mainApp.style.display = 'none';
            finalScreen.style.display = 'flex';
            document.getElementById('coinCount').textContent = coins;
        }
    });

    // Inglizcha talaffuz (UK English)
    document.querySelector('.audio-icon').addEventListener('click', () => {
        const text = document.getElementById('engWord').textContent;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB'; 
        window.speechSynthesis.speak(utterance);
    });

    updateCard();

    // ---------- TESTLAR ----------
    QUnit.module('Flashcard Testlari', function() {
        QUnit.test('Dastlabki holat: birinchi karta va tanga 0', function(assert) {
            assert.equal(document.getElementById('posText').textContent, 'DETERMINER', 'POS to\'g\'ri');
            assert.equal(document.getElementById('engWord').textContent, 'My', 'Ingliz so\'z to\'g\'ri');
            assert.equal(document.getElementById('uzbWord').textContent, 'mening', 'O\'zbek so\'z to\'g\'ri');
            assert.equal(coins, 0, 'Boshida tanga 0');
        });

        QUnit.test('Keyingi tugma bosilganda tanga ortadi va indeks oshadi', function(assert) {
            let oldIdx = currentIdx;
            let oldCoins = coins;
            document.getElementById('nextBtn').click();
            assert.equal(coins, oldCoins + 5, 'Tanga 5 ga oshdi');
            assert.equal(currentIdx, oldIdx + 1, 'Indeks 1 ga oshdi');
        });

        QUnit.test('Karta yangilanishi: ikkinchi element', function(assert) {
            // Hozirgi indeks 1 bo'lishi kerak (oldingi test bosgan)
            assert.equal(document.getElementById('posText').textContent, vocabulary[1].pos, 'POS: name');
            assert.equal(document.getElementById('engWord').textContent, vocabulary[1].eng, 'Eng: name');
            assert.equal(document.getElementById('uzbWord').textContent, vocabulary[1].uzb, 'Uzb: ism');
        });

        QUnit.test('Oxirgi kartaga yetganda yakuniy ekran ko\'rinadi', function(assert) {
            // 2..oxirgigacha bosamiz
            while (currentIdx < vocabulary.length - 1) {
                document.getElementById('nextBtn').click();
            }
            // Endi oxirgi karta
            assert.equal(currentIdx, vocabulary.length - 1, 'Oxirgi indeks');
            let lastCoins = coins;
            document.getElementById('nextBtn').click();
            assert.equal(mainApp.style.display, 'none', 'Asosiy ekran yashirindi');
            assert.equal(finalScreen.style.display, 'flex', 'Final ekran ko\'rinadi');
            assert.equal(document.getElementById('coinCount').textContent, String(lastCoins), 'Tanga miqdori ko\'rsatilgan');
        });
    });
</script>
</body>
</html>
