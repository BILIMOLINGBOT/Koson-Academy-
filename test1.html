<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tili Flashcards & Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --accent-blue: #3b82f6;
            --success-green: #22c55e;
            --error-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        /* Flashcard Styles */
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; }
        .flashcard { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 32px; padding: 25px; width: 100%; }
        .flag-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .flag-img { width: 45px; height: 30px; border-radius: 4px; object-fit: cover; }
        .part-of-speech { color: var(--text-secondary); font-weight: 700; font-size: 18px; text-transform: uppercase; }
        .word-main { font-size: 42px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .audio-icon { color: var(--accent-blue); font-size: 24px; cursor: pointer; }
        .translation-word { font-size: 28px; font-weight: 700; }

        /* Quiz Styles */
        #quiz-screen { display: none; flex-direction: column; justify-content: center; height: 100%; }
        .quiz-question { font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 30px; }
        .options-grid { display: grid; gap: 12px; }
        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn.correct { background: var(--success-green); border-color: var(--success-green); }
        .option-btn.wrong { background: var(--error-red); border-color: var(--error-red); }

        /* UI Elements */
        .footer-area { padding-bottom: 20px; margin-top: 20px; }
        .next-btn {
            width: 100%; height: 65px; background: white; color: black; border: none;
            border-radius: 24px; font-size: 20px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .next-btn:active { transform: scale(0.96); }

        #final-screen { display: none; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; text-align: center; }
        .trophy-icon { font-size: 100px; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="main-app" class="app-container">
    <div class="card-stack">
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                <span class="part-of-speech" id="posText">PRONOUN</span>
            </div>
            <div class="word-main">
                <span id="engWord">My</span>
                <i class="fas fa-volume-up audio-icon" onclick="speakText()"></i>
            </div>
        </div>
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
            </div>
            <div class="translation-word" id="uzbWord">mening</div>
        </div>
    </div>
    <div class="footer-area">
        <button class="next-btn" id="nextBtn">Keyingi <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<div id="quiz-screen" class="app-container">
    <div class="quiz-question" id="quizQuestionText">"Student" so'zining tarjimasi nima?</div>
    <div class="options-grid" id="optionsGrid">
        </div>
</div>

<div id="final-screen" class="app-container">
    <div style="margin-top: 50px;">
        <i class="fas fa-trophy trophy-icon"></i>
        <h1 style="font-size: 28px;">Mashg'ulot yakunlandi</h1>
        <p style="color: var(--text-secondary); margin-top: 10px;">Siz barcha so'zlarni ko'rib chiqdingiz va testdan o'tdingiz!</p>
    </div>
    
    <div style="display: flex; gap: 15px; width: 100%; margin-top: -50px;">
        <div style="flex: 1; border: 3px solid white; border-radius: 20px; padding: 20px; background: black;">
            <div style="background: white; color: black; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; margin-top: -35px; margin-bottom: 10px;">UMUMIY TANGA</div>
            <div style="font-size: 24px; font-weight: bold;"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
        </div>
    </div>

    <button class="next-btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<script>
    const vocabulary = [
        { pos: "DETERMINER", eng: "My", uzb: "mening" },
        { pos: "NOUN", eng: "name", uzb: "ism" },
        { pos: "VERB", eng: "is", uzb: "bo‘lmoq (to be)" },
        { pos: "PRONOUN", eng: "I", uzb: "men" },
        { pos: "PREPOSITION", eng: "from", uzb: "dan" },
        { pos: "VERB", eng: "live", uzb: "yashaymoq" },
        { pos: "PREPOSITION", eng: "in", uzb: "da" },
        { pos: "ARTICLE", eng: "a", uzb: "bir (artikl)" },
        { pos: "NOUN", eng: "student", uzb: "talaba" },
        { pos: "VERB", eng: "have", uzb: "ega bo‘lmoq" },
        { pos: "NOUN", eng: "family", uzb: "oila" }
    ];

    let currentIdx = 0;
    let quizIdx = 0;
    let coins = 0;

    const mainApp = document.getElementById('main-app');
    const quizScreen = document.getElementById('quiz-screen');
    const finalScreen = document.getElementById('final-screen');

    // --- Flashcard Funksiyalari ---
    function updateCard() {
        const item = vocabulary[currentIdx];
        document.getElementById('posText').textContent = item.pos;
        document.getElementById('engWord').textContent = item.eng;
        document.getElementById('uzbWord').textContent = item.uzb;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        coins += 5;
        if (currentIdx < vocabulary.length - 1) {
            currentIdx++;
            updateCard();
        } else {
            startQuiz();
        }
    });

    function speakText() {
        const text = document.getElementById('engWord').textContent;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB'; 
        window.speechSynthesis.speak(utterance);
    }

    // --- Quiz (Test) Funksiyalari ---
    function startQuiz() {
        mainApp.style.display = 'none';
        quizScreen.style.display = 'flex';
        showQuizQuestion();
    }

    function showQuizQuestion() {
        const correctItem = vocabulary[quizIdx];
        document.getElementById('quizQuestionText').textContent = `"${correctItem.eng}" so'zining tarjimasi?`;
        
        const optionsGrid = document.getElementById('optionsGrid');
        optionsGrid.innerHTML = '';

        // To'g'ri va noto'g'ri variantlarni aralashtirish
        let options = [correctItem.uzb];
        while(options.length < 3) {
            let randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)].uzb;
            if(!options.includes(randomWord)) options.push(randomWord);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(btn, opt === correctItem.uzb);
            optionsGrid.appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none'); // Bosishni to'xtatish

        if (isCorrect) {
            btn.classList.add('correct');
            coins += 10;
        } else {
            btn.classList.add('wrong');
        }

        setTimeout(() => {
            if (quizIdx < vocabulary.length - 1 && quizIdx < 4) { // Faqat 5 ta savol yoki hammasi
                quizIdx++;
                showQuizQuestion();
            } else {
                showFinalScreen();
            }
        }, 1000);
    }

    function showFinalScreen() {
        quizScreen.style.display = 'none';
        finalScreen.style.display = 'flex';
        document.getElementById('coinCount').textContent = coins;
    }

    updateCard();
</script>

</body>
</html>
