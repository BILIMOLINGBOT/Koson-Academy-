<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Inglizcha gap quramiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            height: 100%;
            background: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px 20px 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .question-number {
            font-size: 15px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .uzbek-sentence {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            background: #111;
            padding: 20px;
            border-radius: 25px;
            border: 1px solid #333;
        }
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .sentence-builder {
            min-height: 120px;
            background: #0f0f0f;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            border: 2px dashed #333;
        }
        .word-chip {
            background: #2a2a2a;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            border: 1px solid #444;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #0a0a0a;
        }
        .word-chip:hover {
            background: #3a3a3a;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #0a0a0a;
        }
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            background: #0f0f0f;
            padding: 20px;
            border-radius: 30px;
        }
        .bank-token {
            background: #1a1a1a;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 0 #0a0a0a;
        }
        .bank-token:active:not(.disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0a0a0a;
        }
        .bank-token.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(1);
        }
        .action-btn {
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 30px;
            background: #222;
            color: #666;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            border: 1px solid #333;
        }
        .action-btn.active {
            background: #4CAF50;
            color: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-radius: 40px 40px 0 0;
            padding: 40px 25px 30px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: #000;
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }
        .result-panel.active { transform: translateY(0); }
        .result-emoji {
            font-size: 50px;
            text-align: center;
            margin-bottom: 20px;
        }
        #resultTitle {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }
        #resultMessage {
            margin: 15px 0 30px;
            font-size: 18px;
            color: #555;
            text-align: center;
            line-height: 1.6;
        }
        .footer-btn {
            width: 100%;
            padding: 20px;
            border-radius: 25px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .footer-btn:active {
            transform: scale(0.98);
        }
        .correct-highlight {
            color: #4CAF50;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div id="quiz-screen" class="app-container">
    <div class="header">
        <div class="question-number" id="levelCounter">1 / 6</div>
        <div class="uzbek-sentence" id="uzbekPrompt">...</div>
    </div>

    <div class="builder-area">
        <div class="sentence-builder" id="buildingZone"></div>
        <div class="word-bank" id="wordBank"></div>
        <button class="action-btn" id="checkBuilderBtn" disabled>
            <i class="fas fa-check-circle"></i> Javobni tekshirish
        </button>
    </div>

    <div class="result-panel" id="resultPanel">
        <div class="result-emoji" id="resultEmoji">🎯</div>
        <h2 id="resultTitle">...</h2>
        <p id="resultMessage"></p>
        <button class="footer-btn" id="continueBtn">Davom etish</button>
    </div>
</div>

<script>
    const sentences = [
        { 
            uz: "Mening ismim Aziz.", 
            correct: ["My", "name", "is", "Aziz."],
            variants: [
                ["His", "My", "Her"],        // variantlar
                ["surname", "name", "book"],
                ["are", "is", "am"],
                ["Aziz.", "John.", "Alice."]
            ]
        },
        { 
            uz: "Ular maktabga borishadi.", 
            correct: ["They", "go", "to", "school."],
            variants: [
                ["They", "He", "She"],
                ["go", "goes", "went"],
                ["to", "at", "in"],
                ["school.", "home.", "work."]
            ]
        },
        { 
            uz: "Men olma yeyman.", 
            correct: ["I", "eat", "an", "apple."],
            variants: [
                ["I", "You", "We"],
                ["eat", "eats", "eating"],
                ["an", "a", "the"],
                ["apple.", "banana.", "orange."]
            ]
        },
        { 
            uz: "Sizning uyingiz katta.", 
            correct: ["Your", "house", "is", "big."],
            variants: [
                ["Your", "My", "Our"],
                ["house", "car", "garden"],
                ["is", "are", "am"],
                ["big.", "small.", "new."]
            ]
        },
        { 
            uz: "Bugun havo issiq.", 
            correct: ["Today", "the", "weather", "is", "hot."],
            variants: [
                ["Today", "Yesterday", "Tomorrow"],
                ["the", "a", "an"],
                ["weather", "day", "sun"],
                ["is", "was", "will be"],
                ["hot.", "cold.", "warm."]
            ]
        },
        { 
            uz: "Biz yangi mashina sotib oldik.", 
            correct: ["We", "bought", "a", "new", "car."],
            variants: [
                ["We", "They", "I"],
                ["bought", "buy", "will buy"],
                ["a", "an", "the"],
                ["new", "old", "fast"],
                ["car.", "house.", "bike."]
            ]
        }
    ];

    let currentIdx = 0;
    let builtSequence = [];
    let bankWords = [];
    let bankIndices = [];
    let usedFlags = [];
    let score = 0;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initLevel() {
        const current = sentences[currentIdx];
        document.getElementById('uzbekPrompt').textContent = current.uz;
        document.getElementById('levelCounter').textContent = `${currentIdx + 1} / ${sentences.length}`;
        
        // Variantlardan bank yaratish
        bankWords = [];
        bankIndices = [];
        
        current.correct.forEach((word, position) => {
            const variants = current.variants[position];
            // Har bir pozitsiya uchun to'g'ri so'z va 2 ta noto'g'ri variant
            const positionWords = [word, ...variants.filter(v => v !== word).slice(0, 2)];
            // Har bir so'zni bankka qo'shish
            positionWords.forEach(w => {
                bankWords.push(w);
                bankIndices.push(position); // Qaysi pozitsiyaga tegishli ekanligini saqlash
            });
        });
        
        // Bankni aralashtirish
        const combined = bankWords.map((word, idx) => ({ word, pos: bankIndices[idx] }));
        shuffleArray(combined);
        
        bankWords = combined.map(item => item.word);
        bankIndices = combined.map(item => item.pos);
        usedFlags = new Array(bankWords.length).fill(false);
        builtSequence = [];
        render();
    }

    function render() {
        const zone = document.getElementById('buildingZone');
        const bank = document.getElementById('wordBank');
        const btn = document.getElementById('checkBuilderBtn');

        zone.innerHTML = '';
        builtSequence.forEach((item, idx) => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.textContent = item.word;
            chip.onclick = () => {
                usedFlags[item.bankIdx] = false;
                builtSequence.splice(idx, 1);
                render();
            };
            zone.appendChild(chip);
        });

        bank.innerHTML = '';
        bankWords.forEach((word, idx) => {
            const token = document.createElement('div');
            token.className = `bank-token ${usedFlags[idx] ? 'disabled' : ''}`;
            token.textContent = word;
            token.onclick = () => {
                if (!usedFlags[idx]) {
                    usedFlags[idx] = true;
                    builtSequence.push({ word, bankIdx: idx });
                    render();
                }
            };
            bank.appendChild(token);
        });

        const isReady = (builtSequence.length === sentences[currentIdx].correct.length);
        btn.disabled = !isReady;
        btn.classList.toggle('active', isReady);
    }

    document.getElementById('checkBuilderBtn').onclick = () => {
        const current = sentences[currentIdx];
        const correct = current.correct;
        
        // Tekshirish: barcha so'zlar to'g'ri va to'g'ri tartibdami?
        const isCorrect = builtSequence.length === correct.length && 
                          builtSequence.every((val, i) => val.word === correct[i]);
        
        const panel = document.getElementById('resultPanel');
        const title = document.getElementById('resultTitle');
        const msg = document.getElementById('resultMessage');
        const emoji = document.getElementById('resultEmoji');

        if (isCorrect) {
            score++;
            emoji.textContent = "🎉🌟";
            title.textContent = "Ajoyib!";
            msg.innerHTML = "Tabriklayman! Siz gapni to'g'ri tuzdingiz.<br><span style='color:#4CAF50;'>✓ " + correct.join(' ') + "</span>";
        } else {
            emoji.textContent = "💪";
            title.textContent = "Qayta urining!";
            msg.innerHTML = "To'g'ri javob:<br><span style='color:#4CAF50;font-weight:600;'>" + correct.join(' ') + "</span><br><br>Sizning javobingiz:<br><span style='color:#f44336;'>" + 
                (builtSequence.map(w => w.word).join(' ') || "...") + "</span>";
        }
        panel.classList.add('active');
    };

    document.getElementById('continueBtn').onclick = () => {
        document.getElementById('resultPanel').classList.remove('active');
        if (currentIdx < sentences.length - 1) {
            currentIdx++;
            initLevel();
        } else {
            setTimeout(() => {
                alert(`🎉 Mashq tugadi! Natijangiz: ${score} / ${sentences.length}`);
                currentIdx = 0;
                score = 0;
                initLevel();
            }, 300);
        }
    };

    initLevel();
</script>
</body>
</html>
