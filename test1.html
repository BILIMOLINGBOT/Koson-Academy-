<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>INGAME · gap tuzish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* iOS‑ga mos, silliq, zamonaviy dizayn */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
        }

        /* asosiy ekran — dynamic island va home bar moslamasi */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: env(safe-area-inset-top, 12px) 16px env(safe-area-inset-bottom, 12px);
            background: radial-gradient(circle at top, #1c1c1e, #000000);
            position: relative;
        }

        /* silliq header */
        .header {
            padding: 8px 0 12px;
            margin-bottom: 4px;
        }

        .question-badge {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #f0f0f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }

        .uzbek-sentence {
            font-size: 34px;
            font-weight: 700;
            line-height: 1.2;
            color: #ffffff;
            background: rgba(44, 44, 46, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px 20px;
            border-radius: 44px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin: 8px 0 18px;
            box-shadow: 0 20px 30px -10px black;
            word-break: break-word;
        }

        /* qurilish zonasi — drop area */
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sentence-builder {
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 28px 18px;
            min-height: 160px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 10px;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), 0 8px 0 #0a0a0a;
        }

        .word-chip {
            background: #2c2c2e;
            padding: 14px 22px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 560;
            color: white;
            border: 1.5px solid #3a3a3c;
            box-shadow: 0 5px 0 #1c1c1e;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.12s ease;
            user-select: none;
            backdrop-filter: blur(4px);
        }

        .word-chip.placed {
            background: #000000;
            border-color: #ffffff;
            box-shadow: 0 5px 0 #444;
        }

        .word-chip i {
            font-size: 18px;
            color: #8e8e93;
        }

        /* so‘zlar banki — scroll mumkin, lekin iPhone da chiroyli */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px 12px;
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px 16px;
            border-radius: 68px 68px 40px 40px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 8px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.8);
            max-height: 220px;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        .word-bank::-webkit-scrollbar { display: none; }

        .bank-token {
            background: #1c1c1e;
            padding: 18px 28px;
            border-radius: 100px;
            font-size: 24px;
            font-weight: 600;
            color: #ffffff;
            border: 2px solid #4a4a4e;
            box-shadow: 0 7px 0 #111, 0 4px 16px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: all 0.1s linear;
            user-select: none;
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }

        .bank-token:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #111;
        }

        .bank-token.disabled {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* tekshirish tugmasi — iOS style */
        .action-btn {
            width: 100%;
            height: 68px;
            border: none;
            border-radius: 40px;
            background: #2c2c2e;
            color: #8e8e93;
            font-size: 22px;
            font-weight: 700;
            margin: 18px 0 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: not-allowed;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        .action-btn.active {
            background: #ffffff;
            color: #000000;
            cursor: pointer;
            box-shadow: 0 10px 0 #b0b0b0, 0 4px 20px rgba(255,255,255,0.2);
            border: none;
        }

        .action-btn.active:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #b0b0b0;
        }

        /* natija paneli — iOS bottom sheet */
        .result-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(240, 240, 245, 0.98);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 44px 44px 0 0;
            padding: 36px 24px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            z-index: 2000;
            color: #1c1c1e;
            border-top: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 -20px 40px rgba(0,0,0,0.5);
        }

        .result-panel.active { transform: translateY(0); }

        .result-panel h2 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .result-panel p {
            font-size: 20px;
            color: #3a3a3c;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .footer-btn {
            width: 100%;
            background: #000000;
            color: white;
            border: none;
            padding: 22px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 8px 0 #2c2c2e;
            text-transform: none;
            letter-spacing: 0.5px;
        }

        .footer-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #2c2c2e; }

        /* final ekran — medal */
        #final-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 80px 24px 40px;
            text-align: center;
            background: radial-gradient(circle at center, #1d1d1f, #000);
            color: white;
        }

        .trophy-icon {
            font-size: 130px;
            color: #ffd966;
            text-shadow: 0 10px 20px rgba(255,215,0,0.5);
            margin-bottom: 20px;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 440px;
            margin: 24px 0 40px;
        }

        .stat-card {
            flex: 1;
            border-radius: 36px;
            padding: 20px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,240,0.25);
            box-shadow: 0 20px 30px -10px black;
            position: relative;
        }

        .stat-label {
            font-weight: 700;
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: -26px;
            margin-bottom: 16px;
            font-size: 16px;
            background: #ffffff;
            color: black;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(0,0,0,0.1);
        }

        .stat-value {
            display: flex;
            align-items: center;
            font-size: 34px;
            font-weight: 800;
            gap: 8px;
        }

        .footer-btn.end {
            background: white;
            color: black;
            box-shadow: 0 8px 0 #b0b0b0;
            font-weight: 800;
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- Asosiy oyna: builder -->
    <div id="quiz-screen" class="app-container">
        <div class="header">
            <div class="question-badge" id="levelCounter">1 / 6 · so‘z yig‘ish</div>
            <div class="uzbek-sentence" id="uzbekPrompt">... yuklanmoqda</div>
        </div>

        <div class="builder-area">
            <!-- qurilayotgan gap (bosiladigan so‘zlar) -->
            <div class="sentence-builder" id="buildingZone"></div>

            <!-- so‘zlar ombori (bank) -->
            <div class="word-bank" id="wordBank"></div>

            <!-- tekshirish tugmasi -->
            <button class="action-btn" id="checkBuilderBtn" disabled>
                <i class="fas fa-check-circle"></i> Tekshirish
            </button>
        </div>

        <!-- natija paneli (to‘g‘ri / noto‘g‘ri) -->
        <div class="result-panel" id="resultPanel">
            <h2 id="resultTitle">Bajarildi</h2>
            <p id="resultMessage"></p>
            <button class="footer-btn" id="continueBtn">Davom etish</button>
        </div>
    </div>

    <!-- yakuniy ekran (trophy) -->
    <div id="final-screen">
        <div class="trophy-section">
            <i class="fas fa-trophy trophy-icon"></i>
            <h1 style="font-size: 34px; font-weight: 700;">Tabriklaymiz!</h1>
            <p style="font-size: 18px; opacity:0.8; margin-top: 12px;">siz barcha gaplarni tuzdingiz</p>
        </div>
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-label">Aniqlik</div>
                <div class="stat-value">
                    <i class="fas fa-bullseye" style="font-size:28px;"></i>
                    <span id="finalAccuracy">0%</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tangalar</div>
                <div class="stat-value">
                    <i class="fas fa-coins" style="font-size:28px;"></i>
                    <span id="finalScore">0</span>
                </div>
            </div>
        </div>
        <button class="footer-btn end" onclick="location.reload()">Yangi boshlash</button>
    </div>

    <script>
        (function() {
            // SENTENCES (o‘zbekcha, to‘g‘ri inglizcha)
            const sentences = [
                { uz: "Mening ismim Aziz.", correctWords: ["My", "name", "is", "Aziz."] },
                { uz: "Ular maktabga borishadi.", correctWords: ["They", "go", "to", "school."] },
                { uz: "Men olma yeyman.", correctWords: ["I", "eat", "an", "apple."] },
                { uz: "Sizning uyingiz katta.", correctWords: ["Your", "house", "is", "big."] },
                { uz: "Bugun havo issiq.", correctWords: ["Today", "the", "weather", "is", "hot."] },
                { uz: "Biz yangi mashina sotib oldik.", correctWords: ["We", "bought", "a", "new", "car."] }
            ];

            let currentIdx = 0;
            let builtSequence = [];          // { word, bankIndex }
            let bankWords = [];
            let usedFlags = [];
            let coins = 0;
            const totalQuestions = sentences.length;

            // random array
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function initBankForCurrent() {
                const correct = sentences[currentIdx].correctWords;
                bankWords = shuffle([...correct]);
                usedFlags = new Array(bankWords.length).fill(false);
                builtSequence = [];
            }

            // render qilish
            function renderBuilder() {
                const buildingZone = document.getElementById('buildingZone');
                const wordBankDiv = document.getElementById('wordBank');

                // building zone
                buildingZone.innerHTML = '';
                builtSequence.forEach((item, idx) => {
                    const chip = document.createElement('div');
                    chip.className = 'word-chip placed';
                    chip.textContent = item.word;
                    chip.onclick = () => {
                        // bankka qaytarish
                        usedFlags[item.bankIndex] = false;
                        builtSequence = builtSequence.filter((_, i) => i !== idx);
                        renderBuilder();
                        updateCheckButton();
                    };
                    const delIcon = document.createElement('i');
                    delIcon.className = 'fas fa-times-circle';
                    chip.appendChild(delIcon);
                    buildingZone.appendChild(chip);
                });

                // word bank
                wordBankDiv.innerHTML = '';
                bankWords.forEach((word, idx) => {
                    if (usedFlags[idx]) return;
                    const token = document.createElement('div');
                    token.className = 'bank-token';
                    token.textContent = word;
                    token.onclick = () => {
                        builtSequence.push({ word, bankIndex: idx });
                        usedFlags[idx] = true;
                        renderBuilder();
                        updateCheckButton();
                    };
                    wordBankDiv.appendChild(token);
                });

                // Agar barcha so'zlar ishlatilgan bo'lsa, bank bo'sh ko'rinadi
            }

            // Tekshirish tugmasi faqat barcha so'zlar ishlatilsa
            function isAllWordsUsed() {
                return builtSequence.length === sentences[currentIdx].correctWords.length;
            }

            function updateCheckButton() {
                const btn = document.getElementById('checkBuilderBtn');
                const allUsed = isAllWordsUsed();
                btn.disabled = !allUsed;
                btn.classList.toggle('active', allUsed);
            }

            // Yangi savolni yuklash
            function loadSentence() {
                document.getElementById('levelCounter').innerText = 
                    `${currentIdx + 1} / ${totalQuestions} · so‘z yig‘ish`;
                document.getElementById('uzbekPrompt').innerText = sentences[currentIdx].uz;
                initBankForCurrent();
                renderBuilder();
                document.getElementById('resultPanel').classList.remove('active');
                updateCheckButton();
            }

            // Javobni tekshirish
            document.getElementById('checkBuilderBtn').onclick = () => {
                if (!isAllWordsUsed()) return;

                const correct = sentences[currentIdx].correctWords;
                const userWords = builtSequence.map(item => item.word);
                const isCorrect = userWords.length === correct.length && 
                    userWords.every((w, i) => w === correct[i]);

                const resultTitle = document.getElementById('resultTitle');
                const resultMsg = document.getElementById('resultMessage');
                if (isCorrect) {
                    coins++;
                    resultTitle.innerHTML = 'Ajoyib! 🎉';
                    resultMsg.innerHTML = 'Gap to‘g‘ri tuzildi.';
                } else {
                    resultTitle.innerHTML = 'Qayta urunib ko‘ring 📘';
                    resultMsg.innerHTML = `To‘g‘ri tartib: ${correct.join(' ')}`;
                }

                const continueBtn = document.getElementById('continueBtn');
                continueBtn.innerText = (currentIdx === totalQuestions - 1) ? 'Natijani ko‘rish' : 'Keyingi savol';

                document.getElementById('resultPanel').classList.add('active');
            };

            // Davom etish
            document.getElementById('continueBtn').onclick = () => {
                document.getElementById('resultPanel').classList.remove('active');
                if (currentIdx < totalQuestions - 1) {
                    currentIdx++;
                    loadSentence();
                } else {
                    // final ekran
                    document.getElementById('quiz-screen').style.display = 'none';
                    document.getElementById('final-screen').style.display = 'flex';
                    const accuracy = Math.round((coins / totalQuestions) * 100);
                    document.getElementById('finalAccuracy').innerText = accuracy + '%';
                    document.getElementById('finalScore').innerText = coins;
                }
            };

            // Start
            loadSentence();
        })();
    </script>
</body>
</html>
