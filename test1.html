<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Inglizcha gap quramiz · Sentence Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
            background: #0a0a0a;
        }
        .header {
            padding: 20px 0;
            text-align: center;
            margin-bottom: 10px;
        }
        .question-number {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .uzbek-sentence {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        /* Teppa qism - so'zlar yig'iladigan joy (Foni olib tashlandi) */
        .sentence-builder {
            background: transparent;
            min-height: 120px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 8px;
            margin-bottom: 20px;
        }
        .word-chip {
            background: #222;
            padding: 12px 20px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 500;
            color: white;
            border: 2px solid #444;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        /* Pastki qism - qizil chiziq va so'zlar banki */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px 10px;
            background: transparent;
            padding: 30px 10px;
            /* QIZIL CHIZIQ */
            border-top: 3px solid #ff4b4b; 
            margin-top: auto;
        }
        .bank-token {
            background: #1a1a1a;
            padding: 14px 24px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.1s;
        }
        .bank-token:active { opacity: 0.7; }
        .bank-token.disabled {
            opacity: 0.1;
            pointer-events: none;
        }
        .action-btn {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 20px;
            background: #1e1e1e;
            color: #555;
            font-size: 18px;
            font-weight: 700;
            margin: 20px 0 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: not-allowed;
        }
        .action-btn.active {
            background: #ffffff;
            color: #000;
            cursor: pointer;
        }

        /* Natija paneli */
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 30px 20px;
            transform: translateY(100%);
            transition: 0.3s;
            z-index: 1000;
            color: black;
        }
        .result-panel.active { transform: translateY(0); }
        .footer-btn {
            width: 100%;
            background: black; color: white; border: none;
            padding: 18px; border-radius: 20px;
            font-size: 18px; font-weight: 700;
            cursor: pointer;
        }

        #final-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #000;
        }
    </style>
</head>
<body>

<div id="quiz-screen" class="app-container">
    <div class="header">
        <div class="question-number" id="levelCounter">1 / 6</div>
        <div class="uzbek-sentence" id="uzbekPrompt">Mening ismim Aziz.</div>
    </div>

    <div class="builder-area">
        <div class="sentence-builder" id="buildingZone">
            <!-- Bu yerda yig'ilgan so'zlar bo'ladi -->
        </div>

        <div class="word-bank" id="wordBank">
            <!-- Qizil chiziqdan pastda so'zlar banki -->
        </div>

        <button class="action-btn" id="checkBuilderBtn" disabled>
            <i class="fas fa-check"></i> Javobni tekshirish
        </button>
    </div>

    <div class="result-panel" id="resultPanel">
        <h2 id="resultTitle">Bajarildi</h2>
        <p id="resultMessage" style="margin: 10px 0 20px;"></p>
        <button class="footer-btn" id="continueBtn">Davom etish</button>
    </div>
</div>

<div id="final-screen">
    <i class="fas fa-trophy" style="font-size: 80px; color: gold; margin-bottom: 20px;"></i>
    <h1>Tamomlandi!</h1>
    <p id="finalScore" style="margin: 20px 0; font-size: 20px;"></p>
    <button class="footer-btn" onclick="location.reload()" style="max-width: 300px;">Qayta boshlash</button>
</div>

<script>
    const sentences = [
        { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
        { uz: "Ular maktabga borishadi.", correct: ["They", "go", "to", "school."] },
        { uz: "Men olma yeyman.", correct: ["I", "eat", "an", "apple."] },
        { uz: "Sizning uyingiz katta.", correct: ["Your", "house", "is", "big."] },
        { uz: "Bugun havo issiq.", correct: ["Today", "the", "weather", "is", "hot."] },
        { uz: "Biz yangi mashina sotib oldik.", correct: ["We", "bought", "a", "new", "car."] }
    ];

    let currentIdx = 0;
    let builtSequence = [];
    let bankWords = [];
    let usedFlags = [];
    let score = 0;

    function initLevel() {
        const current = sentences[currentIdx];
        document.getElementById('uzbekPrompt').textContent = current.uz;
        document.getElementById('levelCounter').textContent = `${currentIdx + 1} / ${sentences.length}`;
        
        bankWords = [...current.correct].sort(() => Math.random() - 0.5);
        usedFlags = new Array(bankWords.length).fill(false);
        builtSequence = [];
        
        render();
    }

    function render() {
        const zone = document.getElementById('buildingZone');
        const bank = document.getElementById('wordBank');
        const btn = document.getElementById('checkBuilderBtn');

        zone.innerHTML = '';
        builtSequence.forEach((item, idx) => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.innerHTML = `${item.word} <i class="fas fa-times" style="font-size:12px; opacity:0.5"></i>`;
            chip.onclick = () => {
                usedFlags[item.bankIdx] = false;
                builtSequence.splice(idx, 1);
                render();
            };
            zone.appendChild(chip);
        });

        bank.innerHTML = '';
        bankWords.forEach((word, idx) => {
            const token = document.createElement('div');
            token.className = `bank-token ${usedFlags[idx] ? 'disabled' : ''}`;
            token.textContent = word;
            token.onclick = () => {
                if (!usedFlags[idx]) {
                    usedFlags[idx] = true;
                    builtSequence.push({ word, bankIdx: idx });
                    render();
                }
            };
            bank.appendChild(token);
        });

        const isReady = builtSequence.length === bankWords.length;
        btn.disabled = !isReady;
        btn.classList.toggle('active', isReady);
    }

    document.getElementById('checkBuilderBtn').onclick = () => {
        const correct = sentences[currentIdx].correct;
        const isCorrect = builtSequence.every((val, i) => val.word === correct[i]);
        
        const panel = document.getElementById('resultPanel');
        const title = document.getElementById('resultTitle');
        const msg = document.getElementById('resultMessage');

        if (isCorrect) {
            score++;
            title.textContent = "Ajoyib! 🎉";
            msg.textContent = "Gap to'g'ri yig'ildi.";
        } else {
            title.textContent = "Xato 💡";
            msg.textContent = "To'g'ri javob: " + correct.join(' ');
        }
        panel.classList.add('active');
    };

    document.getElementById('continueBtn').onclick = () => {
        document.getElementById('resultPanel').classList.remove('active');
        if (currentIdx < sentences.length - 1) {
            currentIdx++;
            initLevel();
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('final-screen').style.display = 'flex';
            document.getElementById('finalScore').textContent = `Siz ${sentences.length} tadan ${score} ta to'g'ri topdingiz.`;
        }
    };

    initLevel();
</script>
</body>
</html>
