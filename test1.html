<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sentence Builder | English Uzbek</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --accent-color: #6366f1;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Progress Bar */
        .progress-container {
            padding: 10px 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .progress-bar {
            flex: 1;
            height: 12px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Header Area */
        .question-header {
            margin-bottom: 25px;
        }
        .uzbek-card {
            background: var(--surface-color);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            position: relative;
        }
        .uzbek-card::after {
            content: "O'zbekcha";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--accent-color);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        /* Builder Zone */
        .builder-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sentence-display {
            min-height: 120px;
            background: rgba(30, 41, 59, 0.5);
            border: 2px dashed #475569;
            border-radius: 24px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            padding: 15px;
            transition: var(--transition);
        }

        .word-chip {
            background: var(--accent-color);
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            animation: popIn 0.3s ease;
            box-shadow: 0 4px 0 #4338ca;
        }
        .word-chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #4338ca; }

        /* Word Bank */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 20px 0;
        }

        .bank-token {
            background: #334155;
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #475569;
            transition: var(--transition);
            user-select: none;
        }
        .bank-token:active { scale: 0.95; }
        .bank-token.used {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        /* Check Button */
        .check-btn {
            background: #334155;
            color: var(--text-dim);
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: not-allowed;
            transition: var(--transition);
            margin-bottom: 20px;
        }
        .check-btn.ready {
            background: var(--text-main);
            color: var(--bg-color);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        /* Bottom Result Panel */
        .result-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--surface-color);
            padding: 30px 20px 40px;
            border-top: 4px solid var(--success-color);
            transform: translateY(100%);
            transition: var(--transition);
            z-index: 100;
            border-radius: 30px 30px 0 0;
        }
        .result-panel.active { transform: translateY(0); }
        .result-panel.error { border-top-color: var(--error-color); }

        .result-content h2 { font-size: 24px; margin-bottom: 10px; }
        .result-content p { color: var(--text-dim); margin-bottom: 20px; }

        .next-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--success-color);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .error .next-btn { background: var(--error-color); }

        /* Final Screen */
        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 30px;
        }
        .trophy { font-size: 80px; color: #fbbf24; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="quiz-screen" class="app-container">
    <div class="progress-container">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <span id="levelText" style="font-weight: bold; color: var(--accent-color)">1/6</span>
    </div>

    <div class="question-header">
        <div class="uzbek-card" id="uzbekPrompt">Yuklanmoqda...</div>
    </div>

    <div class="builder-section">
        <div class="sentence-display" id="buildingZone"></div>
        <div class="word-bank" id="wordBank"></div>
    </div>

    <button class="check-btn" id="checkBtn" disabled>TEKSHIRISH</button>

    <div class="result-panel" id="resultPanel">
        <div class="result-content">
            <h2 id="resTitle">Barakalla!</h2>
            <p id="resMsg"></p>
            <button class="next-btn" id="nextBtn">DAVOM ETISH</button>
        </div>
    </div>
</div>

<div id="final-screen" class="app-container">
    <i class="fas fa-crown trophy"></i>
    <h1>Mashg'ulot tugadi!</h1>
    <div style="font-size: 1.2rem; color: var(--text-dim)">
        To'g'ri javoblar: <span id="finalScore" style="color: var(--success-color); font-weight: bold">0</span>
    </div>
    <button class="next-btn" style="background: var(--accent-color)" onclick="location.reload()">QAYTADAN BOSHLASH</button>
</div>

<script>
    const data = [
        { uz: "Mening ismim Aziz.", en: ["My", "name", "is", "Aziz."] },
        { uz: "Ular maktabga borishadi.", en: ["They", "go", "to", "school."] },
        { uz: "Men olma yeyman.", en: ["I", "eat", "an", "apple."] },
        { uz: "Sizning uyingiz katta.", en: ["Your", "house", "is", "big."] },
        { uz: "Bugun havo issiq.", en: ["Today", "the", "weather", "is", "hot."] },
        { uz: "Biz yangi mashina oldik.", en: ["We", "bought", "a", "new", "car."] }
    ];

    let current = 0;
    let score = 0;
    let selectedWords = [];
    let bankWords = [];

    const buildingZone = document.getElementById('buildingZone');
    const wordBank = document.getElementById('wordBank');
    const checkBtn = document.getElementById('checkBtn');
    const resultPanel = document.getElementById('resultPanel');

    function initLevel() {
        selectedWords = [];
        const correct = data[current].en;
        bankWords = [...correct].sort(() => Math.random() - 0.5);
        
        document.getElementById('uzbekPrompt').innerText = data[current].uz;
        document.getElementById('levelText').innerText = `${current + 1}/${data.length}`;
        document.getElementById('progressFill').style.width = `${((current) / data.length) * 100}%`;
        
        render();
    }

    function render() {
        buildingZone.innerHTML = '';
        selectedWords.forEach((word, idx) => {
            const div = document.createElement('div');
            div.className = 'word-chip';
            div.innerText = word;
            div.onclick = () => removeWord(idx);
            buildingZone.appendChild(div);
        });

        wordBank.innerHTML = '';
        bankWords.forEach((word, idx) => {
            const div = document.createElement('div');
            div.className = 'bank-token';
            if (selectedWords.includes(word) && isDuplicate(word, idx)) {
                div.classList.add('used');
            }
            div.innerText = word;
            div.onclick = () => addWord(word, idx);
            wordBank.appendChild(div);
        });

        const isReady = selectedWords.length === data[current].en.length;
        checkBtn.disabled = !isReady;
        checkBtn.classList.toggle('ready', isReady);
    }

    // Bir xil so'zlar bo'lsa (masalan "the", "the") indeks bo'yicha tekshirish
    let usedIndices = [];

    function addWord(word, index) {
        selectedWords.push(word);
        usedIndices.push(index);
        render();
    }

    function removeWord(index) {
        selectedWords.splice(index, 1);
        usedIndices.splice(index, 1);
        render();
    }

    function isDuplicate(word, bankIdx) {
        return usedIndices.includes(bankIdx);
    }

    checkBtn.onclick = () => {
        const isCorrect = JSON.stringify(selectedWords) === JSON.stringify(data[current].en);
        const resTitle = document.getElementById('resTitle');
        const resMsg = document.getElementById('resMsg');
        
        if (isCorrect) {
            score++;
            resTitle.innerText = "Ajoyib! 🎉";
            resTitle.style.color = "var(--success-color)";
            resMsg.innerText = "Gapni to'g'ri tuzdingiz.";
            resultPanel.classList.remove('error');
        } else {
            resTitle.innerText = "Xato 📚";
            resTitle.style.color = "var(--error-color)";
            resMsg.innerText = `To'g'ri javob: ${data[current].en.join(' ')}`;
            resultPanel.classList.add('error');
        }
        
        resultPanel.classList.add('active');
    };

    document.getElementById('nextBtn').onclick = () => {
        resultPanel.classList.remove('active');
        if (current < data.length - 1) {
            current++;
            initLevel();
        } else {
            showFinal();
        }
    };

    function showFinal() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('final-screen').style.display = 'flex';
        document.getElementById('finalScore').innerText = `${score} / ${data.length}`;
        document.getElementById('progressFill').style.width = `100%`;
    }

    initLevel();
</script>
</body>
</html>
