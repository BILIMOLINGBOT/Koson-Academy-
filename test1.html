<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ispancha | O'zbekcha Flashcards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .flashcard-app {
            max-width: 400px;
            width: 100%;
            height: 700px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Progress bar */
        .progress-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
        }

        .progress-bar-bg {
            flex: 1;
            height: 8px;
            background: #2a2a2a;
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: white;
            border-radius: 100px;
            transition: width 0.3s ease;
        }

        .coin-counter {
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .coin-counter i {
            color: #fbbf24;
        }

        /* Card stack */
        .cards-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: center;
        }

        .card {
            background: #1a1a1a;
            border: 2px solid #2a2a2a;
            border-radius: 40px;
            padding: 28px 24px;
            transition: transform 0.2s;
        }

        .language-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .flag {
            width: 36px;
            height: 24px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .pos-badge {
            background: #2a2a2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #a0a0a0;
        }

        .word-block {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .word-main {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.2;
        }

        .audio-btn {
            background: none;
            border: none;
            color: #3b82f6;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .audio-btn:active {
            transform: scale(0.9);
        }

        .translation-card .word-main {
            color: white;
            font-size: 40px;
        }

        /* Next button */
        .next-btn {
            width: 100%;
            background: white;
            border: none;
            border-radius: 40px;
            padding: 22px;
            color: black;
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .next-btn:active {
            transform: scale(0.97);
            background: #f0f0f0;
        }

        .next-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Final screen */
        .final-screen {
            max-width: 400px;
            width: 100%;
            height: 700px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0;
        }

        .trophy-container {
            text-align: center;
            margin-top: 60px;
        }

        .trophy-icon {
            font-size: 120px;
            color: white;
            margin-bottom: 24px;
            filter: drop-shadow(0 10px 20px rgba(255,255,255,0.1));
        }

        .final-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        .stats-card {
            background: #000;
            border: 3px solid white;
            border-radius: 40px;
            padding: 24px;
            width: 100%;
            text-align: center;
            margin-bottom: 40px;
        }

        .stats-label {
            background: white;
            color: black;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            margin-top: -42px;
            margin-bottom: 16px;
        }

        .coin-display {
            font-size: 48px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .coin-display i {
            color: #fbbf24;
            font-size: 48px;
        }

        .restart-btn {
            width: 100%;
            background: white;
            border: none;
            border-radius: 40px;
            padding: 22px;
            font-weight: 800;
            font-size: 20px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Asosiy flashcards ekrani -->
    <div id="mainApp" class="flashcard-app">
        <!-- Progress header -->
        <div class="progress-header">
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
            </div>
            <div class="coin-counter">
                <i class="fas fa-coins"></i>
                <span id="coinDisplay">0</span>
            </div>
        </div>

        <!-- Cards stack -->
        <div class="cards-container">
            <!-- Ispancha card -->
            <div class="card">
                <div class="language-header">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Flag_of_Spain.svg" class="flag" alt="Spain">
                    <span class="pos-badge" id="posTag">PRONOMBRE</span>
                </div>
                <div class="word-block">
                    <span class="word-main" id="spanishWord">Yo</span>
                    <button class="audio-btn" id="playAudioBtn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>

            <!-- O'zbekcha card -->
            <div class="card translation-card">
                <div class="language-header">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag" alt="Uzbekistan">
                </div>
                <span class="word-main" id="uzbekWord">Men</span>
            </div>
        </div>

        <!-- Next button -->
        <button class="next-btn" id="nextButton">
            Keyingi <i class="fas fa-arrow-right"></i>
        </button>
    </div>

    <!-- Yakuniy ekran -->
    <div id="finalScreen" class="final-screen">
        <div class="trophy-container">
            <i class="fas fa-trophy trophy-icon"></i>
            <h1 class="final-title">Mashg'ulot<br>yakunlandi</h1>
        </div>
        
        <div class="stats-card">
            <div class="stats-label">TANGA</div>
            <div class="coin-display">
                <i class="fas fa-coins"></i>
                <span id="finalCoins">0</span>
            </div>
        </div>

        <button class="restart-btn" onclick="location.reload()">
            Qaytadan boshlash
        </button>
    </div>

    <script>
        // SIZNING SO'ZLARINGIZ (ingliz va o'zbek asosida)
        const vocabulary = [
            // Olmoshlar va "bo'lmoq"
            { pos: "OLMOSH", esp: "Yo", uzb: "Men" },
            { pos: "OLMOSH", esp: "Tú", uzb: "Sen" },
            { pos: "FE'L", esp: "ser", uzb: "bo'lmoq" },
            { pos: "FE'L", esp: "estar", uzb: "bo'lmoq (holat)" },
            
            // Asosiy fe'llar
            { pos: "FE'L", esp: "llamarse", uzb: "atalmoq" },
            { pos: "FE'L", esp: "vivir", uzb: "yashamoq" },
            { pos: "FE'L", esp: "tener", uzb: "ega bo'lmoq" },
            
            // Otlar va predloglar
            { pos: "OT", esp: "nombre", uzb: "ism" },
            { pos: "PREDLOG", esp: "de", uzb: "dan, ning" },
            { pos: "PREDLOG", esp: "en", uzb: "da, ichida" },
            { pos: "ARTIKL", esp: "un/una", uzb: "bir" },
            { pos: "OT", esp: "estudiante", uzb: "talaba" },
            { pos: "OT", esp: "familia", uzb: "oila" },
            
            // Qo'shimchalar
            { pos: "OLMOSH", esp: "mi", uzb: "mening" },
            { pos: "FE'L", esp: "beber", uzb: "ichmoq" },
            { pos: "FE'L", esp: "comer", uzb: "yemoq" },
            { pos: "OT", esp: "agua", uzb: "suv" },
            { pos: "OT", esp: "país", uzb: "mamlakat" },
            { pos: "OT", esp: "nombre", uzb: "ism" } // takrorlash uchun
        ];

        // App state
        let currentIndex = 0;
        let coins = 0;
        
        // DOM elements
        const mainApp = document.getElementById('mainApp');
        const finalScreen = document.getElementById('finalScreen');
        const posTag = document.getElementById('posTag');
        const spanishWord = document.getElementById('spanishWord');
        const uzbekWord = document.getElementById('uzbekWord');
        const progressFill = document.getElementById('progressFill');
        const coinDisplay = document.getElementById('coinDisplay');
        const finalCoins = document.getElementById('finalCoins');
        const nextBtn = document.getElementById('nextButton');
        const audioBtn = document.getElementById('playAudioBtn');

        // Yangilash funksiyasi
        function updateCard() {
            const item = vocabulary[currentIndex];
            posTag.textContent = item.pos;
            spanishWord.textContent = item.esp;
            uzbekWord.textContent = item.uzb;
            
            // Progress barni yangilash
            const progress = ((currentIndex) / vocabulary.length) * 100;
            progressFill.style.width = progress + '%';
        }

        // Keyingi so'z
        function goToNext() {
            // Tanga qo'shish
            coins += 1;
            coinDisplay.textContent = coins;

            if (currentIndex < vocabulary.length - 1) {
                currentIndex++;
                updateCard();
            } else {
                // Yakuniy ekranga o'tish
                mainApp.classList.add('hidden');
                finalScreen.style.display = 'flex';
                finalCoins.textContent = coins;
            }
        }

        // Audio (ispancha talaffuz)
        function playSpanishAudio() {
            const text = spanishWord.textContent;
            if (text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 0.9;
                window.speechSynthesis.cancel(); // oldingisini to'xtatish
                window.speechSynthesis.speak(utterance);
            }
        }

        // Event listeners
        nextBtn.addEventListener('click', goToNext);
        audioBtn.addEventListener('click', playSpanishAudio);

        // Progressni boshlang'ich holatga keltirish
        updateCard();
        coinDisplay.textContent = coins;
        
        // Mobil sensorlar uchun (double tap zoom oldini olish)
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });

        // Klaviatura (ishlab chiqishda yordam)
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !mainApp.classList.contains('hidden')) {
                e.preventDefault();
                goToNext();
            } else if (e.code === 'KeyA' && !mainApp.classList.contains('hidden')) {
                e.preventDefault();
                playSpanishAudio();
            }
        });

        // Final ekran yashirin bo'lishi kerak
        finalScreen.style.display = 'none';
    </script>
</body>
</html>
