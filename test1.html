<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Inglizcha Gap Quramiz · Interaktiv</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .phone-frame {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 20px 16px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255, 255, 255, 0.05) inset;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: 780px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px 20px;
            color: white;
        }

        .time-badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .coin-display {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            padding: 8px 16px;
            border-radius: 40px;
            color: #0f172a;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.3);
        }

        /* Header */
        .level-progress {
            text-align: center;
            margin: 10px 0 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            border-radius: 20px;
            width: 16%;
            transition: width 0.3s ease;
        }

        .level-text {
            color: #94a3b8;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Uzbek sentence card */
        .uzbek-card {
            background: linear-gradient(135deg, rgba(129, 140, 248, 0.15), rgba(192, 132, 252, 0.15));
            border-radius: 32px;
            padding: 28px 20px;
            margin: 8px 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .uzbek-label {
            color: #818cf8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .uzbek-sentence {
            font-size: 28px;
            font-weight: 700;
            color: white;
            line-height: 1.3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Building area */
        .construction-zone {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 20px 16px;
            min-height: 120px;
            border: 2px dashed rgba(129, 140, 248, 0.5);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 20px;
            transition: all 0.3s ease;
        }

        .word-chip {
            background: linear-gradient(145deg, #2d3a5e, #1e2a44);
            padding: 14px 22px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 0 #0f172a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .word-chip:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0f172a;
        }

        .word-chip i {
            font-size: 16px;
            color: #f87171;
            opacity: 0.8;
        }

        /* Word bank */
        .word-bank {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 24px 16px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex: 1;
        }

        .bank-token {
            background: linear-gradient(145deg, #334155, #1e293b);
            padding: 16px 24px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 6px 0 #0f172a;
            cursor: pointer;
            transition: all 0.1s ease;
            flex: 0 1 auto;
            min-width: 80px;
            text-align: center;
        }

        .bank-token:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f172a;
        }

        .bank-token.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(1);
            transform: scale(0.9);
        }

        /* Check button */
        .check-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #475569, #334155);
            color: #94a3b8;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: not-allowed;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .check-btn.active {
            background: linear-gradient(135deg, #818cf8, #c084fc);
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px rgba(129, 140, 248, 0.5);
            border: none;
        }

        .check-btn.active:active {
            transform: scale(0.98);
        }

        /* Result panel */
        .result-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 32px 24px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
            z-index: 100;
            color: #0f172a;
        }

        .result-modal.active {
            transform: translateY(0);
        }

        .result-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }

        .result-icon.error {
            background: #f87171;
        }

        .continue-btn {
            width: 100%;
            background: #0f172a;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s ease;
        }

        .continue-btn:active {
            transform: scale(0.97);
        }

        /* Final screen */
        .final-screen {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .trophy-ring {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.3);
        }

        .trophy-ring i {
            font-size: 60px;
            color: #0f172a;
        }

        .stats-grid {
            display: flex;
            gap: 20px;
            margin: 40px 0;
            width: 100%;
        }

        .stat-item {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin: 10px 0 5px;
        }

        .restart-btn {
            background: white;
            color: #0f172a;
            border: none;
            padding: 18px 40px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .restart-btn:active {
            transform: scale(0.97);
        }

        /* Hide/show screens */
        #quizScreen {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Dynamic Island -->
        <div class="dynamic-island">
            <span class="time-badge">
                <i class="far fa-clock" style="margin-right: 6px;"></i> 14:30
            </span>
            <span class="coin-display" id="coinCounter">
                <i class="fas fa-coins"></i> 0
            </span>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen">
            <div class="level-progress">
                <div class="level-text" id="levelDisplay">1 / 6 · So'z yig'ish</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 16%"></div>
                </div>
            </div>

            <!-- Uzbek sentence -->
            <div class="uzbek-card">
                <div class="uzbek-label">
                    <i class="fas fa-language"></i> O'zbekcha
                </div>
                <div class="uzbek-sentence" id="uzbekSentence">...</div>
            </div>

            <!-- Building area -->
            <div class="construction-zone" id="buildingZone"></div>

            <!-- Word bank -->
            <div class="word-bank" id="wordBank"></div>

            <!-- Check button -->
            <button class="check-btn" id="checkBtn" disabled>
                <i class="fas fa-check-circle"></i> Javobni tekshirish
            </button>
        </div>

        <!-- Result Modal -->
        <div class="result-modal" id="resultModal">
            <div class="result-icon" id="resultIcon">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="font-size: 28px; margin-bottom: 8px;" id="resultTitle">Ajoyib!</h2>
            <p style="color: #475569; font-size: 18px; margin-bottom: 20px;" id="resultMessage">Gap to'g'ri tuzildi</p>
            <div style="background: #f1f5f9; padding: 16px; border-radius: 20px; margin: 10px 0;">
                <span style="color: #0f172a; font-weight: 600;" id="resultDetail"></span>
            </div>
            <button class="continue-btn" id="continueBtn">Davom etish</button>
        </div>

        <!-- Final Screen -->
        <div class="final-screen" id="finalScreen">
            <div class="trophy-ring">
                <i class="fas fa-trophy"></i>
            </div>
            <h1 style="font-size: 32px; margin-bottom: 8px;">Tabriklaymiz!</h1>
            <p style="color: #94a3b8; margin-bottom: 20px;">Mashg'ulot yakunlandi</p>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fas fa-bullseye" style="color: #818cf8; font-size: 24px;"></i>
                    <div class="stat-value" id="finalAccuracy">0%</div>
                    <div style="color: #94a3b8;">Aniqlik</div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-coins" style="color: #fbbf24; font-size: 24px;"></i>
                    <div class="stat-value" id="finalCoins">0</div>
                    <div style="color: #94a3b8;">Tangalar</div>
                </div>
            </div>

            <button class="restart-btn" onclick="location.reload()">
                <i class="fas fa-redo-alt" style="margin-right: 8px;"></i> Qaytadan boshlash
            </button>
        </div>
    </div>

    <script>
        (function() {
            // Data
            const sentences = [
                { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
                { uz: "Ular maktabga borishadi.", correct: ["They", "go", "to", "school."] },
                { uz: "Men olma yeyman.", correct: ["I", "eat", "an", "apple."] },
                { uz: "Sizning uyingiz katta.", correct: ["Your", "house", "is", "big."] },
                { uz: "Bugun havo issiq.", correct: ["Today", "the", "weather", "is", "hot."] },
                { uz: "Biz yangi mashina sotib oldik.", correct: ["We", "bought", "a", "new", "car."] }
            ];

            let currentIndex = 0;
            let coins = 0;
            let builtWords = [];
            let bankWords = [];
            let usedFlags = [];

            
            // Helper functions
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function initRound() {
                const correct = sentences[currentIndex].correct;
                bankWords = shuffleArray([...correct]);
                usedFlags = new Array(bankWords.length).fill(false);
                builtWords = [];
            }

            function updateUI() {
                // Update building zone
                const buildingZone = document.getElementById('buildingZone');
                buildingZone.innerHTML = '';
                
                builtWords.forEach((item, idx) => {
                    const chip = document.createElement('div');
                    chip.className = 'word-chip';
                    chip.innerHTML = `${item.word} <i class="fas fa-times-circle" style="pointer-events: none;"></i>`;
                    chip.onclick = () => {
                        usedFlags[item.bankIndex] = false;
                        builtWords = builtWords.filter((_, i) => i !== idx);
                        updateUI();
                    };
                    buildingZone.appendChild(chip);
                });

                // Update word bank
                const wordBank = document.getElementById('wordBank');
                wordBank.innerHTML = '';
                
                bankWords.forEach((word, idx) => {
                    if (usedFlags[idx]) return;
                    
                    const token = document.createElement('div');
                    token.className = 'bank-token';
                    token.textContent = word;
                    token.onclick = () => {
                        builtWords.push({ word, bankIndex: idx });
                        usedFlags[idx] = true;
                        updateUI();
                    };
                    wordBank.appendChild(token);
                });

                // Update check button
                const checkBtn = document.getElementById('checkBtn');
                const isComplete = builtWords.length === sentences[currentIndex].correct.length;
                checkBtn.disabled = !isComplete;
                checkBtn.classList.toggle('active', isComplete);
            }

            function loadQuestion() {
                document.getElementById('uzbekSentence').textContent = sentences[currentIndex].uz;
                document.getElementById('levelDisplay').textContent = `${currentIndex + 1} / 6 · So'z yig'ish`;
                document.getElementById('progressFill').style.width = `${((currentIndex + 1) / 6) * 100}%`;
                
                initRound();
                updateUI();
                document.getElementById('resultModal').classList.remove('active');
            }

            // Event listeners
            document.getElementById('checkBtn').onclick = () => {
                const userWords = builtWords.map(item => item.word);
                const correctWords = sentences[currentIndex].correct;
                
                const isCorrect = userWords.join(' ') === correctWords.join(' ');
                
                if (isCorrect) {
                    coins++;
                    document.getElementById('coinCounter').innerHTML = `<i class="fas fa-coins"></i> ${coins}`;
                    
                    document.getElementById('resultIcon').className = 'result-icon';
                    document.getElementById('resultIcon').innerHTML = '<i class="fas fa-check"></i>';
                    document.getElementById('resultTitle').textContent = 'Ajoyib! 🎉';
                    document.getElementById('resultMessage').textContent = 'Gap to\'g\'ri tuzildi';
                    document.getElementById('resultDetail').innerHTML = `<i class="fas fa-check-circle" style="color: #10b981;"></i> +1 tanga`;
                } else {
                    document.getElementById('resultIcon').className = 'result-icon error';
                    document.getElementById('resultIcon').innerHTML = '<i class="fas fa-times"></i>';
                    document.getElementById('resultTitle').textContent = 'Qayta urinib ko\'ring 📚';
                    document.getElementById('resultMessage').textContent = 'Tartib noto\'g\'ri';
                    document.getElementById('resultDetail').innerHTML = `<strong>To'g'ri:</strong> ${correctWords.join(' ')}`;
                }
                
                document.getElementById('continueBtn').textContent = 
                    currentIndex === 5 ? 'Yakunlash' : 'Keyingi savol';
                document.getElementById('resultModal').classList.add('active');
            };

            document.getElementById('continueBtn').onclick = () => {
                document.getElementById('resultModal').classList.remove('active');
                
                if (currentIndex < 5) {
                    currentIndex++;
                    loadQuestion();
                } else {
                    // Show final screen
                    document.getElementById('quizScreen').style.display = 'none';
                    document.getElementById('finalScreen').style.display = 'flex';
                    
                    const accuracy = Math.round((coins / 6) * 100);
                    document.getElementById('finalAccuracy').textContent = accuracy + '%';
                    document.getElementById('finalCoins').textContent = coins;
                }
            };

            // Initialize
            loadQuestion();
        })();
    </script>
</body>
</html>
