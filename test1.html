<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tili Flashcards + Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border-color: #333333;
            --success-color: #4caf50;
            --error-color: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .card-stack {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
        }

        .flashcard {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 32px;
            padding: 25px;
            width: 100%;
        }

        .flag-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .flag-img {
            width: 45px;
            height: 30px;
            border-radius: 4px;
            object-fit: cover;
        }

        .part-of-speech {
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 18px;
            text-transform: uppercase;
        }

        .word-main {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .audio-icon {
            color: #3b82f6;
            font-size: 24px;
            cursor: pointer;
        }

        .translation-word {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
        }

        .footer-area {
            padding-bottom: 20px;
        }

        .next-btn {
            width: 100%;
            height: 65px;
            background: white;
            color: black;
            border: none;
            border-radius: 24px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .next-btn:active {
            transform: scale(0.96);
        }

        .next-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            text-align: center;
        }

        .trophy-icon { font-size: 100px; color: white; margin-bottom: 20px; }
        
        /* Test uchun stillar */
        .test-container {
            margin-top: 20px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 32px;
            border: 2px solid var(--border-color);
        }
        
        .test-question {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .test-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .test-option {
            padding: 16px 20px;
            background: #2a2a2a;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }
        
        .test-option:hover {
            background: #333333;
        }
        
        .test-option.selected {
            border-color: #3b82f6;
            background: #2a3a4a;
        }
        
        .test-option.correct {
            border-color: var(--success-color);
            background: #1e3a2a;
        }
        
        .test-option.wrong {
            border-color: var(--error-color);
            background: #3a1e1e;
        }
        
        .test-feedback {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            min-height: 30px;
        }
        
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        .test-score {
            background: #2a2a2a;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        
        .test-summary {
            margin: 20px 0;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 24px;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 18px;
        }
        
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }
        
        .tab-btn.active {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

<div id="main-app" class="app-container">
    <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('flashcards')">📚 Flashcards</button>
        <button class="tab-btn" onclick="switchTab('test')">✍️ Test</button>
    </div>
    
    <!-- Flashcards bo'limi -->
    <div id="flashcards-section">
        <div class="card-stack">
            <div class="flashcard">
                <div class="flag-row">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                    <span class="part-of-speech" id="posText">PRONOUN</span>
                </div>
                <div class="word-main">
                    <span id="engWord">My</span>
                    <i class="fas fa-volume-up audio-icon" onclick="speakWord()"></i>
                </div>
            </div>

            <div class="flashcard">
                <div class="flag-row">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
                </div>
                <div class="translation-word" id="uzbWord">mening</div>
            </div>
        </div>

        <div class="footer-area">
            <button class="next-btn" id="nextBtn">
                Keyingi <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>
    
    <!-- Test bo'limi -->
    <div id="test-section" style="display: none;">
        <div class="test-container">
            <div class="test-header">
                <span class="test-score" id="testProgress">Savol: 0/0</span>
                <span class="test-score"><i class="fas fa-coins"></i> <span id="testCoins">0</span></span>
            </div>
            
            <div id="testArea">
                <div class="test-question" id="questionText">Savol yuklanmoqda...</div>
                <div class="test-options" id="optionsContainer"></div>
                <div class="test-feedback" id="feedbackMessage"></div>
                <button class="next-btn" id="nextTestBtn" onclick="nextTestQuestion()" disabled>Keyingi savol</button>
            </div>
            
            <div id="testSummary" style="display: none;">
                <div class="test-summary">
                    <h2 style="margin-bottom: 20px;">Test natijalari</h2>
                    <div class="summary-item">
                        <span>Jami savollar:</span>
                        <span id="totalQuestions">0</span>
                    </div>
                    <div class="summary-item">
                        <span>To'g'ri javoblar:</span>
                        <span id="correctAnswers">0</span>
                    </div>
                    <div class="summary-item">
                        <span>Noto'g'ri javoblar:</span>
                        <span id="wrongAnswers">0</span>
                    </div>
                    <div class="summary-item">
                        <span>Foiz:</span>
                        <span id="scorePercentage">0%</span>
                    </div>
                </div>
                <button class="next-btn" onclick="restartTest()">Qaytadan test</button>
            </div>
        </div>
    </div>
</div>

<div id="final-screen" class="app-container">
    <div style="margin-top: 50px;">
        <i class="fas fa-trophy trophy-icon"></i>
        <h1 style="font-size: 28px;">Mashg'ulot yakunlandi</h1>
    </div>
    
    <div style="display: flex; gap: 15px; width: 100%; margin-top: -50px;">
        <div style="flex: 1; border: 3px solid white; border-radius: 20px; padding: 20px; background: black;">
            <div style="background: white; color: black; padding: 4px 10px; border-radius: 10px; font-weight: 800; font-size: 12px; margin-top: -35px; margin-bottom: 10px;">TANGA</div>
            <div style="font-size: 24px; font-weight: bold;"><i class="fas fa-coins"></i> <span id="coinCount">0</span></div>
        </div>
    </div>

    <button class="next-btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<script>
    const vocabulary = [
        { pos: "DETERMINER", eng: "My", uzb: "mening" },
        { pos: "NOUN", eng: "name", uzb: "ism" },
        { pos: "VERB", eng: "is", uzb: "“bo‘lmoq” fe’li (to be)" },
        { pos: "PRONOUN", eng: "I", uzb: "men" },
        { pos: "VERB", eng: "am", uzb: "“bo‘lmoq” fe’li (to be)" },
        { pos: "PREPOSITION", eng: "from", uzb: "dan" },
        { pos: "VERB", eng: "live", uzb: "yashaymoq" },
        { pos: "PREPOSITION", eng: "in", uzb: "da" },
        { pos: "ARTICLE", eng: "a", uzb: "artikl (bir)" },
        { pos: "NOUN", eng: "student", uzb: "talaba" },
        { pos: "VERB", eng: "have", uzb: "ega bo‘lmoq / bor" },
        { pos: "NOUN", eng: "family", uzb: "oila" }
    ];

    let currentIdx = 0;
    let coins = 0;
    let learnedWords = []; // O'rgangan so'zlar
    let testQuestions = [];
    let currentQuestion = 0;
    let score = 0;
    let selectedOption = null;
    let answerLocked = false;

    const mainApp = document.getElementById('main-app');
    const finalScreen = document.getElementById('final-screen');
    const flashcardsSection = document.getElementById('flashcards-section');
    const testSection = document.getElementById('test-section');
    
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        if (tab === 'flashcards') {
            flashcardsSection.style.display = 'block';
            testSection.style.display = 'none';
        } else {
            flashcardsSection.style.display = 'none';
            testSection.style.display = 'block';
            if (learnedWords.length > 0) {
                generateTest();
            } else {
                document.getElementById('testArea').innerHTML = '<div style="text-align: center; padding: 40px;">Avval flashcards orqali so\'zlarni o\'rganing!</div>';
            }
        }
    }
    
    function updateCard() {
        const item = vocabulary[currentIdx];
        document.getElementById('posText').textContent = item.pos;
        document.getElementById('engWord').textContent = item.eng;
        document.getElementById('uzbWord').textContent = item.uzb;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        // So'zni o'rganganlar ro'yxatiga qo'shish
        if (!learnedWords.includes(vocabulary[currentIdx].eng)) {
            learnedWords.push(vocabulary[currentIdx].eng);
            coins += 5; // Har bir yangi so'z uchun 5 tanga
        }
        
        if (currentIdx < vocabulary.length - 1) {
            currentIdx++;
            updateCard();
        } else {
            mainApp.style.display = 'none';
            finalScreen.style.display = 'flex';
            document.getElementById('coinCount').textContent = coins;
        }
    });

    function speakWord() {
        const text = document.getElementById('engWord').textContent;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB'; 
        window.speechSynthesis.speak(utterance);
    }

    // Test funksiyalari
    function generateTest() {
        testQuestions = [];
        learnedWords.forEach(wordEng => {
            const wordData = vocabulary.find(w => w.eng === wordEng);
            if (wordData) {
                // 4 variantli test savoli yaratish
                let options = [wordData.uzb];
                
                // 3 ta noto'g'ri variant qo'shish
                while (options.length < 4) {
                    const randomWord = vocabulary[Math.floor(Math.random() * vocabulary.length)];
                    if (!options.includes(randomWord.uzb) && randomWord.uzb !== wordData.uzb) {
                        options.push(randomWord.uzb);
                    }
                }
                
                // Variantlarni aralashtirish
                options = shuffleArray(options);
                
                testQuestions.push({
                    question: `"${wordData.eng}" so'zining ma'nosi nima?`,
                    options: options,
                    correct: wordData.uzb,
                    word: wordData.eng
                });
            }
        });
        
        if (testQuestions.length > 0) {
            currentQuestion = 0;
            score = 0;
            displayQuestion();
        }
        
        document.getElementById('testCoins').textContent = coins;
    }
    
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
    
    function displayQuestion() {
        if (currentQuestion < testQuestions.length) {
            const q = testQuestions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('testProgress').textContent = `Savol: ${currentQuestion + 1}/${testQuestions.length}`;
            
            const optionsHtml = q.options.map((opt, index) => 
                `<div class="test-option" onclick="selectOption(this, '${opt}')">${opt}</div>`
            ).join('');
            
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            document.getElementById('feedbackMessage').textContent = '';
            document.getElementById('nextTestBtn').disabled = true;
            
            selectedOption = null;
            answerLocked = false;
        } else {
            showTestSummary();
        }
    }
    
    function selectOption(element, option) {
        if (answerLocked) return;
        
        // Oldingi tanlovni olib tashlash
        document.querySelectorAll('.test-option').forEach(opt => {
            opt.classList.remove('selected');
        });
        
        element.classList.add('selected');
        selectedOption = option;
    }
    
    function nextTestQuestion() {
        if (!answerLocked && selectedOption) {
            checkAnswer();
        } else if (answerLocked) {
            // Keyingi savolga o'tish
            currentQuestion++;
            if (currentQuestion < testQuestions.length) {
                displayQuestion();
            } else {
                showTestSummary();
            }
        }
    }
    
    function checkAnswer() {
        const q = testQuestions[currentQuestion];
        const isCorrect = selectedOption === q.correct;
        
        answerLocked = true;
        
        // Variantlarni belgilash
        document.querySelectorAll('.test-option').forEach(opt => {
            opt.classList.remove('selected');
            if (opt.textContent === q.correct) {
                opt.classList.add('correct');
            } else if (opt.textContent === selectedOption && !isCorrect) {
                opt.classList.add('wrong');
            }
        });
        
        if (isCorrect) {
            score++;
            coins += 10; // To'g'ri javob uchun 10 tanga
            document.getElementById('feedbackMessage').textContent = '✅ To\'g\'ri! +10 tanga';
            document.getElementById('feedbackMessage').style.color = '#4caf50';
        } else {
            document.getElementById('feedbackMessage').textContent = `❌ Xato. To\'g\'ri javob: ${q.correct}`;
            document.getElementById('feedbackMessage').style.color = '#f44336';
        }
        
        document.getElementById('testCoins').textContent = coins;
        document.getElementById('nextTestBtn').disabled = false;
        document.getElementById('nextTestBtn').textContent = currentQuestion === testQuestions.length - 1 ? 'Yakunlash' : 'Keyingi savol';
    }
    
    function showTestSummary() {
        document.getElementById('testArea').style.display = 'none';
        document.getElementById('testSummary').style.display = 'block';
        
        document.getElementById('totalQuestions').textContent = testQuestions.length;
        document.getElementById('correctAnswers').textContent = score;
        document.getElementById('wrongAnswers').textContent = testQuestions.length - score;
        document.getElementById('scorePercentage').textContent = 
            Math.round((score / testQuestions.length) * 100) + '%';
    }
    
    function restartTest() {
        document.getElementById('testArea').style.display = 'block';
        document.getElementById('testSummary').style.display = 'none';
        generateTest();
    }

    updateCard();
</script>

</body>
</html>
