
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ispancha Flashcards – Gap tuzish</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: #0a0a0a;
            border-radius: 40px;
            padding: 24px 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* so'z kartochkalari (stack) */
        .card-stack {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .flashcard {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 32px;
            padding: 24px 20px;
        }

        .flag-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .flag-img {
            width: 42px;
            height: 28px;
            border-radius: 6px;
            object-fit: cover;
            border: 1px solid #444;
        }

        .part-of-speech {
            color: #aaa;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .word-main {
            font-size: 40px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 4px;
        }

        .audio-icon {
            color: #3b82f6;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .audio-icon:active { transform: scale(0.9); }

        .translation-word {
            font-size: 30px;
            font-weight: 700;
            line-height: 1.2;
        }

        /* qurilayotgan gap maydoni */
        .sentence-builder {
            background: #111;
            border: 2px solid #2a2a2a;
            border-radius: 40px;
            padding: 22px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sentence-label {
            color: #fbbf24;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .sentence-content {
            font-size: 28px;
            font-weight: 600;
            line-height: 1.3;
            min-height: 3.6rem;
            word-break: break-word;
            color: #fff;
        }

        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .word-chip {
            background: #2a2a2a;
            border: 1.5px solid #3d3d3d;
            border-radius: 40px;
            padding: 12px 22px;
            font-size: 20px;
            font-weight: 600;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            user-select: none;
        }
        .word-chip:active { background: #3d3d3d; transform: scale(0.96); }
        .word-chip i { color: #f97316; font-size: 16px; }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            padding: 18px 0;
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn:active { transform: scale(0.96); background: #e0e0e0; }
        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
        .btn-outline:active { background: #222; }

        .reset-small {
            background: none;
            border: none;
            color: #f87171;
            font-size: 16px;
            font-weight: 600;
            text-align: left;
            padding: 10px 4px;
            cursor: pointer;
            text-decoration: underline dotted;
        }

        #final-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 30px;
            min-height: 70vh;
        }
        .trophy-icon { font-size: 100px; color: #fbbf24; }
        .coin-box {
            background: black;
            border: 3px solid white;
            border-radius: 30px;
            padding: 20px 40px;
            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- ASOSIY EKRAN: Flashcard + gap qurish -->
<div id="main-app" class="app-container">
    <!-- Flashcard stack (Ispancha / O'zbekcha) -->
    <div class="card-stack">
        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Flag_of_Spain.svg" class="flag-img" alt="ispanya">
                <span class="part-of-speech" id="posText">PRONOMBRE</span>
            </div>
            <div class="word-main">
                <span id="spanWord">Soy</span>
                <i class="fas fa-volume-up audio-icon" id="audioSpan"></i>
            </div>
        </div>

        <div class="flashcard">
            <div class="flag-row">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img" alt="o‘zbek">
            </div>
            <div class="translation-word" id="uzbWord">Men ... (feʼl)</div>
        </div>
    </div>

    <!-- Gap qurish maydoni (sentence builder) -->
    <div class="sentence-builder">
        <div class="sentence-label"><i class="fa-regular fa-pen-to-square"></i> Hozirgi gapingiz</div>
        <div class="sentence-content" id="constructedSentence"></div>

        <!-- So‘zlar banki (bosiladigan so‘zlar) - 5 ta gap uchun kerakli fragmentlar -->
        <div class="word-bank" id="wordBank">
            <!-- dynamic chips via js -->
        </div>

        <div class="action-buttons">
            <button class="btn" id="checkSentenceBtn"><i class="fa-regular fa-circle-check"></i> Tekshir</button>
            <button class="btn btn-outline" id="clearLastBtn"><i class="fa-undo-alt"></i> Ortga</button>
        </div>
        <button class="reset-small" id="resetSentenceBtn"><i class="fa-trash-can"></i> Gapni tozalash</button>
    </div>

    <!-- Keyingi so'z (next flashcard) -->
    <button class="btn" id="nextWordBtn" style="margin-top: 8px;">
        Keyingi so‘z <i class="fas fa-arrow-right"></i>
    </button>
</div>

<!-- YAKUNIY EKRAN -->
<div id="final-screen" class="app-container">
    <i class="fas fa-trophy trophy-icon"></i>
    <h1 style="font-size: 32px;">¡Muy bien!</h1>
    <div class="coin-box">
        <i class="fa-solid fa-coins"></i> <span id="coinCount">0</span>
    </div>
    <button class="btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<script>
    (function() {
        // _________________ MA'LUMOTLAR _________________
        // 5 ta gapni tashkil etuvchi so'zlar (har bir gap uchun alohida)
        // Biz foydalanuvchi bosqichma-bosqich shu so'zlarni bosib gapni quradi.
        const targetSentences = [
            { uzbek: "Men Toshkentdanman", spanish: "Soy de Tashkent." },
            { uzbek: "Mening ismim Javlon.", spanish: "Me llamo Javlon." },
            { uzbek: "Men Toshkentda yashayman.", spanish: "Vivo en Tashkent." },
            { uzbek: "Men talabaman.", spanish: "Soy estudiante." },
            { uzbek: "Mening oilam bor.", spanish: "Tengo una familia." }
        ];

        // Kartochkalardagi so'zlar (8 ta) – 5 ta gapni hosil qilish uchun yetarli
        const vocabulary = [
            { pos: "PRONOMBRE",   span: "Soy",        uzb: "Men (feʼl) – ser/estar 1-shaxs" },
            { pos: "VERBO",       span: "soy de",     uzb: "danman (kelib chiqish)" },
            { pos: "SUSTANTIVO",  span: "Tashkent",   uzb: "Toshkent" },
            { pos: "PRONOMBRE",   span: "Me llamo",   uzb: "Mening ismim" },
            { pos: "NOMBRE",      span: "Javlon",     uzb: "Javlon" },
            { pos: "VERBO",       span: "vivo en",    uzb: "yashayman (da)" },
            { pos: "SUSTANTIVO",  span: "estudiante", uzb: "talaba" },
            { pos: "VERBO",       span: "tengo",      uzb: "menda ... bor (ega boʻlmoq)" },
            { pos: "ARTÍCULO",    span: "una",        uzb: "bir (aynan)" },
            { pos: "SUSTANTIVO",  span: "familia",    uzb: "oila" }
        ];

        // Indekslar
        let currentVocabIndex = 0;      // ko'rsatilayotgan flashcard
        let coins = 0;
        // Joriy tuzilayotgan gap (so‘zlar massivi)
        let currentBuiltWords = [];

        // DOM
        const mainApp = document.getElementById('main-app');
        const finalScreen = document.getElementById('final-screen');
        const posSpan = document.getElementById('posText');
        const spanWordEl = document.getElementById('spanWord');
        const uzbWordEl = document.getElementById('uzbWord');
        const audioIcon = document.getElementById('audioSpan');
        const constructedSpan = document.getElementById('constructedSentence');
        const wordBankDiv = document.getElementById('wordBank');
        const nextWordBtn = document.getElementById('nextWordBtn');
        const checkBtn = document.getElementById('checkSentenceBtn');
        const clearLastBtn = document.getElementById('clearLastBtn');
        const resetSentenceBtn = document.getElementById('resetSentenceBtn');
        const coinSpan = document.getElementById('coinCount');

        // Bosiladigan so‘zlar banki (har doim bir xil 10 ta chip, lekin ba’zilarini taklif qilamiz)
        function renderWordBank() {
            // 10 ta so'zni chip sifatida ko'rsat (iboralar)
            const allChips = [
                "Soy", "soy de", "Tashkent", "Me llamo", "Javlon", 
                "vivo en", "estudiante", "tengo", "una", "familia"
            ];
            wordBankDiv.innerHTML = '';
            allChips.forEach(word => {
                const chip = document.createElement('span');
                chip.className = 'word-chip';
                chip.innerHTML = `${word} <i class="fa-regular fa-hand-pointer"></i>`;
                chip.addEventListener('click', () => {
                    // gap quruvchiga qo'shish
                    addWordToSentence(word);
                });
                wordBankDiv.appendChild(chip);
            });
        }

        // So‘zni joriy gapga qo‘shish (agar mantiqan kerak bo‘lsa, hohlagancha qo‘shish mumkin)
        function addWordToSentence(word) {
            currentBuiltWords.push(word);
            updateSentenceDisplay();
        }

        // Gapni ko‘rsat
        function updateSentenceDisplay() {
            if (currentBuiltWords.length === 0) {
                constructedSpan.innerText = '⠀'; // bo'sh joy (invisible char)
            } else {
                constructedSpan.innerText = currentBuiltWords.join(' ');
            }
        }

        // Oxirgi so‘zni o‘chir
        function undoLastWord() {
            currentBuiltWords.pop();
            updateSentenceDisplay();
        }

        // Butun gapni tozalash
        function resetSentence() {
            currentBuiltWords = [];
            updateSentenceDisplay();
        }

        // Flashcard yangilash (joriy vocabIndex bo‘yicha)
        function updateFlashcard() {
            const item = vocabulary[currentVocabIndex];
            posSpan.textContent = item.pos;
            spanWordEl.textContent = item.span;
            uzbWordEl.textContent = item.uzb;
        }

        // Audio (ispancha talaffuz)
        audioIcon.addEventListener('click', () => {
            const text = spanWordEl.textContent;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            window.speechSynthesis.speak(utterance);
        });

        // Keyingi flashcard tugmasi
        nextWordBtn.addEventListener('click', () => {
            // har bir yangi so'z uchun 5 tanga (faqat oxirigacha yetmagan bo'lsa)
            if (currentVocabIndex < vocabulary.length - 1) {
                coins += 5;
                currentVocabIndex++;
                updateFlashcard();
            } else {
                // Agar oxirgi so'z bo'lsa, yakuniy ekranga o'tish
                coins += 5; // oxirgi so'z uchun ham tanga
                finishGame();
            }
        });

        // Tekshirish: hozirgi tuzilgan gap kerakli gaplardan biriga tengmi?
        function checkCurrentSentence() {
            const userSentence = currentBuiltWords.join(' ').trim().toLowerCase().replace(/\s+/g, ' ');
            // Ispancha to‘g‘ri variantlar (biz 5 ta gapni moslashtiramiz)
            const possibleCorrect = [
                "soy de tashkent",
                "me llamo javlon",
                "vivo en tashkent",
                "soy estudiante",
                "tengo una familia"
            ];

            // Agar foydalanuvchi to‘liq mos kelsa
            if (possibleCorrect.includes(userSentence)) {
                // qo‘shimcha 10 tanga
                coins += 10;
                alert(`✅ To‘g‘ri! +10 tanga. Jami: ${coins}`);
                // Avtomatik gapni tozalab, keyingi gapga tayyorlanamiz
                resetSentence();
                // (ixtiyoriy) Keyingi flashcardga o‘tish shart emas, lekin hohlasa o‘tishi mumkin
            } else {
                // Qaysidir gapning qismi bo‘lsa ham, noto‘liq bo‘lsa – to‘liq emas deymiz.
                // Soddaroq: agar to'liq gaplardan biri bo'lmasa, "harakat qiling"
                alert(`❌ To‘liq gap emas. Ispancha to‘g‘ri gaplardan birini yozing.`);
            }
            // tanga yangilash
        }

        // Yakuniy ekran
        function finishGame() {
            mainApp.style.display = 'none';
            finalScreen.style.display = 'flex';
            coinSpan.textContent = coins;
        }

        // Ortga (clear last)
        clearLastBtn.addEventListener('click', undoLastWord);

        // Reset sentence
        resetSentenceBtn.addEventListener('click', resetSentence);

        // Check button
        checkBtn.addEventListener('click', checkCurrentSentence);

        // initial render
        renderWordBank();
        updateFlashcard();
        updateSentenceDisplay();

        // Flashcard tugagach yakunlashni overrid qilish (currentVocabIndex oxiriga yetganda)
        // lekin biz nextWordBtn ga qo'shimcha logika qo'ydik
        // Agar oxirgi so'zdan keyin yana next bosilsa finishGame() ishlaydi

        // Qo'shimcha: tanga counter jonli bo'lmasa ham, finalda ko'rsatamiz
        // bonus: tekshirishda qo'shilgan tangalar finalda ko'rinadi.

        // Lekin finalga o‘tish faqat next tugmasida, vocab tugaganda.
        // Shuningdek, foydalanuvchi istalgan payt gap qura oladi.
    })();
</script>
</body>
</html>
