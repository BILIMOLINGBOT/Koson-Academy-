<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ingliz Tili Kursi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #3b82f6;
            --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; height: 100vh; display: none; flex-direction: column; padding: 40px 20px; }
        .active { display: flex; }

        /* Flashcard */
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 15px; justify-content: center; }
        .card { background: var(--card); border: 2px solid var(--border); border-radius: 25px; padding: 25px; position: relative; }
        .label { color: #888; font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .word-eng { font-size: 36px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .word-uzb { font-size: 24px; color: #ccc; font-weight: 500; }
        
        /* Game Area */
        .header { text-align: center; margin-bottom: 30px; }
        .progress { font-size: 14px; color: #666; margin-bottom: 5px; }
        .prompt { font-size: 26px; font-weight: 700; }
        .zone { min-height: 100px; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 20px; }
        .bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        
        /* Chips & Tokens */
        .chip { background: white; color: black; padding: 12px 20px; border-radius: 15px; font-weight: 600; cursor: pointer; animation: pop 0.2s; }
        .token { background: var(--card); border: 1px solid var(--border); padding: 12px 20px; border-radius: 15px; cursor: pointer; }
        .token.disabled { opacity: 0.2; pointer-events: none; }

        /* Buttons */
        .btn { width: 100%; height: 60px; background: white; color: black; border: none; border-radius: 20px; font-size: 18px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        .btn:disabled { background: #333; color: #666; }

        /* Result Panel */
        .result { position: fixed; bottom: 0; left: 0; right: 0; background: white; color: black; padding: 30px; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.4s; z-index: 100; }
        .result.show { transform: translateY(0); }

        @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
    </style>
</head>
<body>

<!-- 1. FLASHCARDS -->
<div id="s1" class="container active">
    <div class="header"><div class="progress">1-BOSQICH: LUG'AT</div></div>
    <div class="card-stack">
        <div class="card">
            <div class="label">Inglizcha</div>
            <div class="word-eng"><span id="eng">My</span> <i class="fas fa-volume-up" style="color:var(--accent); cursor:pointer" onclick="speak()"></i></div>
        </div>
        <div class="card">
            <div class="label">O'zbekcha</div>
            <div class="word-uzb" id="uzb">mening</div>
        </div>
    </div>
    <button class="btn" onclick="nextCard()">Keyingi <i class="fas fa-arrow-right"></i></button>
</div>

<!-- 2. WORD GAME -->
<div id="s2" class="container">
    <div class="header">
        <div class="progress" id="g1-progress">1 / 10</div>
        <div class="prompt" id="g1-prompt">...</div>
    </div>
    <div style="flex:1">
        <div class="zone" id="g1-zone"></div>
        <div class="bank" id="g1-bank"></div>
    </div>
    <button class="btn" id="g1-btn" onclick="checkG1()" disabled>Tekshirish</button>
</div>

<!-- 3. SENTENCE BUILDER -->
<div id="s3" class="container">
    <div class="header">
        <div class="progress" id="g2-progress">1 / 5</div>
        <div class="prompt" id="g2-prompt">...</div>
    </div>
    <div style="flex:1">
        <div class="zone" id="g2-zone"></div>
        <div class="bank" id="g2-bank"></div>
    </div>
    <button class="btn" id="g2-btn" onclick="checkG2()" disabled>Tekshirish</button>
</div>

<!-- FINAL -->
<div id="s-final" class="container" style="text-align:center; justify-content:center">
    <i class="fas fa-check-circle" style="font-size:80px; color:lime; margin-bottom:20px"></i>
    <h1>Mashg'ulot tugadi!</h1>
    <p style="color:#888; margin: 15px 0 30px">Siz barcha so'z va gaplarni o'rgandingiz.</p>
    <button class="btn" onclick="location.reload()">Qaytadan boshlash</button>
</div>

<!-- RESULT PANEL -->
<div class="result" id="res">
    <h2 id="res-title">...</h2>
    <p id="res-msg" style="margin: 10px 0 20px; color: #444;"></p>
    <button class="btn" style="background:black; color:white" id="res-btn">Davom etish</button>
</div>

<script>
    // 1. DATA
    const vocab = [
        {e: "My", u: "mening"}, {e: "name", u: "ism"}, {e: "is", u: "“bo‘lmoq” fe’li (to be)"},
        {e: "I", u: "men"}, {e: "am", u: "“bo‘lmoq” fe’li (to be)"}, {e: "from", u: "dan"},
        {e: "live", u: "yashaymoq"}, {e: "in", u: "da"}, {e: "a", u: "artikl (bir)"},
        {e: "student", u: "talaba"}, {e: "have", u: "ega bo‘lmoq / bor"}, {e: "family", u: "oila"}
    ];

    const sentences = [
        {u: "Men talabaman.", c: ["I", "am", "a", "student"]},
        {u: "Mening ismim...", c: ["My", "name", "is"]},
        {u: "Mening oilam bor.", c: ["I", "have", "a", "family"]},
        {u: "Men yashayman.", c: ["I", "live"]},
        {u: "Men ...danman.", c: ["I", "am", "from"]}
    ];

    const distractors = ["the", "at", "you", "go", "we"];

    // 2. STATE
    let vIdx = 0, g1Idx = 0, g2Idx = 0;
    let built = [], flags = [], currentBank = [];

    // 3. FLASHCARD LOGIC
    function nextCard() {
        if (vIdx < vocab.length - 1) {
            vIdx++;
            document.getElementById('eng').textContent = vocab[vIdx].e;
            document.getElementById('uzb').textContent = vocab[vIdx].u;
        } else {
            showScreen('s2'); initG1();
        }
    }
    function speak() {
        let u = new SpeechSynthesisUtterance(document.getElementById('eng').textContent);
        u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    // 4. WORD GAME LOGIC
    function initG1() {
        const item = vocab[g1Idx];
        document.getElementById('g1-progress').textContent = `${g1Idx + 1} / ${vocab.length}`;
        document.getElementById('g1-prompt').textContent = item.u;
        let words = [item.e, distractors[Math.floor(Math.random()*distractors.length)]];
        setupGame('g1', words.sort(() => Math.random() - 0.5));
    }

    function checkG1() {
        const correct = vocab[g1Idx].e;
        const isOk = built[0].word === correct;
        showRes(isOk, isOk ? "To'g'ri!" : "Xato", isOk ? "" : `To'g'ri javob: ${correct}`, () => {
            if (g1Idx < vocab.length - 1) { g1Idx++; initG1(); } 
            else { showScreen('s3'); initG2(); }
        });
    }

    // 5. SENTENCE LOGIC
    function initG2() {
        const item = sentences[g2Idx];
        document.getElementById('g2-progress').textContent = `${g2Idx + 1} / ${sentences.length}`;
        document.getElementById('g2-prompt').textContent = item.u;
        setupGame('g2', [...item.c].sort(() => Math.random() - 0.5));
    }

    function checkG2() {
        const correct = sentences[g2Idx].c;
        const isOk = built.length === correct.length && built.every((v,i) => v.word === correct[i]);
        showRes(isOk, isOk ? "Ajoyib!" : "Xato", isOk ? "" : `To'g'ri: ${correct.join(' ')}`, () => {
            if (g2Idx < sentences.length - 1) { g2Idx++; initG2(); } 
            else { showScreen('s-final'); }
        });
    }

    // 6. SHARED CORE
    function setupGame(prefix, words) {
        built = []; currentBank = words;
        flags = new Array(words.length).fill(false);
        render(prefix);
    }

    function render(prefix) {
        const zone = document.getElementById(`${prefix}-zone`);
        const bank = document.getElementById(`${prefix}-bank`);
        zone.innerHTML = ''; bank.innerHTML = '';

        built.forEach((item, i) => {
            let div = document.createElement('div');
            div.className = 'chip'; div.textContent = item.word;
            div.onclick = () => { flags[item.idx] = false; built.splice(i,1); render(prefix); };
            zone.appendChild(div);
        });

        currentBank.forEach((word, i) => {
            let div = document.createElement('div');
            div.className = `token ${flags[i] ? 'disabled' : ''}`;
            div.textContent = word;
            div.onclick = () => { if(!flags[i]) { flags[i]=true; built.push({word, idx:i}); render(prefix); }};
            bank.appendChild(div);
        });

        const btn = document.getElementById(`${prefix}-btn`);
        btn.disabled = built.length === 0;
    }

    function showRes(success, title, msg, cb) {
        const p = document.getElementById('res');
        document.getElementById('res-title').textContent = title;
        document.getElementById('res-title').style.color = success ? "green" : "red";
        document.getElementById('res-msg').textContent = msg;
        p.classList.add('show');
        document.getElementById('res-btn').onclick = () => { p.classList.remove('show'); cb(); };
    }

    function showScreen(id) {
        document.querySelectorAll('.container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
