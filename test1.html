<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Inglizcha so'z o'yini PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px 20px 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .question-number {
            font-size: 14px;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .uzbek-sentence {
            font-size: 32px;
            font-weight: 700;
            color: #eee;
        }
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        /* Tanlangan so'z maydoni */
        .sentence-builder {
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 50px;
        }
        .word-chip {
            background: #222;
            padding: 15px 25px;
            border-radius: 18px;
            font-size: 24px;
            font-weight: 600;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        /* Variantlar banki */
        .word-bank {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 40px;
        }
        .bank-token {
            background: #1a1a1a;
            padding: 18px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .bank-token:active {
            transform: scale(0.95);
        }
        .bank-token.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #111;
        }
        .action-btn {
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 20px;
            background: #1e1e1e;
            color: #444;
            font-size: 19px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s;
        }
        .action-btn.active {
            background: #00d4ff;
            color: #000;
            cursor: pointer;
        }
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px;
            transform: translateY(100%);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #000;
            z-index: 1000;
        }
        .result-panel.active { transform: translateY(0); }
        .footer-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="quiz-screen" class="app-container">
    <div class="header">
        <div class="question-number" id="levelCounter">1 / 5</div>
        <div class="uzbek-sentence" id="uzbekPrompt">...</div>
    </div>

    <div class="builder-area">
        <div class="sentence-builder" id="buildingZone">
            <!-- Bu yerda tanlangan so'z chiqadi -->
        </div>

        <div class="word-bank" id="wordBank">
            <!-- Bu yerda 4 ta variant chiqadi -->
        </div>
        
        <button class="action-btn" id="checkBuilderBtn" disabled>
            <i class="fas fa-paper-plane"></i> Tekshirish
        </button>
    </div>

    <div class="result-panel" id="resultPanel">
        <h2 id="resultTitle" style="font-size: 24px;">...</h2>
        <p id="resultMessage" style="margin: 15px 0 30px; font-size: 18px; color: #333;"></p>
        <button class="footer-btn" id="continueBtn">Davom etish</button>
    </div>
</div>

<script>
    const levels = [
        { uz: "Nima?", correct: "What" },
        { uz: "Vaqt", correct: "Time" },
        { uz: "Kim?", correct: "Who" },
        { uz: "Sana", correct: "Date" },
        { uz: "Yil", correct: "Year" }
    ];

    // Chalkashtiruvchi so'zlar jamlanmasi
    const distractorPool = [
        "Where", "When", "How", "Day", "Month", 
        "Week", "Hour", "Minute", "Second", "Which", 
        "Whose", "Name", "Place", "Age", "Clock"
    ];

    let currentIdx = 0;
    let selectedWord = null;
    let bankWords = [];
    let score = 0;

    function initLevel() {
        const current = levels[currentIdx];
        document.getElementById('uzbekPrompt').textContent = current.uz;
        document.getElementById('levelCounter').textContent = `${currentIdx + 1} / ${levels.length}`;
        
        // 1 ta to'g'ri + 3 ta tasodifiy noto'g'ri so'zni olish
        let choices = [current.correct];
        
        // Noto'g'ri so'zlarni tanlash (to'g'ri so'z takrorlanmasligi kerak)
        let filteredDistractors = distractorPool.filter(w => w !== current.correct);
        let shuffledDistractors = filteredDistractors.sort(() => Math.random() - 0.5);
        
        choices.push(...shuffledDistractors.slice(0, 3));
        
        // Variantlarni aralashtirish
        bankWords = choices.sort(() => Math.random() - 0.5);
        selectedWord = null;
        render();
    }

    function render() {
        const zone = document.getElementById('buildingZone');
        const bank = document.getElementById('wordBank');
        const btn = document.getElementById('checkBuilderBtn');

        // Tanlangan so'zni ko'rsatish
        zone.innerHTML = '';
        if (selectedWord) {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.textContent = selectedWord;
            chip.onclick = () => {
                selectedWord = null;
                render();
            };
            zone.appendChild(chip);
        }

        // Bankni chiqarish
        bank.innerHTML = '';
        bankWords.forEach((word) => {
            const token = document.createElement('div');
            token.className = `bank-token ${selectedWord === word ? 'disabled' : ''}`;
            token.textContent = word;
            token.onclick = () => {
                selectedWord = word;
                render();
            };
            bank.appendChild(token);
        });

        // Tugma holati
        btn.disabled = !selectedWord;
        btn.classList.toggle('active', !!selectedWord);
    }

    document.getElementById('checkBuilderBtn').onclick = () => {
        const correct = levels[currentIdx].correct;
        const isCorrect = selectedWord === correct;
        
        const panel = document.getElementById('resultPanel');
        const title = document.getElementById('resultTitle');
        const msg = document.getElementById('resultMessage');

        if (isCorrect) {
            score++;
            title.textContent = "Ajoyib! ✨";
            title.style.color = "#27ae60";
            msg.textContent = "To'ppa-to'g'ri topdingiz!";
        } else {
            title.textContent = "Xato! ❌";
            title.style.color = "#e74c3c";
            msg.textContent = `To'g'ri javob: ${correct}`;
        }
        panel.classList.add('active');
    };

    document.getElementById('continueBtn').onclick = () => {
        document.getElementById('resultPanel').classList.remove('active');
        if (currentIdx < levels.length - 1) {
            currentIdx++;
            initLevel();
        } else {
            alert(`O'yin tugadi! \nNatijangiz: ${score} / ${levels.length}`);
            currentIdx = 0; score = 0; initLevel();
        }
    };

    initLevel();
</script>
</body>
</html>
