<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Inglizcha gap quramiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body, html {
            height: 100%;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 50px 20px 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .question-number {
            font-size: 14px;
            color: #555;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .uzbek-sentence {
            font-size: 28px;
            font-weight: 700;
            color: #eee;
        }
        .builder-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Tarkibni o'rtaga yig'adi */
        }
        /* Yig'ilayotgan so'zlar joyi - Markazda va tekis */
        .sentence-builder {
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 50px;
        }
        .word-chip {
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            border: 1px solid #333;
            cursor: pointer;
            transition: transform 0.1s;
        }
        /* Pastki so'zlar banki - Markazda va tekis */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .bank-token {
            background: #111;
            padding: 14px 22px;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 500;
            color: #fff;
            border: 1px solid #222;
            cursor: pointer;
        }
        .bank-token.disabled {
            opacity: 0.1;
            pointer-events: none;
        }
        /* Tekshirish tugmasi */
        .action-btn {
            width: 100%;
            height: 65px;
            border: none;
            border-radius: 25px;
            background: #1e1e1e;
            color: #444;
            font-size: 19px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.2s;
        }
        .action-btn.active {
            background: #ffffff;
            color: #000;
            cursor: pointer;
        }

        /* Natija paneli */
        .result-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #fff;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px;
            transform: translateY(100%);
            transition: 0.3s ease;
            color: #000;
            z-index: 1000;
        }
        .result-panel.active { transform: translateY(0); }
        .footer-btn {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="quiz-screen" class="app-container">
    <div class="header">
        <div class="question-number" id="levelCounter">1 / 6</div>
        <div class="uzbek-sentence" id="uzbekPrompt">...</div>
    </div>

    <div class="builder-area">
        <!-- Gap yig'iladigan joy (Markazda) -->
        <div class="sentence-builder" id="buildingZone"></div>

        <!-- Pastki so'zlar banki (Markazda) -->
        <div class="word-bank" id="wordBank"></div>
        
        <button class="action-btn" id="checkBuilderBtn" disabled>
            <i class="fas fa-check"></i> Javobni tekshirish
        </button>
    </div>

    <div class="result-panel" id="resultPanel">
        <h2 id="resultTitle" style="font-size: 24px;">...</h2>
        <p id="resultMessage" style="margin: 15px 0 30px; font-size: 18px; color: #333;"></p>
        <button class="footer-btn" id="continueBtn">Davom etish</button>
    </div>
</div>

<script>
    const sentences = [
        { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
        { uz: "Ular maktabga borishadi.", correct: ["They", "go", "to", "school."] },
        { uz: "Men olma yeyman.", correct: ["I", "eat", "an", "apple."] },
        { uz: "Sizning uyingiz katta.", correct: ["Your", "house", "is", "big."] },
        { uz: "Bugun havo issiq.", correct: ["Today", "the", "weather", "is", "hot."] },
        { uz: "Biz yangi mashina sotib oldik.", correct: ["We", "bought", "a", "new", "car."] }
    ];

    let currentIdx = 0;
    let builtSequence = [];
    let bankWords = [];
    let usedFlags = [];
    let score = 0;

    function initLevel() {
        const current = sentences[currentIdx];
        document.getElementById('uzbekPrompt').textContent = current.uz;
        document.getElementById('levelCounter').textContent = `${currentIdx + 1} / ${sentences.length}`;
        
        bankWords = [...current.correct].sort(() => Math.random() - 0.5);
        usedFlags = new Array(bankWords.length).fill(false);
        builtSequence = [];
        render();
    }

    function render() {
        const zone = document.getElementById('buildingZone');
        const bank = document.getElementById('wordBank');
        const btn = document.getElementById('checkBuilderBtn');

        zone.innerHTML = '';
        builtSequence.forEach((item, idx) => {
            const chip = document.createElement('div');
            chip.className = 'word-chip';
            chip.textContent = item.word;
            chip.onclick = () => {
                usedFlags[item.bankIdx] = false;
                builtSequence.splice(idx, 1);
                render();
            };
            zone.appendChild(chip);
        });

        bank.innerHTML = '';
        bankWords.forEach((word, idx) => {
            const token = document.createElement('div');
            token.className = `bank-token ${usedFlags[idx] ? 'disabled' : ''}`;
            token.textContent = word;
            token.onclick = () => {
                if (!usedFlags[idx]) {
                    usedFlags[idx] = true;
                    builtSequence.push({ word, bankIdx: idx });
                    render();
                }
            };
            bank.appendChild(token);
        });

        const isReady = (builtSequence.length > 0);
        btn.disabled = !isReady;
        btn.classList.toggle('active', isReady);
    }

    document.getElementById('checkBuilderBtn').onclick = () => {
        const correct = sentences[currentIdx].correct;
        const isCorrect = builtSequence.length === correct.length && 
                          builtSequence.every((val, i) => val.word === correct[i]);
        
        const panel = document.getElementById('resultPanel');
        const title = document.getElementById('resultTitle');
        const msg = document.getElementById('resultMessage');

        if (isCorrect) {
            score++;
            title.textContent = "Ajoyib! 🎉";
            msg.textContent = "To'g'ri topdingiz!";
        } else {
            title.textContent = "E'tiborli bo'ling 💡";
            msg.textContent = "To'g'ri tartib: " + correct.join(' ');
        }
        panel.classList.add('active');
    };

    document.getElementById('continueBtn').onclick = () => {
        document.getElementById('resultPanel').classList.remove('active');
        if (currentIdx < sentences.length - 1) {
            currentIdx++;
            initLevel();
        } else {
            alert(`Mashq tugadi! Natijangiz: ${score} / ${sentences.length}`);
            currentIdx = 0; score = 0; initLevel();
        }
    };

    initLevel();
</script>
</body>
</html>
