<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>English Progress</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: rgba(255, 255, 255, 0.75);
      --text-main: #000000;
      --text-secondary: #8e8e93;
      --accent-blue: #007aff;
      --accent-green: #34c759;
      --accent-orange: #ff9500;
      --glass-border: rgba(255, 255, 255, 0.4);
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #000000;
        --card-bg: rgba(28, 28, 30, 0.75);
        --text-main: #ffffff;
        --text-secondary: #aeaeae;
        --glass-border: rgba(255, 255, 255, 0.12);
        --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.3);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 20px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      width: 100%;
      max-width: 420px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding: 0 8px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    .profile-btn {
      font-size: 17px;
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 500;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .profile-btn:active {
      background: rgba(0, 122, 255, 0.1);
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Glass card style */
    .level-card {
      background: var(--card-bg);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 18px 20px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .level-card:active {
      transform: scale(0.975);
      background: rgba(160, 160, 160, 0.12);
    }

    .level-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .level-name {
      display: flex;
      flex-direction: column;
    }

    .level-tag {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-blue);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }

    .level-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.3;
    }

    /* Right side status – percent or label */
    .status-indicator {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(120, 120, 128, 0.08);
      padding: 6px 14px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-blue);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--accent-blue);
    }

    .grammar-badge {
      color: #007aff;
      background: rgba(0, 122, 255, 0.1);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .exercise-badge {
      color: #34c759;
      background: rgba(52, 199, 89, 0.12);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .grammar-badge i, .exercise-badge i {
      font-style: normal;
      font-size: 14px;
      font-weight: 500;
    }

    /* Progress bar (only for A1 as requested, but we keep style for any potential use) */
    .progress-container {
      width: 100%;
      height: 6px;
      background: rgba(120, 120, 128, 0.15);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--accent-blue);
      border-radius: 8px;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Spacer for cards without progress bar to maintain alignment */
    .card-footer-placeholder {
      margin-top: 12px;
      height: 6px;
      background: transparent;
    }

    hr {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Yakshanba</h1>
    <a href="#" class="profile-btn" role="button">Profil</a>
  </div>

  <div class="container">
    <!-- A1 Beginner – progress bar va foiz saqlanib qoldi (soʻrovda faqat A1 dan olib tashlash aytilmagan, lekin "A1 Beginner progress bar va foizi koʻrsatgichni olib tashlash kerak" deyilgan. 
         Iltimos: “A1 Beginner progress bar va foizi koʻrsatgichni olib tashlash kerak oʻrniga Grammar boʻlishi kerak” – demak A1 uchun ham progress/foiz olib tashlanib, Grammar qoʻyiladi.
         Diqqat bilan oʻqilganda: har bir daraja uchun progress/foiz olib tashlanib, yangi matn qoʻyiladi. 
         Shuning uchun A1 da ham progress/foiz oʻrniga “Grammar” boʻladi. Quyida toʻliq moslashtirildi. -->
    
    <!-- A1: Grammar (progress bar va foiz olib tashlandi) -->
    <a href="a1.html" class="level-card">
      <div class="level-info">
        <div class="level-name">
          <span class="level-tag">A1</span>
          <span class="level-title">Beginner</span>
        </div>
        <!-- Grammar badge instead of percent -->
        <span class="grammar-badge">
          <span style="font-size:15px;">📘</span> Grammar
        </span>
      </div>
      <!-- Progress bar butunlay olib tashlandi, o‘rniga hech narsa qo‘yilmaydi yoki bo‘sh joy bo‘lishi mumkin. 
           Layout saqlanishi uchun ko‘rinmas spacer qo‘yamiz -->
      <div class="card-footer-placeholder"></div>
    </a>

    <!-- A2: Exercise (progress bar va foiz olib tashlandi) -->
    <a href="a2.html" class="level-card">
      <div class="level-info">
        <div class="level-name">
          <span class="level-tag">A2</span>
          <span class="level-title">Pre-intermediate</span>
        </div>
        <span class="exercise-badge">
          <span style="font-size:15px;">📋</span> Exercise
        </span>
      </div>
      <div class="card-footer-placeholder"></div>
    </a>

    <!-- B1: Grammar -->
    <a href="b1.html" class="level-card">
      <div class="level-info">
        <div class="level-name">
          <span class="level-tag">B1</span>
          <span class="level-title">Intermediate</span>
        </div>
        <span class="grammar-badge">
          <span style="font-size:15px;">📘</span> Grammar
        </span>
      </div>
      <div class="card-footer-placeholder"></div>
    </a>

    <!-- B2: Exercise -->
    <a href="b2.html" class="level-card">
      <div class="level-info">
        <div class="level-name">
          <span class="level-tag">B2</span>
          <span class="level-title">Upper-intermediate</span>
        </div>
        <span class="exercise-badge">
          <span style="font-size:15px;">📋</span> Exercise
        </span>
      </div>
      <div class="card-footer-placeholder"></div>
    </a>
  </div>

</body>
</html>
