<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yakshanba - Grammar & Exercise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 24px 16px 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        /* Status bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            padding: 0 4px;
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: sticky;
            top: 36px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .profile-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            flex-shrink: 0;
        }

        /* Overall progress */
        .progress-overview {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #f8f9ff, #f1f3ff);
            border-radius: 20px;
            padding: 16px 18px;
        }

        .overall-progress-ring {
            position: relative;
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }

        .overall-progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            font-weight: 700;
            color: #6366f1;
        }

        .overview-info h3 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .overview-info p {
            font-size: 12px;
            color: #8e8e9a;
            line-height: 1.3;
        }

        /* Section title */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            position: sticky;
            top: 90px;
            z-index: 8;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 8px 0;
            border-radius: 12px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.2px;
        }

        .section-count {
            font-size: 12px;
            font-weight: 600;
            color: #8e8e9a;
            background: #f0f0f5;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Cards grid */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .item-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.03);
            transition: all 0.15s ease;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .item-card:active {
            transform: scale(0.97);
            background: #fafbff;
            border-color: #e0e3ff;
        }

        .item-number {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* Grammar colors - warm tones */
        .grammar-color {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            box-shadow: 0 3px 10px rgba(245, 158, 11, 0.25);
        }

        /* Exercise colors - cool tones */
        .exercise-color {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 3px 10px rgba(59, 130, 246, 0.25);
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: #f0f0f5;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
        }

        .grammar-fill {
            background: linear-gradient(90deg, #f59e0b, #f97316);
        }

        .exercise-fill {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
        }

        .percent {
            font-size: 13px;
            font-weight: 600;
            color: #8e8e9a;
            flex-shrink: 0;
            min-width: 36px;
            text-align: right;
        }

        .arrow {
            color: #c4c4d0;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: #e8e8f0;
            margin: 4px 0 20px;
            border-radius: 1px;
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .container {
                padding-bottom: calc(28px + env(safe-area-inset-bottom));
            }
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            }
            .container {
                background: rgba(28, 28, 40, 0.85);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            }
            .status-bar, .header h1, .section-title, .item-name, .overview-info h3 {
                color: #f0f0f5;
            }
            .section-count, .overview-info p, .percent, .arrow {
                color: #9a9aae;
            }
            .section-count {
                background: #2a2a40;
            }
            .section-header {
                background: rgba(28, 28, 40, 0.7);
            }
            .item-card {
                background: #252540;
                box-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
            }
            .item-card:active {
                background: #2a2a48;
                border-color: #3a3a55;
            }
            .progress-bar-container {
                background: #3a3a50;
            }
            .progress-overview {
                background: linear-gradient(135deg, #252540, #2a2a45);
            }
            .divider {
                background: #2a2a40;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time">9:41</span>
            <div class="status-icons">
                <svg viewBox="0 0 18 12" width="16" height="11" fill="currentColor">
                    <rect x="0" y="8" width="3" height="4" rx="0.6"/>
                    <rect x="5" y="5" width="3" height="7" rx="0.6"/>
                    <rect x="10" y="2" width="3" height="10" rx="0.6"/>
                    <rect x="15" y="0" width="3" height="12" rx="0.6"/>
                </svg>
                <svg viewBox="0 0 16 12" width="15" height="11" fill="none" stroke="currentColor" stroke-width="1.2">
                    <circle cx="8" cy="10.5" r="1.5" fill="currentColor" stroke="none"/>
                    <path d="M4.46 8.04a5 5 0 017.08 0M1.93 5.51a8.5 8.5 0 0112.14 0"/>
                </svg>
                <svg viewBox="0 0 25 12" width="22" height="11" fill="currentColor">
                    <rect x="0" y="0" width="21" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
                    <rect x="2" y="2" width="16.5" height="8" rx="1"/>
                    <rect x="22" y="3.5" width="2.5" height="5" rx="1"/>
                </svg>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>Profil</h1>
            <div class="profile-icon">S</div>
        </div>

        <!-- Overall Progress -->
        <div class="progress-overview">
            <div class="overall-progress-ring">
                <svg width="60" height="60" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="26" fill="none" stroke="#e0e3f0" stroke-width="5"/>
                    <circle cx="30" cy="30" r="26" fill="none" stroke="#6366f1" stroke-width="5"
                            stroke-dasharray="163.36" stroke-dashoffset="57" stroke-linecap="round"/>
                </svg>
                <span class="progress-text">35%</span>
            </div>
            <div class="overview-info">
                <h3>Umumiy taraqqiyot</h3>
                <p>20 Grammar + 20 Exercise</p>
            </div>
        </div>

        <!-- Grammar Section -->
        <div class="section-header">
            <span class="section-title">📝 Grammar</span>
            <span class="section-count">20 ta</span>
        </div>

        <div class="cards-grid" id="grammarGrid">
            <!-- JS orqali to'ldiriladi -->
        </div>

        <div class="divider"></div>

        <!-- Exercise Section -->
        <div class="section-header">
            <span class="section-title">🏋️ Exercise</span>
            <span class="section-count">20 ta</span>
        </div>

        <div class="cards-grid" id="exerciseGrid">
            <!-- JS orqali to'ldiriladi -->
        </div>
    </div>

    <script>
        // 20 ta Grammar va 20 ta Exercise yaratish
        function generateCards(containerId, type, count) {
            const container = document.getElementById(containerId);
            const colorClass = type === 'grammar' ? 'grammar-color' : 'exercise-color';
            const fillClass = type === 'grammar' ? 'grammar-fill' : 'exercise-fill';
            const namePrefix = type === 'grammar' ? 'Grammar' : 'Exercise';

            for (let i = 1; i <= count; i++) {
                // Tasodifiy progress (real loyihada backenddan keladi)
                const progress = Math.floor(Math.random() * 100);
                const card = document.createElement('a');
                card.className = 'item-card';
                card.href = `${type}${i}.html`;
                card.innerHTML = `
                    <div class="item-number ${colorClass}">${i}</div>
                    <div class="item-info">
                        <div class="item-name">${namePrefix} ${i}</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill ${fillClass}" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <span class="percent">${progress}%</span>
                    <span class="arrow">›</span>
                `;
                container.appendChild(card);
            }
        }

        // Sahifa yuklanganda kartalarni yaratish
        document.addEventListener('DOMContentLoaded', () => {
            generateCards('grammarGrid', 'grammar', 20);
            generateCards('exerciseGrid', 'exercise', 20);
        });
    </script>
</body>
</html>
