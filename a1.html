<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Progress</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #000000;
            --text-secondary: #8e8e93;
            --accent-blue: #007aff;
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --card-bg: rgba(28, 28, 30, 0.7);
                --text-main: #ffffff;
                --text-secondary: #aeaeae;
                --glass-border: rgba(255, 255, 255, 0.1);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .profile-btn {
            font-size: 17px;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 400;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .level-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease, background 0.2s ease;
            display: block;
        }

        .level-card:active {
            transform: scale(0.97);
            background: rgba(150, 150, 150, 0.1);
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .level-name {
            display: flex;
            flex-direction: column;
        }

        .level-tag {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .level-title {
            font-size: 20px;
            font-weight: 600;
        }

        .percent {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(120, 120, 128, 0.16);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent-blue);
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-blue);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Yakshanba</h1>
        
    </div>

    <div class="container">
        <a href="a1.html" class="level-card">
            <div class="level-info">
                <div class="level-name">
        
                    <span class="level-title">Grammar</span>
                </div>
                <span class="percent">45%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" style="width: 45%;"></div>
            </div>
        </a>

        <a href="a2.html" class="level-card">
            <div class="level-info">
                <div class="level-name">
                    
                    <span class="level-title">Exercise</span>
                </div>
                <span class="percent">20%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" style="width: 20%;"></div>
            </div>
        </a>

        <a href="b1.html" class="level-card">
            <div class="level-info">
                <div class="level-name">
                    
                    <span class="level-title">Grammar</span>
                </div>
                <span class="percent">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" style="width: 0%;"></div>
            </div>
        </a>

        <a href="b2.html" class="level-card">
            <div class="level-info">
                <div class="level-name">
                    <span class="level-tag">B2</span>
                    <span class="level-title">Exercise</span>
                </div>
                <span class="percent">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" style="width: 0%;"></div>
            </div>
        </a>
    </div>

</body>
</html>
