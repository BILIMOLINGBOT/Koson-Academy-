<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Omadli gʻildirak</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .wheel {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 10px solid #333;
      position: relative;
      overflow: hidden;
      transition: transform 4s cubic-bezier(0.33, 1, 0.68, 1);
    }
    .segment {
      position: absolute;
      width: 50%;
      height: 50%;
      background: tomato;
      transform-origin: 100% 100%;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }
    .segment:nth-child(1) { transform: rotate(0deg); background: #ff6666; }
    .segment:nth-child(2) { transform: rotate(60deg); background: #66ccff; }
    .segment:nth-child(3) { transform: rotate(120deg); background: #99ff99; }
    .segment:nth-child(4) { transform: rotate(180deg); background: #ffcc66; }
    .segment:nth-child(5) { transform: rotate(240deg); background: #cc99ff; }
    .segment:nth-child(6) { transform: rotate(300deg); background: #ff99cc; }

    .pointer {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 30px solid #333;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wheel" id="wheel">
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
  </div>
  <div class="pointer"></div>
  <button onclick="spin()">Aylantir!</button>

  <script>
    let wheel = document.getElementById('wheel');
    let deg = 0;

    function spin() {
      let rand = Math.floor(Math.random() * 360) + 720; // 2 to'liq aylanish + tasodifiy
      deg += rand;
      wheel.style.transform = `rotate(${deg}deg)`;
    }
  </script>
</body>
</html>
