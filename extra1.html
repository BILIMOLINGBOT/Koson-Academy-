<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnU · Audio Lesson</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #000000;
            --text-primary: #ffffff;
            --player-green: #ffffff;
            --player-grey: #4a4a4a;
            --highlight: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .lesson-content {
            flex: 1;
            overflow-y: auto;
            padding-top: 20px;
            line-height: 1.8;
            margin-bottom: 20px;
            scrollbar-width: none;
            font-size: 18px;
        }
        .lesson-content::-webkit-scrollbar { display: none; }

        .lesson-content h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            font-size: 26px;
        }

        /* Interaktiv so'zlar */
        .interactive-word {
            display: inline-block;
            cursor: pointer;
            padding: 2px 0;
            border-radius: 8px;
            transition: all 0.2s ease;
            position: relative;
        }

        .interactive-word:hover {
            background: var(--highlight);
            transform: scale(1.02);
        }

        .interactive-word.active {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.1);
        }

        /* So'z tarjimasi tooltip */
        .word-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #222;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid #444;
            z-index: 1000;
            margin-bottom: 8px;
            pointer-events: none;
            animation: fadeIn 0.2s ease;
        }

        .word-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: #222 transparent transparent transparent;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Audio Player */
        .audio-container {
            background: #111;
            padding: 25px 20px;
            border-radius: 25px;
            border: 1px solid #222;
        }

        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .time-text {
            color: #888;
            font-size: 13px;
            min-width: 40px;
        }

        .progress-bar-container {
            flex: 1;
            height: 4px;
            background: var(--player-grey);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--player-green);
            border-radius: 2px;
            position: relative;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            background: var(--player-green);
            border-radius: 50%;
            position: absolute;
            right: -6px;
            top: -4px;
        }

        .player-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--player-green);
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:active { transform: scale(0.9); }
        
        .icon-btn.active {
            color: #ffffff;
            text-shadow: 0 0 8px var(--player-green);
        }

        .play-pause-circle { font-size: 55px; }

        .finish-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lesson-content" id="lesson-content">
        <!-- Matn JavaScript orqali to'ldiriladi -->
    </div>

    <audio id="main-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div class="audio-container">
        <div class="progress-area">
            <span class="time-text" id="current-time">00:00</span>
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-fill" id="progress-fill">
                    <div class="progress-dot"></div>
                </div>
            </div>
        </div>

        <div class="player-controls">
            <button class="icon-btn" onclick="skip(-5)"><i class="fa-solid fa-step-backward"></i></button>
            
            <button class="icon-btn play-pause-circle" id="play-pause-btn">
                <i class="fa-regular fa-circle-play" id="play-icon"></i>
            </button>
            
            <button class="icon-btn" onclick="skip(5)"><i class="fa-solid fa-step-forward"></i></button>
            
            <button class="icon-btn" id="repeat-btn" title="Takrorlash">
                <i class="fa-solid fa-repeat"></i>
            </button>
        </div>
    </div>

    <a href="index.html" class="finish-link">Darsni yakunlash <i class="fa-solid fa-chevron-right"></i></a>
</div>

<script>
    const audio = document.getElementById('main-audio');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIcon = document.getElementById('play-icon');
    const progressContainer = document.getElementById('progress-container');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const repeatBtn = document.getElementById('repeat-btn');
    const lessonContent = document.getElementById('lesson-content');

    let isPlaying = false;
    let isRepeat = false;
    let activeTooltip = null;

    // So'zlar va ularning tarjimalari
    const wordTranslations = {
        'student': 'talaba',
        'name': 'ism',
        'years': 'yosh',
        'old': 'yosh',
        'from': 'dan',
        'family': 'oila',
        'kind': 'mehribon',
        'father': 'ota',

        'nurse': 'hamshira',

        'today': 'bugun',
        'monday': 'dushanba',
        'home': 'uy',
        'weather': 'ob-havo',
        'good': 'yaxshi',
        'sun': 'quyosh',
        'shining': 'yorqin',
        'sky': 'osmon',
        'blue': 'ko\'k',
        'little': 'kichik',

        'sleeping': 'uxlayapti',
        'sofa': 'divan',
        'sitting': 'o\'tiribman',
        'table': 'stol',
        'writing': 'yozmoqda',
        'notebook': 'daftar',
        'morning': 'ertalab',
        'tired': 'charchagan',
        'yesterday': 'kecha',
        'studying': 'o\'qiyotgan edim',
        'late': 'kech',

        'bus': 'avtobus',
        'talking': 'gaplashyapti',
        'homework': 'uy vazifasi',
        'listening': 'tinglayapman',
        'music': 'musiqa',
        'strict': 'qattiqqo\'l',
        'smart': 'aqlli',
        'learning': 'o\'rganyapmiz',
        'english': 'ingliz tili',
        'grammar': 'grammatika',

        'ready': 'tayyor',
        'cooking': 'pishiryapti',
        'kitchen': 'oshxona',
        'food': 'ovqat',
        'delicious': 'mazali',
        'smiling': 'jilmayapti',
        'laughing': 'kulyapti',

        'quiet': 'tinch',
        'next': 'yonida',
        'thinking': 'o\'ylayapman',
        'tomorrow': 'ertaga',
        'life': 'hayot',
        'beautiful': 'chiroyli',
        'wonderful': 'ajoyib',
        'dreams': 'orzular',
        'thankful': 'minnatdor',
        'everything': 'hamma narsa',
        'new': 'yangi',
        'excited': 'hayajonlangan',
        'important': 'muhim',

        'full': 'to\'la',
        'opportunities': 'imkoniyatlar',
        'grow': 'o\'sish',
        'strong': 'kuchli'
    };

    // Asl matn
    const originalText = `I am a student. My name is Javlonbek. I am 20 years old. I am from Tashkent. My family is very kind. My father is a teacher and my mother is a nurse. I am happy because my friends are always with me.

Today is Monday. I am at home now. The weather is good. The sun is shining and the sky is blue. My little brother is playing in the garden. My cat is sleeping on the sofa. I am sitting at the table and I am writing in my notebook.

In the morning, I was very tired because yesterday I was studying until late. My breakfast is simple. I am eating bread and drinking tea. My sister is making breakfast for my parents. She is very kind and helpful.

I am going to school by bus. My friends are on the bus with me. They are talking about their homework. I am listening to music. My teacher is very strict but he is also very smart. We are learning English grammar today.

In the classroom, my friends are answering questions. I am sometimes nervous because the questions are difficult. My notebook is full of notes. The lesson is interesting and I am enjoying it. My pen is on the desk. The blackboard is clean.

At noon, I am very hungry. My lunch is ready. My father is cooking in the kitchen. The food is delicious. My mother is smiling and my little brother is laughing. My cat is sleeping still. I am drinking water. The kitchen is warm and bright.

After lunch, I am going to the park. The park is big. There are many trees and flowers. Children are playing there. Some people are walking their dogs. I am meeting my friend Ali. He is very funny and kind. We are talking about school. The birds are singing. The air is fresh and cool.

In the evening, I am at home again. My homework is ready. My books are on the table. I am reading a story. My little brother is watching TV. My parents are resting. The sun is setting. The sky is orange and pink.

At night, I am feeling happy. My family is together. The house is quiet. My cat is sleeping next to me. I am thinking about tomorrow. I am ready to study more. Life is beautiful. My friends are wonderful. My dreams are big. I am thankful for everything.

Tomorrow is a new day. I am excited. My school is important. My family is important. My friends are important. I am learning new things every day. The world is full of opportunities. I am ready to grow. I am strong. I am happy.`;

    // Matnni interaktiv so'zlarga aylantirish
    function makeTextInteractive(text) {
        const words = text.split(/(\s+)/);
        return words.map(word => {
            // So'zni tozalash (tinish belgilaridan)
            const cleanWord = word.replace(/[.,!?;:]$/, '');
            const punctuation = word.match(/[.,!?;:]$/) ? word.slice(-1) : '';
            
            if (word.trim() && wordTranslations[cleanWord.toLowerCase()]) {
                return `<span class="interactive-word" data-word="${cleanWord.toLowerCase()}" onclick="showTranslation(this, '${wordTranslations[cleanWord.toLowerCase()]}')">${cleanWord}${punctuation}</span>`;
            }
            return word;
        }).join('');
    }

    // Tarjimani ko'rsatish
    window.showTranslation = function(element, translation) {
        // Eski tooltipni o'chirish
        if (activeTooltip) {
            activeTooltip.remove();
        }
        
        // Yangi tooltip yaratish
        const tooltip = document.createElement('span');
        tooltip.className = 'word-tooltip';
        tooltip.textContent = translation;
        
        // So'zni aktiv qilish
        document.querySelectorAll('.interactive-word').forEach(w => w.classList.remove('active'));
        element.classList.add('active');
        
        // Tooltipni qo'shish
        element.appendChild(tooltip);
        activeTooltip = tooltip;
        
        // 3 sekunddan keyin tooltipni o'chirish
        setTimeout(() => {
            if (activeTooltip === tooltip) {
                tooltip.remove();
                element.classList.remove('active');
                activeTooltip = null;
            }
        }, 3000);
    };

    // Matnni joylash
    lessonContent.innerHTML = `
        <h2>A Day in My Life</h2>
        ${makeTextInteractive(originalText)}
    `;

    // Audio player funksiyalari
    function togglePlay() {
        if (isPlaying) {
            audio.pause();
            playIcon.classList.replace('fa-circle-pause', 'fa-circle-play');
        } else {
            audio.play();
            playIcon.classList.replace('fa-circle-play', 'fa-circle-pause');
        }
        isPlaying = !isPlaying;
    }

    playPauseBtn.addEventListener('click', togglePlay);

    audio.addEventListener('timeupdate', () => {
        const { duration, currentTime } = audio;
        const progressPercent = (currentTime / duration) * 100;
        progressFill.style.width = `${progressPercent}%`;

        let minutes = Math.floor(currentTime / 60);
        let seconds = Math.floor(currentTime % 60);
        if (seconds < 10) seconds = `0${seconds}`;
        currentTimeEl.innerText = `${minutes}:${seconds}`;
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = audio.duration;
        audio.currentTime = (clickX / width) * duration;
    });

    repeatBtn.addEventListener('click', () => {
        isRepeat = !isRepeat;
        audio.loop = isRepeat;
        repeatBtn.classList.toggle('active', isRepeat);
    });

    window.skip = function(seconds) {
        audio.currentTime += seconds;
    };

    audio.addEventListener('ended', () => {
        if (!isRepeat) {
            playIcon.classList.replace('fa-circle-pause', 'fa-circle-play');
            isPlaying = false;
        }
    });
</script>

</body>
</html>
