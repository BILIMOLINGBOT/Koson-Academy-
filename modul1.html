<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LearnU · iOS Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #000000;
            --ios-secondary-bg: #1C1C1E;
            --ios-tertiary-bg: #2C2C2E;
            --ios-text: #FFFFFF;
            --ios-secondary-text: #8E8E93;
            --ios-green: #34C759;
            --radius-main: 20px;
            --safe-area-top: env(safe-area-inset-top);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: var(--ios-bg);
            color: var(--ios-text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Ilova konteyneri - iPhone o'lchami */
        .app-container {
            width: 100%;
            max-width: 430px; /* iPhone 15 Pro Max width */
            height: 100vh;
            padding: calc(var(--safe-area-top) + 10px) 20px 40px;
            display: none;
            flex-direction: column;
            position: relative;
        }

        .app-container.active { display: flex; }

        /* Top Navigation Bar */
        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .close-btn {
            font-size: 20px;
            color: var(--ios-secondary-text);
            cursor: pointer;
        }

        .progress-container {
            flex: 1;
            height: 8px;
            background: var(--ios-secondary-bg);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .progress-bar {
            width: 10%;
            height: 100%;
            background: var(--ios-blue);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .points-badge {
            font-weight: 600;
            font-size: 17px;
            color: var(--ios-blue);
        }

        /* Flashcards Section */
        .card-stack {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
        }

        .flashcard {
            background: var(--ios-secondary-bg);
            border-radius: var(--radius-main);
            padding: 30px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .part-of-speech {
            font-size: 13px;
            font-weight: 600;
            color: var(--ios-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .word-main {
            font-size: 40px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .audio-icon {
            width: 44px;
            height: 44px;
            background: var(--ios-tertiary-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ios-blue);
            cursor: pointer;
        }

        .translation-word {
            font-size: 28px;
            font-weight: 500;
            color: var(--ios-secondary-text);
        }

        /* Game Elements */
        .prompt-text {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
        }

        .zone {
            min-height: 120px;
            background: var(--ios-secondary-bg);
            border-radius: var(--radius-main);
            border: 2px dashed var(--ios-tertiary-bg);
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
            margin-bottom: 20px;
        }

        .bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        /* iOS Chips & Tokens */
        .token, .chip {
            padding: 12px 18px;
            background: var(--ios-tertiary-bg);
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            transition: transform 0.1s;
            cursor: pointer;
        }

        .chip {
            background: var(--ios-blue);
            color: white;
        }

        .token:active, .chip:active {
            transform: scale(0.92);
        }

        /* Action Button */
        .ios-btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            height: 56px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .ios-btn:disabled {
            background: #3a3a3c;
            color: #8e8e93;
        }

        .ios-btn:active {
            transform: scale(0.97);
            filter: brightness(0.9);
        }

        /* Result Panel (Bottom Sheet style) */
        .result-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1c1c1e;
            padding: 30px 20px 50px;
            border-radius: 30px 30px 0 0;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.15, 0, 0.2, 1);
            z-index: 1000;
            border-top: 1px solid #38383a;
        }

        .result-panel.active { transform: translateY(0); }

        .result-panel.correct { border-top: 4px solid var(--ios-green); }
        .result-panel.wrong { border-top: 4px solid #ff453a; }

        .res-title { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .res-msg { color: var(--ios-secondary-text); margin-bottom: 20px; }

        /* Final Trophy */
        .trophy-icon {
            font-size: 80px;
            color: #FFD60A;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

<div id="screen1" class="app-container active">
    <div class="nav-bar">
        <i class="fas fa-times close-btn"></i>
        <div class="progress-container"><div class="progress-bar" style="width: 20%"></div></div>
        <div class="points-badge" id="pointsDisplay">⚡ 0</div>
    </div>

    <div class="card-stack">
        <div class="flashcard">
            <span class="part-of-speech" id="f-pos">OLMOSH</span>
            <div class="word-main">
                <span id="f-eng">My</span>
                <div class="audio-icon" onclick="speak()"><i class="fas fa-volume-up"></i></div>
            </div>
        </div>
        <div class="flashcard" style="background: transparent; border: 1px solid var(--ios-tertiary-bg);">
            <div class="translation-word" id="f-uzb">mening</div>
        </div>
    </div>
    
    <button class="ios-btn" onclick="nextFlashcard()">Keyingi</button>
</div>

<div id="screen2" class="app-container">
    <div class="nav-bar">
        <i class="fas fa-chevron-left close-btn" onclick="showScreen('screen1')"></i>
        <div class="progress-container"><div class="progress-bar" style="width: 50%"></div></div>
        <div class="points-badge" id="pointsDisplay2">⚡ 0</div>
    </div>
    <div class="prompt-text" id="g1-prompt">mening</div>
    <div class="zone" id="g1-zone"></div>
    <div class="bank" id="g1-bank"></div>
    <button class="ios-btn" id="g1-check" onclick="checkWordGame()" disabled>Tekshirish</button>
</div>

<div class="result-panel" id="res-panel">
    <div id="res-title" class="res-title">Ajoyib!</div>
    <div id="res-msg" class="res-msg">To'g'ri javob topildi.</div>
    <button class="ios-btn" id="res-btn">Davom etish</button>
</div>

<script>
    // Logic remains mostly same, just updating UI interactions
    let userPoints = 0;
    let currentFlash = 0;
    
    // ... (Old data arrays from your code) ...
    let vocabData = [
        { pos: "OLMOSH", eng: "My", uzb: "mening" },
        { pos: "OT", eng: "Name", uzb: "ism" }
    ];
    let wordGameData = [{ uz: "mening", correct: ["My"] }];
    const distractors = ["You", "He", "She"];
    let builtSeq = [], usedFlags = [];

    function nextFlashcard() {
        if (currentFlash < vocabData.length - 1) {
            currentFlash++;
            document.getElementById('f-eng').textContent = vocabData[currentFlash].eng;
            document.getElementById('f-uzb').textContent = vocabData[currentFlash].uzb;
            document.getElementById('f-pos').textContent = vocabData[currentFlash].pos;
        } else {
            showScreen('screen2');
            initWordGame();
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initWordGame() {
        const curr = wordGameData[0];
        const bankEl = document.getElementById('g1-bank');
        let words = [curr.correct[0], ...distractors].sort(() => Math.random() - 0.5);
        window.currentBank = words;
        usedFlags = new Array(words.length).fill(false);
        renderGame('g1');
    }

    function renderGame(prefix) {
        const zone = document.getElementById(`${prefix}-zone`);
        const bank = document.getElementById(`${prefix}-bank`);
        const btn = document.getElementById(`${prefix}-check`);
        zone.innerHTML = ''; bank.innerHTML = '';
        
        builtSeq.forEach((item, i) => {
            const d = document.createElement('div');
            d.className = 'chip'; d.textContent = item.word;
            d.onclick = () => { usedFlags[item.idx] = false; builtSeq.splice(i,1); renderGame(prefix); };
            zone.appendChild(d);
        });

        window.currentBank.forEach((word, i) => {
            if(!usedFlags[i]) {
                const t = document.createElement('div');
                t.className = 'token'; t.textContent = word;
                t.onclick = () => { usedFlags[i] = true; builtSeq.push({word, idx:i}); renderGame(prefix); };
                bank.appendChild(t);
            }
        });
        btn.disabled = builtSeq.length === 0;
    }

    function checkWordGame() {
        const panel = document.getElementById('res-panel');
        panel.classList.add('active', 'correct');
        document.getElementById('res-btn').onclick = () => {
            panel.classList.remove('active');
            alert("Dars tugadi!");
        }
    }

    function speak() {
        const u = new SpeechSynthesisUtterance(document.getElementById('f-eng').textContent);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }
</script>
</body>
</html>
