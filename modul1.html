
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Asosiy</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent; 
    }

    body { 
      background: #000; 
      color: #fff; 
      height: 100vh; 
      overflow: hidden; 
    }

    .app-wrapper { 
      width: 100%; 
      max-width: 450px; 
      height: 100vh; 
      margin: 0 auto; 
      display: flex; 
      flex-direction: column; 
      background: #000;
    }
    
    /* Header stili - modul.html bilan bir xil */
    .header { 
      padding: 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background: #000;
    }

    .avatar-wrapper { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      cursor: pointer;
    }

    .avatar-circle { 
      width: 45px; 
      height: 45px; 
      background: #1a1a1a; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      font-size: 1.2rem; 
      border: 2px solid #333; 
      overflow: hidden; 
      color: #fff;
    }

    .avatar-circle img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }

    .gradient-name {
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      font-size: 18px;
    }

    .points-badge { 
      background: #fff; 
      color: #000; 
      padding: 8px 16px; 
      border-radius: 30px; 
      font-weight: 800; 
      font-size: 16px; 
      display: inline-flex; 
      align-items: center; 
      gap: 5px;
      box-shadow: 0 2px 10px rgba(255,255,255,0.1);
    }

    /* Scroll container - modul.html dagi card-stack o'rniga */
    .scroll-container { 
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      -ms-overflow-style: none; 
      scrollbar-width: none;
    }

    .scroll-container::-webkit-scrollbar { 
      display: none; 
    }

    /* Lesson card - modul.html dagi flashcard bilan bir xil */
    .lesson-card { 
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 32px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }

    .lesson-card:active {
      transform: scale(0.98);
      border-color: #007aff;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .module-badge {
      color: #a0a0a0;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 14px;
      text-transform: uppercase;
    }

    .module-icon {
      width: 45px;
      height: 30px;
      background: #2a2a2a;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .module-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .module-description {
      color: #a0a0a0;
      font-size: 16px;
      line-height: 1.4;
      margin-bottom: 15px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress-fill {
      height: 100%;
      background: #007aff;
      border-radius: 4px;
      width: 0%;
    }

    .action-button {
      color: #007aff;
      font-weight: 700;
      font-size: 16px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .action-button.completed {
      color: #34c759;
    }

    .action-button.locked {
      color: #8e8e93;
    }

    /* Tab bar - modul.html bilan bir xil */
    .tab-bar { 
      height: 80px; 
      background: rgba(10, 10, 10, 0.95); 
      backdrop-filter: blur(10px);
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      border-top: 1px solid #333; 
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item { 
      color: #8e8e93; 
      text-decoration: none; 
      text-align: center; 
      font-size: 11px; 
      font-weight: 600;
      transition: color 0.2s;
    }

    .tab-item.active { 
      color: #007aff; 
    }

    .tab-item svg { 
      width: 24px; 
      height: 24px; 
      display: block; 
      margin: 0 auto 4px; 
      stroke: currentColor; 
      fill: none; 
      stroke-width: 2;
    }

    /* Statuslar uchun ranglar */
    .status-available { color: #007aff; }
    .status-in-progress { color: #ff9f0a; }
    .status-coming-soon { color: #8e8e93; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Header - modul.html bilan bir xil -->
  <div class="header" onclick="navigateTo('profil.html')">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="userAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
      </div>
    </div>
    <div class="points-badge" id="userPoints">
      <span>⚡</span>
      <span id="pointsValue">0</span>
    </div>
  </div>

  <!-- Modullar ro'yxati - scrollable -->
  <div class="scroll-container" id="moduleContainer">
    <!-- Modullar JavaScript orqali to'ldiriladi -->
  </div>

  <!-- Tab bar - modul.html bilan bir xil -->
  <nav class="tab-bar">
    <a href="index.html" class="tab-item active" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      </svg>
      <span>Asosiy</span>
    </a>
    <a href="reyting.html" class="tab-item" onclick="navigateTo('reyting.html')">
      <svg viewBox="0 0 24 24">
        <line x1="12" y1="20" x2="12" y2="10"/>
        <line x1="18" y1="20" x2="18" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span>Reyting</span>
    </a>
    <a href="gift.html" class="tab-item" onclick="navigateTo('gift.html')">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="7" width="20" height="5"/>
        <path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
      </svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');

  // 30 ta modul ma'lumotlari
  const modules = Array.from({ length: 30 }, (_, i) => {
    const id = i + 1;
    const topics = [
      'Dasturlash asoslari', 'Algoritmlar', 'Ma\'lumotlar tuzilmasi',
      'Veb dasturlash', 'Mobil dasturlash', 'Sun\'iy intellekt',
      'Ma\'lumotlar bazasi', 'Tarmoq texnologiyalari', 'Kiberxavfsizlik',
      'Bulutli hisoblash', 'Python dasturlash', 'JavaScript asoslari',
      'React.js', 'Node.js', 'Flutter', 'Kotlin', 'Swift', 'Java',
      'C++ dasturlash', 'Go dasturlash', 'DevOps asoslari',
      'Docker va Kubernetes', 'Machine Learning', 'Deep Learning',
      'Data Science', 'Blockchain', 'IoT texnologiyalari',
      'AR/VR dasturlash', 'Game Development', 'Software Architecture'
    ];
    
    // Modul holati (localStorage dan o'qiladi)
    const completed = localStorage.getItem(`module_${id}_completed`) === 'true';
    const points = parseInt(localStorage.getItem(`module_${id}_points`)) || 0;
    const status = completed ? 'completed' : (id <= 5 ? 'available' : (id <= 15 ? 'in-progress' : 'coming-soon'));
    
    return {
      id: id,
      title: topics[id-1] || 'Dasturlash asoslari',
      label: `MODUL ${id}`,
      description: `${12} ta dars • ${8} ta mashq`,
      points: points,
      maxPoints: 10,
      status: status,
      action: status === 'completed' ? 'Qayta o'rganish' : 
              (status === 'available' ? 'Darsni boshlash' : 
              (status === 'in-progress' ? 'Davom etish' : 'Tez kunda'))
    };
  });

  function setAvatar(user) {
    const avatarInitial = document.getElementById('avatarInitial');
    const avatarImage = document.getElementById('avatarImage');
    
    if (user && user.photo_url) {
      avatarImage.src = user.photo_url;
      avatarImage.style.display = 'block';
      avatarInitial.style.display = 'none';
      
      avatarImage.onerror = function() {
        avatarImage.style.display = 'none';
        avatarInitial.style.display = 'block';
        if (user.first_name) {
          avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
        }
      };
    } else {
      avatarImage.style.display = 'none';
      avatarInitial.style.display = 'block';
      
      if (user && user.first_name) {
        avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
      } else {
        avatarInitial.textContent = 'U';
      }
    }
  }

  function updatePoints() {
    const points = parseInt(localStorage.getItem('user_points')) || 312;
    document.getElementById('pointsValue').textContent = points;
  }

  function renderModules() {
    const container = document.getElementById('moduleContainer');
    
    modules.forEach(m => {
      const progress = m.status === 'completed' ? 100 : 
                      (m.status === 'in-progress' ? Math.floor(Math.random() * 60) + 20 : 0);
      
      const actionColor = m.status === 'completed' ? '#34c759' : 
                         (m.status === 'available' ? '#007aff' : 
                         (m.status === 'in-progress' ? '#ff9f0a' : '#8e8e93'));
      
      const card = document.createElement('div');
      card.className = 'lesson-card';
      card.onclick = () => openModule(m.id, `modul${m.id}.html`);
      
      card.innerHTML = `
        <div class="card-header">
          <span class="module-badge">${m.label}</span>
          <div class="module-icon">
            ${m.status === 'completed' ? '✅' : (m.status === 'coming-soon' ? '🔒' : '📘')}
          </div>
        </div>
        <div>
          <h2 class="module-title">${m.title}</h2>
          <div class="module-description">${m.description}</div>
        </div>
        ${m.status !== 'coming-soon' ? `
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
        ` : ''}
        <div class="action-button ${m.status}" style="color: ${actionColor}">
          ${m.action} 
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>
      `;
      
      container.appendChild(card);
    });
  }

  function openModule(id, url) {
    tg.HapticFeedback.impactOccurred('medium');
    
    const module = modules.find(m => m.id === id);
    if (module.status === 'coming-soon') {
      tg.HapticFeedback.notificationOccurred('error');
      tg.showAlert('Bu modul hozircha mavjud emas!');
      return;
    }
    
    tg.HapticFeedback.notificationOccurred('success');
    localStorage.setItem('last_module', id);
    localStorage.setItem(`module_${id}_status`, 'opened');
    
    setTimeout(() => {
      window.location.href = url;
    }, 150);
  }

  function navigateTo(url) {
    tg.HapticFeedback.impactOccurred('light');
    setTimeout(() => {
      window.location.href = url;
    }, 100);
  }

  // Telegram BackButton boshqaruvi
  if (window.location.pathname !== '/index.html' && !window.location.pathname.endsWith('index.html')) {
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      window.location.href = 'index.html';
    });
  } else {
    tg.BackButton.hide();
  }

  // Initializatsiya
  function initApp() {
    const user = tg.initDataUnsafe?.user;
    
    if (user) {
      let fullName = user.first_name || 'Foydalanuvchi';
      if (user.last_name) {
        fullName = `${user.first_name} ${user.last_name}`;
      }
      document.getElementById('userName').textContent = fullName;
      setAvatar(user);
    } else {
      document.getElementById('userName').textContent = 'Mehmon';
      setAvatar(null);
    }

    updatePoints();
    renderModules();
  }

  initApp();

  // Ballar o'zgarishini kuzatish
  window.addEventListener('storage', (e) => {
    if (e.key === 'user_points') {
      updatePoints();
    }
  });
</script>
</body>
</html>
