<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>LearnU · 1-bo‘lim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 20px;
            position: relative;
        }
        .points-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .points-badge {
            background: rgba(255,255,255,0.95);
            color: #000;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0,122,255,0.15);
        }
        .card-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; overflow-y: auto; padding: 10px 0; }
        .flashcard {
            background: #0f0f0f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 36px;
            padding: 28px 25px;
            box-shadow: 0 4px 20px rgba(0,122,255,0.15);
        }
        .flag-row { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .flag-img { width: 42px; height: 28px; border-radius: 6px; object-fit: cover; }
        .part-of-speech {
            color: #a0a0a0;
            font-weight: 600;
            letter-spacing: 1.5px;
            font-size: 14px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.03);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .word-main {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #fff, #b0d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .audio-icon {
            color: #007aff;
            font-size: 32px;
            cursor: pointer;
            -webkit-text-fill-color: #007aff;
        }
        .translation-word {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            opacity: 0.95;
        }
        .next-btn {
            width: 100%;
            height: 65px;
            background: linear-gradient(145deg, #007aff, #00c6ff);
            color: white;
            border: none;
            border-radius: 32px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.3);
        }
        .module-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            color: #a0a0a0;
            border: 1px solid rgba(255,255,255,0.08);
        }
        hr { border: 0.5px solid rgba(255,255,255,0.05); margin: 15px 0; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="module-indicator">1-bo‘lim / 20</div>
    <div class="points-header">
        <div class="points-badge" id="pointsDisplay">⚡ 0</div>
    </div>
    <div class="card-stack" id="flashcard-stack"></div>
    <button class="next-btn" onclick="nextSection()">Keyingi bo‘lim <i class="fas fa-arrow-right"></i></button>
</div>

<script>
    let userPoints = parseInt(localStorage.getItem('user_points')) || 0;
    document.getElementById('pointsDisplay').textContent = `⚡ ${userPoints}`;

    const sentences = [
        "I am happy today.",
        "He is my brother.",
        "She is very kind.",
        "You are a good student.",
        "They are in the park."
    ];

    const translations = {
        "I am happy today.": "Men bugun baxtliman.",
        "He is my brother.": "U mening akam.",
        "She is very kind.": "U juda mehribon.",
        "You are a good student.": "Siz yaxshi talabasiz.",
        "They are in the park.": "Ular parkda."
    };

    function renderFlashcards() {
        const stack = document.getElementById('flashcard-stack');
        stack.innerHTML = '';
        
        sentences.forEach((sentence, index) => {
            // Ingliz karta
            const card1 = document.createElement('div');
            card1.className = 'flashcard';
            card1.innerHTML = `
                <div class="flag-row">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
                    <span class="part-of-speech">GAP</span>
                </div>
                <div class="word-main">
                    <span>${sentence}</span>
                    <i class="fas fa-volume-up audio-icon" onclick="speakText('${sentence}')"></i>
                </div>
            `;
            
            // O'zbek karta
            const card2 = document.createElement('div');
            card2.className = 'flashcard';
            card2.innerHTML = `
                <div class="flag-row">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
                </div>
                <div class="translation-word">${translations[sentence]}</div>
            `;
            
            stack.appendChild(card1);
            stack.appendChild(card2);
            
            if (index < sentences.length - 1) {
                const hr = document.createElement('hr');
                stack.appendChild(hr);
            }
        });
    }

    function speakText(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        window.speechSynthesis.speak(utterance);
    }

    function nextSection() {
        window.location.href = '2.html';
    }

    renderFlashcards();
</script>
</body>
</html>
