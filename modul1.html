<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingliz tili moduli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .content {
            padding: 30px;
            min-height: 400px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .module-info {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .module-title {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .module-progress {
            color: #666;
            font-size: 16px;
        }

        .button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            display: inline-block;
            margin: 10px;
        }

        .button:hover {
            background: #357abd;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .flashcard {
            background: white;
            border: 2px solid #4a90e2;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(74,144,226,0.2);
        }

        .flashcard .pos {
            color: #4a90e2;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .flashcard .eng {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .flashcard .uzb {
            font-size: 24px;
            color: #666;
        }

        .game-area {
            margin: 20px 0;
        }

        .prompt {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            text-align: center;
        }

        .build-zone {
            min-height: 60px;
            background: #e8f0fe;
            border: 2px dashed #4a90e2;
            border-radius: 10px;
            margin: 20px 0;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }

        .chip, .token {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .chip {
            background: #4a90e2;
            color: white;
        }

        .chip:hover {
            background: #357abd;
        }

        .token {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .token:hover {
            background: #e0e0e0;
            transform: scale(1.05);
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .final-stats {
            text-align: center;
            padding: 40px;
        }

        .final-stats h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .final-stats p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .small-button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .small-button:hover {
            background: #357abd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            Ingliz tili moduli
        </div>
        <div class="content">
            <!-- Asosiy menyu ekrani -->
            <div id="screen-main" class="screen active">
                <div class="module-info">
                    <div class="module-title">Modul 1: Kirish</div>
                    <div class="module-progress">6/20 so'z o'rganildi</div>
                </div>
                <div class="control-buttons">
                    <button class="button" onclick="startModule()">Boshlash</button>
                    <button class="button" onclick="continueModule()">Davom etish</button>
                </div>
            </div>

            <!-- Flashcard ekrani -->
            <div id="screen-flashcard" class="screen">
                <div class="flashcard">
                    <div class="pos" id="f-pos"></div>
                    <div class="eng" id="f-eng"></div>
                    <div class="uzb" id="f-uzb"></div>
                </div>
                <div class="control-buttons">
                    <button class="button" onclick="prevCard()">Oldingi</button>
                    <button class="button" onclick="nextCard()">Keyingi</button>
                    <button class="button" onclick="finishFlashcards()">Tayyor</button>
                </div>
            </div>

            <!-- So'z o'yini ekrani (g1) -->
            <div id="screen-g1" class="screen">
                <div class="game-area">
                    <div class="prompt" id="g1-question">So'zni toping:</div>
                    <div class="bank" id="g1-bank"></div>
                    <div class="control-buttons">
                        <button class="button" id="g1-check" onclick="checkWordGame()" disabled>Tekshirish</button>
                    </div>
                </div>
            </div>

            <!-- Gap o'yini ekrani (g2) -->
            <div id="screen-g2" class="screen">
                <div class="game-area">
                    <div class="prompt" id="g2-prompt"></div>
                    <div class="build-zone" id="g2-zone"></div>
                    <div class="bank" id="g2-bank"></div>
                    <div class="control-buttons">
                        <button class="button" id="g2-check" onclick="checkSentenceGame()" disabled>Tekshirish</button>
                    </div>
                </div>
            </div>

            <!-- Yakuniy ekran -->
            <div id="screen-final" class="screen">
                <div class="final-stats">
                    <h2>Tabriklaymiz! 🎉</h2>
                    <p>Siz modulni muvaffaqiyatli yakunladingiz!</p>
                    <p>To'plangan ballar: <span id="final-points">0</span></p>
                    <button class="button" onclick="continueToMain()">Asosiy sahifaga qaytish</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal panel -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title"></h3>
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button class="small-button" id="modal-button" onclick="hideModal()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Global o'zgaruvchilar
        let currentModulePoints = 170;
        let moduleId = 1;
        let currentCardIdx = 0;
        let g1Idx = 0;
        let g2Idx = 0;
        let builtSeq = [];
        let usedFlags = [];

        // So'zlar ma'lumotlari
        const vocabData = [
            { pos: "Ot", eng: "Apple", uzb: "Olma" },
            { pos: "Fe'l", eng: "Run", uzb: "Yugurmoq" },
            { pos: "Sifat", eng: "Happy", uzb: "Baxtli" },
            { pos: "Ot", eng: "Book", uzb: "Kitob" },
            { pos: "Fe'l", eng: "Read", uzb: "O'qimoq" },
            { pos: "Sifat", eng: "Big", uzb: "Katta" }
        ];

        // Gap ma'lumotlari
        const sentenceData = [
            { uz: "Men olma yeyman", correct: ["I", "eat", "apple"] },
            { uz: "U kitob o'qiydi", correct: ["She", "reads", "book"] },
            { uz: "Biz baxtlimiz", correct: ["We", "are", "happy"] }
        ];

        // Distraktorlar
        const distractors = ["they", "he", "it", "run", "big", "small"];

        // Ekranlarni boshqarish
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Modalni ko'rsatish
        function togglePanel(show, title, message, callback, isCorrect) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            modal.classList.add('active');
            
            if (isCorrect) {
                currentModulePoints += 10;
            }

            document.getElementById('modal-button').onclick = () => {
                modal.classList.remove('active');
                if (callback) callback();
            };
        }

        function hideModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Asosiy funksiyalar
        function startModule() {
            currentCardIdx = 0;
            g1Idx = 0;
            g2Idx = 0;
            showScreen('screen-flashcard');
            updateFlashcard();
        }

        function continueModule() {
            // Davom etish logikasi
            showScreen('screen-flashcard');
        }

        function updateFlashcard() {
            const item = vocabData[currentCardIdx];
            document.getElementById('f-pos').textContent = item.pos;
            document.getElementById('f-eng').textContent = item.eng;
            document.getElementById('f-uzb').textContent = item.uzb;
        }

        function prevCard() {
            if (currentCardIdx > 0) {
                currentCardIdx--;
                updateFlashcard();
            }
        }

        function nextCard() {
            if (currentCardIdx < vocabData.length - 1) {
                currentCardIdx++;
                updateFlashcard();
            }
        }

        function finishFlashcards() {
            showScreen('screen-g1');
            initWordGame();
        }

        // So'z o'yini (g1)
        function initWordGame() {
            if (g1Idx >= vocabData.length) {
                showScreen('screen-g2');
                initSentenceGame();
                return;
            }
            const curr = vocabData[g1Idx];
            document.getElementById('g1-question').textContent = `"${curr.uzb}" so'zining inglizchasini toping:`;
            
            let options = [curr.eng];
            while (options.length < 4) {
                const randomWord = vocabData[Math.floor(Math.random() * vocabData.length)].eng;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            const bank = document.getElementById('g1-bank');
            bank.innerHTML = '';
            options.forEach(word => {
                const token = document.createElement('div');
                token.className = 'token';
                token.textContent = word;
                token.onclick = () => {
                    document.querySelectorAll('#g1-bank .token').forEach(t => t.classList.remove('selected'));
                    token.classList.add('selected');
                    document.getElementById('g1-check').disabled = false;
                    window.selectedWord = word;
                };
                bank.appendChild(token);
            });
        }

        function checkWordGame() {
            const currentItem = vocabData[g1Idx];
            const isCorrect = window.selectedWord === currentItem.eng;
            togglePanel(true, isCorrect ? "To'g'ri!" : "Noto'g'ri", 
                       isCorrect ? "Juda zo'r!" : `To'g'ri javob: ${currentItem.eng}`, () => {
                if (!isCorrect) {
                    vocabData.push(currentItem);
                }
                if (g1Idx < vocabData.length - 1) {
                    g1Idx++;
                    initWordGame();
                } else {
                    showScreen('screen-g2');
                    initSentenceGame();
                }
            }, isCorrect);
        }

        // Gap o'yini (g2)
        function initSentenceGame() {
            if (g2Idx >= sentenceData.length) {
                showScreen('screen-final');
                return;
            }
            const curr = sentenceData[g2Idx];
            document.getElementById('g2-prompt').textContent = curr.uz;
            // So'zlar banki: to'g'ri so'zlar + 2-3 ta distraktor, aralashtirilgan
            let words = [...curr.correct];
            // distraktorlardan to'ldirish
            let availD = distractors.filter(d => !words.includes(d));
            for (let i=0; i<3; i++) {
                if (availD.length === 0) break;
                const rIdx = Math.floor(Math.random() * availD.length);
                words.push(availD[rIdx]);
                availD.splice(rIdx, 1);
            }
            words.sort(() => Math.random() - 0.5);
            builtSeq = []; 
            usedFlags = new Array(words.length).fill(false);
            window.currentBank = words;
            renderGame('g2');
        }

        function checkSentenceGame() {
            const currentItem = sentenceData[g2Idx];
            const correct = currentItem.correct;
            const isCorrect = builtSeq.length === correct.length && builtSeq.every((v, i) => v.word === correct[i]);
            togglePanel(true, isCorrect ? "Zo'r!" : "E'tiborli bo'ling!", 
                       isCorrect ? "Gap to'g'ri tuzildi." : "To'g'ri tartib: " + correct.join(' '), () => {
                if (!isCorrect) {
                    // xato bo'lsa, yana bir imkoniyat (gapni oxiriga qo'shamiz)
                    sentenceData.push(currentItem);
                }
                if (g2Idx < sentenceData.length - 1) { 
                    g2Idx++; 
                    initSentenceGame(); 
                } else { 
                    showScreen('screen-final'); 
                }
            }, isCorrect);
        }

        function continueToMain() {
            localStorage.setItem('last_module_points', currentModulePoints);
            localStorage.setItem(`module_${moduleId}_points`, currentModulePoints);
            localStorage.setItem(`module_${moduleId}_completed`, 'true');
            window.location.href = 'index.html'; // asosiy sahifaga qaytish
        }

        function renderGame(prefix) {
            const zone = document.getElementById(`${prefix}-zone`);
            const bank = document.getElementById(`${prefix}-bank`);
            const btn = document.getElementById(`${prefix}-check`);
            zone.innerHTML = '';
            builtSeq.forEach((item, i) => {
                const d = document.createElement('div');
                d.className = 'chip'; 
                d.textContent = item.word;
                d.onclick = () => { 
                    usedFlags[item.idx] = false; 
                    builtSeq.splice(i, 1); 
                    renderGame(prefix); 
                };
                zone.appendChild(d);
            });
            bank.innerHTML = '';
            window.currentBank.forEach((word, i) => {
                if (!usedFlags[i]) {
                    const t = document.createElement('div');
                    t.className = 'token'; 
                    t.textContent = word;
                    t.onclick = () => { 
                        usedFlags[i] = true; 
                        builtSeq.push({word, idx: i}); 
                        renderGame(prefix); 
                    };
                    bank.appendChild(t);
                }
            });
            btn.disabled = builtSeq.length === 0;
            btn.style.opacity = btn.disabled ? '0.5' : '1';
        }

        // Dastlabki flashcardni ko'rsatish
        const firstItem = vocabData[0];
        document.getElementById('f-pos').textContent = firstItem.pos;
        document.getElementById('f-eng').textContent = firstItem.eng;
        document.getElementById('f-uzb').textContent = firstItem.uzb;

        // Ballar ko'rsatkichi markazda
        const pointsIndicator = document.createElement('div');
        pointsIndicator.id = 'points-indicator';
        pointsIndicator.textContent = '⚡170';
        pointsIndicator.style.position = 'absolute';
        pointsIndicator.style.top = '50%';
        pointsIndicator.style.left = '50%';
        pointsIndicator.style.transform = 'translate(-50%, -50%)';
        pointsIndicator.style.fontSize = '24px';
        pointsIndicator.style.fontWeight = 'bold';
        pointsIndicator.style.color = '#4a90e2';
        pointsIndicator.style.zIndex = '1000';
        document.body.appendChild(pointsIndicator);
    </script>
</body>
</html>
