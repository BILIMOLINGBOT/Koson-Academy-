<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Modul</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #000; color: #fff; height: 100vh; overflow: hidden; }
    .app-wrapper { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; display: flex; flex-direction: column; }
    
    .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .avatar-wrapper { display: flex; align-items: center; gap: 12px; }
    .avatar-circle { 
      width: 45px; 
      height: 45px; 
      background: #222; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-weight: bold; 
      font-size: 1.2rem; 
      border: 1px solid #333; 
      overflow: hidden; 
    }
    .avatar-circle img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block;
    }
    
    .gradient-name {
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: bold;
    }
    
    .points-badge { background: #fff; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    
    /* Modul header */
    .module-header {
      padding: 0 20px 20px;
    }
    
    .back-button {
      width: 40px;
      height: 40px;
      background: #1c1c1e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    
    .back-button svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
    }
    
    .module-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .module-subtitle {
      color: #8e8e93;
      font-size: 16px;
    }
    
    /* Scroll container */
    .scroll-container { 
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
      -ms-overflow-style: none; 
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }
    
    /* Progress section */
    .progress-section {
      background: #1c1c1e;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    
    .progress-title {
      color: #8e8e93;
      font-size: 14px;
    }
    
    .progress-percent {
      font-weight: 600;
      color: #007aff;
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #007aff, #00c6ff);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s;
    }
    
    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 15px 10px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #007aff;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #8e8e93;
    }
    
    /* Darslar listi */
    .lessons-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    
    .lesson-item {
      background: #1c1c1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lesson-item:active {
      transform: scale(0.98);
      background: #2c2c2e;
    }
    
    .lesson-item.completed {
      border-color: #30d158;
    }
    
    .lesson-icon {
      width: 50px;
      height: 50px;
      background: #2c2c2e;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .lesson-icon.completed {
      background: #30d15820;
      color: #30d158;
    }
    
    .lesson-info {
      flex: 1;
    }
    
    .lesson-name {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .lesson-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: #8e8e93;
    }
    
    .lesson-points {
      color: #ff9f0a;
      font-weight: 600;
    }
    
    .lesson-status {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .lesson-status.completed {
      color: #30d158;
    }
    
    .lesson-status.locked {
      color: #8e8e93;
    }
    
    /* Bottom button */
    .bottom-button {
      margin: 20px;
    }
    
    .action-btn {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, #007aff, #00c6ff);
      border: none;
      border-radius: 28px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:active {
      transform: scale(0.96);
      opacity: 0.9;
    }
    
    .action-btn:disabled {
      background: #333;
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
    }
    
    /* Tab bar */
    .tab-bar { 
      height: 80px; 
      background: rgba(20, 20, 20, 0.95); 
      backdrop-filter: blur(10px);
      display: flex; 
      justify-content: space-around; 
      align-items: center;
      border-top: 0.5px solid #333; 
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-item { 
      color: #8e8e93; 
      text-decoration: none; 
      text-align: center; 
      font-size: 10px; 
      cursor: pointer;
    }
    .tab-item.active { color: #007aff; }
    .tab-item svg { 
      width: 24px; 
      height: 24px; 
      display: block; 
      margin: 0 auto 4px; 
      stroke: currentColor; 
      fill: none; 
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Header -->
  <div class="header" onclick="navigateTo('profil.html')">
    <div class="avatar-wrapper">
      <div class="avatar-circle" id="userAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      <div>
        <h4 id="userName" class="gradient-name">Yuklanmoqda...</h4>
      </div>
    </div>
    <div class="points-badge" id="userPoints">⚡ 0</div>
  </div>

  <!-- Modul Header -->
  <div class="module-header">
    <div class="back-button" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </div>
    <div class="module-title" id="moduleTitle">1-modul</div>
    <div class="module-subtitle" id="moduleSubtitle">Dasturlash asoslari</div>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-container">
    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Umumiy progress</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="completedLessons">0</div>
        <div class="stat-label">Darslar</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="earnedPoints">0</div>
        <div class="stat-label">Ballar</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalTime">0</div>
        <div class="stat-label">Soat</div>
      </div>
    </div>

    <!-- Darslar -->
    <div class="lessons-title">Modul darslari</div>
    <div id="lessonsList"></div>
    
    <!-- Bottom padding -->
    <div style="height: 20px;"></div>
  </div>

  <!-- Bottom Button -->
  <div class="bottom-button">
    <button class="action-btn" id="startBtn" onclick="startModule()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span>Darsni boshlash</span>
    </button>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <a href="index.html" class="tab-item" onclick="navigateTo('index.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span>Asosiy</span>
    </a>
    <a href="reyting.html" class="tab-item" onclick="navigateTo('reyting.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Reyting</span>
    </a>
    <a href="gift.html" class="tab-item" onclick="navigateTo('gift.html')">
      <svg viewBox="0 0 24 24" stroke-width="2"><rect x="2" y="7" width="20" height="5"/><path d="M20 12v10H4V12M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Sovg'alar</span>
    </a>
  </nav>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');

  // URL parametrlardan modul ID ni olish
  const urlParams = new URLSearchParams(window.location.search);
  const moduleId = urlParams.get('id') || '1';
  
  // Modul ma'lumotlari
  const moduleData = {
    title: `${moduleId}-modul`,
    subtitle: getModuleSubtitle(moduleId),
    totalLessons: 12,
    completedLessons: 3,
    earnedPoints: 45,
    totalTime: 2,
    status: 'available' // 'available', 'in-progress', 'coming-soon'
  };

  // Darslar ro'yxati
  const lessons = Array.from({ length: moduleData.totalLessons }, (_, i) => {
    const lessonNum = i + 1;
    const isCompleted = i < moduleData.completedLessons;
    const isLocked = lessonNum > moduleData.completedLessons + 1;
    
    return {
      id: lessonNum,
      name: `${lessonNum}-dars: ${getLessonName(moduleId, lessonNum)}`,
      points: 5,
      duration: '10 min',
      completed: isCompleted,
      locked: isLocked
    };
  });

  function getModuleSubtitle(id) {
    const titles = {
      '1': 'Dasturlash asoslari',
      '2': 'Algoritmlar',
      '3': "Ma'lumotlar tuzilmasi",
      '4': 'Veb dasturlash',
      '5': 'Mobil dasturlash'
    };
    return titles[id] || 'Dasturlash moduli';
  }

  function getLessonName(moduleId, lessonNum) {
    const lessons = {
      '1': {
        1: 'Kirish va o\'rnatish',
        2: 'O\'zgaruvchilar',
        3: 'Ma\'lumot turlari',
        4: 'Shartlar',
        5: 'Sikllar',
        6: 'Funksiyalar',
        7: 'Massivlar',
        8: 'Stringlar',
        9: 'Ob\'ektlar',
        10: 'Xatoliklar',
        11: 'Modullar',
        12: 'Amaliy mashg\'ulot'
      }
    };
    return lessons[moduleId]?.[lessonNum] || `Asosiy tushunchalar ${lessonNum}`;
  }

  function setAvatar(user) {
    const avatarInitial = document.getElementById('avatarInitial');
    const avatarImage = document.getElementById('avatarImage');
    
    if (user && user.photo_url) {
      avatarImage.src = user.photo_url;
      avatarImage.style.display = 'block';
      avatarInitial.style.display = 'none';
      
      avatarImage.onerror = function() {
        avatarImage.style.display = 'none';
        avatarInitial.style.display = 'block';
        if (user.first_name) {
          avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
        }
      };
    } else {
      avatarImage.style.display = 'none';
      avatarInitial.style.display = 'block';
      
      if (user && user.first_name) {
        avatarInitial.textContent = user.first_name.charAt(0).toUpperCase();
      } else {
        avatarInitial.textContent = '?';
      }
    }
  }

  function initApp() {
    const user = tg.initDataUnsafe?.user;
    
    // Foydalanuvchi ismi
    if (user) {
      let fullName = user.first_name || 'Foydalanuvchi';
      if (user.last_name) {
        fullName = `${user.first_name} ${user.last_name}`;
      }
      document.getElementById('userName').textContent = fullName;
      setAvatar(user);
    } else {
      document.getElementById('userName').textContent = 'Mehmon';
      setAvatar(null);
    }

    // Ballarni yuklash
    const points = localStorage.getItem('user_points') || 312;
    document.getElementById('userPoints').textContent = `⚡ ${points}`;

    // Modul ma'lumotlarini ko'rsatish
    document.getElementById('moduleTitle').textContent = moduleData.title;
    document.getElementById('moduleSubtitle').textContent = moduleData.subtitle;
    
    // Progress
    const progress = (moduleData.completedLessons / moduleData.totalLessons) * 100;
    document.getElementById('progressPercent').textContent = `${Math.round(progress)}%`;
    document.getElementById('progressFill').style.width = `${progress}%`;
    
    // Stats
    document.getElementById('completedLessons').textContent = moduleData.completedLessons;
    document.getElementById('earnedPoints').textContent = moduleData.earnedPoints;
    document.getElementById('totalTime').textContent = moduleData.totalTime;

    // Darslarni render qilish
    renderLessons();

    // Button status
    updateStartButton();
  }

  function renderLessons() {
    const container = document.getElementById('lessonsList');
    container.innerHTML = lessons.map(lesson => `
      <div class="lesson-item ${lesson.completed ? 'completed' : ''}" onclick="openLesson(${lesson.id})">
        <div class="lesson-icon ${lesson.completed ? 'completed' : ''}">
          ${lesson.completed ? '✓' : lesson.locked ? '🔒' : lesson.id}
        </div>
        <div class="lesson-info">
          <div class="lesson-name">${lesson.name}</div>
          <div class="lesson-meta">
            <span>${lesson.duration}</span>
            <span class="lesson-points">+${lesson.points}</span>
          </div>
        </div>
        <div class="lesson-status ${lesson.completed ? 'completed' : lesson.locked ? 'locked' : ''}">
          ${lesson.completed ? '✓' : lesson.locked ? '🔒' : ''}
        </div>
      </div>
    `).join('');
  }

  function updateStartButton() {
    const btn = document.getElementById('startBtn');
    const span = btn.querySelector('span');
    
    if (moduleData.status === 'coming-soon') {
      span.textContent = 'Tez kunda';
      btn.disabled = true;
    } else if (moduleData.completedLessons === moduleData.totalLessons) {
      span.textContent = 'Qayta boshlash';
    } else if (moduleData.completedLessons > 0) {
      span.textContent = 'Davom etish';
    } else {
      span.textContent = 'Darsni boshlash';
    }
  }

  function startModule() {
    tg.HapticFeedback.impactOccurred('medium');
    
    if (moduleData.status === 'coming-soon') {
      tg.HapticFeedback.notificationOccurred('warning');
      tg.showAlert('Bu modul hozircha mavjud emas');
      return;
    }
    
    // Birinchi tugallanmagan darsni topish
    const nextLesson = lessons.find(l => !l.completed && !l.locked) || lessons[0];
    openLesson(nextLesson.id);
  }

  function openLesson(lessonId) {
    const lesson = lessons.find(l => l.id === lessonId);
    
    if (lesson.locked) {
      tg.HapticFeedback.notificationOccurred('warning');
      tg.showAlert('Avval oldingi darslarni tugating');
      return;
    }
    
    tg.HapticFeedback.impactOccurred('light');
    
    // Lesson ID ni saqlash
    localStorage.setItem('current_lesson', lessonId);
    localStorage.setItem('current_module', moduleId);
    
    // Dars sahifasiga o'tish
    window.location.href = `dars.html?module=${moduleId}&lesson=${lessonId}`;
  }

  function goBack() {
    tg.HapticFeedback.impactOccurred('light');
    window.history.back();
  }

  window.navigateTo = function(url) {
    tg.HapticFeedback.impactOccurred('light');
    setTimeout(() => {
      window.location.href = url;
    }, 100);
  };

  // Telegram BackButton
  if (window.location.pathname.includes('modul')) {
    tg.BackButton.show();
    tg.BackButton.onClick(goBack);
  } else {
    tg.BackButton.hide();
  }

  initApp();
</script>
</body>
</html>
