<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>LearnU · Keyingi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* LearnU ranglar – qora, oq, kulrang */
        :root {
            --bg-primary: #000000;
            --text-primary: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            justify-content: flex-end;
        }

        /* Navigatsiya tugmasi */
        .next-btn {
            width: 100%;
            height: 65px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 32px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(255,255,255,0.1);
        }
        .next-btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

<div class="app-container">
    <button class="next-btn" onclick="goToIndex()">
        Keyingi <i class="fas fa-arrow-right"></i>
    </button>
</div>

<script>
    // "Keyingi" tugmasi bosilganda index.html sahifasiga o‘tish
    function goToIndex() {
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
