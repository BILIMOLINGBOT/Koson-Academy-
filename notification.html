<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dono - Bildirishnomalar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: calc(env(safe-area-inset-top) + 10px) 16px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.1);
    }

    .back-btn {
      font-size: 28px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .back-btn:active {
      background: #e5e5ea;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
    }

    .mark-read-btn {
      font-size: 14px;
      color: #007AFF;
      cursor: pointer;
    }

    .mark-read-btn:active {
      opacity: 0.6;
    }

    .notification-list {
      display: flex;
      flex-direction: column;
    }

    .notification-item {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: background 0.2s;
    }

    .notification-item:active {
      background: #f2f2f7;
    }

    .notification-item.unread {
      background: rgba(0, 122, 255, 0.05);
    }

    .notification-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: #f2f2f7;
      flex-shrink: 0;
    }

    .notification-content {
      flex: 1;
    }

    .notification-text {
      font-size: 15px;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .notification-time {
      font-size: 12px;
      color: #8e8e93;
    }

    .unread-dot {
      width: 8px;
      height: 8px;
      background: #007AFF;
      border-radius: 50%;
      margin-left: 8px;
      display: inline-block;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #8e8e93;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-top: 0.5px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 16px calc(env(safe-area-inset-bottom) + 8px) 16px;
      z-index: 999;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      flex: 1;
    }

    .nav-item:active {
      opacity: 0.6;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: #8e8e93;
    }

    .nav-item.active .nav-label {
      color: #007AFF;
    }

    .main-content {
      padding-bottom: 70px;
    }
  </style>
</head>
<body>

  <div class="main-content">
    <header class="header">
      <div class="back-btn" id="back-btn">←</div>
      <div class="header-title">Bildirishnomalar</div>
      <div class="mark-read-btn" id="mark-read-btn">Barchasini o'qildi</div>
    </header>

    <div class="notification-list" id="notification-list">
      <!-- Notifications will be loaded here -->
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item" data-page="index">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9L12 3L21 9L21 20H15V14H9V20H3V9Z"/>
      </svg>
      <span class="nav-label">Bosh sahifa</span>
    </div>
    <div class="nav-item" data-page="search">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Qidiruv</span>
    </div>
    <div class="nav-item active" data-page="notification">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="nav-label">Bildirish</span>
    </div>
    <div class="nav-item" data-page="profile">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="nav-label">Profil</span>
    </div>
  </div>

  <script>
    let notifications = [
      {
        id: 1,
        type: 'like',
        icon: '❤️',
        text: 'IT Academy kanali sizning videongizni yoqtirdi: "JavaScript darsi"',
        time: '5 daqiqa oldin',
        read: false
      },
      {
        id: 2,
        type: 'comment',
        icon: '💬',
        text: 'Ali Valiyev: "Ajoyib dars, davom eting!"',
        time: '1 soat oldin',
        read: false
      },
      {
        id: 3,
        type: 'subscribe',
        icon: '🔔',
        text: 'Yangi obunachi: 1250 ta obunachi boʻldingiz!',
        time: '3 soat oldin',
        read: true
      },
      {
        id: 4,
        type: 'video',
        icon: '📹',
        text: 'Siz kuzatayotgan kanal yangi video joyladi: "Sunʼiy intellekt asoslari"',
        time: '1 kun oldin',
        read: true
      },
      {
        id: 5,
        type: 'trending',
        icon: '🔥',
        text: 'Videongiz trend boʻldi! "JavaScript darsi" 10K koʻrildi',
        time: '2 kun oldin',
        read: false
      }
    ];

    function renderNotifications() {
      const container = document.getElementById('notification-list');
      
      if (notifications.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <p>Bildirishnomalar yoʻq</p>
            <p style="font-size: 13px; margin-top: 8px;">Yangi bildirishnomalar kelganda bu yerda koʻrinadi</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = notifications.map(notif => `
        <div class="notification-item ${!notif.read ? 'unread' : ''}" data-id="${notif.id}">
          <div class="notification-icon">${notif.icon}</div>
          <div class="notification-content">
            <div class="notification-text">
              ${notif.text}
              ${!notif.read ? '<span class="unread-dot"></span>' : ''}
            </div>
            <div class="notification-time">${notif.time}</div>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.notification-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = parseInt(item.dataset.id);
          const notif = notifications.find(n => n.id === id);
          if (notif && !notif.read) {
            notif.read = true;
            renderNotifications();
          }
          showToast(notif?.text || 'Bildirishnoma');
        });
      });
    }

    function markAllAsRead() {
      notifications.forEach(notif => notif.read = true);
      renderNotifications();
      showToast('Barcha bildirishnomalar o‘qildi deb belgilandi');
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.textContent = message;
      toast.style.cssText = `
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        font-size: 14px;
        z-index: 3000;
        animation: fadeInOut 2s ease;
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function navigateTo(page) {
      window.location.href = `${page}.html`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderNotifications();
      
      document.getElementById('back-btn')?.addEventListener('click', () => navigateTo('index'));
      document.getElementById('mark-read-btn')?.addEventListener('click', markAllAsRead);
      
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const page = item.dataset.page;
          if (page !== 'notification') {
            navigateTo(page);
          }
        });
      });
      
      if (window.Telegram?.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        
        const unreadCount = notifications.filter(n => !n.read).length;
        if (unreadCount > 0 && window.Telegram.WebApp.MainButton) {
          window.Telegram.WebApp.MainButton.setText(`${unreadCount} ta o‘qilmagan`);
          window.Telegram.WebApp.MainButton.show();
        }
      }
    });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
