<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── PROFIL SAHIFASI ── */
    .profile-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
      overflow-y: auto;
      padding-bottom: 40px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-content {
      padding: 30px 20px;
      text-align: center;
      overflow-y: auto;
      height: 100%;
    }

    /* ── PROFIL MENYU ── */
    .menu-list {
      margin-top: 20px;
      text-align: left;
    }

    .menu-item {
      background: #1c1c1e;
      padding: 18px 20px;
      border-radius: 20px;
      margin-bottom: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #fff;
      transition: 0.2s;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .menu-item:hover,
    .menu-item:active {
      background: #2c2c2e;
      border-color: #007aff;
    }

    .menu-item svg {
      width: 22px;
      height: 22px;
      stroke: #007aff;
      fill: none;
      stroke-width: 2;
    }

    .back-button {
      margin-top: 30px;
      color: #ff453a;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      padding: 15px;
      border-radius: 20px;
      background: #1c1c1e;
    }
    
    .back-button:active {
      background: #2c2c2e;
    }
    
    /* PROFIL SAHIFASI UCHUN STILLAR */
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #007aff;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .profile-username {
      color: #8e8e93;
      margin-bottom: 5px;
    }
    
    .profile-id {
      color: #5e5e62;
      font-size: 0.85rem;
      background: #1c1c1e;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 30px;
    }
    
    .menu-arrow {
      margin-left: auto;
      color: #5e5e62;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <!-- PROFIL SAHIFASI (to'liq menyu bilan) -->
  <div class="profile-page">
    <div class="page-content">
      <div class="profile-avatar-large" id="profileAvatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1 class="profile-name" id="profileFullName">Javlonbek Rashidov</h1>
      <p class="profile-username" id="profileUsername">@username</p>
      <p class="profile-id" id="profileId">ID: 774829</p>

      <!-- MENYU RO'YXATI -->
      <div class="menu-list">
        <div class="menu-item" onclick="showMenuItem('about')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Biz haqimizda</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('partner')">
          <svg viewBox="0 0 24 24"><path d="M12 2v4M12 22v-4M4 12H2h2M20 12h2-2M5.64 5.64l-1.41 1.41 1.41-1.41M18.36 5.64l1.41 1.41-1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
          <span>Hamkorlik dasturi</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('privacy')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span>Maxfiylik siyosati</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showPromoCode()">
          <svg viewBox="0 0 24 24"><path d="M20 6H4v12h16V6z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Promo kod</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('offer')">
          <svg viewBox="0 0 24 24"><path d="M4 4v16h16V4H4z"/><path d="M8 9h8M8 13h6M8 17h4"/></svg>
          <span>Ommaviy oferta</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('terms')">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Foydalanish</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('help')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Yordam</span>
          <span class="menu-arrow">›</span>
        </div>
      </div>

      <!-- ORQAGA QAYTISH TUGMASI index.html ga -->
      <div class="back-button" onclick="goToIndex()">← Orqaga qaytish</div>
    </div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');
  
  const haptic = tg.HapticFeedback;
  
  // Foydalanuvchi ma'lumotlari
  let userData = {
    firstName: 'Javlonbek',
    lastName: 'Rashidov',
    username: 'javlonbek',
    id: '774829',
    photoUrl: null
  };
  
  // index.html ga qaytish
  function goToIndex() {
    haptic.impactOccurred('light');
    window.location.href = 'index.html';
  }
  
  // Telegram ma'lumotlarini olish
  function initTelegramData() {
    const user = tg.initDataUnsafe?.user;
    
    if (user) {
      userData = {
        firstName: user.first_name || 'Javlonbek',
        lastName: user.last_name || 'Rashidov',
        username: user.username || 'javlonbek',
        id: user.id || '774829',
        photoUrl: user.photo_url || null
      };
      
      // Profil ma'lumotlarini yangilash
      updateProfileData();
    }
  }
  
  // Profil ma'lumotlarini yangilash
  function updateProfileData() {
    const fullName = userData.lastName ? 
      `${userData.firstName} ${userData.lastName}` : 
      userData.firstName;
    
    document.getElementById('profileFullName').textContent = fullName;
    document.getElementById('profileUsername').textContent = userData.username ? 
      `@${userData.username}` : 'username mavjud emas';
    document.getElementById('profileId').textContent = `ID: ${userData.id}`;
    
    // Avatar (agar rasm bo'lsa)
    const avatarEl = document.getElementById('profileAvatar');
    if (userData.photoUrl) {
      avatarEl.innerHTML = `<img src="${userData.photoUrl}" alt="avatar">`;
    }
  }
  
  // Promo kod
  function showPromoCode() {
    haptic.impactOccurred('medium');
    const promoCode = 'LEARN2024';
    
    // Promo kodni clipboardga ko'chirish
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(promoCode).then(() => {
        tg.showPopup({
          title: 'Promo Kod',
          message: `✅ Promo kod: ${promoCode}\n\nKod ko'chirildi!`,
          buttons: [{ type: 'close', text: 'Yopish' }]
        });
      }).catch(() => {
        tg.showPopup({
          title: 'Promo Kod',
          message: `🎁 Promo kod: ${promoCode}`,
          buttons: [{ type: 'close', text: 'Yopish' }]
        });
      });
    } else {
      tg.showPopup({
        title: 'Promo Kod',
        message: `🎁 Promo kod: ${promoCode}`,
        buttons: [{ type: 'close', text: 'Yopish' }]
      });
    }
  }
  
  // Menyu bandlari
  function showMenuItem(item) {
    haptic.impactOccurred('light');
    
    const titles = {
      about: 'Biz haqimizda',
      partner: 'Hamkorlik dasturi',
      privacy: 'Maxfiylik siyosati',
      offer: 'Ommaviy oferta',
      terms: 'Foydalanish shartlari',
      help: 'Yordam'
    };
    
    const messages = {
      about: 'LearnU - bu zamonaviy ta\'lim platformasi. Biz sizga eng sara bilimlarni taqdim etamiz.',
      partner: 'Hamkorlik qilishni xohlaysizmi? Biz bilan bog\'laning: partner@learnu.uz',
      privacy: 'Sizning shaxsiy ma\'lumotlaringiz qattiq himoya qilinadi. Batafsil: learnu.uz/privacy',
      offer: 'Ommaviy oferta shartlari bilan tanishish: learnu.uz/offer',
      terms: 'Foydalanish shartlari: learnu.uz/terms',
      help: 'Yordam kerakmi? Telegram: @learnu_support'
    };
    
    tg.showPopup({
      title: titles[item] || 'Ma\'lumot',
      message: messages[item] || 'Bu bo\'lim tez orada ishga tushadi! 🚀',
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // BackButton boshqaruvi
  tg.BackButton.show();
  tg.BackButton.onClick(() => {
    goToIndex();
  });
  
  // Sahifa yuklanganda
  window.addEventListener('load', () => {
    initTelegramData();
  });
</script>

</body>
</html>
