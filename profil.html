<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding-bottom: 90px;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* BACK BUTTON */
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 45px;
      height: 45px;
      background: rgba(28, 28, 30, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      z-index: 100;
      transition: 0.2s;
    }

    .back-button:active {
      transform: scale(0.9);
      background: rgba(50, 50, 52, 0.9);
    }

    .back-button svg {
      width: 24px;
      height: 24px;
      stroke: #ffffff;
      stroke-width: 2;
      fill: none;
    }

    /* PROFIL HEADER */
    .profile-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
      margin-bottom: 30px;
    }

    .avatar-large {
      width: 120px;
      height: 120px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #007aff;
      margin-bottom: 20px;
      overflow: hidden;
      font-size: 3rem;
      font-weight: bold;
      color: white;
      box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
    }

    .avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .profile-username {
      color: #8e8e93;
      font-size: 1rem;
      margin-bottom: 5px;
    }

    .profile-id {
      color: #5e5e62;
      font-size: 0.85rem;
      background: #1c1c1e;
      padding: 5px 15px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    /* STATISTIKA KARTALARI */
    .stats-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 25px 0;
    }

    .stat-card {
      background: #1c1c1e;
      border-radius: 25px;
      padding: 20px 10px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.2s;
    }

    .stat-card:active {
      transform: scale(0.95);
      border-color: #007aff;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #007aff;
      margin-bottom: 5px;
    }

    .stat-label {
      color: #8e8e93;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* MENYU BO'LIMI */
    .menu-title {
      color: #8e8e93;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin: 25px 0 10px 10px;
      text-transform: uppercase;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-item {
      background: #1c1c1e;
      padding: 18px 20px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .menu-item:hover,
    .menu-item:active {
      background: #2c2c2e;
      border-color: #007aff;
      transform: translateX(5px);
    }

    .menu-item svg {
      width: 24px;
      height: 24px;
      stroke: #007aff;
      fill: none;
      stroke-width: 2;
    }

    .menu-item span {
      flex: 1;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
    }

    .menu-arrow {
      color: #5e5e62;
      font-size: 1.2rem;
    }

    /* CHIQISH TUGMASI */
    .logout-button {
      margin-top: 30px;
      background: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.3);
      padding: 18px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #ff453a;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-button:active {
      background: rgba(255, 69, 58, 0.2);
      transform: scale(0.98);
    }

    .logout-button svg {
      width: 24px;
      height: 24px;
      stroke: #ff453a;
      stroke-width: 2;
      fill: none;
    }

    /* BOTTOM SPACE */
    .bottom-space {
      height: 40px;
    }

    /* ANIMATION */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-header, .stats-container, .menu-list, .logout-button {
      animation: slideIn 0.4s ease-out forwards;
    }

    .stats-container { animation-delay: 0.1s; opacity: 0; }
    .menu-title { animation: slideIn 0.4s 0.2s ease-out forwards; opacity: 0; }
    .menu-list { animation-delay: 0.3s; opacity: 0; }
    .logout-button { animation-delay: 0.4s; opacity: 0; }
  </style>
</head>
<body>
  <div class="back-button" onclick="goBack()">
    <svg viewBox="0 0 24 24">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </div>

  <div class="app-wrapper">
    <!-- PROFIL HEADER -->
    <div class="profile-header">
      <div class="avatar-large" id="profileAvatar">👤</div>
      <h1 class="profile-name" id="profileFullName">Yuklanmoqda...</h1>
      <p class="profile-username" id="profileUsername">@username</p>
      <p class="profile-id" id="profileId">ID: 123456789</p>
    </div>

    <!-- STATISTIKA -->
    <div class="stats-container">
      <div class="stat-card" onclick="showStatDetail('ballar')">
        <div class="stat-value" id="statPoints">0</div>
        <div class="stat-label">Ballar</div>
      </div>
      <div class="stat-card" onclick="showStatDetail('modullar')">
        <div class="stat-value" id="statModules">3</div>
        <div class="stat-label">Modullar</div>
      </div>
      <div class="stat-card" onclick="showStatDetail('reyting')">
        <div class="stat-value" id="statRank">#2</div>
        <div class="stat-label">Reyting</div>
      </div>
    </div>

    <!-- MENYU TITLE -->
    <div class="menu-title">⚙️ Sozlamalar</div>

    <!-- MENYU RO'YXATI -->
    <div class="menu-list">
      <div class="menu-item" onclick="showMenuItem('about')">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Biz haqimizda</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showMenuItem('partner')">
        <svg viewBox="0 0 24 24">
          <path d="M12 2v4M12 22v-4M4 12H2h2M20 12h2-2M5.64 5.64l-1.41 1.41 1.41-1.41M18.36 5.64l1.41 1.41-1.41-1.41"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
        <span>Hamkorlik dasturi</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showMenuItem('privacy')">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <span>Maxfiylik siyosati</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showPromoCode()">
        <svg viewBox="0 0 24 24">
          <path d="M20 6H4v12h16V6z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Promo kod</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showMenuItem('offer')">
        <svg viewBox="0 0 24 24">
          <path d="M4 4v16h16V4H4z"/>
          <path d="M8 9h8M8 13h6M8 17h4"/>
        </svg>
        <span>Ommaviy oferta</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showMenuItem('terms')">
        <svg viewBox="0 0 24 24">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span>Foydalanish shartlari</span>
        <span class="menu-arrow">›</span>
      </div>

      <div class="menu-item" onclick="showMenuItem('help')">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <span>Yordam</span>
        <span class="menu-arrow">›</span>
      </div>
    </div>

    <!-- CHIQISH TUGMASI -->
    <div class="logout-button" onclick="logout()">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Chiqish</span>
    </div>

    <div class="bottom-space"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor('bg_color');
    
    const haptic = tg.HapticFeedback;
    
    // Reyting ma'lumotlari (asosiy sahifadan olinadi)
    const rankingData = [
      { name: 'Sardor', points: 12400 },
      { name: 'Javlonbek', points: 11850 },
      { name: 'Malika', points: 10200 },
      { name: 'Aziz', points: 9800 },
      { name: 'Dilnoza', points: 9100 }
    ];
    
    // Foydalanuvchi ma'lumotlarini yuklash
    function loadUserData() {
      const user = tg.initDataUnsafe?.user;
      const points = localStorage.getItem('user_points') || 359;
      
      if (user) {
        const fullName = user.last_name ? 
          `${user.first_name} ${user.last_name}` : 
          user.first_name;
        
        document.getElementById('profileFullName').textContent = fullName;
        document.getElementById('profileUsername').textContent = user.username ? 
          `@${user.username}` : 'username mavjud emas';
        document.getElementById('profileId').textContent = `ID: ${user.id}`;
        
        // Avatar
        const avatarEl = document.getElementById('profileAvatar');
        if (user.photo_url) {
          avatarEl.innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
        } else {
          avatarEl.textContent = user.first_name.charAt(0).toUpperCase();
        }
        
        // Ballar
        document.getElementById('statPoints').textContent = points;
        
        // Reyting o'rnini topish
        const userRank = rankingData.findIndex(u => u.name === user.first_name) + 1;
        document.getElementById('statRank').textContent = userRank > 0 ? `#${userRank}` : '#10';
        
        // Modullar soni (localStorage dan)
        const modulesDone = localStorage.getItem('completed_modules') || 3;
        document.getElementById('statModules').textContent = modulesDone;
      }
    }
    
    // Orqaga qaytish
    function goBack() {
      haptic.impactOccurred('light');
      tg.BackButton.hide();
      window.location.href = 'index.html';
    }
    
    // Statistik detalni ko'rsatish
    function showStatDetail(type) {
      haptic.impactOccurred('medium');
      let message = '';
      switch(type) {
        case 'ballar':
          message = 'Sizning ballaringiz: ' + document.getElementById('statPoints').textContent;
          break;
        case 'modullar':
          message = 'Siz ' + document.getElementById('statModules').textContent + ' ta modulni yakunlagansiz';
          break;
        case 'reyting':
          message = 'Reytingdagi o\'rningiz: ' + document.getElementById('statRank').textContent;
          break;
      }
      tg.showPopup({
        title: 'Statistika',
        message: message,
        buttons: [{ type: 'close', text: 'Yopish' }]
      });
    }
    
    // Menyu bandlarini ko'rsatish
    function showMenuItem(item) {
      haptic.impactOccurred('light');
      const titles = {
        about: 'Biz haqimizda',
        partner: 'Hamkorlik dasturi',
        privacy: 'Maxfiylik siyosati',
        offer: 'Ommaviy oferta',
        terms: 'Foydalanish shartlari',
        help: 'Yordam'
      };
      
      tg.showPopup({
        title: titles[item] || 'Ma\'lumot',
        message: 'Bu bo\'lim tez orada ishga tushadi. Tez kunda kuting! 🚀',
        buttons: [{ type: 'close', text: 'Yopish' }]
      });
    }
    
    // Promo kod
    function showPromoCode() {
      haptic.impactOccurred('medium');
      const promoCode = 'LEARN2024';
      navigator.clipboard?.writeText(promoCode).then(() => {
        tg.showPopup({
          title: 'Promo Kod',
          message: `✅ ${promoCode}\n\nPromo kod ko'chirildi!`,
          buttons: [{ type: 'close', text: 'Ajoyib' }]
        });
      }).catch(() => {
        tg.showPopup({
          title: 'Promo Kod',
          message: `🎁 Promo kod: ${promoCode}`,
          buttons: [{ type: 'close', text: 'Yopish' }]
        });
      });
    }
    
    // Chiqish
    function logout() {
      haptic.notificationOccurred('warning');
      tg.showPopup({
        title: 'Chiqish',
        message: 'Haqiqatan ham chiqmoqchimisiz?',
        buttons: [
          { type: 'destructive', text: 'Chiqish' },
          { type: 'cancel', text: 'Bekor qilish' }
        ]
      }, (buttonId) => {
        if (buttonId === 'destructive') {
          localStorage.clear();
          tg.close();
        }
      });
    }
    
    // BackButton ni sozlash
    tg.BackButton.show();
    tg.BackButton.onClick(goBack);
    
    // Sahifa yuklanganda
    window.addEventListener('load', () => {
      loadUserData();
    });
  </script>
</body>
</html>
