<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── PROFIL SAHIFASI ── */
    .profile-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
      overflow-y: auto;
      padding-bottom: 40px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-content {
      padding: 30px 20px;
      text-align: center;
      overflow-y: auto;
      height: 100%;
    }

    /* ── PROFIL MENYU ── */
    .menu-list {
      margin-top: 20px;
      text-align: left;
    }

    .menu-item {
      background: #1c1c1e;
      padding: 18px 20px;
      border-radius: 20px;
      margin-bottom: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #fff;
      transition: 0.2s;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .menu-item:hover,
    .menu-item:active {
      background: #2c2c2e;
      border-color: #007aff;
    }

    .menu-item svg {
      width: 22px;
      height: 22px;
      stroke: #007aff;
      fill: none;
      stroke-width: 2;
    }

    .back-button {
      margin-top: 30px;
      color: #ff453a;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      padding: 15px;
      border-radius: 20px;
      background: #1c1c1e;
    }
    
    .back-button:active {
      background: #2c2c2e;
    }
    
    /* PROFIL SAHIFASI UCHUN STILLAR */
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #007aff;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .menu-arrow {
      margin-left: auto;
      color: #5e5e62;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <!-- PROFIL SAHIFASI (faqat "+" menyu bilan) -->
  <div class="profile-page">
    <div class="page-content">
      <div class="profile-avatar-large" id="profileAvatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1 class="profile-name" id="profileFullName">Javlonbek Rashidov</h1>

      <!-- MENYU RO'YXATI - FAQAT "+" QOLDI -->
      <div class="menu-list">
        <div class="menu-item" onclick="showMenuItem('partner')">
          <svg viewBox="0 0 24 24"><path d="M12 2v4M12 22v-4M4 12H2h2M20 12h2-2M5.64 5.64l-1.41 1.41 1.41-1.41M18.36 5.64l1.41 1.41-1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
          <span>+</span>  <!-- MATN FAQAT "+" -->
          <span class="menu-arrow">›</span>
        </div>
      </div>

      <!-- ORQAGA QAYTISH TUGMASI index.html ga -->
      <div class="back-button" onclick="goToIndex()">← Orqaga qaytish</div>
    </div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');
  
  const haptic = tg.HapticFeedback;
  
  // Foydalanuvchi ma'lumotlari
  let userData = {
    firstName: 'Javlonbek',
    lastName: 'Rashidov',
    photoUrl: null
  };
  
  // index.html ga qaytish
  function goToIndex() {
    haptic.impactOccurred('light');
    window.location.href = 'index.html';
  }
  
  // Telegram ma'lumotlarini olish
  function initTelegramData() {
    const user = tg.initDataUnsafe?.user;
    
    if (user) {
      userData = {
        firstName: user.first_name || 'Javlonbek',
        lastName: user.last_name || '',
        photoUrl: user.photo_url || null
      };
      
      // Profil ma'lumotlarini yangilash
      updateProfileData();
    }
  }
  
  // Profil ma'lumotlarini yangilash
  function updateProfileData() {
    let fullName = userData.firstName;
    
    if (userData.lastName) {
      fullName = `${userData.firstName} ${userData.lastName}`;
    }
    
    document.getElementById('profileFullName').textContent = fullName;
    
    // Avatar (agar rasm bo'lsa)
    const avatarEl = document.getElementById('profileAvatar');
    if (userData.photoUrl) {
      avatarEl.innerHTML = `<img src="${userData.photoUrl}" alt="avatar">`;
    } else {
      // Agar rasm bo'lmasa, ismning birinchi harfini ko'rsatish
      avatarEl.innerHTML = `<span style="font-size: 2.5rem;">${userData.firstName.charAt(0).toUpperCase()}</span>`;
    }
  }
  
  // Promo kod (funksiya saqlanadi, lekin chaqirilmaydi — xatolikka yo'l qo'ymaslik uchun qoldirildi)
  function showPromoCode() {
    // mavjud emas
  }
  
  // Menyu bandlari (faqat partner qoldi, lekin matni "+" ga moslandi)
  function showMenuItem(item) {
    haptic.impactOccurred('light');
    
    const titles = {
      partner: '+'   // sarlavha ham "+" qilindi
    };
    
    const messages = {
      partner: 'Hamkorlik dasturi haqida maʼlumot: +998 90 123 45 67 yoki partner@learnu.uz'  // kerakli matn
    };
    
    tg.showPopup({
      title: titles[item] || 'Maʼlumot',
      message: messages[item] || 'Bu boʻlim tez orada ishga tushadi! 🚀',
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // BackButton boshqaruvi
  tg.BackButton.show();
  tg.BackButton.onClick(() => {
    goToIndex();
  });
  
  // Sahifa yuklanganda
  window.addEventListener('load', () => {
    initTelegramData();
  });
</script>

</body>
</html>
