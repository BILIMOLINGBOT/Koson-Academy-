<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #000;
    }

    /* Profil header */
    .profile-header {
      padding: 30px 20px;
      text-align: center;
      border-bottom: 1px solid #222;
      position: relative;
    }
    
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #007aff;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0;
      color: #888;
      font-size: 14px;
    }
    
    .profile-stats span {
      display: block;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    /* Yuklash tugmasi */
    .upload-button {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: #007aff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.4);
      border: none;
      z-index: 10;
      transition: 0.2s;
    }

    .upload-button:active {
      transform: scale(0.9);
      background: #005bbf;
    }

    .upload-button svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.5;
    }

    /* Videolar bo'limi */
    .videos-section {
      padding: 20px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }

    .user-videos {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .video-item {
      display: flex;
      gap: 12px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
      cursor: pointer;
    }

    .video-thumbnail {
      width: 160px;
      aspect-ratio: 16/9;
      background: #000;
    }

    .video-thumbnail video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .video-details {
      flex: 1;
      padding: 12px;
    }

    .video-details h4 {
      font-size: 16px;
      margin-bottom: 6px;
      color: #fff;
    }

    .video-details p {
      color: #888;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .video-meta {
      display: flex;
      gap: 12px;
      color: #666;
      font-size: 12px;
    }

    .empty-videos {
      text-align: center;
      color: #666;
      padding: 40px 20px;
      background: #111;
      border-radius: 12px;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: #222;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      z-index: 10;
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <!-- Profil header -->
    <div class="profile-header">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <button class="upload-button" onclick="navigateTo('videoupdate.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>

      <div class="profile-avatar-large" id="profileAvatar">
        <span id="avatarInitial">?</span>
        <img id="avatarImage" src="" alt="avatar" style="display: none;">
      </div>
      
      <h1 class="profile-name" id="profileFullName">Yuklanmoqda...</h1>
      
      <div class="profile-stats">
        <div>
          <span id="videosCount">0</span>
          Videolar
        </div>
        <div>
          <span id="totalViews">0</span>
          Ko'rishlar
        </div>
      </div>
    </div>

    <!-- Videolar ro'yxati -->
    <div class="videos-section">
      <div class="section-title">Mening videolarim</div>
      <div class="user-videos" id="userVideos">
        <div class="empty-videos">
          <p>Hali video yuklamagansiz</p>
          <p style="font-size: 14px; margin-top: 8px;">+ tugmasini bosib video yuklang</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor('bg_color');

    // BackButton
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      window.location.href = 'index.html';
    });

    function goBack() {
      window.location.href = 'index.html';
    }

    window.navigateTo = function(url) {
      window.location.href = url;
    };

    // Telegram ma'lumotlarini olish
    function initTelegramData() {
      const user = tg.initDataUnsafe?.user;
      
      if (user) {
        let fullName = user.first_name || 'Foydalanuvchi';
        if (user.last_name) {
          fullName = `${user.first_name} ${user.last_name}`;
        }
        document.getElementById('profileFullName').textContent = fullName;
        
        // Avatar
        const avatarInitial = document.getElementById('avatarInitial');
        const avatarImage = document.getElementById('avatarImage');
        
        if (user.photo_url) {
          avatarImage.src = user.photo_url;
          avatarImage.style.display = 'block';
          avatarInitial.style.display = 'none';
        } else {
          avatarInitial.textContent = user.first_name?.charAt(0).toUpperCase() || '?';
        }
      }
    }

    // Foydalanuvchi videolarini yuklash
    function loadUserVideos() {
      const allVideos = JSON.parse(localStorage.getItem('videos')) || [];
      const userVideos = allVideos.filter(v => v.author === "Siz" || !v.author);
      
      // Statistika
      document.getElementById('videosCount').textContent = userVideos.length;
      const totalViews = userVideos.reduce((sum, v) => sum + (parseInt(v.views) || 0), 0);
      document.getElementById('totalViews').textContent = totalViews;

      const container = document.getElementById('userVideos');

      if (userVideos.length === 0) {
        container.innerHTML = `
          <div class="empty-videos">
            <p>Hali video yuklamagansiz</p>
            <p style="font-size: 14px; margin-top: 8px;">+ tugmasini bosib video yuklang</p>
          </div>
        `;
        return;
      }

      container.innerHTML = userVideos
        .sort((a, b) => b.id - a.id)
        .map(video => `
          <div class="video-item" onclick="openVideo(${video.id})">
            <div class="video-thumbnail">
              <video muted preload="metadata">
                <source src="${video.videoUrl}" type="video/mp4">
              </video>
            </div>
            <div class="video-details">
              <h4>${video.title || 'Nomsiz video'}</h4>
              <p>${video.description?.substring(0, 50) || ''}${video.description?.length > 50 ? '...' : ''}</p>
              <div class="video-meta">
                <span>${video.views || 0} ko'rish</span>
                <span>•</span>
                <span>${video.timeAgo || 'hozirgina'}</span>
              </div>
            </div>
          </div>
        `).join('');
    }

    window.openVideo = function(videoId) {
      const allVideos = JSON.parse(localStorage.getItem('videos')) || [];
      const video = allVideos.find(v => v.id === videoId);
      if (video) {
        localStorage.setItem('currentVideo', JSON.stringify(video));
        window.location.href = 'videoview.html';
      }
    };

    // Ishga tushirish
    window.addEventListener('load', () => {
      initTelegramData();
      loadUserVideos();
    });
  </script>
</body>
</html>
