
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Ultra Premium</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── SAHIFALAR (PAGES) ── */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding-bottom: 100px;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
      overflow-y: auto;
    }

    .page.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER (FAQAT ASOSIYDA) ── */
    .header {
      padding: 25px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .avatar-wrapper {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar-circle {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #222;
      overflow: hidden;
      font-weight: bold;
      font-size: 1.2rem;
    }
    
    .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── KARTALAR (ASOSIY SAHIFA) ── */
    .scroll-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 20px;
      gap: 15px;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .lesson-card {
      flex: 0 0 85%;
      height: 280px;
      border-radius: 40px;
      padding: 35px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: center;
      background: linear-gradient(145deg, #1c1c1e, #0a0a0a);
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }

    .lesson-card:active {
      transform: scale(0.98);
    }

    /* ── BOSHQA SAHIFALAR UCHUN STIL ── */
    .page-content {
      padding: 30px 20px;
      text-align: center;
      overflow-y: auto;
      height: 100%;
    }

    .page-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 20px;
    }

    /* ── iPHONE TAB BAR ── */
    .tab-bar {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 75px;
      background: rgba(28, 28, 30, 0.8);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 35px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      z-index: 100;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      color: #8e8e93;
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 600;
      transition: 0.2s;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 60px;
    }

    .tab-item.active { color: #ffffff; }

    .tab-item svg { 
      width: 26px; 
      height: 26px; 
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* ── REYTING LIST STILI ── */
    .rank-item {
      background: #1c1c1e;
      padding: 15px 20px;
      border-radius: 20px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .current-user-rank {
      border: 1px solid #007aff;
      background: #1c2a3a;
    }

    /* ── PROFIL MENYU ── */
    .menu-list {
      margin-top: 20px;
      text-align: left;
    }

    .menu-item {
      background: #1c1c1e;
      padding: 18px 20px;
      border-radius: 20px;
      margin-bottom: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #fff;
      transition: 0.2s;
      border: 1px solid transparent;
      cursor: pointer;
    }

    .menu-item:hover,
    .menu-item:active {
      background: #2c2c2e;
      border-color: #007aff;
    }

    .menu-item svg {
      width: 22px;
      height: 22px;
      stroke: #007aff;
      fill: none;
      stroke-width: 2;
    }

    .back-button {
      margin-top: 30px;
      color: #ff453a;
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      padding: 15px;
      border-radius: 20px;
      background: #1c1c1e;
    }
    
    .back-button:active {
      background: #2c2c2e;
    }
    
    /* PROFIL SAHIFASI UCHUN QO'SHIMCHA STILLAR */
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #007aff;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    
    .profile-username {
      color: #8e8e93;
      margin-bottom: 5px;
    }
    
    .profile-id {
      color: #5e5e62;
      font-size: 0.85rem;
      background: #1c1c1e;
      padding: 5px 15px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 30px;
    }
    
    .menu-arrow {
      margin-left: auto;
      color: #5e5e62;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <!-- ASOSIY SAHIFA -->
  <div id="home-page" class="page active">
    <div class="header" onclick="showPage('profile-page')">
      <div class="avatar-wrapper">
        <div class="avatar-circle" id="homeAvatar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div>
          <h4 id="homeUserName" style="font-size: 1.1rem;">Yuklanmoqda...</h4>
          <p id="homeUserStatus" style="color: #8e8e93; font-size: 0.85rem;">@username</p>
        </div>
      </div>
      <div id="homePoints" style="background: #fff; color: #000; padding: 6px 12px; border-radius: 15px; font-weight: 800; font-size: 0.8rem;">⚡ 359</div>
    </div>

    <div class="scroll-container" id="moduleContainer">
      <!-- Modullar JS orqali to'ldiriladi -->
    </div>
  </div>

  <!-- REYTING SAHIFASI -->
  <div id="rating-page" class="page">
    <div class="page-content">
      <h1 class="page-title">Top O'quvchilar</h1>
      <div id="ratingContainer">
        <!-- Reyting JS orqali to'ldiriladi -->
      </div>
    </div>
  </div>

  <!-- SOVG'ALAR SAHIFASI -->
  <div id="gift-page" class="page">
    <div class="page-content">
      <h1 class="page-title">Omadli G'ildirak</h1>
      <div style="width: 200px; height: 200px; border: 5px dashed #333; border-radius: 50%; margin: 40px auto; display: flex; align-items: center; justify-content: center;">
        <span id="wheelEmoji" style="font-size: 3rem;">🎁</span>
      </div>
      <button onclick="spinWheel()" style="background: #ffffff; color: #000; border: none; padding: 15px 40px; border-radius: 20px; font-weight: 700; font-size: 1rem; cursor: pointer;">Aylantirish</button>
      <p id="wheelResult" style="color: #8e8e93; margin-top: 20px;"></p>
    </div>
  </div>

  <!-- PROFIL SAHIFASI (to'liq menyu bilan) -->
  <div id="profile-page" class="page">
    <div class="page-content">
      <div class="profile-avatar-large" id="profileAvatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1 class="profile-name" id="profileFullName">Javlonbek Rashidov</h1>
      <p class="profile-username" id="profileUsername">@username</p>
      <p class="profile-id" id="profileId">ID: 774829</p>

      <!-- STATISTIKA -->
      <div style="display: flex; justify-content: space-around; margin-bottom: 30px;">
        <div>
          <div style="font-size: 1.5rem; font-weight: 700; color: #007aff;" id="statPoints">359</div>
          <div style="color: #8e8e93; font-size: 0.8rem;">Ballar</div>
        </div>
        <div>
          <div style="font-size: 1.5rem; font-weight: 700; color: #007aff;" id="statModules">3</div>
          <div style="color: #8e8e93; font-size: 0.8rem;">Modullar</div>
        </div>
        <div>
          <div style="font-size: 1.5rem; font-weight: 700; color: #007aff;" id="statRank">#2</div>
          <div style="color: #8e8e93; font-size: 0.8rem;">Reyting</div>
        </div>
      </div>

      <!-- MENYU RO'YXATI -->
      <div class="menu-list">
        <div class="menu-item" onclick="showMenuItem('about')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Biz haqimizda</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('partner')">
          <svg viewBox="0 0 24 24"><path d="M12 2v4M12 22v-4M4 12H2h2M20 12h2-2M5.64 5.64l-1.41 1.41 1.41-1.41M18.36 5.64l1.41 1.41-1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
          <span>Hamkorlik dasturi</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('privacy')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span>Maxfiylik siyosati</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showPromoCode()">
          <svg viewBox="0 0 24 24"><path d="M20 6H4v12h16V6z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Promo kod</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('offer')">
          <svg viewBox="0 0 24 24"><path d="M4 4v16h16V4H4z"/><path d="M8 9h8M8 13h6M8 17h4"/></svg>
          <span>Ommaviy oferta</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('terms')">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Foydalanish</span>
          <span class="menu-arrow">›</span>
        </div>
        <div class="menu-item" onclick="showMenuItem('help')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
          <span>Yordam</span>
          <span class="menu-arrow">›</span>
        </div>
      </div>

      <!-- ORQAGA QAYTISH TUGMASI -->
      <div class="back-button" onclick="showPage('home-page')">← Orqaga qaytish</div>
    </div>
  </div>

  <!-- TAB BAR -->
  <nav class="tab-bar">
    <div class="tab-item active" onclick="showPage('home-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span>Asosiy</span>
    </div>
    <div class="tab-item" onclick="showPage('rating-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      <span>Reyting</span>
    </div>
    <div class="tab-item" onclick="showPage('gift-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
      <span>Sovg'a</span>
    </div>
  </nav>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');
  
  const haptic = tg.HapticFeedback;
  
  // Ma'lumotlar
  const modules = [
    { id: 1, title: 'Kvant fizikasi asoslari', label: 'MODUL 1', action: 'Darsni boshlash' },
    { id: 2, title: 'Algoritmlar va ma\'lumotlar', label: 'MODUL 2', action: 'Davom etish' }
  ];
  
  const rankingData = [
    { name: 'Sardor', points: 12400 },
    { name: 'Javlonbek', points: 11850 },
    { name: 'Malika', points: 10200 }
  ];
  
  // Foydalanuvchi ma'lumotlari
  let userData = {
    firstName: 'Javlonbek',
    lastName: 'Rashidov',
    username: 'javlonbek',
    id: '774829',
    photoUrl: null,
    points: 359
  };
  
  // Sahifani ko'rsatish
  function showPage(pageId, element) {
    haptic.impactOccurred('light');
    
    document.querySelectorAll('.page').forEach(page => {
      page.classList.remove('active');
    });
    
    document.getElementById(pageId).classList.add('active');
    
    if (element) {
      document.querySelectorAll('.tab-item').forEach(item => {
        item.classList.remove('active');
      });
      element.classList.add('active');
    }
    
    // Profil sahifasini yangilash
    if (pageId === 'profile-page') {
      updateProfilePage();
    }
    
    // Reyting sahifasini yangilash
    if (pageId === 'rating-page') {
      updateRatingPage();
    }
  }
  
  // Telegram ma'lumotlarini olish
  function initTelegramData() {
    const user = tg.initDataUnsafe?.user;
    
    if (user) {
      userData = {
        firstName: user.first_name || 'Javlonbek',
        lastName: user.last_name || 'Rashidov',
        username: user.username || 'javlonbek',
        id: user.id || '774829',
        photoUrl: user.photo_url || null,
        points: parseInt(localStorage.getItem('user_points')) || 359
      };
      
      // Asosiy sahifani yangilash
      document.getElementById('homeUserName').textContent = userData.firstName;
      document.getElementById('homeUserStatus').textContent = userData.username ? 
        `@${userData.username}` : `ID: ${userData.id}`;
      document.getElementById('homePoints').textContent = `⚡ ${userData.points}`;
      
      // Profil sahifasini yangilash
      updateProfilePage();
    }
    
    // Modullarni render qilish
    renderModules();
  }
  
  // Modullarni render qilish
  function renderModules() {
    const container = document.getElementById('moduleContainer');
    container.innerHTML = modules.map(m => `
      <div class="lesson-card" onclick="openModule(${m.id})">
        <span style="color: #8e8e93; font-size: 0.7rem; letter-spacing: 1px;">${m.label}</span>
        <h2 style="font-size: 1.6rem;">${m.title}</h2>
        <div style="color: #007aff; font-weight: 600; font-size: 0.9rem;">${m.action} →</div>
      </div>
    `).join('');
  }
  
  // Profil sahifasini yangilash
  function updateProfilePage() {
    const fullName = userData.lastName ? 
      `${userData.firstName} ${userData.lastName}` : 
      userData.firstName;
    
    document.getElementById('profileFullName').textContent = fullName;
    document.getElementById('profileUsername').textContent = `@${userData.username}`;
    document.getElementById('profileId').textContent = `ID: ${userData.id}`;
    
    // Statistika
    document.getElementById('statPoints').textContent = userData.points;
    document.getElementById('statModules').textContent = localStorage.getItem('completed_modules') || '3';
    
    // Reyting o'rni
    const userRank = rankingData.findIndex(u => u.name === userData.firstName) + 1;
    document.getElementById('statRank').textContent = userRank > 0 ? `#${userRank}` : '#10';
    
    // Avatar (agar rasm bo'lsa)
    const avatarEl = document.getElementById('profileAvatar');
    if (userData.photoUrl) {
      avatarEl.innerHTML = `<img src="${userData.photoUrl}" alt="avatar">`;
    }
  }
  
  // Reyting sahifasini yangilash
  function updateRatingPage() {
    const container = document.getElementById('ratingContainer');
    
    let html = '';
    rankingData.forEach((user, index) => {
      const isCurrentUser = user.name === userData.firstName;
      html += `
        <div class="rank-item ${isCurrentUser ? 'current-user-rank' : ''}">
          <span>${index + 1}. ${user.name}</span>
          <span>${user.points.toLocaleString()} p</span>
        </div>
      `;
    });
    
    container.innerHTML = html;
  }
  
  // Modulni ochish
  function openModule(id) {
    haptic.notificationOccurred('success');
    tg.showPopup({
      title: 'Modul',
      message: `Modul ${id} ochilmoqda...`,
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // G'ildirakni aylantirish
  function spinWheel() {
    haptic.impactOccurred('medium');
    
    const emojis = ['🎁', '⭐', '🎯', '🏆', '💎'];
    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
    document.getElementById('wheelEmoji').textContent = randomEmoji;
    
    const winPoints = [5, 10, 20, 50][Math.floor(Math.random() * 4)];
    userData.points += winPoints;
    document.getElementById('homePoints').textContent = `⚡ ${userData.points}`;
    localStorage.setItem('user_points', userData.points);
    
    document.getElementById('wheelResult').textContent = `Tabriklaymiz! ${winPoints} ball yutdingiz!`;
    haptic.notificationOccurred('success');
  }
  
  // Promo kod
  function showPromoCode() {
    haptic.impactOccurred('medium');
    const promoCode = 'LEARN2024';
    navigator.clipboard?.writeText(promoCode);
    tg.showPopup({
      title: 'Promo Kod',
      message: `Promo kod: ${promoCode}`,
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // Menyu bandlari
  function showMenuItem(item) {
    haptic.impactOccurred('light');
    const titles = {
      about: 'Biz haqimizda',
      partner: 'Hamkorlik dasturi',
      privacy: 'Maxfiylik siyosati',
      offer: 'Ommaviy oferta',
      terms: 'Foydalanish shartlari',
      help: 'Yordam'
    };
    
    tg.showPopup({
      title: titles[item] || 'Ma\'lumot',
      message: 'Bu bo\'lim tez orada ishga tushadi! 🚀',
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // BackButton boshqaruvi
  tg.BackButton.onClick(() => {
    const activePage = document.querySelector('.page.active');
    if (activePage.id !== 'home-page') {
      showPage('home-page');
    } else {
      tg.close();
    }
  });
  
  // Boshlang'ich sozlash
  window.addEventListener('load', () => {
    initTelegramData();
    updateRatingPage();
  });
</script>

</body>
</html>
