<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profil</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── PROFIL SAHIFASI ── */
    .profile-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
      overflow-y: auto;
      padding-bottom: 20px;
      position: relative;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-content {
      padding: 30px 20px;
      text-align: center;
      overflow-y: auto;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* PROFIL SAHIFASI UCHUN STILLAR */
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #007aff;
      overflow: hidden;
      font-size: 2.5rem;
      font-weight: bold;
    }
    
    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .profile-name {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #fff, #aaccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── YUQORI O'NG BURCHAKDAGI + IKONKASI ── */
    .plus-button-corner {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      background: #007aff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0, 122, 255, 0.4);
      border: none;
      z-index: 10;
    }

    .plus-button-corner:hover,
    .plus-button-corner:active {
      background: #005bbf;
      transform: scale(1.05);
    }

    .plus-button-corner svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.5;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <!-- PROFIL SAHIFASI (o'ng burchakda + ikonkasi bilan) -->
  <div class="profile-page">
    <!-- YUQORI O'NG BURCHAKDAGI + IKONKASI -->
    <div class="plus-button-corner" onclick="handlePlusClick()">
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </div>
    
    <div class="page-content">
      <div class="profile-avatar-large" id="profileAvatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h1 class="profile-name" id="profileFullName">Javlonbek Rashidov</h1>
    </div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('secondary_bg_color');
  tg.setBackgroundColor('bg_color');
  
  const haptic = tg.HapticFeedback;
  
  // Foydalanuvchi ma'lumotlari
  let userData = {
    firstName: 'Javlonbek',
    lastName: 'Rashidov',
    photoUrl: null
  };
  
  // index.html ga qaytish (BackButton uchun)
  function goToIndex() {
    window.location.href = 'index.html';
  }
  
  // Telegram ma'lumotlarini olish
  function initTelegramData() {
    const user = tg.initDataUnsafe?.user;
    
    if (user) {
      userData = {
        firstName: user.first_name || 'Javlonbek',
        lastName: user.last_name || '',
        photoUrl: user.photo_url || null
      };
      
      // Profil ma'lumotlarini yangilash
      updateProfileData();
    }
  }
  
  // Profil ma'lumotlarini yangilash
  function updateProfileData() {
    let fullName = userData.firstName;
    
    if (userData.lastName) {
      fullName = `${userData.firstName} ${userData.lastName}`;
    }
    
    document.getElementById('profileFullName').textContent = fullName;
    
    // Avatar (agar rasm bo'lsa)
    const avatarEl = document.getElementById('profileAvatar');
    if (userData.photoUrl) {
      avatarEl.innerHTML = `<img src="${userData.photoUrl}" alt="avatar">`;
    } else {
      // Agar rasm bo'lmasa, ismning birinchi harfini ko'rsatish
      avatarEl.innerHTML = `<span style="font-size: 2.5rem;">${userData.firstName.charAt(0).toUpperCase()}</span>`;
    }
  }
  
  // + ikonkasi bosilganda ishlaydigan funksiya
  function handlePlusClick() {
    haptic.impactOccurred('medium');
    tg.showPopup({
      title: 'Qoʻshish',
      message: 'Bu yerda yangi element qoʻshish interfeysi boʻladi. (Tez orada)',
      buttons: [{ type: 'close', text: 'Yopish' }]
    });
  }
  
  // BackButton boshqaruvi (orqaga qaytganda index.html ga o'tadi)
  tg.BackButton.show();
  tg.BackButton.onClick(() => {
    goToIndex();
  });
  
  // Sahifa yuklanganda
  window.addEventListener('load', () => {
    initTelegramData();
  });
</script>

</body>
</html>
