
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>1-Dars | O'zingizni tanishtiring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: #1C1C1E;
      --player-bg: #0A0A0A;
      --accent: #FFFFFF;
      --blue-active: #007AFF;
      --text-secondary: #8E8E93;
      --border-subtle: #2C2C2E;
      --toast-bg: rgba(0, 0, 0, 0.85);
    }

    * {
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Fixed Header */
    .header {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 0.5px solid #2C2C2E;
      height: 64px;
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 22px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: background 0.2s;
      cursor: pointer;
    }
    .back-btn:active {
      background: rgba(255,255,255,0.15);
    }

    .header h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    /* Scrollable Content */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 80px 20px 210px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      background-color: #000000;
    }

    .text-item {
      margin-bottom: 24px;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid transparent;
      transition: border-color 0.3s ease, background-color 0.3s ease;
      cursor: pointer;
      user-select: none;
    }

    .text-item:active {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .text-item.active {
      border-color: #FFFFFF;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .en {
      font-size: 18px;
      font-weight: 600;
      display: block;
      color: #FFFFFF;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .uz {
      font-size: 15px;
      color: var(--text-secondary);
      display: block;
      line-height: 1.4;
    }

    /* Fixed Player Bottom */
    .player-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--player-bg);
      padding: 16px 20px 28px;
      border-top: 1px solid #222;
      z-index: 1000;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(10, 10, 10, 0.92);
    }

    .progress-box {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 18px;
    }

    .bar-container {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 4px;
      position: relative;
    }

    .bar-fill {
      width: 5%;
      height: 100%;
      background: #8E8E93;
      border-radius: 4px;
      transition: width 0.3s ease;
      position: relative;
    }

    .bar-dot {
      position: absolute;
      right: -6px;
      top: -5px;
      width: 14px;
      height: 14px;
      background: #FFFFFF;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }

    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      font-weight: 500;
    }

    .player-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      max-width: 400px;
      margin: 0 auto;
    }

    .player-controls i {
      font-size: 22px;
      color: #CCC;
      cursor: pointer;
      transition: 0.2s;
      padding: 8px;
      border-radius: 50%;
    }

    .player-controls i:active {
      transform: scale(0.9);
      color: #FFF;
      background: rgba(255,255,255,0.1);
    }

    .player-controls i.active-repeat {
      color: var(--blue-active);
      text-shadow: 0 0 12px rgba(0, 122, 255, 0.6);
    }

    .btn-play-pause {
      width: 68px;
      height: 68px;
      background: #1C1C1E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.6);
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid #2C2C2E;
    }

    .btn-play-pause:active {
      transform: scale(0.94);
      background: #2C2C2E;
    }

    .btn-play-pause i {
      font-size: 28px;
      color: #FFF;
      padding: 0;
    }

    .player-controls i.fa-backward-step,
    .player-controls i.fa-forward-step {
      font-size: 26px;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--toast-bg);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Telegram tasmasiga moslashish */
    body.telegram-app {
      padding-top: env(safe-area-inset-top);
    }
    
    .header.telegram-header {
      padding-top: calc(16px + env(safe-area-inset-top));
      height: calc(64px + env(safe-area-inset-top));
    }

    .player-fixed.telegram-player {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }
  </style>
</head>
<body>

<div class="header" id="headerBar">
  <a href="index.html" class="back-btn" id="backButton"><i class="fas fa-chevron-left"></i></a>
  <h1>O'zingizni tanishtiring</h1>
</div>

<main class="content-scroll" id="contentArea">
  <!-- JavaScript orqali matnlar qo'shiladi -->
</main>

<div class="player-fixed" id="playerBar">
  <div class="progress-box">
    <div class="bar-container">
      <div class="bar-fill" id="progressFill">
        <div class="bar-dot"></div>
      </div>
    </div>
    <div class="time-labels">
      <span id="currentTime">00:01</span>
      <span>01:53</span>
    </div>
  </div>

  <div class="player-controls">
    <i class="fas fa-arrows-rotate" id="repeatBtn" title="Takrorlash"></i>

    <i class="fas fa-backward-step" id="prevSentenceBtn" title="Oldingi"></i>

    <div class="btn-play-pause" id="playBtn">
      <i class="fas fa-pause"></i>
    </div>

    <i class="fas fa-forward-step" id="nextSentenceBtn" title="Keyingi"></i>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">Yana bir marta bosing, chiqish uchun</div>

<!-- ✅ TELEGRAM WEB APP SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
  (function() {
    // ==================== TELEGRAM INTEGRATION ====================
    const isTelegramApp = !!window.Telegram?.WebApp;
    let tg = null;
    let isTelegramBackButtonVisible = false;

    if (isTelegramApp) {
      tg = window.Telegram.WebApp;
      
      // Telegram tema ranglarini qo'llash
      document.documentElement.style.setProperty('--bg-dark', tg.themeParams.bg_color || '#000000');
      document.documentElement.style.setProperty('--card-bg', tg.themeParams.secondary_bg_color || '#1C1C1E');
      document.documentElement.style.setProperty('--text-secondary', tg.themeParams.hint_color || '#8E8E93');
      
      // Telegram native header qo'shish (ixtiyoriy)
      if (tg.version >= '6.1') {
        tg.setHeaderColor('bg_color');
        tg.setBackgroundColor('bg_color');
      }

      // Telegram back button
      tg.BackButton.show();
      isTelegramBackButtonVisible = true;

      tg.onEvent('backButtonClicked', function() {
        handleBackPress();
      });

      // Telegram ready
      tg.ready();
      
      // Expand to full height
      if (tg.version >= '6.0') {
        tg.expand();
      }
    }

    // ==================== DATA ====================
    const sentences = [
      ["My name is Ali.", "Mening ismim Ali."],
      ["I am 20 years old.", "Men 20 yoshdaman."],
      ["I was born in 2005.", "Men 2005-yilda tug'ilganman."],
      ["I am the youngest in my family.", "Men oilamda eng kichikman."],
      ["I live in Tashkent.", "Men Toshkentda yashayman."],
      ["My city is beautiful.", "Mening shahrim chiroyli."],
      ["I live near the park.", "Men bog' yaqinida yashayman."],
      ["I moved to this city last year.", "Men o'tgan yili bu shaharga ko'chib kelganman."],
      ["I have a big family.", "Mening katta oilam bor."],
      ["I have two brothers and one sister.", "Mening ikkita aka-ukam va bir opam bor."],
      ["My father is a teacher.", "Mening otam o'qituvchi."],
      ["I live with my parents.", "Men ota-onam bilan yashayman."],
      ["I study at State University.", "Men Davlat Universitetida o'qiyman."],
      ["I am a student.", "Men talabaman."],
      ["I study English.", "Men ingliz tilini o'qiyman."],
      ["I will graduate next year.", "Men kelgusi yil bitiruvchiman."],
      ["I want to be a programmer.", "Men dasturchi bo'lmoqchiman."],
      ["I like reading books.", "Men kitob o'qishni yoqtiraman."],
      ["I enjoy playing football.", "Men futbol o'ynashdan zavq olaman."],
      ["I love listening to music.", "Men musiqa tinglashni yaxshi ko'raman."],
      ["I am interested in technology.", "Men texnologiyaga qiziqaman."],
      ["I like watching movies.", "Men filmlar ko'rishni yoqtiraman."],
      ["My hobby is drawing.", "Mening xobbim — chizish."],
      ["I enjoy taking photos.", "Men suratga tushishdan zavq olaman."],
      ["I play chess in my free time.", "Men bo'sh vaqtda shaxmat o'ynayman."],
      ["I like green color.", "Men yashil rangni yoqtiraman."],
      ["I love pizza and burgers.", "Men pitsa va burgerlarni yaxshi ko'raman."],
      ["I like summer most.", "Men yozni eng ko'p yoqtiraman."],
      ["I enjoy traveling.", "Men sayohat qilishdan zavq olaman."],
      ["I like spending time with friends.", "Men do'stlar bilan vaqt o'tkazishni yoqtiraman."],
      ["I don't like waking up early.", "Men erta turishni yoqtirmayman."],
      ["I hate waiting in lines.", "Men navbat kutishdan nafratlanaman."],
      ["I don't like loud music.", "Men baland musiqani yoqtirmayman."],
      ["I dislike cold weather.", "Men sovuq ob-havoni yoqtirmayman."],
      ["I don't eat fish.", "Men baliq yemayman."],
      ["I am a friendly person.", "Men do'stona odamman."],
      ["I am hard-working.", "Men mehnatsevar odamman."],
      ["I am always happy.", "Men har doim baxtli odamman."],
      ["I am a good listener.", "Men yaxshi tinglovchiman."],
      ["I try to be honest.", "Men rostgo'y bo'lishga harakat qilaman."],
      ["I want to travel around the world.", "Men butun dunyo bo'ylab sayohat qilmoqchiman."],
      ["I want to learn three languages.", "Men uchta til o'rganmoqchiman."],
      ["I hope to find a good job.", "Men yaxshi ish topishni umid qilaman."],
      ["I dream of visiting Japan.", "Men Yaponiyaga borishni orzu qilaman."],
      ["I plan to open my own business.", "Men o'z biznesimni ochmoqchiman."]
    ];

    // ==================== DOM ELEMENTS ====================
    const container = document.getElementById('contentArea');
    const repeatBtn = document.getElementById('repeatBtn');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const playBtn = document.getElementById('playBtn');
    const playIcon = playBtn.querySelector('i');
    const toast = document.getElementById('toast');
    const backButton = document.getElementById('backButton');
    const prevSentenceBtn = document.getElementById('prevSentenceBtn');
    const nextSentenceBtn = document.getElementById('nextSentenceBtn');
    const headerBar = document.getElementById('headerBar');
    const playerBar = document.getElementById('playerBar');

    // ==================== STATE ====================
    let currentIdx = 0;
    let isRepeatMode = false;
    let textItems = [];
    let isNavigatingBack = false;
    let backPressTimer = null;
    const PAGE_ID = 'learnu_dars_1';

    // ==================== TELEGRAM ADAPTATION ====================
    if (isTelegramApp) {
      document.body.classList.add('telegram-app');
      headerBar.classList.add('telegram-header');
      playerBar.classList.add('telegram-player');
      
      // Agar Telegramda bo'lsa, ortiqcha back tugmani yashirish (ixtiyoriy)
      if (tg.BackButton.isVisible) {
        backButton.style.opacity = '0.4'; // Indikatsiya uchun xira qilish
      }
    }

    // ==================== RENDER ====================
    function renderTexts() {
      container.innerHTML = '';
      textItems = [];
      sentences.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'text-item';
        if (i === 0) item.classList.add('active');
        item.innerHTML = `<span class="en">${s[0]}</span><span class="uz">${s[1]}</span>`;
        
        item.addEventListener('click', function() {
          currentIdx = i;
          updateActive(currentIdx);
          updateProgressForIndex(currentIdx);
          saveCurrentState();
          
          // Telegram haptic feedback
          if (tg) {
            tg.HapticFeedback?.impactOccurred('light');
          }
        });
        
        container.appendChild(item);
        textItems.push(item);
      });
    }

    function updateActive(index) {
      textItems.forEach(item => item.classList.remove('active'));
      
      if (textItems[index]) {
        textItems[index].classList.add('active');
        textItems[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // Telegramga MainButton matnini o'zgartirish
        if (tg && tg.MainButton.isVisible) {
          const progress = Math.round(((index + 1) / sentences.length) * 100);
          tg.MainButton.setText(`Davom etish (${progress}%)`);
        }
      }
    }

    // ==================== PROGRESS ====================
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgressForIndex(index) {
      const totalDuration = 113;
      const perSentence = totalDuration / sentences.length;
      const currentSeconds = index * perSentence;
      
      const progressPercent = ((index + 1) / sentences.length) * 100;
      progressFill.style.width = progressPercent + '%';
      
      if (currentTimeSpan) {
        currentTimeSpan.textContent = formatTime(currentSeconds);
      }
    }

    // ==================== SENTENCE NAVIGATION ====================
    function changeSentence(step) {
      if (isRepeatMode && step === 1) {
        updateProgressForIndex(currentIdx);
        updateActive(currentIdx);
        return;
      }
      
      let newIndex = currentIdx + step;
      if (newIndex >= 0 && newIndex < sentences.length) {
        currentIdx = newIndex;
        updateActive(currentIdx);
        updateProgressForIndex(currentIdx);
        saveCurrentState();
        
        if (tg) {
          tg.HapticFeedback?.impactOccurred('light');
        }
        
        // Progressga qarab tugma ko'rinishini o'zgartirish
        updateTelegramMainButton();
      }
    }

    // ==================== TELEGRAM MAIN BUTTON ====================
    function updateTelegramMainButton() {
      if (!tg) return;
      
      const isComplete = currentIdx === sentences.length - 1;
      
      if (isComplete) {
        tg.MainButton.setText('✅ Yakunlash');
        tg.MainButton.color = '#34C759'; // Green
      } else {
        const progress = Math.round(((currentIdx + 1) / sentences.length) * 100);
        tg.MainButton.setText(`Keyingi (${progress}%)`);
        tg.MainButton.color = '#007AFF'; // Blue
      }
      
      if (!tg.MainButton.isVisible) {
        tg.MainButton.show();
      }
    }

    if (tg) {
      tg.MainButton.onClick(function() {
        if (currentIdx < sentences.length - 1) {
          changeSentence(1);
        } else {
          // Dars yakunlandi
          tg.HapticFeedback?.notificationOccurred('success');
          tg.showPopup({
            title: 'Dars yakunlandi! 🎉',
            message: `Siz ${sentences.length} ta jumlani o'rganib chiqdingiz`,
            buttons: [
              {id: 'repeat', type: 'default', text: 'Qaytadan'},
              {id: 'back', type: 'destructive', text: 'Chiqish'}
            ]
          }, function(buttonId) {
            if (buttonId === 'repeat') {
              currentIdx = 0;
              updateActive(0);
              updateProgressForIndex(0);
            } else {
              handleBackPress();
            }
          });
        }
      });
      
      updateTelegramMainButton();
    }

    // ==================== HISTORY & NAVIGATION ====================
    const HISTORY_KEY = 'learnu_navigation_stack';
    const HOME_PAGE_ID = 'learnu_sozlashuv_home';

    function getNavigationStack() {
      try {
        const stack = localStorage.getItem(HISTORY_KEY);
        return stack ? JSON.parse(stack) : [];
      } catch (e) {
        return [];
      }
    }

    function saveNavigationStack(stack) {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(stack));
      } catch (e) {
        console.warn('localStorage to\'lib ketgan');
      }
    }

    function saveCurrentState() {
      const stack = getNavigationStack();
      const currentState = {
        id: PAGE_ID,
        url: window.location.href,
        currentIdx: currentIdx,
        isRepeatMode: isRepeatMode,
        timestamp: Date.now()
      };
      
      const lastIndex = stack.length - 1;
      if (lastIndex >= 0 && stack[lastIndex].id === PAGE_ID) {
        stack[lastIndex] = currentState;
      } else {
        stack.push(currentState);
        if (stack.length > 20) stack.shift();
      }
      
      saveNavigationStack(stack);
    }

    function handleBackPress() {
      saveCurrentState();

      if (tg && isTelegramBackButtonVisible) {
        // Telegramda scroll holatini tiklab qaytish
        const navigationStack = getNavigationStack();
        
        if (navigationStack.length > 1) {
          const previousPage = navigationStack[navigationStack.length - 2];
          window.location.href = previousPage.url || 'index.html';
        } else {
          tg.close();
        }
      } else {
        // Oddiy brauzerda
        window.location.href = 'index.html';
      }
    }

    // ==================== HISTORY INITIALIZATION ====================
    function initializeHistory() {
      history.replaceState(
        { page: PAGE_ID, timestamp: Date.now(), initialLoad: true },
        '',
        window.location.href
      );
      
      // Brauzer uchun state
      history.pushState(
        { page: PAGE_ID, action: 'ready', timestamp: Date.now() },
        '',
        window.location.href
      );
      
      saveCurrentState();
    }

    
    // ==================== RESTORE STATE ====================
    function restoreState() {
      const stack = getNavigationStack();
      const currentState = stack.find(entry => entry.id === PAGE_ID);
      
      if (currentState) {
        if (typeof currentState.currentIdx !== 'undefined') {
          currentIdx = currentState.currentIdx;
          updateActive(currentIdx);
          updateProgressForIndex(currentIdx);
        }
        
        if (typeof currentState.isRepeatMode !== 'undefined') {
          isRepeatMode = currentState.isRepeatMode;
          if (isRepeatMode) {
            repeatBtn.classList.add('active-repeat');
          }
        }
        
        if (tg) updateTelegramMainButton();
      }
    }

    // ==================== EVENT LISTENERS ====================
    
    // Browser popstate (Android back button)
    window.addEventListener('popstate', function(event) {
      if (event.state && event.state.page === PAGE_ID) {
        handleBackPress();
      }
    });

    // Back button click
    backButton.addEventListener('click', function(e) {
      e.preventDefault();
      handleBackPress();
    });

    // Sentence navigation
    prevSentenceBtn.addEventListener('click', () => changeSentence(-1));
    nextSentenceBtn.addEventListener('click', () => changeSentence(1));

    // Keyboard
    document.addEventListener('keydown', function(e) {
      switch(e.key) {
        case 'ArrowRight':
        case 'ArrowDown':
          e.preventDefault();
          changeSentence(1);
          break;
        case 'ArrowLeft':
        case 'ArrowUp':
          e.preventDefault();
          changeSentence(-1);
          break;
        case 'Escape':
          e.preventDefault();
          handleBackPress();
          break;
        case ' ':
          e.preventDefault();
          togglePlayPause();
          break;
      }
    });

    // Repeat
    repeatBtn.addEventListener('click', function() {
      isRepeatMode = !isRepeatMode;
      this.classList.toggle('active-repeat');
      saveCurrentState();
      
      if (tg) {
        tg.HapticFeedback?.impactOccurred('soft');
      }
    });

    // Play/Pause
    function togglePlayPause() {
      if (playIcon.classList.contains('fa-pause')) {
        playIcon.classList.remove('fa-pause');
        playIcon.classList.add('fa-play');
      } else {
        playIcon.classList.remove('fa-play');
        playIcon.classList.add('fa-pause');
      }
    }
    playBtn.addEventListener('click', togglePlayPause);

    // Visibility
    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        saveCurrentState();
      } else {
        backPressTimer = null;
      }
    });

    // Before unload
    window.addEventListener('beforeunload', function() {
      saveCurrentState();
    });

    // Swipe gestures
    let touchStartX = 0;
    let touchStartY = 0;
    
    document.addEventListener('touchstart', function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      const diffX = e.changedTouches[0].clientX - touchStartX;
      const diffY = e.changedTouches[0].clientY - touchStartY;
      
      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
        if (diffX > 0) {
          changeSentence(-1);
        } else {
          changeSentence(1);
        }
      }
      
      backPressTimer = null;
    });

    // ==================== TELEGRAM EVENTS ====================
    if (tg) {
      // Viewport o'zgarganda
      tg.onEvent('viewportChanged', function(data) {
        const { height } = data;
        document.documentElement.style.setProperty('--tg-viewport-height', `${height}px`);
      });
      
      // Tema o'zgarganda
      tg.onEvent('themeChanged', function() {
        document.documentElement.style.setProperty('--bg-dark', tg.themeParams.bg_color || '#000000');
        document.documentElement.style.setProperty('--card-bg', tg.themeParams.secondary_bg_color || '#1C1C1E');
        document.documentElement.style.setProperty('--text-secondary', tg.themeParams.hint_color || '#8E8E93');
      });
    }

    // ==================== INIT ====================
    function init() {
      renderTexts();
      initializeHistory();
      
      const initialPercent = (1 / sentences.length) * 100;
      progressFill.style.width = initialPercent + '%';
      if (currentTimeSpan) currentTimeSpan.textContent = '00:00';
      
      setTimeout(restoreState, 100);
      
      // Telegram specific init
      if (tg) {
        console.log('✅ Telegram Web App initialized');
        console.log('   - Back button synced');
        console.log('   - Main button active');
        console.log('   - Theme integrated');
        console.log('   - Haptic feedback enabled');
      }
    }

    init();

    // ==================== DEBUG ====================
    if (typeof window !== 'undefined') {
      window.learnuDebug = {
        isTelegram: isTelegramApp,
        getStack: getNavigationStack,
        clearStack: () => {
          localStorage.removeItem(HISTORY_KEY);
        },
        getState: () => ({
          currentIdx,
          isRepeatMode,
          pageId: PAGE_ID,
          isTelegram: isTelegramApp
        }),
        simulateBack: handleBackPress
      };
    }

    console.log('📱 LearnU Dars 1 initialized');
    console.log(`   Platform: ${isTelegramApp ? 'Telegram Web App' : 'Browser'}`);
  })();
</script>
