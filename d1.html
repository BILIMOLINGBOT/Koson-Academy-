<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Dars | O'zingizni tanishtiring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: #1C1C1E;
            --player-bg: #0A0A0A;
            --accent: #FFFFFF;
            --blue-active: #007AFF; /* Takrorlash yoqilgandagi rang */
            --text-secondary: #8E8E93;
        }

        body {
            background-color: var(--bg-dark);
            color: #FFFFFF;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Fixed Header */
        .header {
            padding: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 0.5px solid #333;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 22px;
            margin-right: 15px;
        }

        .header h1 {
            font-size: 20px;
            margin: 0;
            font-weight: 600;
        }

        /* Scrollable Content */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 90px 20px 220px;
            scroll-behavior: smooth;
        }

        .sentence-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sentence-card.active {
            border-color: #FFFFFF;
            background: #2C2C2E;
        }

        .en {
            font-size: 18px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }

        .uz {
            font-size: 15px;
            color: var(--text-secondary);
            display: block;
        }

        /* Fixed Player Bottom */
        .player-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--player-bg);
            padding: 20px 20px 30px;
            border-top: 1px solid #222;
            z-index: 1000;
        }

        .progress-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .bar-container {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
        }

        .bar-fill {
            width: 5%; 
            height: 100%;
            background: #8E8E93;
            border-radius: 2px;
            transition: width 0.3s;
        }

        .bar-dot {
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #FFFFFF;
            border-radius: 50%;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            max-width: 500px;
            margin: 0 auto;
        }

        .player-controls i {
            font-size: 24px;
            color: #BBB;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Takrorlash rejimi yoqilgandagi uslub */
        .player-controls i.active-repeat {
            color: var(--blue-active);
            text-shadow: 0 0 10px rgba(0, 122, 255, 0.5);
        }

        .btn-play-pause {
            width: 70px;
            height: 70px;
            background: #1C1C1E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-play-pause i {
            font-size: 28px;
            color: #FFF;
        }

        .player-controls i:active {
            transform: scale(0.85);
            color: #FFF;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h1>O'zingizni tanishtiring</h1>
    </div>

    <main class="content-scroll" id="contentArea">
        </main>

    <div class="player-fixed">
        <div class="progress-box">
            <div class="bar-container">
                <div class="bar-fill" id="progressFill">
                    <div class="bar-dot"></div>
                </div>
            </div>
            <div class="time-labels">
                <span id="currentTime">00:01</span>
                <span>01:53</span>
            </div>
        </div>

        <div class="player-controls">
            <i class="fas fa-arrows-rotate" id="repeatBtn" title="Takrorlash"></i>
            
            <i class="fas fa-backward-step" onclick="changeSentence(-1)"></i>
            
            <div class="btn-play-pause" id="playBtn">
                <i class="fas fa-pause"></i>
            </div>
            
            <i class="fas fa-forward-step" onclick="changeSentence(1)"></i>
            
            </div>
    </div>

    <script>
        const sentences = [
            ["My name is Ali.", "Mening ismim Ali."],
            ["I am 20 years old.", "Men 20 yoshdaman."],
            ["I was born in 2005.", "Men 2005-yilda tug'ilganman."],
            ["I am the youngest in my family.", "Men oilamda eng kichikman."],
            ["I live in Tashkent.", "Men Toshkentda yashayman."],
            ["My city is beautiful.", "Mening shahrim chiroyli."],
            ["I live near the park.", "Men bog' yaqinida yashayman."],
            ["I moved to this city last year.", "Men o'tgan yili bu shaharga ko'chib kelganman."],
            ["I have a big family.", "Mening katta oilam bor."],
            ["I have two brothers and one sister.", "Mening ikkita aka-ukam va bir opam bor."],
            ["My father is a teacher.", "Mening otam o'qituvchi."],
            ["I live with my parents.", "Men ota-onam bilan yashayman."],
            ["I study at State University.", "Men Davlat Universitetida o'qiyman."],
            ["I am a student.", "Men talabaman."],
            ["I study English.", "Men ingliz tilini o'qiyman."],
            ["I will graduate next year.", "Men kelgusi yil bitiruvchiman."],
            ["I want to be a programmer.", "Men dasturchi bo'lmoqchiman."],
            ["I like reading books.", "Men kitob o'qishni yoqtiraman."],
            ["I enjoy playing football.", "Men futbol o'ynashdan zavq olaman."],
            ["I love listening to music.", "Men musiqa tinglashni yaxshi ko'raman."],
            ["I am interested in technology.", "Men texnologiyaga qiziqaman."],
            ["I like watching movies.", "Men filmlar ko'rishni yoqtiraman."],
            ["My hobby is drawing.", "Mening xobbim — chizish."],
            ["I enjoy taking photos.", "Men suratga tushishdan zavq olaman."],
            ["I play chess in my free time.", "Men bo'sh vaqtda shaxmat o'ynayman."],
            ["I like green color.", "Men yashil rangni yoqtiraman."],
            ["I love pizza and burgers.", "Men pitsa va burgerlarni yaxshi ko'raman."],
            ["I like summer most.", "Men yozni eng ko'p yoqtiraman."],
            ["I enjoy traveling.", "Men sayohat qilishdan zavq olaman."],
            ["I like spending time with friends.", "Men do'stlar bilan vaqt o'tkazishni yoqtiraman."],
            ["I don't like waking up early.", "Men erta turishni yoqtirmayman."],
            ["I hate waiting in lines.", "Men navbat kutishdan nafratlanaman."],
            ["I don't like loud music.", "Men baland musiqani yoqtirmayman."],
            ["I dislike cold weather.", "Men sovuq ob-havoni yoqtirmayman."],
            ["I don't eat fish.", "Men baliq yemayman."],
            ["I am a friendly person.", "Men do'stona odamman."],
            ["I am hard-working.", "Men mehnatsevar odamman."],
            ["I am always happy.", "Men har doim baxtli odamman."],
            ["I am a good listener.", "Men yaxshi tinglovchiman."],
            ["I try to be honest.", "Men rostgo'y bo'lishga harakat qilaman."],
            ["I want to travel around the world.", "Men butun dunyo bo'ylab sayohat qilmoqchiman."],
            ["I want to learn three languages.", "Men uchta til o'rganmoqchiman."],
            ["I hope to find a good job.", "Men yaxshi ish topishni umid qilaman."],
            ["I dream of visiting Japan.", "Men Yaponiyaga borishni orzu qilaman."],
            ["I plan to open my own business.", "Men o'z biznesimni ochmoqchiman."]
        ];

        const container = document.getElementById('contentArea');
        const repeatBtn = document.getElementById('repeatBtn');
        let currentIdx = 0;
        let isRepeatMode = false;

        // Gaplarni ro'yxatga qo'shish
        sentences.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = `sentence-card ${i === 0 ? 'active' : ''}`;
            card.innerHTML = `<span class="en">${s[0]}</span><span class="uz">${s[1]}</span>`;
            card.onclick = () => updateActive(i);
            container.appendChild(card);
        });

        // Takrorlash rejimi funksiyasi
        repeatBtn.onclick = () => {
            isRepeatMode = !isRepeatMode;
            repeatBtn.classList.toggle('active-repeat');
        };

        function updateActive(index) {
            currentIdx = index;
            document.querySelectorAll('.sentence-card').forEach(c => c.classList.remove('active'));
            
            const activeCard = container.children[index];
            activeCard.classList.add('active');
            
            // Matnni markazga keltirish
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Progress barni yangilash
            const progress = ((index + 1) / sentences.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function changeSentence(step) {
            // Agar takrorlash yoqilgan bo'lsa va "Next" (step 1) bosilsa, indeksni o'zgartirmaymiz
            if (isRepeatMode && step === 1) {
                // Faqat animatsiyani qayta ko'rsatamiz (takrorlash effekti)
                updateActive(currentIdx);
                return;
            }

            let newIndex = currentIdx + step;
            if (newIndex >= 0 && newIndex < sentences.length) {
                updateActive(newIndex);
            }
        }

        // Play/Pause tugmasi
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            const icon = playBtn.querySelector('i');
            icon.classList.toggle('fa-pause');
            icon.classList.toggle('fa-play');
        });
    </script>
</body>
</html>
