
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>1-Dars | O'zingizni tanishtiring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: #1C1C1E;
      --player-bg: #0A0A0A;
      --accent: #FFFFFF;
      --blue-active: #007AFF;
      --text-secondary: #8E8E93;
      --border-subtle: #2C2C2E;
    }

    * { box-sizing: border-box; }

    body {
      background-color: var(--bg-dark);
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Fixed Header */
    .header {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 0.5px solid #2C2C2E;
      height: 64px;
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 22px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: background 0.2s;
      cursor: pointer;
    }
    .back-btn:active { background: rgba(255,255,255,0.15); }

    .header h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    /* Scrollable Content */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 80px 20px 210px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      background-color: #000000;
    }

    .text-item {
      margin-bottom: 24px;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }

    .text-item.active {
      border-color: #FFFFFF;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .en { font-size: 18px; font-weight: 600; display: block; margin-bottom: 4px; }
    .uz { font-size: 15px; color: var(--text-secondary); display: block; }

    /* Player Bottom */
    .player-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px 20px 28px;
      z-index: 1000;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(10, 10, 10, 0.92);
      border-top: 1px solid #222;
    }

    .progress-box { width: 100%; max-width: 500px; margin: 0 auto 18px; }
    .bar-container { width: 100%; height: 4px; background: #333; border-radius: 4px; position: relative; }
    .bar-fill { height: 100%; background: #8E8E93; border-radius: 4px; transition: width 0.3s ease; position: relative; }
    .bar-dot { position: absolute; right: -6px; top: -5px; width: 14px; height: 14px; background: #FFFFFF; border-radius: 50%; }

    .time-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

    .player-controls { display: flex; justify-content: center; align-items: center; gap: 36px; max-width: 400px; margin: 0 auto; }
    .player-controls i { font-size: 22px; color: #CCC; cursor: pointer; padding: 8px; }
    .player-controls i.active-repeat { color: var(--blue-active); text-shadow: 0 0 12px rgba(0, 122, 255, 0.6); }

    .btn-play-pause {
      width: 68px; height: 68px; background: #1C1C1E; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #2C2C2E; cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="back-btn" id="backButton"><i class="fas fa-chevron-left"></i></div>
  <h1>O'zingizni tanishtiring</h1>
</div>

<main class="content-scroll" id="contentArea"></main>

<div class="player-fixed">
  <div class="progress-box">
    <div class="bar-container"><div class="bar-fill" id="progressFill"><div class="bar-dot"></div></div></div>
    <div class="time-labels"><span id="currentTime">00:00</span><span>01:53</span></div>
  </div>
  <div class="player-controls">
    <i class="fas fa-arrows-rotate" id="repeatBtn"></i>
    <i class="fas fa-backward-step" onclick="changeSentence(-1)"></i>
    <div class="btn-play-pause" id="playBtn"><i class="fas fa-pause"></i></div>
    <i class="fas fa-forward-step" onclick="changeSentence(1)"></i>
  </div>
</div>

<script>
  (function() {
    const sentences = [
      ["My name is Ali.", "Mening ismim Ali."],
      ["I am 20 years old.", "Men 20 yoshdaman."],
      ["I was born in 2005.", "Men 2005-yilda tug'ilganman."],
      ["I am the youngest in my family.", "Men oilamda eng kichikman."],
      ["I live in Tashkent.", "Men Tashkentda yashayman."]
      // ... qolgan gaplar
    ];

    const container = document.getElementById('contentArea');
    const backButton = document.getElementById('backButton');
    const playBtn = document.getElementById('playBtn');
    const repeatBtn = document.getElementById('repeatBtn');
    const progressFill = document.getElementById('progressFill');

    let currentIdx = 0;
    let isRepeatMode = false;
    let textItems = [];

    // TUZATILGAN QISM: To'g'ridan-to'g'ri index.html ga o'tish
    backButton.addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });

    function renderTexts() {
      sentences.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'text-item' + (i === 0 ? ' active' : '');
        item.innerHTML = `<span class="en">${s[0]}</span><span class="uz">${s[1]}</span>`;
        container.appendChild(item);
        textItems.push(item);
      });
    }

    window.changeSentence = function(step) {
      if (isRepeatMode && step === 1) return;
      let newIndex = currentIdx + step;
      if (newIndex >= 0 && newIndex < sentences.length) {
        currentIdx = newIndex;
        textItems.forEach(it => it.classList.remove('active'));
        textItems[currentIdx].classList.add('active');
        textItems[currentIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
        progressFill.style.width = ((currentIdx + 1) / sentences.length * 100) + '%';
      }
    };

    repeatBtn.onclick = () => {
      isRepeatMode = !isRepeatMode;
      repeatBtn.classList.toggle('active-repeat');
    };

    playBtn.onclick = () => {
      const icon = playBtn.querySelector('i');
      icon.classList.toggle('fa-pause');
      icon.classList.toggle('fa-play');
    };

    renderTexts();
  })();
</script>
</body>
</html>
