<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Dars | O'zingizni tanishtiring</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --player-bg: #121212;
            --card-bg: #1C1C1E;
            --accent: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        body {
            background-color: var(--bg-dark);
            color: #FFFFFF;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Asosiy body skrol bo'lmaydi */
        }

        /* Yuqori qism (Header va Player) - Mahkamlangan */
        .sticky-header {
            background-color: var(--bg-dark);
            padding: 15px 20px 5px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .top-nav {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 20px;
            margin-right: 15px;
        }

        .top-nav h1 {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        /* Audio Player */
        .audio-player {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .progress-container {
            width: 100%;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-current {
            width: 15%; /* Namuna uchun */
            height: 100%;
            background: #777;
            border-radius: 2px;
            position: relative;
        }

        .progress-dot {
            position: absolute;
            right: -6px;
            top: -4px;
            width: 12px;
            height: 12px;
            background: #FFFFFF;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 20px;
        }

        .controls i {
            font-size: 20px;
            color: #BBBBBB;
            cursor: pointer;
        }

        .play-pause-btn {
            width: 65px;
            height: 65px;
            background: #222;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-pause-btn i {
            font-size: 26px;
            color: #FFFFFF;
        }

        /* Skrol bo'ladigan matnlar qismi */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .sentence-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 15px;
            border: 2px solid transparent; /* Oddiy holatda hoshiya yo'q */
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ACTIVE HOLATI (Rasmda qizil/oq bilan so'ralgan joy) */
        .sentence-card.active {
            border-color: #FFFFFF; /* Oq ko'rsatgich (hoshiya) */
            background: #252529;
            transform: scale(1.02);
        }

        .en {
            font-size: 17px;
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .uz {
            font-size: 14px;
            color: var(--text-secondary);
            display: block;
        }

        /* Scrollbar dizayni */
        .scrollable-content::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <div class="top-nav">
            <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
            <h1>O'zingizni tanishtiring</h1>
        </div>

        <div class="audio-player">
            <div class="progress-container">
                <div class="progress-bar-wrapper">
                    <div class="progress-current" id="progressBar">
                        <div class="progress-dot"></div>
                    </div>
                </div>
                <div class="time-info">
                    <span id="currentTime">00:06</span>
                    <span>01:53</span>
                </div>
            </div>

            <div class="controls">
                <i class="fas fa-arrows-rotate"></i>
                <i class="fas fa-backward-step" onclick="prevSentence()"></i>
                <div class="play-pause-btn" id="playBtn">
                    <i class="fas fa-pause"></i>
                </div>
                <i class="fas fa-forward-step" onclick="nextSentence()"></i>
                <i class="fas fa-shuffle"></i>
            </div>
        </div>
    </div>

    <main class="scrollable-content" id="sentencesList">
        </main>

    <script>
        const data = [
            ["My name is Ali.", "Mening ismim Ali."],
            ["I am 20 years old.", "Men 20 yoshdaman."],
            ["I was born in 2005.", "Men 2005-yilda tug'ilganman."],
            ["I am the youngest in my family.", "Men oilamda eng kichikman."],
            ["I live in Tashkent.", "Men Toshkentda yashayman."],
            ["My city is beautiful.", "Mening shahrim chiroyli."],
            ["I live near the park.", "Men bog' yaqinida yashayman."],
            ["I moved to this city last year.", "Men o'tgan yili bu shaharga ko'chib kelganman."],
            ["I have a big family.", "Mening katta oilam bor."],
            ["I have two brothers and one sister.", "Mening ikkita aka-ukam va bir opam bor."],
            ["My father is a teacher.", "Mening otam o'qituvchi."]
            // ... qolgan gaplar ham shu tartibda davom etadi
        ];

        const listContainer = document.getElementById('sentencesList');
        let currentIndex = 0;

        // Gaplarni ekranga chiqarish
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `sentence-card ${index === 0 ? 'active' : ''}`;
            card.innerHTML = `
                <span class="en">${item[0]}</span>
                <span class="uz">${item[1]}</span>
            `;
            card.onclick = () => setActive(index);
            listContainer.appendChild(card);
        });

        function setActive(index) {
            currentIndex = index;
            // Barcha kartochkalardan 'active' klassini olib tashlash
            document.querySelectorAll('.sentence-card').forEach(c => c.classList.remove('active'));
            
            // Tanlanganiga qo'shish
            const activeCard = listContainer.children[index];
            activeCard.classList.add('active');
            
            // Avtomatik skrol qilish (o'rtaga keltirish)
            activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });

            // Progress barni simulatsiya qilish
            const percent = ((index + 1) / data.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function nextSentence() {
            if (currentIndex < data.length - 1) setActive(currentIndex + 1);
        }

        function prevSentence() {
            if (currentIndex > 0) setActive(currentIndex - 1);
        }

        // Play/Pause animatsiyasi
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            const icon = playBtn.querySelector('i');
            icon.classList.toggle('fa-pause');
            icon.classList.toggle('fa-play');
        });
    </script>
</body>
</html>
