<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>1-Dars | O'zingizni tanishtiring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #000000;
      --card-bg: #1C1C1E;
      --player-bg: #0A0A0A;
      --accent: #FFFFFF;
      --blue-active: #007AFF;
      --text-secondary: #8E8E93;
      --border-subtle: #2C2C2E;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Fixed Header */
    .header {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 0.5px solid #2C2C2E;
      height: 64px;
    }

    .back-btn {
      color: white;
      text-decoration: none;
      font-size: 22px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    
    .back-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }

    .header h1 {
      font-size: 20px;
      margin: 0;
      font-weight: 600;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    /* Scrollable Content */
    .content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 80px 20px 210px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      background-color: #000000;
    }

    .text-item {
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .text-item:active {
      transform: scale(0.98);
      transition: transform 0.1s;
    }

    .text-item.active {
      border-color: #FFFFFF;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .en {
      font-size: 18px;
      font-weight: 600;
      display: block;
      color: #FFFFFF;
      line-height: 1.4;
      margin-bottom: 4px;
      pointer-events: none;
    }

    .uz {
      font-size: 15px;
      color: var(--text-secondary);
      display: block;
      line-height: 1.4;
      pointer-events: none;
    }

    /* Fixed Player Bottom */
    .player-fixed {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--player-bg);
      padding: 16px 20px 28px;
      border-top: 1px solid #222;
      z-index: 1000;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(10, 10, 10, 0.92);
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
    }

    .progress-box {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 18px;
    }

    .bar-container {
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 4px;
      position: relative;
      cursor: pointer;
    }

    .bar-fill {
      width: 2.22%;
      height: 100%;
      background: #8E8E93;
      border-radius: 4px;
      transition: width 0.3s ease;
      position: relative;
    }

    .bar-dot {
      position: absolute;
      right: -6px;
      top: -5px;
      width: 14px;
      height: 14px;
      background: #FFFFFF;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    }

    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      font-weight: 500;
    }

    .player-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 36px;
      max-width: 400px;
      margin: 0 auto;
    }

    .player-controls i {
      font-size: 22px;
      color: #CCC;
      cursor: pointer;
      transition: 0.2s;
      padding: 8px;
      border-radius: 50%;
      -webkit-tap-highlight-color: transparent;
    }

    .player-controls i:active {
      transform: scale(0.9);
      color: #FFF;
      background: rgba(255, 255, 255, 0.1);
    }

    .player-controls i.active-repeat {
      color: var(--blue-active);
      text-shadow: 0 0 12px rgba(0, 122, 255, 0.6);
    }

    .btn-play-pause {
      width: 68px;
      height: 68px;
      background: #1C1C1E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
      transition: 0.2s;
      cursor: pointer;
      border: 1px solid #2C2C2E;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-play-pause:active {
      transform: scale(0.94);
      background: #2C2C2E;
    }

    .btn-play-pause i {
      font-size: 28px;
      color: #FFF;
      padding: 0;
    }

    .player-controls i.fa-backward-step,
    .player-controls i.fa-forward-step {
      font-size: 26px;
    }

    /* Custom Scrollbar */
    .content-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .content-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroll::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 2px;
    }
  </style>
</head>
<body>

<div class="header">
  <a href="#" class="back-btn" id="backButton"><i class="fas fa-chevron-left"></i></a>
  <h1>O'zingizni tanishtiring</h1>
</div>

<main class="content-scroll" id="contentArea">
  <!-- JavaScript orqali matnlar qo'shiladi -->
</main>

<div class="player-fixed">
  <div class="progress-box">
    <div class="bar-container" id="progressBar">
      <div class="bar-fill" id="progressFill">
        <div class="bar-dot"></div>
      </div>
    </div>
    <div class="time-labels">
      <span id="currentTime">00:00</span>
      <span id="totalTime">01:53</span>
    </div>
  </div>

  <div class="player-controls">
    <i class="fas fa-arrows-rotate" id="repeatBtn" title="Takrorlash"></i>

    <i class="fas fa-backward-step" id="prevBtn" title="Oldingi"></i>

    <div class="btn-play-pause" id="playBtn">
      <i class="fas fa-pause"></i>
    </div>

    <i class="fas fa-forward-step" id="nextBtn" title="Keyingi"></i>
  </div>
</div>

<script>
  (function() {
    // ==================== MA'LUMOTLAR ====================
    const sentences = [
      ["My name is Ali.", "Mening ismim Ali."],
      ["I am 20 years old.", "Men 20 yoshdaman."],
      ["I was born in 2005.", "Men 2005-yilda tug'ilganman."],
      ["I am the youngest in my family.", "Men oilamda eng kichikman."],
      ["I live in Tashkent.", "Men Toshkentda yashayman."],
      ["My city is beautiful.", "Mening shahrim chiroyli."],
      ["I live near the park.", "Men bog' yaqinida yashayman."],
      ["I moved to this city last year.", "Men o'tgan yili bu shaharga ko'chib kelganman."],
      ["I have a big family.", "Mening katta oilam bor."],
      ["I have two brothers and one sister.", "Mening ikkita aka-ukam va bir opam bor."],
      ["My father is a teacher.", "Mening otam o'qituvchi."],
      ["I live with my parents.", "Men ota-onam bilan yashayman."],
      ["I study at State University.", "Men Davlat Universitetida o'qiyman."],
      ["I am a student.", "Men talabaman."],
      ["I study English.", "Men ingliz tilini o'qiyman."],
      ["I will graduate next year.", "Men kelgusi yil bitiruvchiman."],
      ["I want to be a programmer.", "Men dasturchi bo'lmoqchiman."],
      ["I like reading books.", "Men kitob o'qishni yoqtiraman."],
      ["I enjoy playing football.", "Men futbol o'ynashdan zavq olaman."],
      ["I love listening to music.", "Men musiqa tinglashni yaxshi ko'raman."],
      ["I am interested in technology.", "Men texnologiyaga qiziqaman."],
      ["I like watching movies.", "Men filmlar ko'rishni yoqtiraman."],
      ["My hobby is drawing.", "Mening xobbim — chizish."],
      ["I enjoy taking photos.", "Men suratga tushishdan zavq olaman."],
      ["I play chess in my free time.", "Men bo'sh vaqtda shaxmat o'ynayman."],
      ["I like green color.", "Men yashil rangni yoqtiraman."],
      ["I love pizza and burgers.", "Men pitsa va burgerlarni yaxshi ko'raman."],
      ["I like summer most.", "Men yozni eng ko'p yoqtiraman."],
      ["I enjoy traveling.", "Men sayohat qilishdan zavq olaman."],
      ["I like spending time with friends.", "Men do'stlar bilan vaqt o'tkazishni yoqtiraman."],
      ["I don't like waking up early.", "Men erta turishni yoqtirmayman."],
      ["I hate waiting in lines.", "Men navbat kutishdan nafratlanaman."],
      ["I don't like loud music.", "Men baland musiqani yoqtirmayman."],
      ["I dislike cold weather.", "Men sovuq ob-havoni yoqtirmayman."],
      ["I don't eat fish.", "Men baliq yemayman."],
      ["I am a friendly person.", "Men do'stona odamman."],
      ["I am hard-working.", "Men mehnatsevar odamman."],
      ["I am always happy.", "Men har doim baxtli odamman."],
      ["I am a good listener.", "Men yaxshi tinglovchiman."],
      ["I try to be honest.", "Men rostgo'y bo'lishga harakat qilaman."],
      ["I want to travel around the world.", "Men butun dunyo bo'ylab sayohat qilmoqchiman."],
      ["I want to learn three languages.", "Men uchta til o'rganmoqchiman."],
      ["I hope to find a good job.", "Men yaxshi ish topishni umid qilaman."],
      ["I dream of visiting Japan.", "Men Yaponiyaga borishni orzu qilaman."],
      ["I plan to open my own business.", "Men o'z biznesimni ochmoqchiman."]
    ];

    // ==================== DOM ELEMENTLAR ====================
    const container = document.getElementById('contentArea');
    const repeatBtn = document.getElementById('repeatBtn');
    const progressFill = document.getElementById('progressFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const playBtn = document.getElementById('playBtn');
    const playIcon = playBtn.querySelector('i');
    const backButton = document.getElementById('backButton');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');

    // ==================== O'ZGARUVCHILAR ====================
    let currentIdx = 0;
    let isRepeatMode = false;
    let isPlaying = true;
    let textItems = [];
    const TOTAL_DURATION = 113; // 1 daqiqa 53 soniya

    // ==================== HISTORY BOSHQARISH ====================
    // Sahifa yuklanganda boshlang'ich holatni o'rnatish
    history.replaceState({ 
      page: 'lesson', 
      index: 0 
    }, '', window.location.href);

    // Orqaga qaytish tugmasi bosilganda
    window.addEventListener('popstate', function(event) {
      if (event.state && event.state.page === 'lesson') {
        currentIdx = event.state.index;
        updateActive(currentIdx);
        updateProgressForIndex(currentIdx);
      } else {
        // Agar tarixda hech narsa bo'lmasa, asosiy sahifaga o'tish
        goToMainPage();
      }
    });

    // Back button bosilganda
    backButton.addEventListener('click', function(e) {
      e.preventDefault();
      goToMainPage();
    });

    function goToMainPage() {
      // Asosiy sahifaga o'tish
      window.location.href = 'index.html';
    }

    // ==================== MATNLARNI YARATISH ====================
    function renderTexts() {
      container.innerHTML = '';
      textItems = [];
      
      sentences.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'text-item';
        if (i === 0) item.classList.add('active');
        item.innerHTML = `<span class="en">${s[0]}</span><span class="uz">${s[1]}</span>`;
        
        // Har bir gap uchun bosish eventi
        item.addEventListener('click', function() {
          if (i !== currentIdx) {
            navigateToSentence(i);
          }
        });
        
        container.appendChild(item);
        textItems.push(item);
      });
    }

    // ==================== NAVIGATSIYA FUNKSIYALARI ====================
    function navigateToSentence(index) {
      if (index >= 0 && index < sentences.length) {
        currentIdx = index;
        updateActive(currentIdx);
        updateProgressForIndex(currentIdx);
        
        // Tarixga qo'shish
        history.pushState({ 
          page: 'lesson', 
          index: currentIdx 
        }, '', `#sentence-${currentIdx}`);
      }
    }

    function changeSentence(step) {
      if (isRepeatMode) {
        // Takrorlash rejimida faqat progressni yangilash
        updateProgressForIndex(currentIdx);
        updateActive(currentIdx);
        return;
      }
      
      let newIndex = currentIdx + step;
      if (newIndex >= 0 && newIndex < sentences.length) {
        navigateToSentence(newIndex);
      }
    }

    function updateActive(index) {
      // Barcha elementlardan active klassini olib tashlash
      textItems.forEach(item => item.classList.remove('active'));
      
      // Yangi indeksga active klassini qo'shish
      if (textItems[index]) {
        textItems[index].classList.add('active');
        
        // Ko'rinadigan qismga siljitish
        textItems[index].scrollIntoView({ 
          behavior: 'smooth', 
          block: 'center' 
        });
      }
    }

    // ==================== PROGRESS BAR FUNKSIYALARI ====================
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateProgressForIndex(index) {
      const perSentence = TOTAL_DURATION / sentences.length;
      const currentSeconds = index * perSentence;
      
      // Progress foizini hisoblash
      const progressPercent = ((index + 1) / sentences.length) * 100;
      progressFill.style.width = progressPercent + '%';
      
      // Vaqtni yangilash
      if (currentTimeSpan) {
        currentTimeSpan.textContent = formatTime(currentSeconds);
      }
    }

    // Progress bar ustiga bosish
    progressBar.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const barWidth = rect.width;
      const clickPercent = clickX / barWidth;
      
      // Bosilgan joyga mos indexni hisoblash
      const targetIndex = Math.floor(clickPercent * sentences.length);
      if (targetIndex >= 0 && targetIndex < sentences.length) {
        navigateToSentence(targetIndex);
      }
    });

    // ==================== PLAY/PAUSE BOSHQARISH ====================
    playBtn.addEventListener('click', function() {
      isPlaying = !isPlaying;
      
      if (isPlaying) {
        playIcon.classList.remove('fa-play');
        playIcon.classList.add('fa-pause');
      } else {
        playIcon.classList.remove('fa-pause');
        playIcon.classList.add('fa-play');
      }
    });

    // ==================== TAKRORLASH REJIMI ====================
    repeatBtn.addEventListener('click', function() {
      isRepeatMode = !isRepeatMode;
      
      if (isRepeatMode) {
        this.classList.add('active-repeat');
      } else {
        this.classList.remove('active-repeat');
      }
    });

    // ==================== TUGMALAR ORQALI BOSHQARISH ====================
    prevBtn.addEventListener('click', function() {
      changeSentence(-1);
    });

    nextBtn.addEventListener('click', function() {
      changeSentence(1);
    });

    // ==================== KLAVIATURA ORQALI BOSHQARISH ====================
    document.addEventListener('keydown', function(e) {
      switch(e.key) {
        case 'ArrowRight':
        case 'ArrowDown':
          e.preventDefault();
          changeSentence(1);
          break;
        case 'ArrowLeft':
        case 'ArrowUp':
          e.preventDefault();
          changeSentence(-1);
          break;
        case ' ':
          e.preventDefault();
          playBtn.click();
          break;
        case 'Escape':
          e.preventDefault();
          goToMainPage();
          break;
      }
    });

    // ==================== SWIPE (SURISH) ORQALI BOSHQARISH ====================
    let touchStartX = 0;
    let touchStartY = 0;
    let touchEndX = 0;
    let touchEndY = 0;

    document.addEventListener('touchstart', function(e) {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      touchEndX = e.changedTouches[0].screenX;
      touchEndY = e.changedTouches[0].screenY;
      handleSwipe();
    }, { passive: true });

    function handleSwipe() {
      const swipeThreshold = 50;
      const deltaX = touchEndX - touchStartX;
      const deltaY = touchEndY - touchStartY;
      
      // Gorizontal surish vertikaldan kattaroq bo'lsa
      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (Math.abs(deltaX) > swipeThreshold) {
          if (deltaX > 0) {
            // O'nga surish - oldingi gap
            changeSentence(-1);
          } else {
            // Chapga surish - keyingi gap
            changeSentence(1);
          }
        }
      }
    }

    // ==================== PWA VA ANDROID UCHUN MAXSUS HANDLER ====================
    // Android WebView yoki PWA uchun
    document.addEventListener('backbutton', function(e) {
      e.preventDefault();
      
      if (currentIdx > 0) {
        // Agar dars ichida bo'lsa, oldingi gapga qaytish
        changeSentence(-1);
      } else {
        // Agar birinchi gapda bo'lsa, asosiy sahifaga qaytish
        goToMainPage();
      }
    }, false);

    // ==================== SAHIFA YUKLANGANDA ====================
    function initializeApp() {
      renderTexts();
      
      // Boshlang'ich progress
      const initialPercent = (1 / sentences.length) * 100;
      progressFill.style.width = initialPercent + '%';
      currentTimeSpan.textContent = '00:00';
      totalTimeSpan.textContent = formatTime(TOTAL_DURATION);
      
      // Birinchi gapni aktiv qilish
      updateActive(0);
    }

    // ==================== XOTIRADAN TOZALASH ====================
    window.addEventListener('beforeunload', function() {
      // Cleanup
      textItems = [];
    });

    // ==================== ILOVANI ISHGA TUSHIRISH ====================
    initializeApp();

    console.log('✅ Dars ilovasi muvaffaqiyatli yuklandi');
    console.log('📱 Back button xavfsiz holatda');
    console.log('🎯 Jami gaplar:', sentences.length);
    console.log('⏱️ Umumiy davomiylik:', formatTime(TOTAL_DURATION));

  })();
</script>
</body>
</html>
