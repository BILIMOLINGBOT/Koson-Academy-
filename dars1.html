
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Stacked Cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #d4e0e9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    .phone {
      max-width: 375px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 44px 44px 32px 32px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3), 0 0 0 8px #eef3f8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 740px;
    }

    /* ----- HEADER ----- */
    .header-orange {
      background-color: #FFA500;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }

    .user-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-circle {
      width: 46px;
      height: 46px;
      background-color: #9b9b9b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-circle svg {
      width: 68%;
      height: 68%;
      fill: #dfdfdf;
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #000000;
      letter-spacing: -0.2px;
    }

    .score-pill {
      background-color: #1a1a1a;
      border-radius: 40px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-number {
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* ----- STACKED CARDS CONTAINER ----- */
    .cards-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      /* Scrollbar yashirish */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .cards-scroll-area::-webkit-scrollbar {
      display: none;
    }

    .card {
      position: sticky;
      top: 0; /* Kartalar tepada ustma-ust yig'iladi */
      min-height: 400px;
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    /* Kartalar ranglari (navbat bilan) */
    .card-1 { background-color: #ADD8E6; top: 10px; }
    .card-2 { background-color: #B2EBF2; top: 30px; }
    .card-3 { background-color: #81D4FA; top: 50px; }
    .card-4 { background-color: #4FC3F7; top: 70px; }
    .card-5 { background-color: #29B6F6; top: 90px; }

    /* ----- LABELS ----- */
    .label-row {
      display: flex;
      justify-content: space-around;
      padding: 12px 36px;
      background: white;
      flex-shrink: 0;
    }

    .label {
      color: #000;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.85;
    }

    /* ----- BOTTOM NAV ----- */
    .bottom-nav {
      background-color: #333333;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 64px;
    }

    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item:nth-child(1) .icon-circle { background-color: #3b82f6; }
    .nav-item:nth-child(2) .icon-circle { background-color: white; }

    .degree-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #222;
      font-weight: 600;
    }
    .degree-big { font-size: 2rem; margin-bottom: -10px; }

    .nav-label {
      color: white;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Header -->
    <div class="header-orange">
      <div class="user-block">
        <div class="avatar-circle">
          <svg viewBox="0 0 24 24"><path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 2.69 8 6v2H4v-2c0-3.31 3.58-6 8-6z"/></svg>
        </div>
        <span class="user-name">Javlonbek Rashidov</span>
      </div>
      <div class="score-pill">
        <span class="score-number">359</span>
      </div>
    </div>

    <!-- 5 ta Ustma-ust Kartalar -->
    <div class="cards-scroll-area">
      <div class="card card-1"></div>
      <div class="card card-2"></div>
      <div class="card card-3"></div>
      <div class="card card-4"></div>
      <div class="card card-5"></div>
    </div>

    <!-- Labels -->
    <div class="label-row">
      <span class="label">Darslar</span>
      <span class="label">Resurslar</span>
      <span class="label">Ko'proq</span>
    </div>

    <!-- Navigation -->
    <div class="bottom-nav">
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="28" fill="white"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <span class="nav-label">Darslar</span>
      </div>

      <div class="nav-item">
        <div class="icon-circle">
          <div class="degree-block">
            <span class="degree-big">°</span>
            <span class="zero-small">0</span>
          </div>
        </div>
      </div>

      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="32" stroke="white" fill="none"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg>
        </div>
        <span class="nav-label">Resurslar</span>
      </div>

      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="32" fill="white"><circle cx="5" cy="12" r="2.5"/><circle cx="12" cy="12" r="2.5"/><circle cx="19" cy="12" r="2.5"/></svg>
        </div>
        <span class="nav-label">Ko'proq</span>
      </div>
    </div>
  </div>
</body>
</html>
