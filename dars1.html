<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profile Premium</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── SAHIFALAR (PAGES) ── */
    .page {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      padding-bottom: 100px;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .page.active { display: flex; }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── PROFIL HEADER ── */
    .profile-header-ui {
      padding: 40px 20px 20px;
      text-align: center;
    }
    
    .profile-avatar-large {
      width: 100px; height: 100px;
      background: #1c1c1e;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #333;
      position: relative;
    }

    .profile-avatar-large img {
        width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
    }

    .user-name { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
    .user-id { color: #8e8e93; font-size: 0.9rem; margin-top: 4px; }

    /* ── SETTINGS GROUPS (iOS STYLE) ── */
    .settings-group {
      margin: 20px 16px;
      background: #1c1c1e;
      border-radius: 14px;
      overflow: hidden;
    }

    .settings-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 15px;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: #2c2c2e; }

    .icon-box {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-box svg { width: 18px; height: 18px; color: white; fill: none; stroke: currentColor; stroke-width: 2.5; }

    .row-title { flex: 1; font-size: 1.05rem; font-weight: 400; color: #ffffff; }
    .chevron { width: 14px; height: 14px; opacity: 0.3; }

    /* ── Ikonkalar ranglari ── */
    .bg-orange { background: #ff9500; }
    .bg-green { background: #34c759; }
    .bg-blue { background: #007aff; }
    .bg-purple { background: #5856d6; }
    .bg-gray { background: #8e8e93; }
    .bg-red { background: #ff3b30; }

    /* ── TAB BAR ── */
    .tab-bar {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); width: 92%; height: 75px;
      background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px); border-radius: 35px;
      display: flex; align-items: center; justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      color: #8e8e93; font-size: 0.65rem; font-weight: 600;
    }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 26px; height: 26px; }

  </style>
</head>
