<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Yumaloq Kartalar</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    }

    body {
      background: #f0f2f5;
      display: flex; 
      align-items: center; 
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stack-scene {
      position: relative;
      width: 90%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lesson-card {
      position: absolute;
      width: 100%;
      height: 450px; 
      border-radius: 40px; /* Burchaklar yumaloqligi */
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      
      /* ASOSIY O'ZGARIŞ: Markazni pastga qo'yamiz */
      transform-origin: center bottom; 
      
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  opacity 0.4s ease, 
                  filter 0.4s ease;
    }

    /* Ranglar */
    .lesson-card:nth-child(1) { background: linear-gradient(135deg, #FF6B6B, #EE5252); }
    .lesson-card:nth-child(2) { background: linear-gradient(135deg, #4ECDC4, #45B7AA); }
    .lesson-card:nth-child(3) { background: linear-gradient(135deg, #FFD93D, #F6C90E); }
    .lesson-card:nth-child(4) { background: linear-gradient(135deg, #6C5CE7, #5F4BCF); }
    .lesson-card:nth-child(5) { background: linear-gradient(135deg, #A8E6CF, #7FCFB1); }

    .card-tag {
      font-size: 0.8rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 2rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
    }

    .hint {
      position: absolute;
      bottom: 40px;
      color: #888;
      font-size: 0.85rem;
      background: white;
      padding: 10px 20px;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">
    <!-- Kartalar -->
    <div class="lesson-card"><div class="card-tag">1-dars</div><div class="card-title">Algebra asoslari</div></div>
    <div class="lesson-card"><div class="card-tag">2-dars</div><div class="card-title">Ingliz tili</div></div>
    <div class="lesson-card"><div class="card-tag">3-dars</div><div class="card-title">Fizika</div></div>
    <div class="lesson-card"><div class="card-tag">4-dars</div><div class="card-title">Tarix</div></div>
    <div class="lesson-card"><div class="card-tag">5-dars</div><div class="card-title">Kimyo</div></div>
  </div>
  <div class="hint">Almashtirish uchun tepaga yoki pastga suring</div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* SOZLAMALAR */
  const Y_OFFSET = 45;       /* Orqa kartalar qancha tepaga chiqib turishi (px) */
  const SCALE_STEP = 0.05;   /* Orqadagi kartalar qisqarishi */

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      // Tartibni hisoblash (0 - eng oldindagi)
      const depth = (i - topIdx + N) % N;
      
      card.style.transition = animated ? '' : 'none';
      
      // Kartaning holati
      // translateY: kartani yuqoriga suradi
      // scale: kartani ozgina kichraytiradi
      const ty = -depth * Y_OFFSET;
      const sc = 1 - (depth * SCALE_STEP);
      
      card.style.transform = `translateY(${ty}px) scale(${sc})`;
      card.style.zIndex = N - depth;
      
      // Orqadagi kartalarni xiralashtirish
      card.style.filter = `brightness(${1 - depth * 0.1})`;
      card.style.opacity = depth > 3 ? 0 : 1;
      
      // Faqat eng oldingisiga teginish mumkin
      card.style.pointerEvents = depth === 0 ? 'auto' : 'none';
    });
  }

  applyLayout(false);

  let startY = null;
  const onDown = (e) => startY = e.touches ? e.touches[0].clientY : e.clientY;
  const onUp = (e) => {
    if (startY === null) return;
    const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const deltaY = endY - startY;
    if (Math.abs(deltaY) > 50) {
      topIdx = deltaY < 0 ? (topIdx + 1) % N : (topIdx - 1 + N) % N;
      applyLayout(true);
    }
    startY = null;
  };

  scene.addEventListener('mousedown', onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup', onUp);
  scene.addEventListener('touchend', onUp);
})();
</script>

</body>
</html>
