<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Yumaloq Kartalar</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', sans-serif; 
    }

    body {
      background: #e0e0e0; /* Orqa fon bir oz to'qroq */
      display: flex; 
      align-items: center; 
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end; /* Kartalarni pastga taqaymiz */
      padding-bottom: 60px;
    }

    .stack-scene {
      position: relative;
      width: 90%;
      height: 500px; /* Kartalar balandligi */
      display: flex;
      justify-content: center;
    }

    .lesson-card {
      position: absolute;
      width: 100%;
      height: 100%;
      /* Burchaklarni aynan rasmdagidek qilish */
      border-radius: 80px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      padding: 60px 40px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      /* Pastdan tepaga qarab o'sishi uchun */
      transform-origin: bottom center; 
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                  opacity 0.4s ease, 
                  filter 0.4s ease;
    }

    /* Ranglar (Rasmdagiga yaqinroq) */
    .lesson-card:nth-child(1) { background: linear-gradient(180deg, #D65454, #C04848); }
    .lesson-card:nth-child(2) { background: linear-gradient(180deg, #389393, #2D7A7A); }
    .lesson-card:nth-child(3) { background: linear-gradient(180deg, #B59B32, #9E882B); }
    .lesson-card:nth-child(4) { background: linear-gradient(180deg, #4F44A7, #41388B); }
    .lesson-card:nth-child(5) { background: linear-gradient(180deg, #7BB9A1, #66A38B); }

    .card-tag {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 30px;
    }

    .card-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: white;
      line-height: 1.1;
    }

    .hint {
      margin-top: 40px;
      color: #777;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.6);
      padding: 12px 24px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">
    <div class="lesson-card">
      <div class="card-tag">1-Dars · Matematika</div>
      <div class="card-title">Algebra asoslari va murakkab tenglamalar</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">2-Dars · Ingliz tili</div>
      <div class="card-title">Grammatika va so'zlashuv</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">3-Dars · Fizika</div>
      <div class="card-title">Kinematika va dinamika asoslari</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">4-Dars · Tarix</div>
      <div class="card-title">Jahon sivilizatsiyasi rivojlanishi</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">5-Dars · Kimyo</div>
      <div class="card-title">Organik birikmalar va reaksiyalar</div>
    </div>
  </div>
  <div class="hint">Almashtirish uchun tepaga yoki pastga suring</div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* Vizual sozlamalar */
  const Y_OFFSET = 25;       /* Kartalar orasidagi masofa (tepaga siljish) */
  const SCALE_STEP = 0.04;    /* Orqa kartalar qisqarishi */

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      // Indexni hisoblash (aylanma)
      const depth = (i - topIdx + N) % N;
      
      card.style.transition = animated ? '' : 'none';
      
      // Rasmdagidek effekt: 
      // depth 0 - eng oldinda, translateY(0)
      // depth 1 - orqada, translateY(-25px), bir oz kichikroq
      const ty = -(depth * Y_OFFSET);
      const sc = 1 - (depth * SCALE_STEP);
      
      card.style.transform = `translateY(${ty}px) scale(${sc})`;
      card.style.zIndex = N - depth;
      
      // Orqa fondagilarni xiralashtirish
      card.style.filter = `brightness(${1 - depth * 0.1})`;
      card.style.opacity = depth > 3 ? 0 : 1;
      card.style.pointerEvents = depth === 0 ? 'auto' : 'none';
    });
  }

  applyLayout(false);

  let startY = null;
  function onDown(e) { startY = e.touches ? e.touches[0].clientY : e.clientY; }
  function onUp(e) {
    if (startY === null) return;
    const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const deltaY = endY - startY;
    if (Math.abs(deltaY) > 50) {
      if (deltaY < 0) topIdx = (topIdx + 1) % N; // Swipe UP
      else topIdx = (topIdx - 1 + N) % N;       // Swipe DOWN
      applyLayout(true);
    }
    startY = null;
  }

  scene.addEventListener('mousedown', onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  document.addEventListener('mouseup', onUp);
  scene.addEventListener('touchend', onUp);
})();
</script>

</body>
</html>
