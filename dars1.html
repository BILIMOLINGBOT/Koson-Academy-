<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Premium</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    }

    body {
      background: #f8f9fa;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── ASOSIY KONTEYNER ── */
    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    /* ── PROFIL PANEL (Rasmdagi kabi) ── */
    .profile-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #E67E22; /* Rasmdagi rangga yaqin */
      margin: 15px;
      border-radius: 24px;
      color: white;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 45px;
      height: 45px;
      background: #bdc3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .user-text h4 {
      font-size: 1rem;
      font-weight: 600;
    }

    .user-text p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .stats-badge {
      background: #1a1a1a;
      padding: 6px 14px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    /* ── KARTALAR KONTEYNERI (Yuqorida) ── */
    .scroll-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 20px 30px 20px;
      gap: 15px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    /* ── KARTA DIZAYNI ── */
    .lesson-card {
      flex: 0 0 88%;
      height: 240px; /* Kattalar uchun ixchamroq va jiddiyroq o'lcham */
      border-radius: 30px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* Professional Gradientlar */
    .card-1 { background: linear-gradient(135deg, #2c3e50, #000000); }
    .card-2 { background: linear-gradient(135deg, #1e3c72, #2a5298); }
    .card-3 { background: linear-gradient(135deg, #134e5e, #71b280); }

    .card-tag {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 8px;
      width: fit-content;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-footer {
      font-size: 0.85rem;
      opacity: 0.8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-start {
      background: white;
      color: black;
      padding: 8px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .hint {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Profil qismi -->
  <div class="profile-header">
    <div class="user-info">
      <div class="avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="user-text">
        <h4>Javlonbek</h4>
        <p>Rashidov</p>
      </div>
    </div>
    <div class="stats-badge">
      <span>⚡</span>
      <span>359</span>
    </div>
  </div>

  <!-- Kartalar skrolli -->
  <div class="scroll-container">
    <!-- 1-karta -->
    <div class="lesson-card card-1">
      <div class="card-tag">Matematika</div>
      <div class="card-title">Algebra: Murakkab tenglamalar tahlili</div>
      <div class="card-footer">
        <span>45 daqiqa</span>
        <div class="btn-start">Boshlash</div>
      </div>
    </div>

    <!-- 2-karta -->
    <div class="lesson-card card-2">
      <div class="card-tag">Moliya</div>
      <div class="card-title">Investitsiya va risklarni boshqarish</div>
      <div class="card-footer">
        <span>60 daqiqa</span>
        <div class="btn-start">Boshlash</div>
      </div>
    </div>

    <!-- 3-karta -->
    <div class="lesson-card card-3">
      <div class="card-tag">Biznes</div>
      <div class="card-title">Strategik menejment asoslari</div>
      <div class="card-footer">
        <span>30 daqiqa</span>
        <div class="btn-start">Boshlash</div>
      </div>
    </div>
  </div>

  <div class="hint">Kurslarni ko'rish uchun suring →</div>
</div>

</body>
</html>
