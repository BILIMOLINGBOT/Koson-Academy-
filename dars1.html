<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Lucky Wheel</title>
    <style>
        :root {
            --bg-color: #0f1012;
            --accent-color: #0088cc;
            --card-bg: #ffffff;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* G'ildirak konteyneri - yarmini kesib tashlash uchun */
        .wheel-container {
            position: relative;
            width: 400px;
            height: 200px; /* Balandlik kenglikning yarmi */
            overflow: hidden;
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .wheel {
            position: absolute;
            top: 0;
            width: 400px;
            height: 400px; /* To'liq aylana */
            border-radius: 50%;
            border: 8px solid rgba(255, 255, 255, 0.05);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: radial-gradient(circle, #1a1b1e 0%, #0f1012 100%);
        }

        /* Sovg'a katakchalari */
        .item {
            position: absolute;
            width: 60px;
            height: 80px;
            left: 50%;
            top: 20px;
            transform-origin: 50% 180px;
            margin-left: -30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border-radius: 12px;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .item img { width: 30px; margin-bottom: 5px; }

        /* Ko'rsatkich (Pointer) */
        .pointer {
            position: absolute;
            bottom: -10px;
            z-index: 10;
            width: 30px;
            height: 40px;
            background: var(--accent-color);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        .spin-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .ticket-count {
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="ticket-count">1 ticket = 1 spin</div>
    <div style="font-size: 24px; margin-bottom: 30px;">🎟️ 8</div>

    <div class="wheel-container">
        <div class="wheel" id="wheel">
            </div>
        <div class="pointer"></div>
    </div>

    <button class="spin-btn" onclick="spinWheel()">Spin the Wheel</button>

    <script>
        const wheel = document.getElementById('wheel');
        const items = [
            { label: '50', icon: '💰', color: '#FFD700' },
            { label: 'XP', icon: '⚡', color: '#FF4500' },
            { label: '100', icon: '💎', color: '#00BFFF' },
            { label: '5', icon: '🎟️', color: '#32CD32' },
            { label: '0', icon: '❌', color: '#808080' },
            { label: '20', icon: '💰', color: '#FFD700' },
            { label: '75', icon: '💎', color: '#00BFFF' },
            { label: 'XP', icon: '⚡', color: '#FF4500' }
        ];

        // Elementlarni aylanaga joylashtirish
        items.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'item';
            div.style.transform = `rotate(${index * (360 / items.length)}deg)`;
            div.innerHTML = `<span>${item.icon}</span><span style="font-size: 12px">${item.label}</span>`;
            wheel.appendChild(div);
        });

        let currentRotation = 0;

        function spinWheel() {
            const extraDegrees = Math.floor(Math.random() * 360) + 1800; // Kamida 5 marta aylanish
            currentRotation += extraDegrees;
            wheel.style.transform = `rotate(-${currentRotation}deg)`;
        }
    </script>
</body>
</html>
