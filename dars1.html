<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stack Cards Only</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;                /* butun fon oq */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* faqat kartalar uchun container – oq fon, hech qanday qo‘shimcha element yo‘q */
    .cards-scroll-area {
      max-width: 375px;
      width: 100%;
      height: 740px;                    /* telefon balandligi */
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: white;                /* toza oq fon */

      /* scrollbar yashirish (kerak bo‘lsa) */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .cards-scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* karta stil */
    .card {
      position: sticky;
      top: 0;
      min-height: 400px;
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    /* kartalar ranglari */
    .card-1 { background-color: #ADD8E6; top: 10px; }
    .card-2 { background-color: #B2EBF2; top: 30px; }
    .card-3 { background-color: #81D4FA; top: 50px; }
    .card-4 { background-color: #4FC3F7; top: 70px; }
    .card-5 { background-color: #29B6F6; top: 90px; }
  </style>
</head>
<body>
  <!-- faqat 5 ta stacked card – boshqa hech narsa yo‘q -->
  <div class="cards-scroll-area">
    <div class="card card-1"></div>
    <div class="card card-2"></div>
    <div class="card card-3"></div>
    <div class="card card-4"></div>
    <div class="card card-5"></div>
  </div>
</body>
</html>
