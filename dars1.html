<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · cards centered</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }

    body {
      background:white;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:12px;
    }

    .phone {
      max-width:375px; width:100%;
      background:white;
      border-radius:44px 44px 32px 32px;
      box-shadow:0 30px 50px -20px rgba(0,0,0,.15);
      overflow:hidden;
      display:flex; flex-direction:column;
      height:740px;
    }

    /* ── CARDS CONTAINER CENTERED ── */
    .cards-container {
      background:white;
      flex:1; 
      min-height:0;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;     /* center vertically */
      justify-content:center; /* center horizontally */
    }

    .stack-scene {
      position:relative;
      width:100%;
      height:300px;           /* fixed height for cards stack */
      max-width:343px;        /* cards width (16px margin on each side) */
      margin:0 auto;
    }

    /* ── LESSON CARDS ── */
    .lesson-card {
      position:absolute;
      left:0; right:0;
      height:190px;
      border-radius:24px;
      box-shadow:0 -6px 24px rgba(0,0,0,.18);
      display:flex; flex-direction:column; justify-content:flex-end;
      padding:20px 22px 22px;
      cursor:grab;
      user-select:none;
      touch-action:none;
      transform-origin:bottom center;
    }
    .lesson-card:active { cursor:grabbing; }

    .lesson-card:nth-child(1){background:linear-gradient(145deg,#4f8ef7,#1a5fd6);}
    .lesson-card:nth-child(2){background:linear-gradient(145deg,#f97b4f,#e04010);}
    .lesson-card:nth-child(3){background:linear-gradient(145deg,#52c97a,#1e9e4b);}
    .lesson-card:nth-child(4){background:linear-gradient(145deg,#b76ef7,#7b20d6);}
    .lesson-card:nth-child(5){background:linear-gradient(145deg,#f7c14f,#d48a00);}

    .lesson-card::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:160px; height:160px; border-radius:50%;
      background:rgba(255,255,255,.12); pointer-events:none;
    }
    .lesson-card::after {
      content:''; position:absolute; top:16px; right:16px;
      width:70px; height:70px; border-radius:50%;
      background:rgba(255,255,255,.1); pointer-events:none;
    }

    .card-tag   { font-size:.68rem; font-weight:700; letter-spacing:1.2px;
                  text-transform:uppercase; color:rgba(255,255,255,.75);
                  margin-bottom:7px; position:relative; z-index:1; }
    .card-title { font-size:1.1rem; font-weight:700; color:#fff;
                  line-height:1.3; margin-bottom:10px; position:relative; z-index:1; }
    .card-meta  { display:flex; align-items:center; gap:12px; position:relative; z-index:1; }
    .card-badge { background:rgba(255,255,255,.2); border-radius:20px;
                  padding:4px 11px; font-size:.72rem; font-weight:600; color:#fff; }
    .card-progress-bar  { flex:1; height:5px; background:rgba(255,255,255,.25);
                          border-radius:10px; overflow:hidden; }
    .card-progress-fill { height:100%; border-radius:10px; background:rgba(255,255,255,.85); }
  </style>
</head>
<body>
<div class="phone">

  <!-- CARDS CENTERED -->
  <div class="cards-container">
    <div class="stack-scene" id="stackScene">

      <div class="lesson-card">
        <div class="card-tag">1-dars · Matematika</div>
        <div class="card-title">Algebra asoslari va tenglamalar</div>
        <div class="card-meta">
          <span class="card-badge">72%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:72%"></div></div>
        </div>
      </div>

      <div class="lesson-card">
        <div class="card-tag">2-dars · Ingliz tili</div>
        <div class="card-title">Present Perfect ishlatilishi</div>
        <div class="card-meta">
          <span class="card-badge">45%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:45%"></div></div>
        </div>
      </div>

      <div class="lesson-card">
        <div class="card-tag">3-dars · Fizika</div>
        <div class="card-title">Nyuton qonunlari va kuch</div>
        <div class="card-meta">
          <span class="card-badge">90%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:90%"></div></div>
        </div>
      </div>

      <div class="lesson-card">
        <div class="card-tag">4-dars · Tarix</div>
        <div class="card-title">O'rta asrlar davri va sivilizatsiya</div>
        <div class="card-meta">
          <span class="card-badge">30%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:30%"></div></div>
        </div>
      </div>

      <div class="lesson-card">
        <div class="card-tag">5-dars · Kimyo</div>
        <div class="card-title">Davriy jadval va elementlar</div>
        <div class="card-meta">
          <span class="card-badge">58%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:58%"></div></div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* Layout params */
  const BOTTOM_START = 20;   // front card distance from container bottom
  const PEEK         = 26;   // px each back card peeks ABOVE the front card
  const SCALE_STEP   = 0.04; // scale shrink per depth level

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      const depth  = (i - topIdx + N) % N;
      // depth=0 → front card (lowest, bottom anchored)
      // depth=1 → one behind, peeking its top above front
      // depth=2 → two behind, etc.
      const bottom = BOTTOM_START + depth * PEEK;
      const scale  = 1 - depth * SCALE_STEP;
      const z      = N - depth;
      const bright = 1 - 0.12 * depth;

      card.style.transition = animated
        ? 'bottom .38s cubic-bezier(.4,0,.2,1), transform .38s cubic-bezier(.4,0,.2,1), filter .38s ease'
        : 'none';

      card.style.bottom    = bottom + 'px';
      card.style.top       = 'auto';
      card.style.transform = `scale(${scale})`;  // changed to uniform scale
      card.style.zIndex    = z;
      card.style.filter    = `brightness(${bright})`;
    });
  }

  applyLayout(false);
  window.addEventListener('resize', () => applyLayout(false));

  /* ── Swipe ── */
  let startY = null, startX = null;

  function onDown(e) {
    const p = e.touches ? e.touches[0] : e;
    startY = p.clientY; startX = p.clientX;
  }

  function onUp(e) {
    if (startY === null) return;
    const p  = e.changedTouches ? e.changedTouches[0] : e;
    const dy = p.clientY - startY;
    const dx = p.clientX - startX;

    if (Math.abs(dy) > 28 && Math.abs(dy) > Math.abs(dx) * 1.1) {
      if (dy < 0) {
        topIdx = (topIdx + 1) % N;       // swipe UP → next card to front
      } else {
        topIdx = (topIdx - 1 + N) % N;  // swipe DOWN → prev card to front
      }
      applyLayout(true);
    }
    startY = null;
  }

  scene.addEventListener('mousedown',  onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup',    onUp);
  scene.addEventListener('touchend',   onUp);
  document.addEventListener('mouseup', onUp);
})();
</script>
</body>
</html>
