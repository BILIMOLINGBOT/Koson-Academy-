
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 14 Pro - Spin Wheel</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #010c1e;
        }

        .background-wheel-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vw;
            background: radial-gradient(circle, #f5d179, #c18b28, #96611a);
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .phone-wrapper {
            position: relative;
            width: 380px;
            height: 800px;
            background-color: #1a1a1a;
            border: 14px solid #1a1a1a;
            border-radius: 56px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5), 0 0 1px 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            z-index: 10;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            border-radius: 42px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .dynamic-island {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 36px;
            background-color: black;
            border-radius: 20px;
            z-index: 20;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            z-index: 15;
            box-sizing: border-box;
        }

        .spin-wheel {
            position: relative;
            width: 700px;
            height: 700px;
            background: conic-gradient(
                #96611a 0deg 51.4deg,
                #f5d179 51.4deg 102.8deg,
                #96611a 102.8deg 154.2deg,
                #f5d179 154.2deg 205.6deg,
                #96611a 205.6deg 257deg,
                #f5d179 257deg 308.4deg,
                #96611a 308.4deg 360deg
            );
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(245, 209, 121, 0.3), inset 0 0 100px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(-50%, -50%);
            position: absolute;
            top: 50%;
            left: 50%;
            transition: transform 5s cubic-bezier(0.2, 0.8, 0.2, 0.99);
        }

        .wheel-text {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .wheel-text span {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: 0 0;
            color: white;
            font-weight: 700;
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        .wheel-text span:nth-child(1) { transform: rotate(25.7deg) translateY(-280px) rotate(-25.7deg); }
        .wheel-text span:nth-child(2) { transform: rotate(77.1deg) translateY(-280px) rotate(-77.1deg); }
        .wheel-text span:nth-child(3) { transform: rotate(128.5deg) translateY(-280px) rotate(-128.5deg); }
        .wheel-text span:nth-child(4) { transform: rotate(180deg) translateY(-280px) rotate(-180deg); }
        .wheel-text span:nth-child(5) { transform: rotate(231.4deg) translateY(-280px) rotate(-231.4deg); }
        .wheel-text span:nth-child(6) { transform: rotate(282.8deg) translateY(-280px) rotate(-282.8deg); }
        .wheel-text span:nth-child(7) { transform: rotate(334.2deg) translateY(-280px) rotate(-334.2deg); }

        .central-pattern {
            position: absolute;
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #d4af37, #96611a);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(245, 209, 121, 0.5);
            z-index: 12;
        }

        .central-pattern::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 4px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: central-spin 5s linear infinite;
        }

        @keyframes central-spin {
            to { transform: rotate(360deg); }
        }

        .pointer {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #f5d179;
            z-index: 16;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        .blur-button {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            padding: 18px 40px 18px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            z-index: 20;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.3s ease, background 0.3s ease;
            box-sizing: border-box;
        }

        .blur-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-50%) scale(1.02);
        }

        .blur-button:active {
            transform: translateX(-50%) scale(0.98);
        }

        .blur-button::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid #f5d179;
            border-top-color: transparent;
            border-radius: 50%;
            animation: central-spin 2s linear infinite;
        }
    </style>
</head>
<body>

    <div class="background-wheel-effect"></div>

    <div class="phone-wrapper">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋 100%</span>
        </div>
        <div class="dynamic-island"></div>
        <div class="pointer"></div>
        
        <div class="screen">
            <div class="spin-wheel" id="wheel">
                <div class="wheel-text">
                    <span>10 000</span>
                    <span>5 000</span>
                    <span>Keyingi</span>
                    <span>Zehnli</span>
                    <span>10%</span>
                    <span>20%</span>
                    <span>30%</span>
                </div>
                <div class="central-pattern"></div>
            </div>

            <div class="blur-button" onclick="spinWheel()">
                Aylantiring
            </div>
        </div>
    </div>

    <script>
        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const currentRotate = wheel.style.transform;
            const randomDeg = Math.floor(Math.random() * 360) + 1440; // 4-5 full rotations
            wheel.style.transform = `translate(-50%, -50%) rotate(${randomDeg}deg)`;
        }

        // Reset animation when it ends (optional)
        document.getElementById('wheel').addEventListener('transitionend', function() {
            console.log('Wheel stopped spinning!');
        });
    </script>
</body>
</html>
