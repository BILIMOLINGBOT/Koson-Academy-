
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Spin Wheel</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }
    .wheel {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 8px solid #333;
      position: relative;
      overflow: hidden;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }
    .wheel div {
      position: absolute;
      width: 50%;
      height: 50%;
      background: #ff7675;
      transform-origin: 100% 100%;
    }
    .wheel div:nth-child(2) { background: #74b9ff; transform: rotate(60deg); }
    .wheel div:nth-child(3) { background: #55efc4; transform: rotate(120deg); }
    .wheel div:nth-child(4) { background: #ffeaa7; transform: rotate(180deg); }
    .wheel div:nth-child(5) { background: #fd79a8; transform: rotate(240deg); }
    .wheel div:nth-child(6) { background: #a29bfe; transform: rotate(300deg); }

    .arrow {
      width: 0; 
      height: 0; 
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 30px solid #333;
      margin-top: 20px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wheel" id="wheel">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
  </div>
  <div class="arrow"></div>
  <button onclick="spin()">Spin!</button>

  <script>
    let wheel = document.getElementById('wheel');
    let deg = 0;

    function spin() {
      let rand = Math.floor(Math.random() * 360) + 720; // kamida 2 marta aylanadi
      deg += rand;
      wheel.style.transform = `rotate(${deg}deg)`;
    }
  </script>
</body>
</html>
