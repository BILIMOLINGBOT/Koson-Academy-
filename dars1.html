<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · mobile concept</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #c2d9e8; /* soft background to highlight the mobile card */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* mobile frame – exactly 375px wide, clean white background */
    .phone {
      max-width: 375px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 40px 40px 28px 28px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3), 0 0 0 8px #f0f3f7;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 700px;                /* fixed ratio to keep header / sky / nav proportions */
    }

    /* ----- ORANGE HEADER (#FFA500) ----- */
    .header-orange {
      background-color: #FFA500;
      padding: 14px 18px 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* left side: gray circle + name */
    .user-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-circle {
      width: 44px;
      height: 44px;
      background-color: #a0a0a0;    /* medium gray */
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar-circle svg {
      width: 66%;
      height: 66%;
      fill: #e6e6e6;                /* light silhouette */
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #000000;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    /* right: black rounded rectangle with lightning & 359 */
    .score-pill {
      background-color: #1e1e1e;     /* near black */
      border-radius: 40px;
      padding: 8px 16px 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    .lightning-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .lightning-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
      display: block;
    }

    .score-number {
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
    }

    /* ----- MAIN SKY-BLUE AREA (plain #ADD8E6, approx 80% height, no dots) ----- */
    .sky-area {
      background-color: #ADD8E6;      /* light blue, like a calm sky */
      flex: 1;                         /* takes all leftover space between header & nav */
      display: flex;
      flex-direction: column;
      justify-content: flex-end;       /* push label row to bottom */
      padding: 0 24px 24px 24px;       /* bottom padding for the three labels */
      min-height: 0;                   /* flex limitation */
      width: 100%;
      /* absolutely plain – no dots, no lines, no extra elements */
    }

    /* three small black labels, placed horizontally near bottom of sky */
    .bottom-labels {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background-color: transparent;
      padding: 8px 0 2px 0;
      margin-bottom: 6px;               /* tiny gap before nav */
    }

    .label {
      color: #000000;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: 0.2px;
    }

    .label:first-letter {
      text-transform: uppercase;
    }

    /* ----- BOTTOM NAVIGATION (dark #333) fixed to bottom of phone ----- */
    .bottom-nav {
      background-color: #333333;        /* dark gray */
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 12px 10px 12px;
      flex-shrink: 0;
      width: 100%;
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.1);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 64px;                      /* stable width for alignment */
    }

    /* icon container – circle or transparent */
    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* first item: blue circle + white house + label "Darslar" */
    .nav-item:nth-child(1) .icon-circle {
      background-color: #3b82f6;        /* vibrant blue */
    }

    .nav-item:nth-child(1) svg {
      fill: white;
      width: 28px;
      height: 28px;
    }

    /* second item: white circle with '°' symbol and '0' stacked inside */
    .nav-item:nth-child(2) .icon-circle {
      background-color: #ffffff;         /* pure white */
    }

    .degree-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      color: #222;                       /* dark symbol */
      font-weight: 600;
      margin-top: 2px;
    }

    .degree-big {
      font-size: 2rem;
      margin-bottom: -8px;
    }

    .zero-small {
      font-size: 1rem;
      font-weight: 600;
    }

    /* third item: book icon (transparent background) */
    .nav-item:nth-child(3) .icon-circle {
      background-color: transparent;
    }

    .nav-item:nth-child(3) svg {
      stroke: white;
      stroke-width: 2;
      fill: none;
      width: 32px;
      height: 32px;
    }

    /* fourth item: grid (dots) icon */
    .nav-item:nth-child(4) .icon-circle {
      background-color: transparent;
    }

    .grid-dots svg {
      fill: white;
      width: 32px;
      height: 32px;
    }

    .nav-label {
      color: white;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2px;
      text-transform: lowercase;
    }

    .nav-label:first-letter {
      text-transform: uppercase;
    }

    /* spacing assurance: header & nav never touch the sky labels */
    .sky-area {
      border-top: 1px solid transparent;  /* invisible separation */
      border-bottom: 1px solid transparent;
    }

    /* responsive touch: if width < 375px, everything shrinks gracefully */
    @media (max-width: 350px) {
      .user-name {
        font-size: 0.9rem;
      }
      .score-pill {
        padding: 6px 12px;
      }
    }

    /* ensure no black dots anywhere (nothing extra in sky) */
    .sky-area * {
      border: none;
      outline: none;
    }

    /* just to make the bottom labels a bit more visible */
    .label {
      text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- orange header -->
    <div class="header-orange">
      <div class="user-block">
        <div class="avatar-circle">
          <!-- simple silhouette (head & shoulders) -->
          <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
            <path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 2.69 8 6v2H4v-2c0-3.31 3.58-6 8-6z"/>
          </svg>
        </div>
        <span class="user-name">Javlonbek Rashidov</span>
      </div>
      <div class="score-pill">
        <span class="lightning-icon">
          <!-- white lightning bolt -->
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
          </svg>
        </span>
        <span class="score-number">359</span>
      </div>
    </div>

    <!-- large light blue area (plain, with only three labels near bottom) -->
    <div class="sky-area">
      <!-- label row sits at bottom of sky -->
      <div class="bottom-labels">
        <span class="label">Darslar</span>
        <span class="label">Resurslar</span>
        <span class="label">Ko'proq</span>
      </div>
    </div>

    <!-- bottom navigation bar (dark #333) -->
    <div class="bottom-nav">
      <!-- item 1: blue circle, house, Darslar -->
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="white">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        </div>
        <span class="nav-label">Darslar</span>
      </div>

      <!-- item 2: white circle with ° and 0 (progress) -->
      <div class="nav-item">
        <div class="icon-circle">
          <div class="degree-block">
            <span class="degree-big">°</span>
            <span class="zero-small">0</span>
          </div>
        </div>
        <!-- hidden label to keep consistent structure? we keep an empty string for spacing, but better to put a blank? 
        According to spec: below the icon there is text? Actually second icon says "below it '0' maybe for progress" but we already show '0' inside.
        To keep parity we use the same nav-label as others but invisible? but we need no extra text; instead I'll make it a transparent placeholder to maintain alignment -->
        <span class="nav-label" style="opacity:0; pointer-events:none;"> </span>
      </div>

      <!-- item 3: book icon + Resurslar -->
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" fill="none">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
        </div>
        <span class="nav-label">Resurslar</span>
      </div>

      <!-- item 4: grid (dots) + Ko'proq -->
      <div class="nav-item">
        <div class="icon-circle grid-dots">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
            <circle cx="5" cy="12" r="2.5"/>
            <circle cx="12" cy="12" r="2.5"/>
            <circle cx="19" cy="12" r="2.5"/>
          </svg>
        </div>
        <span class="nav-label">Ko'proq</span>
      </div>
    </div>
  </div>
</body>
</html>
