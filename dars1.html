
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Spin Wheel</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #111;
      font-family: Arial, sans-serif;
    }

    .wheel-container {
      position: relative;
      width: 400px;
      height: 400px;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 10px solid #ffcc00;
      position: relative;
      overflow: hidden;
      transition: transform 5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
    }

    .segment {
      position: absolute;
      width: 50%;
      height: 50%;
      background: #222;
      color: #fff;
      text-align: center;
      line-height: 180px;
      font-size: 18px;
      font-weight: bold;
      transform-origin: 100% 100%;
    }

    /* 8 sektor ranglari va burchaklari */
    .segment:nth-child(1) { background:#ff7675; transform: rotate(0deg); }
    .segment:nth-child(2) { background:#74b9ff; transform: rotate(45deg); }
    .segment:nth-child(3) { background:#55efc4; transform: rotate(90deg); }
    .segment:nth-child(4) { background:#ffeaa7; transform: rotate(135deg); color:#000; }
    .segment:nth-child(5) { background:#fd79a8; transform: rotate(180deg); }
    .segment:nth-child(6) { background:#a29bfe; transform: rotate(225deg); }
    .segment:nth-child(7) { background:#00cec9; transform: rotate(270deg); }
    .segment:nth-child(8) { background:#fab1a0; transform: rotate(315deg); color:#000; }

    .arrow {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; 
      height: 0; 
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 30px solid #ffcc00;
    }

    .center-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ffcc00;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 50%;
      width: 100px;
      height: 100px;
      cursor: pointer;
      font-size: 16px;
      box-shadow: 0 0 20px #ffcc00;
    }
  </style>
</head>
<body>
  <div class="wheel-container">
    <div class="wheel" id="wheel">
      <div class="segment">30%</div>
      <div class="segment">10 000</div>
      <div class="segment">5 000</div>
      <div class="segment">Next time</div>
      <div class="segment">Zehnly</div>
      <div class="segment">10%</div>
      <div class="segment">20%</div>
      <div class="segment">30%</div>
    </div>
    <div class="arrow"></div>
    <button class="center-btn" onclick="spin()">Aylantiring</button>
  </div>

  <script>
    let wheel = document.getElementById('wheel');
    let deg = 0;

    function spin() {
      let rand = Math.floor(Math.random() * 360) + 1440; // kamida 4 marta aylanadi
      deg += rand;
      wheel.style.transform = `rotate(${deg}deg)`;
    }
  </script>
</body>
</html>
