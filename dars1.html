<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli G'ildirak - Silliq Dizayn</title>
    <style>
        :root {
            --primary-gold: #f39c12;
            --dark-gold: #d35400;
            --bg-color: #0b131e;
            --text-white: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text-white);
        }

        .wheel-container {
            position: relative;
            width: 420px;
            height: 420px;
            margin-bottom: 30px;
            /* Tashqi silliq halqa */
            border: 10px solid #1a2533;
            border-radius: 50%;
            box-shadow: 0 0 30px var(--shadow-color), inset 0 0 20px rgba(0,0,0,0.5);
            padding: 5px;
        }

        /* Silliqlashtirilgan ko'rsatkich */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: var(--primary-gold);
            z-index: 10;
            clip-path: polygon(50% 100%, 0% 0%, 100% 0%); /* Uchburchak shakli */
            border-radius: 50% 50% 20% 20%; /* Pastki burchakni yumshatish uchun */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* Ko'rsatkichni yanada silliq qilish uchun qo'shimcha uslub */
        .pointer::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 5px; 
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.2, 0, 0.2, 1);
        }

        /* Markazdagi silliq doira */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, #ffffff, #e67e22);
            border: 4px solid #0b131e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a1a;
            font-size: 13px;
            z-index: 5;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: none;
            text-transform: uppercase;
        }

        #spin-btn {
            padding: 15px 45px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f1c40f, #d35400);
            border: none;
            border-radius: 30px; /* Silliq burchaklar */
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(211, 84, 0, 0.3);
            letter-spacing: 1px;
        }

        #spin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(211, 84, 0, 0.5);
        }

        #spin-btn:active {
            transform: translateY(1px);
        }

        #spin-btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            font-size: 26px;
            font-weight: bold;
            height: 35px;
            color: var(--primary-gold);
            text-shadow: 0 2px 10px rgba(243, 156, 18, 0.3);
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="center-circle">OMADINGIZNI <br> SINANG</div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <button id="spin-btn">Aylantirish</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result');

        const segments = [
            "10 000",
            "5 000",
            "Yana bir bor",
            "Zehnly",
            "10%",
            "20%",
            "30%"
        ];

        // Ranglar palitrasini yanada yumshoqroq qildim
        const colors = [
            "#e67e22", "#d35400", "#e67e22", "#d35400", "#e67e22", "#d35400", "#e67e22"
        ];

        const numSegments = segments.length;
        const anglePerSegment = 2 * Math.PI / numSegments;
        let currentRotation = 0;

        function drawWheel() {
            const radius = canvas.width / 2;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((text, i) => {
                const angle = i * anglePerSegment;
                
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                
                // lineJoin burchaklarni silliqlashtiradi
                ctx.lineJoin = 'round';
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius - 5, angle, angle + anglePerSegment);
                ctx.lineTo(centerX, centerY);
                ctx.fill();

                // Segmentlar orasidagi chiziqni yumshoq qilish
                ctx.strokeStyle = '#0b131e';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Matnni chizish
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "600 28px 'Segoe UI'";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.3)";
                ctx.fillText(text, radius - 50, 10);
                ctx.restore();
            });
        }

        drawWheel();

        btn.addEventListener('click', () => {
            btn.disabled = true;
            resultDisplay.innerText = "";
            
            // Kamida 5-8 marta to'liq aylanish
            const randomSpin = Math.floor(Math.random() * 360) + 2160; 
            currentRotation += randomSpin;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                btn.disabled = false;
                
                const actualDeg = currentRotation % 360;
                // Pointer tepada bo'lgani uchun 270 gradusdan hisoblaymiz
                const correctedDeg = (360 - actualDeg + 270) % 360;
                const segmentIndex = Math.floor(correctedDeg / (360 / numSegments));
                
                resultDisplay.innerText = "Yutuq: " + segments[segmentIndex];
            }, 4000);
        });
    </script>
</body>
</html>
