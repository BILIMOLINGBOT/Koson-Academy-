<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Modern Stack</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, sans-serif; 
    }

    body {
      background: #0f172a; /* To'q fon (oq fon olib tashlandi) */
      display: flex; 
      align-items: center; 
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── ASOSIY KONTEYNER ── */
    .container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: transparent;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── STACK MAYDONI ── */
    .stack-scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ── RANGLI KARTALAR ── */
    .lesson-card {
      position: absolute;
      width: 90%; /* Devorga tegib turganda o'ng tomonda joy qolishi uchun */
      height: 400px;
      /* Chap burchaklarni 0 qilish orqali devorga taqash effektini kuchaytiramiz */
      border-radius: 0 45px 45px 0; 
      box-shadow: 10px 20px 40px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      padding: 45px 35px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: left center; /* Chap tomondan o'sish */
      transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1), 
                  left 0.45s cubic-bezier(0.23, 1, 0.32, 1),
                  opacity 0.4s ease, 
                  filter 0.4s ease;
    }

    /* Ranglar palitrasi - Modern uslubda */
    .lesson-card:nth-child(1) { background: linear-gradient(135deg, #f43f5e, #be123c); }
    .lesson-card:nth-child(2) { background: linear-gradient(135deg, #0ea5e9, #0369a1); }
    .lesson-card:nth-child(3) { background: linear-gradient(135deg, #f59e0b, #b45309); }
    .lesson-card:nth-child(4) { background: linear-gradient(135deg, #8b5cf6, #5b21b6); }
    .lesson-card:nth-child(5) { background: linear-gradient(135deg, #10b981, #047857); }

    .card-tag {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
    }

    /* Swipe ko'rsatmasi */
    .hint {
      position: absolute;
      bottom: 40px;
      color: #64748b;
      font-size: 0.9rem;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
      padding: 10px 20px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">
    <div class="lesson-card"><div class="card-tag">1-dars</div><div class="card-title">Algebra asoslari</div></div>
    <div class="lesson-card"><div class="card-tag">2-dars</div><div class="card-title">Ingliz tili</div></div>
    <div class="lesson-card"><div class="card-tag">3-dars</div><div class="card-title">Fizika fani</div></div>
    <div class="lesson-card"><div class="card-tag">4-dars</div><div class="card-title">Tarix darsi</div></div>
    <div class="lesson-card"><div class="card-tag">5-dars</div><div class="card-title">Kimyo darsi</div></div>
  </div>
  <div class="hint">Chapga yoki o'ngga suring</div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  const PEEK = 15;            /* Orqa kartalar orasidagi masofa */
  const SCALE_STEP = 0.04; 
  const LEFT_START = 0;       /* Karta devorga tegib turishi uchun 0 qildik */

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      const depth = (i - topIdx + N) % N;
      card.style.transition = animated ? '' : 'none';
      
      // LEFT_START 0 bo'lgani uchun karta chetga taqaladi
      card.style.left = (LEFT_START + (depth * PEEK)) + 'px';
      card.style.transform = `scale(${1 - depth * SCALE_STEP})`;
      card.style.zIndex = N - depth;
      card.style.filter = `brightness(${1 - depth * 0.15})`;
      card.style.opacity = depth > 3 ? 0 : 1;
      card.style.pointerEvents = depth === 0 ? 'auto' : 'none';
    });
  }

  applyLayout(false);

  let startX = null;
  scene.addEventListener('mousedown', e => startX = e.clientX);
  scene.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive: true});

  function handleEnd(clientX) {
    if (startX === null) return;
    const deltaX = clientX - startX;
    if (Math.abs(deltaX) > 50) {
      topIdx = deltaX < 0 ? (topIdx + 1) % N : (topIdx - 1 + N) % N;
      applyLayout(true);
    }
    startX = null;
  }

  scene.addEventListener('mouseup', e => handleEnd(e.clientX));
  scene.addEventListener('touchend', e => handleEnd(e.changedTouches[0].clientX));
  document.addEventListener('mouseup', e => { if(startX) handleEnd(e.clientX); });
})();
</script>

</body>
</html>
