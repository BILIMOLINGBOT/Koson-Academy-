<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Dark Premium</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000; /* Toza qora fon */
      color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #000000;
      position: relative;
    }

    /* ── PROFIL PANEL (Minimalist) ── */
    .profile-header {
      padding: 25px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #222;
    }

    .user-text h4 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .user-text p {
      font-size: 0.9rem;
      color: #8e8e93;
    }

    .stats-badge {
      background: #ffffff;
      color: #000000;
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
      font-size: 0.9rem;
    }

    /* ── KARTALAR SKROLLI (Yuqorida) ── */
    .scroll-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 20px;
      gap: 15px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .lesson-card {
      flex: 0 0 85%;
      height: 260px;
      border-radius: 40px;
      padding: 35px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Professional Dark Gradients */
    .card-1 { background: linear-gradient(145deg, #1c1c1e, #0a0a0a); }
    .card-2 { background: linear-gradient(145deg, #2c2c2e, #1c1c1e); }
    .card-3 { background: linear-gradient(145deg, #1a1a1a, #000000); }

    .card-tag {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: #8e8e93;
      letter-spacing: 1.5px;
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      color: #ffffff;
    }

    .card-footer {
      font-size: 0.85rem;
      font-weight: 600;
      color: #007aff; /* iOS Blue */
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── iPHONE STYLE BOTTOM MENU (Faqat 2 ta) ── */
    .tab-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px; /* Ixcham o'lcham */
      height: 70px;
      background: rgba(28, 28, 30, 0.7);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 35px;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e8e93;
      text-decoration: none;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .tab-item:active {
      transform: scale(0.9);
      opacity: 0.7;
    }

    .tab-item svg {
      width: 28px;
      height: 28px;
      stroke-width: 1.8;
    }

    .tab-item span {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Aktiv holat ranglari */
    .tab-item.active {
      color: #ffffff;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="profile-header">
    <div class="user-info">
      <div class="avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <div class="user-text">
        <h4>Javlonbek</h4>
        <p>Premium Member</p>
      </div>
    </div>
    <div class="stats-badge">
      <span>⚡</span>
      <span>359</span>
    </div>
  </div>

  <div class="scroll-container">
    <div class="lesson-card card-1">
      <div class="card-tag">Mathematics</div>
      <div class="card-title">Advanced Quantum Logic</div>
      <div class="card-footer">Darsni boshlash <span>→</span></div>
    </div>
    
    <div class="lesson-card card-2">
      <div class="card-tag">Business</div>
      <div class="card-title">Global Market Strategy</div>
      <div class="card-footer">Davom etish <span>→</span></div>
    </div>

    <div class="lesson-card card-3">
      <div class="card-tag">English</div>
      <div class="card-title">IELTS Mastery 8.5+</div>
      <div class="card-footer">Ko'rish <span>→</span></div>
    </div>
  </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"></path><path d="M18 20V4"></path><path d="M6 20v-4"></path></svg>
      <span>Reyting</span>
    </a>
    
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
      <span>Sovg'a</span>
    </a>
  </nav>
</div>

</body>
</html>
