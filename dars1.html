<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>pure · stacked cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #ffffff;                /* faqat oq fon */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* minimal container — faqat kartalar uchun */
    .cards-stack {
      max-width: 340px;
      width: 100%;
      position: relative;
      min-height: 520px;                  /* stack balandligi */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;             /* kartalar o'rtada */
    }

    /* umumiy karta stili — mutlaq o'rniga sticky yig'ish, lekin o'rtada turish uchun 
       biz relative/absolute emas, balki flex + margin bilan markazda */
    .card {
      width: 100%;
      max-width: 300px;
      height: 420px;
      border-radius: 40px;
      box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.2), 0 -6px 14px rgba(255,255,255,0.3);
      transition: transform 0.2s ease;
      /* bir-birining ustiga chiqish uchun margin-top manfiy */
    }

    /* stack effekti: har bir keyingi karta oldingisining ustiga chiqadi */
    .card-1 {
      background-color: #ADD8E6;           /* och havo rang */
      margin-bottom: -320px;                /* birinchi kartani pastga tortadi, lekin stack yuqoriga */
      z-index: 5;
      position: relative;
    }
    .card-2 {
      background-color: #B2EBF2;
      margin-bottom: -320px;
      z-index: 4;
      position: relative;
    }
    .card-3 {
      background-color: #81D4FA;
      margin-bottom: -320px;
      z-index: 3;
      position: relative;
    }
    .card-4 {
      background-color: #4FC3F7;
      margin-bottom: -320px;
      z-index: 2;
      position: relative;
    }
    .card-5 {
      background-color: #29B6F6;
      margin-bottom: 0;                    /* oxirgi karta normal */
      z-index: 1;
      position: relative;
    }

    /* stack ichida har bir karta biroz ofset bilan ko'rinadi (ixtiyoriy) */
    .card-1 { transform: translateY(0px) rotate(0.5deg); }
    .card-2 { transform: translateY(-8px) rotate(-0.3deg); }
    .card-3 { transform: translateY(-16px) rotate(0.8deg); }
    .card-4 { transform: translateY(-24px) rotate(-0.6deg); }
    .card-5 { transform: translateY(-32px) rotate(0.2deg); }

    /* kichik ekranlar uchun */
    @media (max-width: 400px) {
      .card {
        height: 380px;
        max-width: 280px;
      }
      .card-1 { margin-bottom: -290px; }
      .card-2 { margin-bottom: -290px; }
      .card-3 { margin-bottom: -290px; }
      .card-4 { margin-bottom: -290px; }
    }

    /* orqa fon oq, boshqa hech narsa yo'q */
  </style>
</head>
<body>
  <!-- faqat 5 ta karta, hech qanday header, label, nav yo'q -->
  <div class="cards-stack">
    <div class="card card-1"></div>
    <div class="card card-2"></div>
    <div class="card card-3"></div>
    <div class="card card-4"></div>
    <div class="card card-5"></div>
  </div>
</body>
</html>
