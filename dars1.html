<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stacked Cards Only</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: white;                /* Faqat oq fon */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* Kichik telefon qutisi — faqat kartalar uchun */
    .cards-container {
      max-width: 375px;
      width: 100%;
      height: 740px;                    /* Ilgarigi balandlik */
      display: flex;
      flex-direction: column;
      justify-content: center;          /* Kartalarni vertikal markazlash */
    }

    /* Stacked cards maydoni */
    .cards-scroll-area {
      position: relative;
      width: 100%;
      height: 440px;                    /* Kartalar joylashadigan balandlik */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;        /* Pastdan yig'ilish effekti */
    }

    .card {
      position: absolute;
      width: 100%;
      max-width: 320px;
      height: 380px;
      border-radius: 40px;
      box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
    }

    /* Har bir karta uchun pastki qatlam effekti */
    .card-1 { background-color: #ADD8E6; bottom: 0px; z-index: 5; }
    .card-2 { background-color: #B2EBF2; bottom: 12px; z-index: 4; }
    .card-3 { background-color: #81D4FA; bottom: 24px; z-index: 3; }
    .card-4 { background-color: #4FC3F7; bottom: 36px; z-index: 2; }
    .card-5 { background-color: #29B6F6; bottom: 48px; z-index: 1; }

    /* Qo'shimcha: kartalar bir-birining ustida turgani ko'rinsin */
  </style>
</head>
<body>
  <div class="cards-container">
    <!-- Faqat 5 ta ustma-ust karta -->
    <div class="cards-scroll-area">
      <div class="card card-1"></div>
      <div class="card card-2"></div>
      <div class="card card-3"></div>
      <div class="card card-4"></div>
      <div class="card card-5"></div>
    </div>
  </div>
</body>
</html>
