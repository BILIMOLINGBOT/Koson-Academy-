<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile learning · Javlonbek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #E5E5E5; /* subtle outer background, just for contrast */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* mobile card – mimics screen */
        .app-screen {
            max-width: 375px;
            width: 100%;
            background-color: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 32px 32px 24px 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 700px;            /* fixed height for consistent spacing */
            position: relative;
            margin: 16px;
        }

        /* ----- TOP ORANGE HEADER (#FFA500) ----- */
        .orange-header {
            background-color: #FFA500;   /* orange */
            padding: 14px 20px 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #000;                 /* black text */
            flex-shrink: 0;
        }

        /* left side: profile icon + name */
        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-icon {
            width: 42px;
            height: 42px;
            background-color: #aaa;       /* gray circle */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 400;
            /* simple silhouette: head and shoulders – using svg */
            overflow: hidden;
        }

        .profile-icon svg {
            width: 70%;
            height: 70%;
            fill: #f0f0f0;                /* light gray silhouette */
            opacity: 0.9;
        }

        .profile-name {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.3px;
            color: black;
            white-space: nowrap;
        }

        /* right side: black rounded rectangle with lightning + 359 */
        .badge-lightning {
            background-color: #111;         /* almost black */
            border-radius: 40px;            /* rounded rectangle */
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .lightning-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
            line-height: 1;
            margin-top: -4px;               /* fine tune position */
        }

        .lightning-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
            display: block;
        }

        .lightning-number {
            letter-spacing: 0.5px;
        }

        /* ----- MAIN LIGHT BLUE AREA (plain sky) ----- */
        .main-sky {
            background-color: #ADD8E6;       /* light blue */
            flex: 1;                         /* takes ~80% of remaining space */
            min-height: 0;                    /* flex restriction */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;        /* push bottom labels down */
            padding: 0 24px 20px 24px;        /* bottom padding for label row */
            width: 100%;
            /* no dots, no lines – completely plain */
        }

        /* small black labels (Darslar, Resurslar, Ko'proq) placed horizontally */
        .label-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: transparent;
            padding: 8px 0 4px 0;
            margin-bottom: 6px;               /* small gap before bottom nav */
        }

        .label-item {
            color: black;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-transform: lowercase;
        }

        .label-item:first-letter {
            text-transform: uppercase;         /* keep nice casing */
        }

        /* ----- FIXED BOTTOM NAVIGATION (dark #333) ----- */
        .bottom-nav {
            background-color: #333;            /* dark gray */
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 10px 10px 10px;
            color: white;
            flex-shrink: 0;
            width: 100%;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #ddd;
            transition: color 0.1s;
            width: 60px;                       /* stable width */
        }

        /* icon containers */
        .icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
        }

        /* specific styles per item */

        /* first: blue circle with white house */
        .nav-item:nth-child(1) .icon-circle {
            background-color: #3b82f6;          /* vibrant blue */
        }

        .nav-item:nth-child(1) svg {
            fill: white;
            width: 24px;
            height: 24px;
        }

        /* second: white circle with '°' symbol and tiny '0' – we'll put the 0 inside? but spec: 'White circle with '°' symbol and '0' below it' 
           we use white circle, big degree icon + small zero floating or below? Let's put degree symbol and then '0' as separate tiny text inside column. */
        .nav-item:nth-child(2) .icon-circle {
            background-color: white;              /* white circle */
        }

        .degree-zero {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.1;
            color: #333;                           /* dark icon */
            font-weight: 600;
        }

        .degree-sign {
            font-size: 1.8rem;
            margin-top: -6px;
        }

        .zero-sign {
            font-size: 0.9rem;
            margin-top: -8px;
            font-weight: 600;
        }

        /* third: book icon (simple) */
        .nav-item:nth-child(3) .icon-circle {
            background-color: transparent;
        }

        .nav-item:nth-child(3) svg {
            fill: none;
            stroke: white;
            stroke-width: 2;
            width: 28px;
            height: 28px;
        }

        /* fourth: grid icon (dots) */
        .nav-item:nth-child(4) .icon-circle {
            background-color: transparent;
        }

        .grid-dots svg {
            fill: white;
            width: 26px;
            height: 26px;
        }

        .nav-label {
            color: white;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.2px;
            text-transform: lowercase;
        }

        .nav-label:first-letter {
            text-transform: uppercase;
        }

        /* bottom nav item hover (non functional, just nice) */
        .nav-item:hover .nav-label {
            color: #FFA500;
        }

        /* ensure everything fits within 375px */
        @media (max-width: 375px) {
            .profile-name {
                font-size: 0.9rem;
            }
            .badge-lightning {
                padding: 6px 12px;
            }
        }

        /* fine details: no black dots anywhere */
        .main-sky * {
            border: none;
            outline: none;
        }

        /* extra spacing to avoid touching */
        .main-sky {
            border-bottom: 2px solid transparent; /* just for visual separation */
        }
    </style>
</head>
<body>
    <div class="app-screen">

        <!-- Orange header -->
        <header class="orange-header">
            <div class="profile-area">
                <div class="profile-icon">
                    <!-- silhouette SVG (head & shoulders simple) -->
                    <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
                        <path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 2.69 8 6v2H4v-2c0-3.31 3.58-6 8-6z"/>
                    </svg>
                </div>
                <span class="profile-name">Javlonbek Rashidov</span>
            </div>
            <div class="badge-lightning">
                <span class="lightning-icon">
                    <!-- white lightning bolt -->
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
                        <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
                    </svg>
                </span>
                <span class="lightning-number">359</span>
            </div>
        </header>

        <!-- Large light blue plain area, with bottom labels -->
        <div class="main-sky">
            <!-- absolutely plain – no extra elements, just the row at bottom -->
            <div class="label-row">
                <span class="label-item">Darslar</span>
                <span class="label-item">Resurslar</span>
                <span class="label-item">Ko'proq</span>
            </div>
        </div>

        <!-- Bottom navigation dark gray (#333) -->
        <nav class="bottom-nav">
            <!-- item 1: Blue circle + house + 'Darslar' -->
            <div class="nav-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="white">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                </div>
                <span class="nav-label">Darslar</span>
            </div>

            <!-- item 2: White circle with '°' symbol and '0' below (both inside column) -->
            <div class="nav-item">
                <div class="icon-circle">
                    <div class="degree-zero">
                        <span class="degree-sign">°</span>
                        <span class="zero-sign">0</span>
                    </div>
                </div>
                <span class="nav-label"> </span> <!-- invisible label? spec says below icon, but we keep blank to avoid extra text – we already have zero? But request says 'below it' maybe '0' appears below °, but we put in same circle and leave label empty. Or we can use ° and 0 stacked and a hidden label? Simpler: keep icon and no label – but they asked 'White circle with '°' symbol and '0' below it' → we already show 0 stacked inside, but also there could be text? For clarity I'll leave label empty. Also 'progress' mention: fine. -->
                <!-- I'll add a very subtle 'progress' hidden? Actually spec: 'Second: White circle with '°' symbol and '0' below it (perhaps for progress).' So the label under icon maybe empty? we can use a tiny '0' as part of icon. I'll keep nav-label as an invisible placeholder to keep alignment  -->
                <span class="nav-label" style="opacity:0; pointer-events:none;">_</span>
            </div>

            <!-- item 3: Book icon with 'Resurslar' -->
            <div class="nav-item">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" fill="none">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                    </svg>
                </div>
                <span class="nav-label">Resurslar</span>
            </div>

            <!-- item 4: Grid icon (dots) with 'Ko'proq' -->
            <div class="nav-item">
                <div class="icon-circle grid-dots">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="white">
                        <circle cx="5" cy="12" r="2.2"/>
                        <circle cx="12" cy="12" r="2.2"/>
                        <circle cx="19" cy="12" r="2.2"/>
                    </svg>
                </div>
                <span class="nav-label">Ko'proq</span>
            </div>
        </nav>
    </div>

    <!-- subtle note: the main area is plain light blue, no dots or lines, with small labels above bottom nav -->
</body>
</html>
