<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Devorga Yopishgan Kartalar</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    }

    body {
      /* Oq fon olib tashlandi - o'rniga to'q va zamonaviy rang */
      background: #0f172a; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── ASOSIY KONTEYNER ── */
    .container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: transparent;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* Soyalar olib tashlandi */
    }

    .stack-scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
    }

    /* ── RANGLI KARTALAR ── */
    .lesson-card {
      position: absolute;
      width: 85%; /* Orqadagi kartalar ko'rinishi uchun biroz kichikroq */
      height: 450px;
      /* Chap burchaklarni 0 qilsak, devorga yanada jipsroq ko'rinadi */
      border-radius: 0 40px 40px 0; 
      box-shadow: 10px 0 30px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      padding: 45px 35px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      
      /* TRANSFORMATSIYA MARKAZI CHAPDA */
      transform-origin: left center; 
      
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                  left 0.5s cubic-bezier(0.25, 1, 0.5, 1),
                  opacity 0.4s ease, 
                  filter 0.4s ease;
    }

    /* Ranglar */
    .lesson-card:nth-child(1) { background: linear-gradient(135deg, #FF6B6B, #EE5252); }
    .lesson-card:nth-child(2) { background: linear-gradient(135deg, #4ECDC4, #45B7AA); }
    .lesson-card:nth-child(3) { background: linear-gradient(135deg, #FFD93D, #F6C90E); }
    .lesson-card:nth-child(4) { background: linear-gradient(135deg, #6C5CE7, #5F4BCF); }
    .lesson-card:nth-child(5) { background: linear-gradient(135deg, #A8E6CF, #7FCFB1); }

    .card-tag {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: white;
      line-height: 1.2;
    }

    .hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: #64748b;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.05);
      padding: 10px 20px;
      border-radius: 100px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">
    <div class="lesson-card">
      <div class="card-tag">1-dars · Matematika</div>
      <div class="card-title">Algebra va tenglamalar</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">2-dars · Ingliz tili</div>
      <div class="card-title">Grammatika darslari</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">3-dars · Fizika</div>
      <div class="card-title">Kinematika asoslari</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">4-dars · Tarix</div>
      <div class="card-title">Jahon sivilizatsiyasi</div>
    </div>
    <div class="lesson-card">
      <div class="card-tag">5-dars · Kimyo</div>
      <div class="card-title">Organik birikmalar</div>
    </div>
  </div>
  <div class="hint">Chapga yoki o'ngga suring</div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* SOZLAMALAR */
  const PEEK = 35;           /* Orqa kartalar qancha masofada chiqib turishi */
  const SCALE_STEP = 0.08;   /* Orqaga qarab kichrayish darajasi */
  const LEFT_START = 0;      /* DEVORGA TEGIB TURISHI UCHUN 0 */

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      const depth = (i - topIdx + N) % N;
      
      card.style.transition = animated ? '' : 'none';
      
      // Karta joylashuvi: chapdan boshlanadi
      card.style.left = (LEFT_START + (depth * PEEK)) + 'px';
      
      // Transform: chap tomondan scale qilish
      card.style.transform = `scale(${1 - depth * SCALE_STEP})`;
      card.style.zIndex = N - depth;
      
      // Effektlar
      card.style.filter = `brightness(${1 - depth * 0.15})`;
      card.style.opacity = depth > 3 ? 0 : 1;
      card.style.pointerEvents = depth === 0 ? 'auto' : 'none';
    });
  }

  applyLayout(false);

  let startX = null;
  const onDown = (e) => startX = e.touches ? e.touches[0].clientX : e.clientX;
  const onUp = (e) => {
    if (startX === null) return;
    const endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const deltaX = endX - startX;
    if (Math.abs(deltaX) > 50) {
      topIdx = deltaX < 0 ? (topIdx + 1) % N : (topIdx - 1 + N) % N;
      applyLayout(true);
    }
    startX = null;
  };

  scene.addEventListener('mousedown', onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup', onUp);
  scene.addEventListener('touchend', onUp);
  document.addEventListener('mouseup', onUp);
})();
</script>

</body>
</html>
