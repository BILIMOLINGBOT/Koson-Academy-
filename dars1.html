<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Oq va Katta Kartalar</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Inter', sans-serif; }

    body {
      background:#f5f5f5; /* Umumiy fon biroz kulrang, oq kartalar ko'rinishi uchun */
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }

    /* ── ASOSIY KONTEYNER ── */
    .container {
      width: 100%;
      max-width: 400px; /* Telefon kengligi */
      height: 100vh;
      background: white;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── STACK MAYDONI ── */
    .stack-scene {
      position: relative;
      width: 100%;
      height: 600px; /* Balandlikni yana oshirdik */
      display: flex;
      justify-content: center;
    }

    /* ── OQ KARTA DIZAYNI ── */
    .lesson-card {
      position: absolute;
      width: 100%;      /* "Devorga" tegib turishi uchun */
      height: 520px;    /* Karta balandligi yanada oshirildi */
      background: white; /* Faqat oq fon */
      border: 1px solid #eee; /* Chegarasi ko'rinishi uchun juda och chiziq */
      border-radius: 32px 32px 0 0; /* Faqat tepa burchaklari yumaloq */
      box-shadow: 0 -10px 30px rgba(0,0,0,0.08); /* Faqat tepadan soya */
      display: flex;
      flex-direction: column;
      padding: 40px 30px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform-origin: bottom center;
    }

    /* Ortiqcha narsalar olib tashlandi (before, after, progress barlar) */

    .card-tag {
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #222;
      line-height: 1.3;
    }

    /* Swipe animatsiyasi */
    .lesson-card {
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                  bottom 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                  filter 0.4s ease;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="stack-scene" id="stackScene">

    <div class="lesson-card">
      <div class="card-tag">1-dars</div>
      <div class="card-title">Algebra asoslari va murakkab tenglamalar</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">2-dars</div>
      <div class="card-title">Ingliz tili: Grammatika va so'zlashuv</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">3-dars</div>
      <div class="card-title">Fizika: Kinematika va dinamika asoslari</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">4-dars</div>
      <div class="card-title">Tarix: Jahon sivilizatsiyasi rivojlanishi</div>
    </div>

    <div class="lesson-card">
      <div class="card-tag">5-dars</div>
      <div class="card-title">Kimyo: Organik birikmalar va reaksiyalar</div>
    </div>

  </div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* Layout parametrlari */
  const BOTTOM_START = 0;    /* Eng oldingi karta eng pastda */
  const PEEK         = 35;   /* Orqa kartalar tepadan qancha chiqib turishi */
  const SCALE_STEP   = 0.04; /* Orqaga qarab kichrayish */

  let topIdx = 0;

  function applyLayout() {
    cards.forEach((card, i) => {
      const depth  = (i - topIdx + N) % N;
      const bottom = BOTTOM_START - (depth * PEEK); 
      const scale  = 1 - (depth * SCALE_STEP);
      const z      = N - depth;
      const blur   = depth * 1; // Orqadagi kartalar biroz xiraroq

      card.style.bottom    = (depth * PEEK) + 'px';
      card.style.transform = `scale(${scale})`;
      card.style.zIndex    = z;
      card.style.filter    = `brightness(${1 - depth * 0.05})`;
      
      // Faqat yaqin 4 ta kartani ko'rsatish
      card.style.opacity = depth > 3 ? 0 : 1;
    });
  }

  applyLayout();

  /* ── SWIPE LOGIKASI ── */
  let startY = null;

  function onDown(e) {
    startY = e.touches ? e.touches[0].clientY : e.clientY;
  }

  function onUp(e) {
    if (startY === null) return;
    const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const diff = startY - endY;

    if (Math.abs(diff) > 50) {
      if (diff > 0) {
        topIdx = (topIdx + 1) % N;
      } else {
        topIdx = (topIdx - 1 + N) % N;
      }
      applyLayout();
    }
    startY = null;
  }

  scene.addEventListener('mousedown',  onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup',    onUp);
  scene.addEventListener('touchend',   onUp);
})();
</script>

</body>
</html>
