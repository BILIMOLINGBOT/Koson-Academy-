<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations UI Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #2a104a 0%, #000000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Orqa fondagi setka (Grid) */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .header {
            margin-top: 60px;
            text-align: center;
            z-index: 1;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .claim-link {
            color: #888;
            text-decoration: none;
            font-size: 18px;
        }

        /* G'ildirak qismi */
        .wheel-area {
            position: relative;
            margin-top: auto;
            width: 100%;
            height: 450px;
            display: flex;
            justify-content: center;
            z-index: 1;
        }

        .items-container {
            position: absolute;
            bottom: -350px; /* Doirani pastga tushirib, faqat tepasini ko'rsatamiz */
            width: 800px;
            height: 800px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
        }

        .item {
            position: absolute;
            width: 120px;
            height: 150px;
            background: linear-gradient(135deg, #7b2ff7, #2d0a63);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-origin: center 450px; /* Aylanish markazi */
            transition: all 0.3s ease;
        }

        /* Markazdagi g'olib element stylingi */
        .item.active {
            background: linear-gradient(135deg, #4c26b7, #1b0a3d);
            transform: rotate(0deg) scale(1.15);
            z-index: 10;
            box-shadow: 0 0 30px rgba(123, 47, 247, 0.5);
        }

        .item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        /* Ko'rsatkichlar (Pointers) */
        .pointers {
            position: absolute;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 180px; /* Ikkita arrow orasidagi masofa */
            z-index: 20;
        }

        .arrow-down {
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 35px solid white;
            filter: drop-shadow(0 0 10px white);
        }

        .arrow-up {
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid white;
        }

        .prize-name {
            position: absolute;
            top: 300px;
            font-size: 28px;
            font-weight: bold;
        }

        /* Pastki tugma */
        .footer-btn {
            width: 90%;
            max-width: 400px;
            background: white;
            color: black;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 40px;
            cursor: pointer;
            z-index: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Elementlarni joylashtirish (Burchaklar bo'yicha) */
        .item:nth-child(1) { transform: rotate(-60deg); background: #9c008b; }
        .item:nth-child(2) { transform: rotate(-30deg); background: #32107c; }
        .item:nth-child(3) { transform: rotate(0deg); } /* Markaz */
        .item:nth-child(4) { transform: rotate(30deg); background: #9200a8; }
        .item:nth-child(5) { transform: rotate(60deg); background: #32107c; }

    </style>
</head>
<body>

    <div class="header">
        <h1>Congratulations!</h1>
        <a href="#" class="claim-link">Claim Bonus</a>
    </div>

    <div class="wheel-area">
        <div class="pointers">
            <div class="arrow-down"></div>
            <div class="arrow-up"></div>
        </div>

        <div class="items-container">
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" alt="box">
            </div>
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/2855/2855169.png" alt="ufc">
            </div>
            
            <div class="item active">
                <img src="https://cdn-icons-png.flaticon.com/512/10302/10302971.png" alt="papakha">
            </div>

            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/867/867855.png" alt="genie">
            </div>
            <div class="item">
                <img src="https://cdn-icons-png.flaticon.com/512/3100/3100247.png" alt="bottle">
            </div>
        </div>

        <div class="prize-name">Khabib's Papakha</div>
    </div>

    <button class="footer-btn">Claim Bonus</button>

</body>
</html>
