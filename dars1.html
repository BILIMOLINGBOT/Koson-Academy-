<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Profile Premium</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── SAHIFALAR ── */
    .page {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      padding-bottom: 90px;
      display: none;
      flex-direction: column;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .page::-webkit-scrollbar { display: none; }
    .page.active { display: flex; }

    /* ── PROFIL HEADER ── */
    .profile-header-box {
      padding: 40px 20px 20px;
      text-align: center;
    }

    .avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #333, #111);
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #2c2c2e;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .user-name {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .user-id {
      color: #8e8e93;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* ── SOZLAMALAR GURUHLARI ── */
    .settings-section {
      margin: 20px 16px;
      background: #1c1c1e;
      border-radius: 14px;
      overflow: hidden;
    }

    .settings-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      gap: 15px;
      background: #1c1c1e;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: white;
    }

    .settings-item:last-child { border-bottom: none; }
    .settings-item:active { background: #2c2c2e; }

    .icon-box {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-box svg {
      width: 20px;
      height: 20px;
      stroke: white;
      stroke-width: 2;
    }

    .item-label {
      flex: 1;
      font-size: 1.05rem;
      font-weight: 400;
    }

    .chevron {
      width: 16px;
      height: 16px;
      stroke: #3a3a3c;
      stroke-width: 3;
    }

    /* ── TUGMA (CHIQISH) ── */
    .logout-btn {
      margin: 10px 16px 40px;
      background: #1c1c1e;
      color: #ff453a;
      padding: 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
    }

    /* ── TAB BAR ── */
    .tab-bar {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); width: 92%; height: 75px;
      background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px); border-radius: 35px;
      display: flex; align-items: center; justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: #8e8e93; font-size: 0.65rem; font-weight: 600;
    }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 26px; height: 26px; stroke-width: 2; }
  </style>
</head>
