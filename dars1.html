<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · toza versiya</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #d4e0e9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* mobile frame – 375px */
    .phone {
      max-width: 375px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 44px 44px 32px 32px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3), 0 0 0 8px #eef3f8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 740px;
      gap: 16px;                /* header, card, labels, nav orasidagi bo'shliq */
    }

    /* ----- ORANGE HEADER ----- */
    .header-orange {
      background-color: #FFA500;
      padding: 16px 20px 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .user-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-circle {
      width: 46px;
      height: 46px;
      background-color: #9b9b9b;    /* kulrang doira */
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-circle svg {
      width: 68%;
      height: 68%;
      fill: #dfdfdf;                /* siluet */
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #000000;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    /* o'ng tomondagi qora pill */
    .score-pill {
      background-color: #1a1a1a;
      border-radius: 40px;
      padding: 8px 16px 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    .lightning-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
      display: block;
    }

    .score-number {
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* ----- KO'K KARTA (BUTUNLAY BO'SH, hech qanday nuqta/chiziq YO'Q) ----- */
    .blue-card {
      background-color: #ADD8E6;        /* och moviy */
      border-radius: 32px;              /* katta burchaklar */
      margin: 0 16px;                   /* yon tomonlardan bo'shliq */
      flex: 1;                          /* 70-80% balandlikni egallaydi */
      min-height: 0;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
      position: relative;
      /* ichki elementlar yo'q - toza, bo'sh, faqat fon rangi */
    }

    /* karta ichi butunlay bo'sh - hech qanday qo'shimcha element yo'q */
    .blue-card::after {
      display: none;  /* hech qanday psevdo-element yo'q */
    }

    /* ----- KARTA OSTIDAGI KICHIK YOZUVLAR (Darslar, Resurslar, Ko'proq) ----- */
    .label-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 36px;
      margin: 8px 0 12px 0;        /* yuqorida karta, pastda navigatsiya bilan tegmaydi */
      flex-shrink: 0;
    }

    .label {
      color: #000;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: 0.2px;
    }

    .label:first-letter {
      text-transform: uppercase;
    }

    /* ----- PASTKI NAVIGATSIYA (to'q kulrang #333) ----- */
    .bottom-nav {
      background-color: #333333;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 12px 14px 12px;
      flex-shrink: 0;
      width: 100%;
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.15);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 64px;
    }

    /* icon doira */
    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 1 - ko'k doira + uycha */
    .nav-item:nth-child(1) .icon-circle {
      background-color: #3b82f6;
    }
    .nav-item:nth-child(1) svg {
      fill: white;
      width: 28px;
      height: 28px;
    }

    /* 2 - oq doira, ichida ° va 0 */
    .nav-item:nth-child(2) .icon-circle {
      background-color: white;
    }
    .degree-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      color: #222;
      font-weight: 600;
      margin-top: 4px;
    }
    .degree-big {
      font-size: 2rem;
      margin-bottom: -10px;
    }
    .zero-small {
      font-size: 1rem;
    }

    /* 3 - kitob ikonkasi */
    .nav-item:nth-child(3) .icon-circle {
      background-color: transparent;
    }
    .nav-item:nth-child(3) svg {
      stroke: white;
      stroke-width: 2;
      fill: none;
      width: 32px;
      height: 32px;
    }

    /* 4 - grid (nuqtalar) */
    .nav-item:nth-child(4) .icon-circle {
      background-color: transparent;
    }
    .grid-dots svg {
      fill: white;
      width: 32px;
      height: 32px;
    }

    .nav-label {
      color: white;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2px;
      text-transform: lowercase;
    }
    .nav-label:first-letter {
      text-transform: uppercase;
    }

    /* ikkinchi itemda label ko'rinmas, chunki '0' ikonka ichida */
    .nav-item:nth-child(2) .nav-label {
      opacity: 0;
      pointer-events: none;
    }

    /* kichik ekranlar uchun */
    @media (max-width: 350px) {
      .user-name { font-size: 0.9rem; }
      .score-pill { padding: 6px 12px; }
    }

    /* hech qanday nuqta, chiziq, yozuv YO'Q - tozalik kafolati */
    .blue-card {
      /* ichki elementlar butunlay yo'q */
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- to'q sariq header -->
    <div class="header-orange">
      <div class="user-block">
        <div class="avatar-circle">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
            <path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 2.69 8 6v2H4v-2c0-3.31 3.58-6 8-6z"/>
          </svg>
        </div>
        <span class="user-name">Javlonbek Rashidov</span>
      </div>
      <div class="score-pill">
        <span class="lightning-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
          </svg>
        </span>
        <span class="score-number">359</span>
      </div>
    </div>

    <!-- KO'K KARTA - butunlay bo'sh, hech qanday nuqta, chiziq, yozuv yo'q -->
    <div class="blue-card">
      <!-- bo'sh - faqat fon rangi #ADD8E6 -->
    </div>

    <!-- karta ostidagi uchta qora yozuv -->
    <div class="label-row">
      <span class="label">Darslar</span>
      <span class="label">Resurslar</span>
      <span class="label">Ko'proq</span>
    </div>

    <!-- pastki navigatsiya paneli -->
    <div class="bottom-nav">
      <!-- 1: ko'k doira, uy, Darslar -->
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="white">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        </div>
        <span class="nav-label">Darslar</span>
      </div>

      <!-- 2: oq doira, ° va 0 (progress) -->
      <div class="nav-item">
        <div class="icon-circle">
          <div class="degree-block">
            <span class="degree-big">°</span>
            <span class="zero-small">0</span>
          </div>
        </div>
        <span class="nav-label" style="opacity:0;"> </span>
      </div>

      <!-- 3: kitob + Resurslar -->
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" fill="none">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
        </div>
        <span class="nav-label">Resurslar</span>
      </div>

      <!-- 4: grid nuqtalar + Ko'proq -->
      <div class="nav-item">
        <div class="icon-circle grid-dots">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
            <circle cx="5" cy="12" r="2.5"/>
            <circle cx="12" cy="12" r="2.5"/>
            <circle cx="19" cy="12" r="2.5"/>
          </svg>
        </div>
        <span class="nav-label">Ko'proq</span>
      </div>
    </div>
  </div>
</body>
</html>
