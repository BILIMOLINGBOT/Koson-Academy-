
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Ultra Premium Dark</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── SAHIFALAR ── */
    .page {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      padding-bottom: 100px;
      display: none;
      flex-direction: column;
      animation: fadeIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .page.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── PROFILE HEADER (Rasmdagi kabi) ── */
    .header {
      padding: 25px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-info { display: flex; align-items: center; gap: 15px; }
    .avatar-circle {
      width: 50px; height: 50px;
      background: #333; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid #444;
    }
    .stats-badge {
      background: #1c1c1e; color: #fff;
      padding: 8px 16px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
      font-weight: 800; font-size: 0.9rem;
      border: 1px solid #333;
    }

    /* ── OMADLI G'ILDIRAK (WHEEL) ── */
    .wheel-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .wheel-box {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 40px;
    }

    /* G'ildirak ko'rsatkichi (Arrow) */
    .wheel-arrow {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 40px;
      background: #ffffff;
      clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
      z-index: 10;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid #1c1c1e;
      position: relative;
      overflow: hidden;
      transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
      background: #1c1c1e;
    }

    .wheel-section {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 50%;
      transform-origin: 0% 0%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 40px;
      font-size: 0.75rem;
      font-weight: 800;
      text-align: center;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* Aylantirish tugmasi */
    .spin-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 18px 50px;
      border-radius: 25px;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: 0 10px 30px rgba(255,255,255,0.1);
      transition: 0.2s;
    }
    .spin-btn:active { transform: scale(0.95); }
    .spin-btn:disabled { opacity: 0.5; }

    /* ── REYTING ── */
    .rank-list-container { flex: 1; overflow-y: auto; padding: 0 20px; }
    .rank-item {
      background: #1c1c1e; padding: 15px; border-radius: 20px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 15px;
    }

    /* ── iPHONE TAB BAR ── */
    .tab-bar {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%); width: 90%; height: 75px;
      background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px); border-radius: 35px;
      display: flex; align-items: center; justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08); z-index: 100;
    }
    .tab-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      color: #8e8e93; font-size: 0.65rem; font-weight: 600; cursor: pointer;
    }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 26px; height: 26px; }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <div id="home-page" class="page active">
    <div class="header">
      <div class="user-info">
        <div class="avatar-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div>
          <h4>Javlonbek Rashidov</h4>
          <p style="color:#8e8e93; font-size:0.8rem;">359 ball to'plandi</p>
        </div>
      </div>
      <div class="stats-badge">⚡ 359</div>
    </div>
    <div style="padding: 20px; flex:1; display:flex; align-items:center; justify-content:center;">
       <h2 style="color:#333; text-align:center;">Darslar ro'yxati bu yerda bo'ladi</h2>
    </div>
  </div>

  <div id="rating-page" class="page">
    <div style="padding: 30px 20px;"><h1 style="font-size:2.2rem; font-weight:800;">Reyting</h1></div>
    <div class="rank-list-container" id="leaderboard"></div>
  </div>

  <div id="gift-page" class="page">
    <div style="padding: 30px 20px; text-align:center;"><h1 style="font-size:2rem; font-weight:800;">Omadli G'ildirak</h1></div>
    
    <div class="wheel-container">
      <div class="wheel-box">
        <div class="wheel-arrow"></div>
        <div class="wheel" id="wheel">
          </div>
      </div>
      <button class="spin-btn" id="spinBtn" onclick="spinWheel()">AYLANTIRISH</button>
      <p id="winMessage" style="margin-top: 20px; font-weight: 700; color: #ffcc00; height: 24px;"></p>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item active" onclick="showPage('home-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span>Asosiy</span>
    </div>
    <div class="tab-item" onclick="showPage('rating-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      <span>Reyting</span>
    </div>
    <div class="tab-item" onclick="showPage('gift-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
      <span>Sovg'a</span>
    </div>
  </nav>

</div>

<script>
  // SAHIFALARNI BOSHQARISH
  function showPage(pageId, element) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');
  }

  // REYTING GENERATSIYASI (100 ta)
  const leaderboard = document.getElementById('leaderboard');
  const users = [
    { name: "Javlonbek", points: 900 },
    { name: "Sardor", points: 800 }
  ];
  for(let i=3; i<=100; i++) {
    users.push({ name: "O'quvchi " + i, points: 800 - (i*5) });
  }
  users.forEach((u, i) => {
    leaderboard.innerHTML += `
      <div class="rank-item" ${i === 0 ? 'style="border: 1px solid #ffcc00"' : ''}>
        <div style="width:25px; font-weight:700; color:#8e8e93;">${i+1}</div>
        <div style="width:40px; height:40px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700;">${u.name.charAt(0)}</div>
        <div style="flex:1; font-weight:600;">${u.name}</div>
        <div style="font-weight:800;">⚡ ${u.points}</div>
      </div>`;
  });

  // OMADLI G'ILDIRAK LOGIKASI
  const prizes = [
    { text: "100 000 soʻm", color: "#1c1c1e" },
    { text: "Yutuq yo'q", color: "#2c2c2e" },
    { text: "50 000 soʻm", color: "#1c1c1e" },
    { text: "500 000 soʻm", color: "#E67E22" }, // JackPot rangi
    { text: "250 000 soʻm", color: "#1c1c1e" },
    { text: "Yutuq yo'q", color: "#2c2c2e" }
  ];

  const wheel = document.getElementById('wheel');
  prizes.forEach((prize, i) => {
    const angle = 360 / prizes.length;
    const section = document.createElement('div');
    section.className = 'wheel-section';
    section.style.transform = `rotate(${i * angle}deg) skewY(${90 - angle}deg)`;
    section.style.backgroundColor = prize.color;
    
    const textNode = document.createElement('div');
    textNode.style.transform = `skewY(-${90 - angle}deg) rotate(${angle/2}deg)`;
    textNode.style.position = 'absolute';
    textNode.style.left = '40px';
    textNode.innerText = prize.text;
    
    section.appendChild(textNode);
    wheel.appendChild(section);
  });

  let currentRotation = 0;
  function spinWheel() {
    const btn = document.getElementById('spinBtn');
    const msg = document.getElementById('winMessage');
    btn.disabled = true;
    msg.innerText = "Omad kutilmoqda...";

    const randomSpin = Math.floor(Math.random() * 360) + 1440; // Kamida 4 marta aylanish
    currentRotation += randomSpin;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      btn.disabled = false;
      const actualDeg = currentRotation % 360;
      const prizeIndex = Math.floor((360 - actualDeg) / (360 / prizes.length)) % prizes.length;
      msg.innerText = "Yutuq: " + prizes[prizeIndex].text;
      if(prizes[prizeIndex].text !== "Yutuq yo'q") {
        confettiEffect();
      }
    }, 4000);
  }

  function confettiEffect() {
    // Bu yerga kichik animatsiya qo'shish mumkin
    document.body.style.boxShadow = "inset 0 0 100px rgba(255,204,0,0.2)";
    setTimeout(() => document.body.style.boxShadow = "none", 1000);
  }
</script>

</body>
</html>
