<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stack Cards - Full Stack</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* container - faqat kartalar uchun */
    .cards-container {
      position: relative;
      max-width: 375px;
      width: 100%;
      height: 740px;
      background: white;
    }

    /* barcha kartalar bir nuqtada to'liq stack bo'ladi */
    .card {
      position: absolute;
      left: 16px;
      right: 16px;
      width: calc(100% - 32px);  /* container chetidan 16px tashlab markazda */
      height: 400px;
      border-radius: 32px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
    }

    /* har bir karta bir-birining ustiga to'liq yig'iladi */
    .card-1 { background-color: #ADD8E6; top: 10px; }
    .card-2 { background-color: #B2EBF2; top: 30px; }
    .card-3 { background-color: #81D4FA; top: 50px; }
    .card-4 { background-color: #4FC3F7; top: 70px; }
    .card-5 { background-color: #29B6F6; top: 90px; }
  </style>
</head>
<body>
  <div class="cards-container">
    <div class="card card-1"></div>
    <div class="card card-2"></div>
    <div class="card card-3"></div>
    <div class="card card-4"></div>
    <div class="card card-5"></div>
  </div>
</body>
</html>
