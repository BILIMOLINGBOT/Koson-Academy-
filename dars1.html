<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Wheel UI</title>
    <style>
        /* Umumiy fon */
        body {
            background-color: #050c12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ko'rsatkich (Strelka) */
        .indicator {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff9d00;
            position: absolute;
            top: -10px;
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(255, 157, 0, 0.5));
        }

        /* G'ildirak asosi */
        .wheel-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 8px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        /* Segmentlar */
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            border: 1px solid rgba(0,0,0,0.2);
            /* Gradient rang rasmga moslab */
            background: linear-gradient(135deg, #f0a500 0%, #a67000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Matn joylashuvi */
        .wheel-segment span {
            position: absolute;
            bottom: 40px;
            right: 20px;
            transform: rotate(45deg);
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            width: 100px;
        }

        /* Markazdagi tugma */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff 0%, #f7d794 100%);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 5px solid #000;
            font-weight: bold;
            font-size: 16px;
            color: #222;
            user-select: none;
        }

        .center-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="indicator"></div>
    
    <div class="wheel-wrapper" id="wheel">
        <div class="wheel-segment" style="transform: rotate(0deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">10 000</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(51.4deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">5 000</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(102.8deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">Next time</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(154.2deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">Zehnly</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(205.6deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">10%</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(257deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">20%</span>
        </div>
        <div class="wheel-segment" style="transform: rotate(308.4deg) skewY(-38.5deg);">
            <span style="transform: skewY(38.5deg) rotate(25deg);">30%</span>
        </div>
    </div>

    <div class="center-btn" onclick="spinWheel()">
        Aylantiring
    </div>
</div>

<script>
    let currentRotation = 0;

    function spinWheel() {
        const wheel = document.getElementById('wheel');
        // Kamida 5 marta to'liq aylanadi + tasodifiy gradus
        const extraDegree = Math.floor(Math.random() * 360);
        currentRotation += 1800 + extraDegree; 
        
        wheel.style.transform = `rotate(${currentRotation}deg)`;
    }
</script>

</body>
</html>
