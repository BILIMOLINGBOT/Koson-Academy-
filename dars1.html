<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Omadli G'ildirak</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle,#2a145a,#000);
    font-family:sans-serif;
}

.container{
    position:relative;
}

.arrow{
    position:absolute;
    top:-20px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:20px solid transparent;
    border-right:20px solid transparent;
    border-bottom:40px solid white;
    z-index:10;
}

.wheel{
    width:350px;
    height:350px;
    border-radius:50%;
    background:
    conic-gradient(
        #ff00aa 0deg 60deg,
        #6a00ff 60deg 120deg,
        #3b00a6 120deg 180deg,
        #ff00aa 180deg 240deg,
        #6a00ff 240deg 300deg,
        #3b00a6 300deg 360deg
    );
    border:12px solid #111;
    transition:transform 4s cubic-bezier(.17,.67,.83,.67);
}

button{
    margin-top:30px;
    width:120px;
    height:40px;
    border:none;
    border-radius:10px;
    background:#ff00aa;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="arrow"></div>

<div id="wheel" class="wheel"></div>

<div style="text-align:center">
<button onclick="spin()">Spin</button>
</div>

</div>

<script>
function spin(){

let wheel = document.getElementById("wheel");

let random = Math.floor(Math.random()*360) + 1440;

wheel.style.transform = "rotate(" + random + "deg)";
}
</script>

</body>
</html>
