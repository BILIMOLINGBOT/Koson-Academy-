<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Stacked Cards</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #f5f7fa; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    .cards-container {
      max-width: 375px;
      width: 100%;
      height: 700px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .cards-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px 16px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      -ms-overflow-style: none;
      scrollbar-width: none;
      position: relative;
    }

    .cards-scroll-area::-webkit-scrollbar {
      display: none;
    }

    .card {
      position: sticky;
      min-height: 420px;
      width: 100%;
      border-radius: 36px;
      box-shadow: 0 -4px 10px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(2px);
    }

    /* Kuchli ustma-ustlik - kartalar bir-biriga yopishgan */
    .card-1 { 
      background: linear-gradient(145deg, #FFB6C1, #FFC0CB); 
      top: 20px; 
      z-index: 5;
    }
    .card-2 { 
      background: linear-gradient(145deg, #FFD700, #FFC107); 
      top: 5px; 
      z-index: 4;
      margin-top: -340px; /* Kuchli ustma-ustlik */
    }
    .card-3 { 
      background: linear-gradient(145deg, #98FB98, #90EE90); 
      top: -10px; 
      z-index: 3;
      margin-top: -340px;
    }
    .card-4 { 
      background: linear-gradient(145deg, #87CEFA, #00BFFF); 
      top: -25px; 
      z-index: 2;
      margin-top: -340px;
    }
    .card-5 { 
      background: linear-gradient(145deg, #DDA0DD, #DA70D6); 
      top: -40px; 
      z-index: 1;
      margin-top: -340px;
    }

    /* Scroll qilinganda kartalar ochiladi */
    .cards-scroll-area:active .card,
    .cards-scroll-area:hover .card {
      margin-top: 0;
      transition: margin-top 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .cards-scroll-area:active .card-2,
    .cards-scroll-area:hover .card-2 {
      margin-top: -280px;
    }

    .cards-scroll-area:active .card-3,
    .cards-scroll-area:hover .card-3 {
      margin-top: -280px;
    }

    .cards-scroll-area:active .card-4,
    .cards-scroll-area:hover .card-4 {
      margin-top: -280px;
    }

    .cards-scroll-area:active .card-5,
    .cards-scroll-area:hover .card-5 {
      margin-top: -280px;
    }

    /* Kartalarga content */
    .card::after {
      content: "✨";
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      opacity: 0.7;
    }

    .card-1::after { content: "📚 1"; font-size: 48px; font-weight: bold; }
    .card-2::after { content: "✏️ 2"; font-size: 48px; font-weight: bold; }
    .card-3::after { content: "🎯 3"; font-size: 48px; font-weight: bold; }
    .card-4::after { content: "💡 4"; font-size: 48px; font-weight: bold; }
    .card-5::after { content: "⭐ 5"; font-size: 48px; font-weight: bold; }
  </style>
</head>
<body>

    <div class="cards-container">
      <div class="cards-scroll-area">
        <div class="card card-1"></div>
        <div class="card card-2"></div>
        <div class="card card-3"></div>
        <div class="card card-4"></div>
        <div class="card card-5"></div>
      </div>
    </div>

</body>
</html>
