<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonus Wheel Clone</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1a0033 0%, #000 70%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      position: relative;
      width: 380px;
      max-width: 90vw;
    }

    h1 {
      font-size: 2.4rem;
      margin: 0 0 0.4rem 0;
      text-shadow: 0 0 20px rgba(255,215,0,0.7);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1.3rem;
      margin: 0 0 2.5rem 0;
      opacity: 0.9;
    }

    .wheel-wrapper {
      position: relative;
    }

    .wheel {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: conic-gradient(
        #c300ff 0deg 72deg,
        #ff00aa 72deg 144deg,
        #ff5500 144deg 216deg,
        #ffaa00 216deg 288deg,
        #55ff00 288deg 360deg
      );
      border-radius: 50%;
      position: relative;
      box-shadow: 
        0 0 40px rgba(200,0,255,0.6),
        inset 0 0 60px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 50px solid #fff;
      filter: drop-shadow(0 0 15px #fff);
      z-index: 10;
    }

    .segment {
      position: absolute;
      width: 100%;
      height: 100%;
      clip-path: polygon(50% 50%, 100% 0, 100% 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: 50% 50%;
    }

    .segment-content {
      transform: translateY(-30%) rotate(25deg);
      font-size: 1.1rem;
      font-weight: bold;
      text-shadow: 0 0 8px black;
      text-align: center;
      line-height: 1.1;
    }

    .claim-btn {
      margin-top: 2.5rem;
      background: linear-gradient(45deg, #ffd700, #ffaa00);
      color: #000;
      font-size: 1.5rem;
      font-weight: bold;
      padding: 16px 60px;
      border: none;
      border-radius: 50px;
      box-shadow: 0 8px 30px rgba(255,215,0,0.5);
      cursor: pointer;
      transition: all 0.2s;
    }

    .claim-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 40px rgba(255,215,0,0.7);
    }

    .small-text {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Congratulations!</h1>
  <div class="subtitle">Claim Bonus</div>

  <div class="wheel-wrapper">
    <div class="pointer"></div>

    <div class="wheel">

      <!-- 5 segment misol uchun -->
      <div class="segment" style="transform: rotate(0deg); background: rgba(0,0,0,0.2);">
        <div class="segment-content">
          UFC<br>Collectible
        </div>
      </div>
      <div class="segment" style="transform: rotate(72deg); background: rgba(0,0,0,0.2);">
        <div class="segment-content">
          Khabib's<br>Papakakha
        </div>
      </div>
      <div class="segment" style="transform: rotate(144deg); background: rgba(0,0,0,0.2);">
        <div class="segment-content">
          Bot<br>Army
        </div>
      </div>
      <div class="segment" style="transform: rotate(216deg); background: rgba(0,0,0,0.2);">
        <div class="segment-content">
          Golden<br>Genie
        </div>
      </div>
      <div class="segment" style="transform: rotate(288deg); background: rgba(0,0,0,0.2);">
        <div class="segment-content">
          Mystery<br>Chest
        </div>
      </div>

    </div>
  </div>

  <button class="claim-btn">Claim Bonus</button>

  <div class="small-text">Khabib's Papakakha</div>
</div>

</body>
</html>
