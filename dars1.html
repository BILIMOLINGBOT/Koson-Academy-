<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Stacked Cards Only</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      /* Orqa fon oq bo'lishi kerak */
      background: #ffffff; 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* Kartalar uchun asosiy konteyner markazda */
    .cards-container {
      max-width: 375px;
      width: 100%;
      height: 650px; /* Kartalar ko'rinishi uchun balandlik */
      display: flex;
      flex-direction: column;
    }

    .cards-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      /* Scrollbar yashirish */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .cards-scroll-area::-webkit-scrollbar {
      display: none;
    }

    .card {
      position: sticky;
      min-height: 400px;
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    /* Kartalar ranglari va joylashuvi o'zgarmadi */
    .card-1 { background-color: #ADD8E6; top: 10px; }
    .card-2 { background-color: #B2EBF2; top: 11px; }
    .card-3 { background-color: #81D4FA; top: 12px; }
    .card-4 { background-color: #4FC3F7; top: 13x; }
    .card-5 { background-color: #29B6F6; top: 14px; }

  </style>
</head>
<body>

    <!-- Faqat kartalar qoldi va ular o'rtada -->
    <div class="cards-container">
      <div class="cards-scroll-area">
        <div class="card card-1"></div>
        <div class="card card-2"></div>
        <div class="card card-3"></div>
        <div class="card card-4"></div>
        <div class="card card-5"></div>
      </div>
    </div>

</body>
</html>
