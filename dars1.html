<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stack Cards - Full Overlap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* Container - faqat kartalar uchun */
    .cards-container {
      max-width: 375px;
      width: 100%;
      height: 740px;
      background: white;
      position: relative;    /* Kartalarni absolute joylashtirish uchun */
    }

    /* Barcha kartalar bir-birining ustiga chiqishi uchun */
    .card {
      position: absolute;
      width: 100%;
      height: 400px;
      border-radius: 32px;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      left: 0;
    }

    /* Kartalar bir xil joyda, faqat bir-birining ustida */
    .card-1 { 
      background-color: #ADD8E6; 
      top: 10px;              /* Eng tepadagi karta */
      z-index: 5;
    }
    .card-2 { 
      background-color: #B2EBF2; 
      top: 30px;              /* Bir oz pastroq, lekin ustma-ust */
      z-index: 4;
    }
    .card-3 { 
      background-color: #81D4FA; 
      top: 50px;
      z-index: 3;
    }
    .card-4 { 
      background-color: #4FC3F7; 
      top: 70px;
      z-index: 2;
    }
    .card-5 { 
      background-color: #29B6F6; 
      top: 90px;              /* Eng pastdagi karta */
      z-index: 1;
    }

    /* Scroll qilish uchun (agar kerak bo'lsa) */
    .cards-container {
      overflow-y: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .cards-container::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div class="cards-container">
    <div class="card card-1"></div>
    <div class="card card-2"></div>
    <div class="card card-3"></div>
    <div class="card card-4"></div>
    <div class="card card-5"></div>
  </div>
</body>
</html>
