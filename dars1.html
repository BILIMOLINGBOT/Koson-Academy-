<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LearnU · 4 kun</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ios-blue: #007AFF;
      --bg-color: #000000;
      --card-radius: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-color);
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .vertical-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    .lesson-card {
      position: relative;
      min-height: 220px;
      border-radius: var(--card-radius);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(145deg, #1e1e1e, #111111);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .lesson-card::after {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: var(--ios-blue);
      filter: blur(100px);
      opacity: 0.2;
      pointer-events: none;
    }

    .lesson-card:active {
      transform: scale(0.97);
    }

    .card-title {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
      color: #fff;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
    }

    .btn-start {
      background: #fff;
      color: #000;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
      transition: 0.2s;
    }

    .btn-start:active {
      opacity: 0.7;
      transform: scale(0.96);
    }

    .reward-badge {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      padding: 8px 18px;
      border-radius: 30px;
    }
    
    .vertical-container::-webkit-scrollbar {
      width: 4px;
    }
    .vertical-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .vertical-container::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }
    
    @media (max-width: 420px) {
      .card-title { font-size: 28px; }
      .lesson-card { padding: 24px; min-height: 200px; }
      .btn-start { padding: 10px 22px; font-size: 15px; }
      .reward-badge { font-size: 15px; padding: 6px 16px; }
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <div class="vertical-container" id="cards-list">
    <!-- 4 ta kartalar -->
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.enableClosingConfirmation();
  
  const haptic = (type = 'light') => {
    try {
      if (tg.HapticFeedback) {
        if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
        else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
        else tg.HapticFeedback.impactOccurred('light');
      }
    } catch(e) { console.log('haptic error'); }
  };
  
  // 4 kun - faqat kuni raqami
  const dailyCourses = [];
  for (let i = 1; i <= 4; i++) {
    dailyCourses.push({
      id: i,
      title: `${i}-Kuni`,
      points: 100
    });
  }
  
  let userPoints = 1750;
  const POINTS_KEY = 'learnu_points';
  const COMPLETED_KEY = 'learnu_completed_days';
  let completedLessons = new Set();
  
  function loadUserData() {
    const savedPoints = localStorage.getItem(POINTS_KEY);
    if (savedPoints && !isNaN(parseInt(savedPoints))) {
      userPoints = parseInt(savedPoints);
    } else {
      userPoints = 1750;
    }
    const savedCompleted = localStorage.getItem(COMPLETED_KEY);
    if (savedCompleted) {
      try {
        const arr = JSON.parse(savedCompleted);
        if (Array.isArray(arr)) completedLessons = new Set(arr);
      } catch(e) {}
    }
  }
  
  function saveUserData() {
    localStorage.setItem(POINTS_KEY, userPoints);
    localStorage.setItem(COMPLETED_KEY, JSON.stringify([...completedLessons]));
  }
  
  function renderCards() {
    const container = document.getElementById('cards-list');
    if (!container) return;
    
    const cardsHTML = dailyCourses.map(lesson => {
      const lessonPage = `dars${lesson.id}.html`;
      
      return `
        <div class="lesson-card" data-lesson-id="${lesson.id}" data-page="${lessonPage}">
          <div class="card-title">${lesson.title}</div>
          <div class="card-footer">
            <div class="btn-start">Boshlash</div>
            <div class="reward-badge">100 ball</div>
          </div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = cardsHTML;
    
    document.querySelectorAll('.lesson-card').forEach(card => {
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        const lessonId = parseInt(card.getAttribute('data-lesson-id'));
        const pageUrl = card.getAttribute('data-page');
        if (lessonId && pageUrl) {
          openLesson(lessonId, pageUrl);
        }
      });
    });
    
    document.querySelectorAll('.btn-start').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parentCard = btn.closest('.lesson-card');
        if (parentCard) {
          const lessonId = parseInt(parentCard.getAttribute('data-lesson-id'));
          const pageUrl = parentCard.getAttribute('data-page');
          if (lessonId && pageUrl) openLesson(lessonId, pageUrl);
        }
      });
    });
  }
  
  function openLesson(lessonId, pageUrl) {
    haptic('light');
    
    const alreadyCompleted = completedLessons.has(lessonId);
    if (!alreadyCompleted) {
      const reward = 100;
      userPoints += reward;
      completedLessons.add(lessonId);
      saveUserData();
      haptic('success');
      tg.showPopup({
        title: "🎉 Tabriklaymiz!",
        message: `${lessonId}-Kuni darsini ochdingiz! +100 ball qo'shildi. Jami: ${userPoints} ball`,
        buttons: [{type: "ok"}]
      });
    } else {
      haptic('light');
    }
    
    try {
      let currentPath = window.location.pathname;
      let basePath = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
      let targetUrl = basePath + pageUrl;
      tg.HapticFeedback.impactOccurred('medium');
      window.location.href = targetUrl;
    } catch (navErr) {
      console.warn(navErr);
      window.open(pageUrl, '_self');
    }
  }
  
  loadUserData();
  renderCards();
  
  window.addEventListener('resize', () => {
    tg.expand();
  });
</script>
</body>
</html>
