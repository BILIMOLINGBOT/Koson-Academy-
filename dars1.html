
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zehnly Spin Wheel UI</title>
    <style>
        :root {
            --bg-color: #0a0f14;
            --wheel-border: #000000;
            --gold-gradient: linear-gradient(180deg, #f0ac31 0%, #a66a15 100%);
            --center-white: #ffffff;
            --indicator-color: #f0ac31;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tepasidagi ko'rsatkich (uchburchak) */
        .indicator {
            position: absolute;
            top: -10px;
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 25px solid var(--indicator-color);
            filter: drop-shadow(0 0 5px rgba(240, 172, 49, 0.8));
        }

        /* Barabanning asosi */
        .wheel-container {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid var(--wheel-border);
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background-color: var(--wheel-border);
        }

        /* Segmentlar */
        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            border: 2px solid var(--wheel-border);
            background: var(--gold-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .segment span {
            position: absolute;
            top: -130px;
            left: 20px;
            transform: rotate(75deg);
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* 7 ta segment uchun pozitsiyalar (360 / 7 = ~51.4deg) */
        .segment:nth-child(1) { transform: rotate(-25.7deg) skewY(-38.6deg); }
        .segment:nth-child(2) { transform: rotate(25.7deg) skewY(-38.6deg); }
        .segment:nth-child(3) { transform: rotate(77.1deg) skewY(-38.6deg); }
        .segment:nth-child(4) { transform: rotate(128.5deg) skewY(-38.6deg); }
        .segment:nth-child(5) { transform: rotate(179.9deg) skewY(-38.6deg); }
        .segment:nth-child(6) { transform: rotate(231.3deg) skewY(-38.6deg); }
        .segment:nth-child(7) { transform: rotate(282.7deg) skewY(-38.6deg); }

        /* Markazdagi tugma */
        .spin-button {
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--center-white);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), inset 0 0 10px rgba(0,0,0,0.2);
            border: 10px solid var(--wheel-border);
            user-select: none;
        }

        .spin-button span {
            color: #222;
            font-weight: 800;
            font-size: 16px;
        }

        .spin-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="indicator"></div>
        
        <div class="wheel-container" id="wheel">
            <div class="segment"><span>10 000</span></div>
            <div class="segment"><span>5 000</span></div>
            <div class="segment"><span>Next time</span></div>
            <div class="segment"><span>Zehnly</span></div>
            <div class="segment"><span>10%</span></div>
            <div class="segment"><span>20%</span></div>
            <div class="segment"><span>30%</span></div>
        </div>

        <div class="spin-button" onclick="spinWheel()">
            <span>Aylantiring</span>
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;

            isSpinning = true;
            const wheel = document.getElementById('wheel');
            
            // Tasodifiy aylanish (kamida 5 marta to'liq aylanish + tasodifiy gradus)
            const extraDegrees = Math.floor(Math.random() * 360);
            const spinDegrees = 1800 + extraDegrees; 
            
            currentRotation += spinDegrees;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Aylanish tugagach
            setTimeout(() => {
                isSpinning = false;
            }, 4000);
        }
    </script>
</body>
</html>
