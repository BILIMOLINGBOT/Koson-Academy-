<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · 5 ta karta</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #d4e0e9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* mobile frame */
    .phone {
      max-width: 375px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 44px 44px 32px 32px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3), 0 0 0 8px #eef3f8;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 740px;
    }

    /* ----- ORANGE HEADER ----- */
    .header-orange {
      background-color: #FFA500;
      padding: 16px 20px 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .user-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar-circle {
      width: 46px;
      height: 46px;
      background-color: #9b9b9b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-circle svg {
      width: 68%;
      height: 68%;
      fill: #dfdfdf;
    }

    .user-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #000000;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    .score-pill {
      background-color: #1a1a1a;
      border-radius: 40px;
      padding: 8px 16px 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }

    .lightning-icon svg {
      width: 22px;
      height: 22px;
      fill: white;
      display: block;
    }

    .score-number {
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* ----- KARTALAR KONTEYNERI (surish uchun) ----- */
    .cards-container {
      flex: 1;
      position: relative;
      margin: 16px 16px 8px 16px;
      overflow: hidden;
      border-radius: 24px;
      touch-action: pan-y; /* vertikal surish imkonini beradi */
    }

    .cards-stack {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: grab;
      transition: transform 0.3s ease-out;
      will-change: transform;
      user-select: none;
    }

    .cards-stack:active {
      cursor: grabbing;
      transition: none; /* surish paytida transition bo'lmasin */
    }

    /* karta dizayni */
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      transition: box-shadow 0.2s;
      will-change: transform;
      pointer-events: none; /* konteyner surish uchun */
      overflow: hidden;
    }

    /* har bir karta turli rangda (farqlash uchun) */
    .card-1 { background-color: #ADD8E6; } /* och moviy */
    .card-2 { background-color: #FADADD; } /* och pushti */
    .card-3 { background-color: #C1E1C1; } /* och yashil */
    .card-4 { background-color: #FFDAB9; } /* shaftoli */
    .card-5 { background-color: #E6E6FA; } /* lavanta */

    /* karta ichidagi kontent */
    .card-content {
      padding: 20px;
      color: #333;
      font-weight: 600;
      font-size: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card-number {
      font-size: 3rem;
      opacity: 0.3;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 1.2rem;
      background: rgba(255,255,255,0.3);
      padding: 8px 12px;
      border-radius: 20px;
      align-self: flex-start;
    }

    /* pastdagi yozuvlar */
    .label-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 36px;
      margin: 8px 0 12px 0;
      flex-shrink: 0;
    }

    .label {
      color: #000;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: 0.2px;
    }

    .label:first-letter {
      text-transform: uppercase;
    }

    /* ----- BOTTOM NAVIGATION ----- */
    .bottom-nav {
      background-color: #333333;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 12px 14px 12px;
      flex-shrink: 0;
      width: 100%;
      box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.15);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 64px;
    }

    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-item:nth-child(1) .icon-circle {
      background-color: #3b82f6;
    }
    .nav-item:nth-child(1) svg {
      fill: white;
      width: 28px;
      height: 28px;
    }

    .nav-item:nth-child(2) .icon-circle {
      background-color: white;
    }
    .degree-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      color: #222;
      font-weight: 600;
      margin-top: 4px;
    }
    .degree-big {
      font-size: 2rem;
      margin-bottom: -10px;
    }
    .zero-small {
      font-size: 1rem;
    }

    .nav-item:nth-child(3) .icon-circle {
      background-color: transparent;
    }
    .nav-item:nth-child(3) svg {
      stroke: white;
      stroke-width: 2;
      fill: none;
      width: 32px;
      height: 32px;
    }

    .nav-item:nth-child(4) .icon-circle {
      background-color: transparent;
    }
    .grid-dots svg {
      fill: white;
      width: 32px;
      height: 32px;
    }

    .nav-label {
      color: white;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.2px;
      text-transform: lowercase;
    }
    .nav-label:first-letter {
      text-transform: uppercase;
    }

    .nav-item:nth-child(2) .nav-label {
      opacity: 0;
      pointer-events: none;
    }

    /* kichik ekranlar uchun */
    @media (max-width: 350px) {
      .user-name { font-size: 0.9rem; }
      .score-pill { padding: 6px 12px; }
    }

    /* surish paneli indikatori */
    .drag-hint {
      text-align: center;
      font-size: 0.7rem;
      color: #666;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- header -->
    <div class="header-orange">
      <div class="user-block">
        <div class="avatar-circle">
          <svg viewBox="0 0 24 24" width="30" height="30" fill="currentColor">
            <path d="M12 4a4 4 0 1 1 0 8 4 4 0 0 1 0-8zm0 10c4.42 0 8 2.69 8 6v2H4v-2c0-3.31 3.58-6 8-6z"/>
          </svg>
        </div>
        <span class="user-name">Javlonbek Rashidov</span>
      </div>
      <div class="score-pill">
        <span class="lightning-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
            <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
          </svg>
        </span>
        <span class="score-number">359</span>
      </div>
    </div>

    <!-- 5 ta karta (ustma-ust, suriladigan) -->
    <div class="cards-container" id="cardsContainer">
      <div class="cards-stack" id="cardsStack">
        <!-- Karta 5 (eng pastda) -->
        <div class="card card-5" style="z-index: 1; transform: translateY(80px);">
          <div class="card-content">
            <div class="card-number">5</div>
            <div class="card-title">Mustahkamlash</div>
          </div>
        </div>
        <!-- Karta 4 -->
        <div class="card card-4" style="z-index: 2; transform: translateY(60px);">
          <div class="card-content">
            <div class="card-number">4</div>
            <div class="card-title">Amaliyot</div>
          </div>
        </div>
        <!-- Karta 3 -->
        <div class="card card-3" style="z-index: 3; transform: translateY(40px);">
          <div class="card-content">
            <div class="card-number">3</div>
            <div class="card-title">Qo'llanma</div>
          </div>
        </div>
        <!-- Karta 2 -->
        <div class="card card-2" style="z-index: 4; transform: translateY(20px);">
          <div class="card-content">
            <div class="card-number">2</div>
            <div class="card-title">Mashq</div>
          </div>
        </div>
        <!-- Karta 1 (eng tepada) -->
        <div class="card card-1" style="z-index: 5; transform: translateY(0px);">
          <div class="card-content">
            <div class="card-number">1</div>
            <div class="card-title">Dars</div>
          </div>
        </div>
      </div>
    </div>

    <!-- surish indikatori -->
    <div class="drag-hint">↑ pastdan yuqoriga / tepadan pastga suring ↓</div>

    <!-- pastki yozuvlar -->
    <div class="label-row">
      <span class="label">Darslar</span>
      <span class="label">Resurslar</span>
      <span class="label">Ko'proq</span>
    </div>

    <!-- bottom navigation -->
    <div class="bottom-nav">
      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="white">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
        </div>
        <span class="nav-label">Darslar</span>
      </div>

      <div class="nav-item">
        <div class="icon-circle">
          <div class="degree-block">
            <span class="degree-big">°</span>
            <span class="zero-small">0</span>
          </div>
        </div>
        <span class="nav-label" style="opacity:0;"> </span>
      </div>

      <div class="nav-item">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" fill="none">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
          </svg>
        </div>
        <span class="nav-label">Resurslar</span>
      </div>

      <div class="nav-item">
        <div class="icon-circle grid-dots">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
            <circle cx="5" cy="12" r="2.5"/>
            <circle cx="12" cy="12" r="2.5"/>
            <circle cx="19" cy="12" r="2.5"/>
          </svg>
        </div>
        <span class="nav-label">Ko'proq</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('cardsContainer');
      const stack = document.getElementById('cardsStack');
      
      let startY = 0;
      let currentTranslate = 0;
      let isDragging = false;
      let startDragY = 0;
      
      // surish chegaralari
      const MIN_TRANSLATE = -250; // yuqoriga (pastki kartalarni ko'rish uchun)
      const MAX_TRANSLATE = 0;     // pastga (eng tepadagi kartani ko'rish)
      
      // mouse/touch eventlari
      stack.addEventListener('mousedown', startDrag);
      stack.addEventListener('touchstart', startDrag, { passive: false });
      
      window.addEventListener('mousemove', drag);
      window.addEventListener('touchmove', drag, { passive: false });
      
      window.addEventListener('mouseup', endDrag);
      window.addEventListener('touchend', endDrag);
      window.addEventListener('mouseleave', endDrag);
      
      function startDrag(e) {
        e.preventDefault();
        isDragging = true;
        startDragY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
        startY = currentTranslate;
        stack.style.transition = 'none';
        stack.style.cursor = 'grabbing';
      }
      
      function drag(e) {
        if (!isDragging) return;
        e.preventDefault();
        
        const currentY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
        const diff = currentY - startDragY;
        
        // yangi pozitsiyani hisoblash
        let newTranslate = startY + diff;
        
        // chegaralarni qo'llash
        if (newTranslate > MAX_TRANSLATE) {
          newTranslate = MAX_TRANSLATE + (newTranslate - MAX_TRANSLATE) * 0.2; // elastiklik
        }
        if (newTranslate < MIN_TRANSLATE) {
          newTranslate = MIN_TRANSLATE + (newTranslate - MIN_TRANSLATE) * 0.2; // elastiklik
        }
        
        currentTranslate = newTranslate;
        stack.style.transform = `translateY(${currentTranslate}px)`;
      }
      
      function endDrag(e) {
        if (!isDragging) return;
        isDragging = false;
        stack.style.transition = 'transform 0.3s ease-out';
        stack.style.cursor = 'grab';
        
        // chegaralarga tekislash
        if (currentTranslate > MAX_TRANSLATE) {
          currentTranslate = MAX_TRANSLATE;
        }
        if (currentTranslate < MIN_TRANSLATE) {
          currentTranslate = MIN_TRANSLATE;
        }
        
        stack.style.transform = `translateY(${currentTranslate}px)`;
      }
      
      // boshlang'ich pozitsiya
      stack.style.transform = `translateY(0px)`;
      stack.style.cursor = 'grab';
    })();
  </script>
</body>
</html>
