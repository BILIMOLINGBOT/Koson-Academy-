<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Modern UI</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
    }

    body {
      background: #f4f6f8;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    /* ── PROFIL PANEL (OQ FONDA) ── */
    .profile-header {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff; /* Oq fon */
      margin: 10px 15px;
      border-radius: 20px;
      color: #1a1a1a; /* To'q matn */
      border: 1px solid #f0f0f0; /* Panel chegarasi bilinishi uchun */
      box-shadow: 0 4px 15px rgba(0,0,0,0.04);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: #f0f2f5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #e0e0e0;
    }

    .user-text h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .user-text p {
      font-size: 0.8rem;
      color: #7f8c8d;
      margin-top: -2px;
    }

    .stats-badge {
      background: #1a1a1a;
      color: white;
      padding: 6px 14px;
      border-radius: 100px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* ── KARTALAR SKROLLI ── */
    .scroll-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 10px 20px;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .lesson-card {
      flex: 0 0 85%;
      height: 220px;
      border-radius: 28px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: center;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    /* To'q va professional ranglar */
    .card-1 { background: #1a1a1a; }
    .card-2 { background: #2c3e50; }
    .card-3 { background: #16a085; }

    .card-tag {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 6px;
      width: fit-content;
    }

    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .btn-start {
      background: white;
      color: black;
      padding: 6px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.75rem;
      width: fit-content;
    }

    .hint {
      text-align: center;
      color: #bdc3c7;
      font-size: 0.8rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Oq fonli profil paneli -->
  <div class="profile-header">
    <div class="user-info">
      <div class="avatar">
        <!-- User ikonasi -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#7f8c8d"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="user-text">
        <h4>Javlonbek</h4>
        <p>Rashidov</p>
      </div>
    </div>
    <div class="stats-badge">
      <span>⚡</span>
      <span>359</span>
    </div>
  </div>

  <div class="scroll-container">
    <div class="lesson-card card-1">
      <div class="card-tag">Matematika</div>
      <div class="card-title">Algebra: Murakkab modulli tenglamalar</div>
      <div class="btn-start">Boshlash</div>
    </div>

    <div class="lesson-card card-2">
      <div class="card-tag">IELTS</div>
      <div class="card-title">Advanced Vocabulary for Writing Task 2</div>
      <div class="btn-start">Boshlash</div>
    </div>

    <div class="lesson-card card-3">
      <div class="card-tag">Biznes</div>
      <div class="card-title">Menejment va jamoa bilan ishlash</div>
      <div class="btn-start">Boshlash</div>
    </div>
  </div>

  <div class="hint">Kurslarni ko'rish uchun suring →</div>
</div>

</body>
</html>
