<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Maxsus Karta Dizayni</title>
  <style>
    /* ── ASOSIY RESET VA FON ── */
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }

    body {
      background:#f0f2f5;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; padding:12px;
    }

    /* ── TELEFON MOKAPI ── */
    .phone {
      max-width:375px; width:100%;
      background:#fff;
      border-radius:44px;
      box-shadow:0 30px 60px -12px rgba(0,0,0,0.25);
      overflow:hidden;
      display:flex; flex-direction:column;
      height:740px;
      position: relative;
    }

    /* ── KARTALARNI MARKAZLASHTIRISH ── */
    .cards-container {
      background:#f8f9fa;
      flex:1; 
      min-height:0;
      position:relative;
      overflow:hidden;
      display:flex;
      align-items:center;     /* Vertikal markaz */
      justify-content:center; /* Gorizontal markaz */
    }

    /* ── STACK MAYDONI (Uzunligi oshirildi: 480px) ── */
    .stack-scene {
      position:relative;
      width:100%;
      height:480px;           /* Orqa kartalar ko'rinishi uchun joy */
      max-width:343px;
      margin:0 auto;
    }

    /* ── KARTALANING KO'RINISHI (Balandligi oshirildi: 320px) ── */
    .lesson-card {
      position:absolute;
      left:0; right:0;
      height:320px;           /* Siz xohlagan qizil chiziqlar oralig'i */
      border-radius:32px;     /* Burchaklar yumshoqroq */
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
      display:flex; flex-direction:column; justify-content:flex-end;
      padding:28px 24px;
      cursor:grab;
      user-select:none;
      touch-action:none;
      transform-origin:bottom center;
    }

    .lesson-card:active { cursor:grabbing; }

    /* Kartalar ranglari */
    .lesson-card:nth-child(1){background:linear-gradient(145deg,#4f8ef7,#1a5fd6);}
    .lesson-card:nth-child(2){background:linear-gradient(145deg,#f97b4f,#e04010);}
    .lesson-card:nth-child(3){background:linear-gradient(145deg,#52c97a,#1e9e4b);}
    .lesson-card:nth-child(4){background:linear-gradient(145deg,#b76ef7,#7b20d6);}
    .lesson-card:nth-child(5){background:linear-gradient(145deg,#f7c14f,#d48a00);}

    /* Dekorativ doiralar */
    .lesson-card::before {
      content:''; position:absolute; top:-40px; right:-40px;
      width:160px; height:160px; border-radius:50%;
      background:rgba(255,255,255,0.1); pointer-events:none;
    }

    /* Karta ichidagi matnlar */
    .card-tag   { font-size:0.75rem; font-weight:700; letter-spacing:1.2px;
                  text-transform:uppercase; color:rgba(255,255,255,0.8);
                  margin-bottom:10px; }
    .card-title { font-size:1.4rem; font-weight:800; color:#fff;
                  line-height:1.2; margin-bottom:15px; }
    .card-meta  { display:flex; align-items:center; gap:12px; }
    .card-badge { background:rgba(255,255,255,0.25); border-radius:20px;
                  padding:5px 12px; font-size:0.75rem; font-weight:700; color:#fff; }
    .card-progress-bar  { flex:1; height:6px; background:rgba(255,255,255,0.2);
                          border-radius:10px; overflow:hidden; }
    .card-progress-fill { height:100%; border-radius:10px; background:#fff; }
  </style>
</head>
<body>

<div class="phone">
  <div class="cards-container">
    <div class="stack-scene" id="stackScene">

      <!-- 1-Karta -->
      <div class="lesson-card">
        <div class="card-tag">1-dars · Matematika</div>
        <div class="card-title">Algebra asoslari va tenglamalar</div>
        <div class="card-meta">
          <span class="card-badge">72%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:72%"></div></div>
        </div>
      </div>

      <!-- 2-Karta -->
      <div class="lesson-card">
        <div class="card-tag">2-dars · Ingliz tili</div>
        <div class="card-title">Present Perfect ishlatilishi</div>
        <div class="card-meta">
          <span class="card-badge">45%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:45%"></div></div>
        </div>
      </div>

      <!-- 3-Karta -->
      <div class="lesson-card">
        <div class="card-tag">3-dars · Fizika</div>
        <div class="card-title">Nyuton qonunlari va kuch</div>
        <div class="card-meta">
          <span class="card-badge">90%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:90%"></div></div>
        </div>
      </div>

      <!-- 4-Karta -->
      <div class="lesson-card">
        <div class="card-tag">4-dars · Tarix</div>
        <div class="card-title">O'rta asrlar davri va sivilizatsiya</div>
        <div class="card-meta">
          <span class="card-badge">30%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:30%"></div></div>
        </div>
      </div>

      <!-- 5-Karta -->
      <div class="lesson-card">
        <div class="card-tag">5-dars · Kimyo</div>
        <div class="card-title">Davriy jadval va elementlar</div>
        <div class="card-meta">
          <span class="card-badge">58%</span>
          <div class="card-progress-bar"><div class="card-progress-fill" style="width:58%"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
(function(){
  const scene = document.getElementById('stackScene');
  const cards = Array.from(scene.querySelectorAll('.lesson-card'));
  const N = cards.length;

  /* Layout parametrlari */
  const BOTTOM_START = 20;   // Eng oldingi kartaning pastki masofasi
  const PEEK         = 28;   // Kartalar orasidagi masofa (yuqoriga qarab)
  const SCALE_STEP   = 0.05; // Orqaga qarab kichrayish koeffitsienti

  let topIdx = 0;

  function applyLayout(animated) {
    cards.forEach((card, i) => {
      const depth  = (i - topIdx + N) % N;
      const bottom = BOTTOM_START + depth * PEEK;
      const scale  = 1 - depth * SCALE_STEP;
      const z      = N - depth;
      const bright = 1 - 0.1 * depth;

      card.style.transition = animated
        ? 'all 0.45s cubic-bezier(0.25, 1, 0.5, 1)'
        : 'none';

      card.style.bottom    = bottom + 'px';
      card.style.transform = `scale(${scale})`;
      card.style.zIndex    = z;
      card.style.filter    = `brightness(${bright})`;
      
      // Orqadagi juda uzoq kartalarni yashirish (ixtiyoriy)
      card.style.opacity = depth > 3 ? 0 : 1;
    });
  }

  applyLayout(false);

  /* ── SWIPE LOGIKASI (Tepaga/Pastga surish) ── */
  let startY = null;

  function onDown(e) {
    startY = e.touches ? e.touches[0].clientY : e.clientY;
  }

  function onUp(e) {
    if (startY === null) return;
    const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const diff = startY - endY;

    if (Math.abs(diff) > 40) { // 40px dan ortiq surilsa
      if (diff > 0) {
        topIdx = (topIdx + 1) % N;       // Swipe UP -> Keyingi karta
      } else {
        topIdx = (topIdx - 1 + N) % N;  // Swipe DOWN -> Oldingi karta
      }
      applyLayout(true);
    }
    startY = null;
  }

  scene.addEventListener('mousedown',  onDown);
  scene.addEventListener('touchstart', onDown, { passive: true });
  scene.addEventListener('mouseup',    onUp);
  scene.addEventListener('touchend',   onUp);
})();
</script>

</body>
</html>
