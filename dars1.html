
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli G'ildirak - Zamonaviy Dizayn</title>
    <style>
        :root {
            --primary-gold: #f39c12;
            --dark-gold: #d35400;
            --bg-color: #0b131e;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin-bottom: 30px;
        }

        /* Tepasidagi ko'rsatkich (uchburchak) */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid var(--primary-gold);
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(243, 156, 18, 0.8));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(243, 156, 18, 0.2);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* Markazdagi doira */
        .center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff, #f39c12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a1a;
            font-size: 14px;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #spin-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(145deg, var(--primary-gold), var(--dark-gold));
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.4);
        }

        #spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.6);
        }

        #spin-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: scale(1);
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            height: 30px;
            color: var(--primary-gold);
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="center-circle">Aylantiring</div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button id="spin-btn">Spinni boshlash</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result');

        const segments = [
            "10 000",
            "5 000",
            "Next time",
            "Zehnly",
            "10%",
            "20%",
            "30%"
        ];

        const colors = [
            "#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a"
        ];

        const numSegments = segments.length;
        const anglePerSegment = 2 * Math.PI / numSegments;
        let currentRotation = 0;

        // G'ildirakni chizish
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((text, i) => {
                const angle = i * anglePerSegment;
                
                // Segment rangini chizish
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + anglePerSegment);
                ctx.lineTo(radius, radius);
                ctx.fill();
                ctx.strokeStyle = '#0b131e';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Matnni yozish
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 24px Arial";
                ctx.fillText(text, radius - 30, 10);
                ctx.restore();
            });
        }

        drawWheel();

        // Aylantirish funksiyasi
        btn.addEventListener('click', () => {
            btn.disabled = true;
            resultDisplay.innerText = "";
            
            // Tasodifiy aylanish darajasi (kamida 5 ta to'liq aylanish + tasodifiy)
            const randomSpin = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomSpin;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // To'xtash va natijani aniqlash (4 soniyadan keyin)
            setTimeout(() => {
                btn.disabled = false;
                
                // Qaysi segmentda to'xtaganini hisoblash
                const actualDeg = currentRotation % 360;
                // Canvasda 0 gradus o'ng tomondan boshlanadi, pointer esa tepada (-90 deg)
                // Shuning uchun hisobni to'g'irlaymiz
                const correctedDeg = (360 - actualDeg + 270) % 360;
                const segmentIndex = Math.floor(correctedDeg / (360 / numSegments));
                
                resultDisplay.innerText = "Natija: " + segments[segmentIndex];
            }, 4000);
        });
    </script>
</body>
</html>
