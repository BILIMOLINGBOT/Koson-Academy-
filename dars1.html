<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · iPhone Style</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #ffffff; /* Butunlay oq fon */
      color: #000000;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      position: relative;
    }

    /* ── PROFIL PANEL (CHЕGARASIZ) ── */
    .profile-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #ffffff; 
      margin-top: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: #f2f2f7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-text h4 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .user-text p {
      font-size: 0.9rem;
      color: #8e8e93;
    }

    .stats-badge {
      background: #000000;
      color: #ffffff;
      padding: 8px 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* ── KARTALAR SKROLLI ── */
    .scroll-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding: 20px;
      gap: 15px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-container::-webkit-scrollbar {
      display: none;
    }

    .lesson-card {
      flex: 0 0 85%;
      height: 240px;
      border-radius: 35px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      scroll-snap-align: center;
      color: white;
      transition: transform 0.3s ease;
    }

    .card-1 { background: #000000; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
    .card-2 { background: #1c1c1e; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    .card-3 { background: #2c2c2e; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

    .card-tag {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      background: rgba(255,255,255,0.1);
      padding: 5px 12px;
      border-radius: 10px;
      width: fit-content;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    /* ── iPHONE STYLE BOTTOM MENU ── */
    .tab-bar {
      position: absolute;
      bottom: 25px;
      left: 20px;
      right: 20px;
      height: 70px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.03);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e8e93;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .tab-item.active {
      color: #007aff; /* iOS Blue */
    }

    .tab-item svg {
      width: 26px;
      height: 26px;
      stroke-width: 1.5;
    }

    .tab-item span {
      font-size: 0.65rem;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="app-wrapper">
  <!-- Profil (Chegarasiz va toza) -->
  <div class="profile-header">
    <div class="user-info">
      <div class="avatar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </div>
      <div class="user-text">
        <h4>Javlonbek</h4>
        <p>Premium darslar</p>
      </div>
    </div>
    <div class="stats-badge">
      <span>⚡</span>
      <span>359</span>
    </div>
  </div>

  <!-- Kartalar -->
  <div class="scroll-container">
    <div class="lesson-card card-1">
      <div class="card-tag">Dars · 01</div>
      <div class="card-title">Muvaffaqiyatli Biznes Strategiyasi</div>
      <div style="font-size: 0.9rem; opacity: 0.7;">Boshlash uchun bosing</div>
    </div>
    <div class="lesson-card card-2">
      <div class="card-tag">Dars · 02</div>
      <div class="card-title">Shaxsiy Moliyani Boshqarish</div>
      <div style="font-size: 0.9rem; opacity: 0.7;">Davom etish</div>
    </div>
  </div>

  <!-- iOS Tab Bar -->
  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      <span>Asosiy</span>
    </a>
    <a href="#" class="tab-item">
      <!-- Reyting Ikonkasi (Chart) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      <span>Reyting</span>
    </a>
    <a href="#" class="tab-item">
      <!-- Omadli g'ildirak (Wheel/Gift) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      <span>G'ildirak</span>
    </a>
    <a href="#" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      <span>Sozlamalar</span>
    </a>
  </nav>
</div>

</body>
</html>
