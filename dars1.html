<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Ingliz tili + Darslar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: #000000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h2 {
      margin: 0;
      font-size: 22px;
    }

    .stats {
      display: flex;
      gap: 15px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Darslar grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
      padding-bottom: 80px;
    }

    .card {
      border-radius: 20px;
      padding: 25px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
      border: 2px solid #333;
    }

    .card.completed { 
      background: #000000; 
      border: 2px solid gold; 
    }

    .card.locked { 
      opacity: 0.5; 
      cursor: not-allowed; 
    }

    .card-number {
      font-size: 14px;
      opacity: 0.9;
      background: rgba(255,255,255,0.2);
      padding: 3px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 15px;
    }

    .card h3 {
      margin-bottom: 15px;
      font-size: 18px;
    }

    .percent-text {
      font-size: 28px;
      font-weight: bold;
      margin: 10px 0;
    }

    .progress-bg {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 10px;
      width: 0%;
      transition: width 0.5s;
    }

    .completed .progress-fill {
      background: gold;
    }

    /* O'yin sahifalari */
    .app-container {
      display: none;
      width: 100%;
      max-width: 450px;
      margin: 0 auto;
      padding: 20px;
      height: 100vh;
      flex-direction: column;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .app-container.active {
      display: flex;
    }

    /* Dars test sarlavhasi */
    .lesson-header {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      border: 2px solid #333;
    }

    .lesson-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .lesson-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #a0a0a0;
    }

    /* Test kartochkasi */
    .test-card {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      color: gold;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .option-btn {
      background: #2a2a2a;
      border: 2px solid #444;
      border-radius: 15px;
      padding: 18px;
      color: white;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .option-btn:hover {
      background: #333;
      border-color: #666;
    }

    .option-btn.selected {
      background: #000;
      border-color: gold;
    }

    .option-prefix {
      width: 30px;
      height: 30px;
      background: #444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .selected .option-prefix {
      background: gold;
      color: black;
    }

    .test-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .question-counter {
      color: #888;
      font-size: 14px;
    }

    .submit-btn {
      background: white;
      color: black;
      border: none;
      border-radius: 15px;
      padding: 15px 30px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000;
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      border-top: 2px solid #333;
      z-index: 1000;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-item.active {
      color: white;
    }

    .nav-icon { font-size: 22px; }
    .nav-text { font-size: 12px; }

    /* Result panel */
    .result-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      color: black;
      border-radius: 30px 30px 0 0;
      padding: 40px 25px;
      transform: translateY(100%);
      transition: 0.4s;
      z-index: 2000;
    }

    .result-panel.active {
      transform: translateY(0);
    }

    .res-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .res-msg {
      font-size: 16px;
      margin-bottom: 25px;
      color: #444;
    }

    #res-btn {
      background: black !important;
      color: white !important;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Back button */
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      margin-right: 15px;
    }

    .lesson-header-top {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- DARSLAR SAHIFASI -->
<div id="lessons-screen" style="display: block;">
  <div class="header">
    <h2><i class="fas fa-book-open"></i> Darslar</h2>
    <div class="stats">
      <div class="stat-item"><i class="fas fa-fire"></i> 0</div>
      <div class="stat-item"><i class="fas fa-coins" style="color: gold;"></i> <span id="coin-display">0</span></div>
    </div>
  </div>

  <div class="cards-grid" id="cardsContainer"></div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <div class="nav-item active" onclick="showLessonsScreen()">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-text">Darslar</span>
    </div>
    <div class="nav-item" onclick="showProfile()">
      <i class="fas fa-user nav-icon"></i>
      <span class="nav-text">Profil</span>
    </div>
  </div>
</div>

<!-- DARS TEST SAHIFASI -->
<div id="lesson-test-screen" class="app-container">
  <div class="lesson-header-top">
    <button class="back-btn" onclick="showLessonsScreen()"><i class="fas fa-arrow-left"></i></button>
    <h2>Dars testi</h2>
  </div>
  
  <div class="lesson-header" id="lesson-test-header">
    <div class="lesson-title" id="current-lesson-title">1-dars: Kirish</div>
    <div class="lesson-progress">
      <i class="fas fa-star" style="color: gold;"></i>
      <span id="lesson-test-progress">0/10 savol</span>
    </div>
  </div>

  <div id="test-container">
    <!-- Testlar JS orqali yaratiladi -->
  </div>
</div>

<!-- PROFIL SAHIFASI -->
<div id="profile-screen" class="app-container">
  <div class="lesson-header-top">
    <button class="back-btn" onclick="showLessonsScreen()"><i class="fas fa-arrow-left"></i></button>
    <h2>Mening profilim</h2>
  </div>
  
  <div style="text-align: center; margin: 40px 0;">
    <i class="fas fa-user-circle" style="font-size: 100px; color: gold;"></i>
    <h3 style="margin: 20px 0;">Talaba</h3>
    <div style="background: #1a1a1a; padding: 20px; border-radius: 20px;">
      <p><i class="fas fa-coins" style="color: gold;"></i> Tangalar: <span id="profile-coins">0</span></p>
      <p><i class="fas fa-star" style="color: gold;"></i> Tugallangan darslar: <span id="completed-lessons">0</span>/<span id="total-lessons">10</span></p>
    </div>
  </div>
</div>

<div class="result-panel" id="res-panel">
  <div id="res-title" class="res-title"></div>
  <div id="res-msg" class="res-msg"></div>
  <button class="next-btn" id="res-btn">Davom etish</button>
</div>

<script>
  // ========== MA'LUMOTLAR ==========
  let coins = parseInt(localStorage.getItem('english_coins')) || 0;
  
  // Darslar ro'yxati
  const lessonsData = [
    { 
      id: 1,
      title: "Kirish va asosiy tushunchalar", 
      progress: 0,
      completed: false,
      tests: [
        { question: "'Hello' so'zi qanday tarjima qilinadi?", options: ["Salom", "Xayr", "Rahmat", "Ha"], correct: 0 },
        { question: "'Goodbye' so'zi qanday tarjima qilinadi?", options: ["Salom", "Xayr", "Rahmat", "Ha"], correct: 1 },
        { question: "'Thank you' so'zi qanday tarjima qilinadi?", options: ["Salom", "Xayr", "Rahmat", "Ha"], correct: 2 },
        { question: "'Yes' so'zi qanday tarjima qilinadi?", options: ["Yo'q", "Ha", "Balki", "Hech qachon"], correct: 1 },
        { question: "'No' so'zi qanday tarjima qilinadi?", options: ["Yo'q", "Ha", "Balki", "Hech qachon"], correct: 0 }
      ]
    },
    { 
      id: 2,
      title: "Dasturlash asoslari", 
      progress: 0,
      completed: false,
      tests: [
        { question: "'Computer' so'zi qanday tarjima qilinadi?", options: ["Telefon", "Kompyuter", "Planshet", "Monitor"], correct: 1 },
        { question: "'Program' so'zi qanday tarjima qilinadi?", options: ["Dastur", "O'yin", "Ilova", "Sayt"], correct: 0 },
        { question: "'Code' so'zi qanday tarjima qilinadi?", options: ["Matn", "Kod", "Raqam", "Belgi"], correct: 1 },
        { question: "'Developer' so'zi qanday tarjima qilinadi?", options: ["Foydalanuvchi", "Dasturchi", "Dizayner", "Admin"], correct: 1 },
        { question: "'Website' so'zi qanday tarjima qilinadi?", options: ["Ilova", "Dastur", "Veb-sayt", "Tarmoq"], correct: 2 }
      ]
    },
    { 
      id: 3,
      title: "O'zgaruvchilar va ma'lumot turlari", 
      progress: 0,
      completed: false,
      tests: [
        { question: "'Number' so'zi qanday tarjima qilinadi?", options: ["Matn", "Raqam", "Belgi", "So'z"], correct: 1 },
        { question: "'Text' so'zi qanday tarjima qilinadi?", options: ["Matn", "Raqam", "Belgi", "So'z"], correct: 0 },
        { question: "'True' so'zi qanday tarjima qilinadi?", options: ["Yolg'on", "To'g'ri", "Noto'g'ri", "Balki"], correct: 1 },
        { question: "'False' so'zi qanday tarjima qilinadi?", options: ["Yolg'on", "To'g'ri", "Noto'g'ri", "Balki"], correct: 0 },
        { question: "'Variable' so'zi qanday tarjima qilinadi?", options: ["O'zgarmas", "O'zgaruvchi", "Funksiya", "Massiv"], correct: 1 }
      ]
    }
  ];

  // ========== TANGA TIZIMI ==========
  function updateCoinDisplay() {
    document.getElementById('coin-display').textContent = coins;
    document.getElementById('profile-coins').textContent = coins;
    localStorage.setItem('english_coins', coins);
  }
  
  function addCoin(amount = 1) {
    coins += amount;
    updateCoinDisplay();
  }

  // ========== DARSLAR SAHIFASI ==========
  function showLessonsScreen() {
    document.getElementById('lessons-screen').style.display = 'block';
    document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item')[0].classList.add('active');
    document.querySelectorAll('.nav-item')[1].classList.remove('active');
    createLessonCards();
    updateProfileStats();
  }

  function showProfile() {
    document.getElementById('lessons-screen').style.display = 'none';
    document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
    document.getElementById('profile-screen').classList.add('active');
    document.querySelectorAll('.nav-item')[0].classList.remove('active');
    document.querySelectorAll('.nav-item')[1].classList.add('active');
  }

  // Dars kartalarini yaratish
  function createLessonCards() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';
    
    lessonsData.forEach((lesson, index) => {
      const card = document.createElement('div');
      card.className = `card ${lesson.completed ? 'completed' : ''}`;
      
      // Progress foizini hisoblash
      const totalTests = lesson.tests.length;
      const completedTests = lesson.tests.filter(t => t.completed).length;
      const percent = totalTests > 0 ? Math.round((completedTests / totalTests) * 100) : 0;
      
      card.innerHTML = `
        <div class="card-number">${index + 1}-dars</div>
        <h3>${lesson.title}</h3>
        <div class="percent-text">
          <i class="fas ${lesson.completed ? 'fa-check-circle' : 'fa-star'}" style="color: gold;"></i>
          % ${percent}
        </div>
        <div class="progress-bg">
          <div class="progress-fill" style="width: ${percent}%;"></div>
        </div>
        <div style="margin-top: 15px; font-size: 14px; color: #888;">
          <i class="fas fa-question-circle"></i> ${completedTests}/${totalTests} ta test
        </div>
      `;
      
      card.onclick = () => openLessonTest(index);
      container.appendChild(card);
    });
  }

  // ========== DARS TESTLARI ==========
  let currentLessonIndex = 0;
  let currentQuestionIndex = 0;
  let selectedOption = null;

  function openLessonTest(lessonIndex) {
    currentLessonIndex = lessonIndex;
    currentQuestionIndex = 0;
    selectedOption = null;
    
    document.getElementById('lessons-screen').style.display = 'none';
    document.querySelectorAll('.app-container').forEach(s => s.classList.remove('active'));
    document.getElementById('lesson-test-screen').classList.add('active');
    
    const lesson = lessonsData[lessonIndex];
    document.getElementById('current-lesson-title').textContent = `${lessonIndex + 1}-dars: ${lesson.title}`;
    
    // Progressni yangilash
    updateTestProgress();
    
    // Testni yaratish
    renderTest();
  }

  function updateTestProgress() {
    const lesson = lessonsData[currentLessonIndex];
    const completedTests = lesson.tests.filter(t => t.completed).length;
    document.getElementById('lesson-test-progress').textContent = 
      `${completedTests}/${lesson.tests.length} savol`;
  }

  function renderTest() {
    const lesson = lessonsData[currentLessonIndex];
    const question = lesson.tests[currentQuestionIndex];
    
    if (!question) return;
    
    const container = document.getElementById('test-container');
    container.innerHTML = `
      <div class="test-card">
        <div class="question-text">${currentQuestionIndex + 1}. ${question.question}</div>
        <div class="options-grid" id="options-container">
          ${question.options.map((opt, idx) => `
            <div class="option-btn" onclick="selectOption(${idx})">
              <span class="option-prefix">${String.fromCharCode(65 + idx)}</span>
              ${opt}
            </div>
          `).join('')}
        </div>
        <div class="test-footer">
          <span class="question-counter">${currentQuestionIndex + 1} / ${lesson.tests.length}</span>
          <button class="submit-btn" id="submit-test" onclick="submitAnswer()" disabled>Tekshirish</button>
        </div>
      </div>
    `;
    
    // Agar savol allaqachon javob berilgan bo'lsa
    if (question.userAnswer !== undefined) {
      highlightSelectedOption(question.userAnswer);
      document.getElementById('submit-test').disabled = false;
    }
  }

  function selectOption(index) {
    selectedOption = index;
    
    // Highlight tanlangan variantni
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      if (i === index) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });
    
    document.getElementById('submit-test').disabled = false;
  }

  function highlightSelectedOption(index) {
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
      if (i === index) {
        btn.classList.add('selected');
      }
    });
  }

  function submitAnswer() {
    if (selectedOption === null) return;
    
    const lesson = lessonsData[currentLessonIndex];
    const question = lesson.tests[currentQuestionIndex];
    
    // Agar oldin javob berilmagan bo'lsa
    if (!question.completed) {
      const isCorrect = selectedOption === question.correct;
      
      if (isCorrect) {
        // To'g'ri javob uchun 1 tanga
        addCoin(1);
        
        // Testni completed deb belgilash
        question.completed = true;
        question.userAnswer = selectedOption;
        
        // Progressni yangilash
        updateTestProgress();
        
        // Darsni tekshirish (agar barcha testlar tugagan bo'lsa)
        checkLessonCompletion();
        
        showResultPanel(
          "Barakalla! 🎉",
          "To'g'ri javob! +1 tanga",
          moveToNextQuestion
        );
      } else {
        // Xato javob
        showResultPanel(
          "Xato! 😅",
          `To'g'ri javob: ${question.options[question.correct]}`,
          () => {
            // Xato bo'lsa ham keyingi savolga o'tish
            moveToNextQuestion();
          }
        );
      }
    } else {
      // Agar oldin javob berilgan bo'lsa, keyingi savolga o'tish
      moveToNextQuestion();
    }
  }

  function moveToNextQuestion() {
    const lesson = lessonsData[currentLessonIndex];
    
    if (currentQuestionIndex < lesson.tests.length - 1) {
      // Keyingi savolga o'tish
      currentQuestionIndex++;
      selectedOption = null;
      renderTest();
    } else {
      // Testlar tugadi
      if (lesson.completed) {
        showResultPanel(
          "Tabriklaymiz! 🏆",
          "Siz bu darsni muvaffaqiyatli yakunladingiz!",
          () => showLessonsScreen()
        );
      } else {
        showResultPanel(
          "Dars yakunlandi!",
          `Siz ${lesson.tests.filter(t => t.completed).length}/${lesson.tests.length} ta testga to'g'ri javob berdingiz`,
          () => showLessonsScreen()
        );
      }
    }
  }

  function checkLessonCompletion() {
    const lesson = lessonsData[currentLessonIndex];
    const allCompleted = lesson.tests.every(t => t.completed);
    
    if (allCompleted && !lesson.completed) {
      lesson.completed = true;
      showResultPanel(
        "Ajoyib! 🎉",
        "Siz darsni to'liq yakunladingiz! Qo'shimcha +5 tanga",
        null
      );
      addCoin(5); // Darsni to'liq tugatgan uchun bonus
    }
  }

  // ========== UMUMIY FUNKSIYALAR ==========
  function showResultPanel(title, message, callback) {
    document.getElementById('res-title').textContent = title;
    document.getElementById('res-msg').textContent = message;
    document.getElementById('res-panel').classList.add('active');
    document.getElementById('res-btn').onclick = () => {
      document.getElementById('res-panel').classList.remove('active');
      if (callback) callback();
    };
  }

  function updateProfileStats() {
    const completedCount = lessonsData.filter(l => l.completed).length;
    document.getElementById('completed-lessons').textContent = completedCount;
    document.getElementById('total-lessons').textContent = lessonsData.length;
  }

  // ========== BOSHLANG'ICH SOZLASH ==========
  updateCoinDisplay();
  createLessonCards();
  updateProfileStats();
</script>

</body>
</html>
