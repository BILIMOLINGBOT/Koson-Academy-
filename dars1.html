<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LearnU · Leaderboard</title>
  <style>
    /* ── ASOSIY RESET ── */
    * { 
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .app-wrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      background: #000000;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* ── SAHIFALAR ── */
    .page {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      padding-bottom: 90px;
      display: none;
      flex-direction: column;
    }
    .page.active { display: flex; }

    /* ── REYTING SAHIFASI MAHSUS ── */
    .rating-header {
      padding: 30px 20px 15px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .rating-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .rank-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 15px;
      /* Scrollbar yashirish */
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .rank-list-container::-webkit-scrollbar { display: none; }

    .rank-item {
      display: flex;
      align-items: center;
      padding: 12px 15px;
      background: #1c1c1e;
      border-radius: 20px;
      margin-bottom: 8px;
      transition: transform 0.2s;
    }
    
    .rank-item:active { transform: scale(0.98); }

    /* Top 3 uchun maxsus oltin, kumush, bronza effekt */
    .rank-item.top-1 { border: 1px solid rgba(255, 215, 0, 0.3); background: linear-gradient(90deg, #1c1c1e, #2c2c2e); }

    .rank-number {
      width: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #8e8e93;
    }

    .rank-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #3a3a3c;
      margin-right: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.2rem;
      overflow: hidden;
      border: 1px solid #48484a;
    }

    .rank-info { flex: 1; }
    .rank-name { font-weight: 600; font-size: 1rem; }
    
    .rank-points {
      font-weight: 800;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.9rem;
    }

    .rank-points span { color: #ffcc00; }

    /* ── iPHONE TAB BAR ── */
    .tab-bar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      height: 70px;
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      border: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #8e8e93;
      text-decoration: none;
      font-size: 0.65rem;
      font-weight: 600;
    }
    .tab-item.active { color: #ffffff; }
    .tab-item svg { width: 24px; height: 24px; }
  </style>
</head>
<body>

<div class="app-wrapper">
  
  <div id="home-page" class="page">
     <div style="padding: 40px 20px;">
        <h1 style="font-size: 2rem;">Asosiy</h1>
        <p style="color: #8e8e93;">Darslarga qaytishingiz mumkin</p>
     </div>
  </div>

  <div id="rating-page" class="page active">
    <div class="rating-header">
      <h1>Reyting</h1>
    </div>
    <div class="rank-list-container" id="leaderboard">
      </div>
  </div>

  <div id="gift-page" class="page">
    <div style="padding: 40px 20px; text-align: center;">
      <h1>Sovg'alar</h1>
      <p>Yutuqlarni qo'lga kiriting</p>
    </div>
  </div>

  <nav class="tab-bar">
    <div class="tab-item" onclick="showPage('home-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
      <span>Asosiy</span>
    </div>
    <div class="tab-item active" onclick="showPage('rating-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
      <span>Reyting</span>
    </div>
    <div class="tab-item" onclick="showPage('gift-page', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V22H4V12"></path><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
      <span>Sovg'a</span>
    </div>
  </nav>

</div>

<script>
  // Sahifalarni almashtirish funksiyasi
  function showPage(pageId, element) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
    
    document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
    element.classList.add('active');
  }

  // Reyting ro'yxatini generatsiya qilish
  const leaderboard = document.getElementById('leaderboard');
  const users = [
    { name: "Javlonbek", points: 900, avatar: "J" },
    { name: "Sardor", points: 800, avatar: "S" }
  ];

  // Qolgan 98 ta foydalanuvchini qo'shish
  const names = ["Malika", "Aziz", "Zilola", "Temur", "Madina", "Shoxrux", "Lola", "Jasur", "Nigora", "Bobur"];
  for (let i = 3; i <= 100; i++) {
    users.push({
      name: names[Math.floor(Math.random() * names.length)] + " " + i,
      points: 800 - (i * 7), // Ballar kamayib boradi
      avatar: "?"
    });
  }

  // Ro'yxatni HTML ga chiqarish
  users.forEach((user, index) => {
    const item = document.createElement('div');
    item.className = `rank-item ${index === 0 ? 'top-1' : ''}`;
    item.innerHTML = `
      <div class="rank-number">${index + 1}</div>
      <div class="rank-avatar" style="${index === 0 ? 'background: #ffcc00; color: #000; border:none;' : ''}">
        ${user.avatar === "?" ? user.name.charAt(0) : user.avatar}
      </div>
      <div class="rank-info">
        <div class="rank-name">${user.name} ${index === 0 ? '⭐️' : ''}</div>
      </div>
      <div class="rank-points"><span>⚡</span> ${user.points}</div>
    `;
    leaderboard.appendChild(item);
  });
</script>

</body>
</html>
