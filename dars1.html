<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wheel Clone</title>
    <style>
        :root {
            --bg-dark: #05111a;
            --accent-orange: #f4a100;
            --blue-btn: #42a5f5;
            --card-bg: #1c1308;
            --green-border: #4caf50;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; margin-top: 40px;}
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { color: #8a99a4; font-size: 14px; max-width: 250px; line-height: 1.5; }

        /* G'ildirak qismi */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        /* Pointer (Tepadagi uchburchak) */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid var(--accent-orange);
            z-index: 10;
            filter: drop-shadow(0 0 10px var(--accent-orange));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #1a2a35;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                from 22.5deg,
                #d48806 0deg 45deg,
                #9e6604 45deg 90deg,
                #d48806 90deg 135deg,
                #9e6604 135deg 180deg,
                #d48806 180deg 225deg,
                #9e6604 225deg 270deg,
                #d48806 270deg 315deg,
                #9e6604 315deg 360deg
            );
        }

        /* Segment chiziqlari */
        .wheel::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: repeating-conic-gradient(from 22.5deg, transparent 0 44deg, #000 44deg 45deg);
            pointer-events: none;
        }

        .label {
            position: absolute;
            width: 50%;
            height: 40px;
            top: 50%;
            left: 50%;
            transform-origin: 0% 50%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 25px;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
        }

        /* Markaziy aylana tugmasi */
        .center-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            background: radial-gradient(circle, #fff9e6 0%, #d4a017 100%);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        /* Hozirgi so'z kartasi */
        .word-card {
            width: 100%;
            max-width: 340px;
            background-color: var(--card-bg);
            border: 1.5px solid var(--green-border);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .word-card span { color: #8a8a8a; font-size: 14px; }
        .word-card h2 { margin: 10px 0 0; font-size: 24px; letter-spacing: 1px; }

        /* Asosiy aylantirish tugmasi */
        .main-btn {
            width: 100%;
            max-width: 340px;
            background-color: var(--blue-btn);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.3);
        }

        .main-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Daily Wheel</h1>
        <p>Sovrinlarni yutib olish va ingliz tilini o'rganish uchun aylantiring</p>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="center-circle" onclick="spin()">Aylantiring</div>
        <div class="wheel" id="wheel">
            </div>
    </div>

    <div class="word-card">
        <span>Hozirgi so'z</span>
        <h2>volatile</h2>
    </div>

    <button class="main-btn" onclick="spin()">Aylantirish</button>

    <script>
        const wheel = document.getElementById('wheel');
        const prizes = [
            "10 000", "5 000", "Next time", "Zehnly", 
            "10%", "20%", "30%", "10 000"
        ];

        // Elementlarni aylanaga joylashtirish
        prizes.forEach((text, i) => {
            const el = document.createElement('div');
            el.className = 'label';
            // Har bir elementni 45 gradusga surish (360/8 = 45)
            el.style.transform = `translateY(-50%) rotate(${i * 45}deg)`;
            el.innerText = text;
            wheel.appendChild(el);
        });

        let currentRotation = 0;
        let isSpinning = false;

        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            // Kamida 5 marta to'liq aylanish + tasodifiy burchak
            const randomExtra = Math.floor(Math.random() * 360);
            const totalSpin = 1800 + randomExtra; 
            
            currentRotation += totalSpin;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000); // 5 soniya davom etadi (CSS transition bilan bir xil)
        }
    </script>
</body>
</html>
