<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omadli G'ildirak - Zamonaviy</title>
    <style>
        :root {
            --primary-gold: #f39c12;
            --dark-gold: #b07010;
            --bg-color: #0b131e;
            --text-white: #ffffff;
            --circle-center-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-white);
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            margin-bottom: 30px;
            perspective: 1000px;
        }

        /* Tepasidagi yangilangan ko'rsatkich */
        .pointer {
            position: absolute;
            top: -30px; /* Joyini sozlash */
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Uchburchak qismi */
        .pointer-triangle {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid var(--primary-gold);
            filter: drop-shadow(0 0 5px rgba(243, 156, 18, 0.8));
        }

        /* Uchi aylana qismi */
        .pointer-circle-tip {
            width: 35px;
            height: 35px;
            background-color: var(--primary-gold);
            border-radius: 50%;
            margin-top: -10px; /* Uchburchak bilan birlashtirish */
            box-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(243, 156, 18, 0.8);
            position: relative;
        }

        /* G'ildirakning asosi (aylanadi) */
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(243, 156, 18, 0.2);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            position: relative;
            z-index: 1;
        }

        /* Markazdagi "Aylantiring" tugmasi */
        .center-spin-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff, #f39c12);
            border-radius: 50%;
            border: 5px solid #0b131e; /* Qora chegara */
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a1a;
            font-size: 16px;
            z-index: 5;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .center-spin-button:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.7);
        }

        .center-spin-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            color: #555;
            box-shadow: none;
        }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            height: 35px;
            color: var(--primary-gold);
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer">
            <div class="pointer-triangle"></div>
            <div class="pointer-circle-tip"></div>
        </div>
        
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        
        <button class="center-spin-button" id="spinBtn">
            Aylantiring
        </button>
    </div>

    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('result');

        // Segmentlar va ranglar (image_0.png asosida)
        const segments = [
            "10 000",
            "5 000",
            "Next time",
            "Zehnly",
            "10%",
            "20%",
            "30%"
        ];

        // Har bir segmentning o'ziga xos tilla/jigarrang gradyenti
        const colors = [
            "#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a"
        ];

        const numSegments = segments.length;
        const anglePerSegment = 2 * Math.PI / numSegments;
        let currentRotation = 0;

        // G'ildirakni Canvas-da chizish
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((text, i) => {
                const angle = i * anglePerSegment;
                
                // Segment rangini chizish
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + anglePerSegment);
                ctx.lineTo(radius, radius);
                ctx.fill();
                
                // Qora bo'luvchi chiziqlar
                ctx.strokeStyle = '#0b131e';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Matnni yozish
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 26px Arial";
                ctx.fillText(text, radius - 40, 10);
                ctx.restore();
            });
        }

        drawWheel();

        // Aylantirish funksiyasi
        btn.addEventListener('click', () => {
            if (btn.disabled) return; // Allaqachon aylanayotgan bo'lsa
            btn.disabled = true;
            resultDisplay.innerText = "";
            
            // Tasodifiy aylanish darajasi (kamida 5 ta to'liq aylanish + 0-360 gradus)
            const randomSpin = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomSpin;
            
            // CSS orqali g'ildirakni aylantirish
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // To'xtash va natijani aniqlash (4 soniyadan keyin)
            setTimeout(() => {
                btn.disabled = false;
                
                // Qaysi segmentda to'xtaganini hisoblash
                const actualDeg = currentRotation % 360;
                // Canvasda 0 gradus o'ng tomondan boshlanadi, ko'rsatkich esa tepada (-90 deg)
                const correctedDeg = (360 - actualDeg + 270) % 360;
                const segmentIndex = Math.floor(correctedDeg / (360 / numSegments));
                
                resultDisplay.innerText = "Yutuq: " + segments[segmentIndex];
            }, 4000); // 4 soniya (CSS transition-ga mos)
        });
    </script>
</body>
</html>
