<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Fortune - Aylantiring</title>
    <style>
        :root {
            --gold-light: #f9d976;
            --gold-dark: #b07e0a;
            --bg-color: #0b131a;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        /* Yuqoridagi ko'rsatkich (Pointer) */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: linear-gradient(to bottom, #ffcc00, #b07e0a);
            clip-path: polygon(0% 0%, 100% 0%, 50% 100%);
            z-index: 10;
            filter: drop-shadow(0 0 5px rgba(255, 204, 0, 0.8));
        }

        /* Asosiy baraban */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 8px solid #000;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: #000;
        }

        /* Segmentlar */
        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0% 0%;
            border: 2px solid #000;
            background: radial-gradient(circle at bottom right, var(--gold-light), var(--gold-dark));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .segment span {
            position: absolute;
            left: 20px;
            top: 40px;
            transform: rotate(-70deg); /* Matnni segmentga moslash */
            font-weight: bold;
            color: #fff;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        /* Markazdagi tugma */
        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff, #f9d976);
            border-radius: 50%;
            border: 8px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: #1a1a1a;
            user-select: none;
        }

        .center-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
    </style>
</head>
<body>

<div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
        </div>
    <div class="center-button" onclick="spin()">
        Aylantiring
    </div>
</div>

<script>
    const wheel = document.getElementById('wheel');
    const items = ["10 000", "5 000", "Next time", "Zehnly", "10%", "20%", "30%"];
    const segmentCount = items.length;
    const angleStep = 360 / segmentCount;

    // Segmentlarni yaratish
    items.forEach((item, index) => {
        const segment = document.createElement('div');
        segment.className = 'segment';
        
        // Har bir segmentni burish va qiyshaytirish (skew)
        // 7 ta segment bo'lgani uchun skewY ishlatamiz
        const rotation = index * angleStep;
        const skew = 90 - angleStep;
        segment.style.transform = `rotate(${rotation}deg) skewY(-${skew}deg)`;
        
        const span = document.createElement('span');
        span.innerText = item;
        
        // Matnni teskari burish (skewni kompensatsiya qilish)
        span.style.transform = `skewY(${skew}deg) rotate(15deg) translate(40px, 20px)`;
        
        segment.appendChild(span);
        wheel.appendChild(segment);
    });

    let currentRotation = 0;

    function spin() {
        // Tasodifiy aylanish darajasi (kamida 5 marta to'liq aylanish + tasodifiy)
        const extraDegree = Math.floor(Math.random() * 360);
        currentRotation += 1800 + extraDegree; 
        
        wheel.style.transform = `rotate(${currentRotation}deg)`;
    }
</script>

</body>
</html>
