
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Lucky Wheel</title>
    <style>
        :root {
            --ios-gold: linear-gradient(180deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --ios-dark: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* iPhone karkasi */
        .iphone-frame {
            width: 375px;
            height: 750px;
            background: var(--ios-dark);
            border: 12px solid #333;
            border-radius: 50px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Dynamic Island */
        .dynamic-island {
            width: 110px;
            height: 30px;
            background: black;
            border-radius: 20px;
            margin-top: 10px;
            z-index: 10;
        }

        /* Tepasidagi ko'rsatkich */
        .pointer {
            position: absolute;
            top: 120px;
            z-index: 10;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #fccd4d;
            filter: drop-shadow(0 0 10px rgba(252, 205, 77, 0.8));
        }

        .wheel-box {
            margin-top: 80px;
            position: relative;
        }

        canvas {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Markaziy oltin doira */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: var(--ios-gold);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #000;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        /* iOS uslubidagi tugma */
        #spin-btn {
            margin-top: auto;
            margin-bottom: 50px;
            width: 80%;
            padding: 18px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #spin-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.2);
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: 300;
            color: #fccd4d;
            height: 30px;
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>
        <div class="pointer"></div>

        <div class="wheel-box">
            <div class="center-dot">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V5M12 19V22M22 12H19M5 12H2M19.07 4.93L16.95 7.05M7.05 16.95L4.93 19.07M19.07 19.07L16.95 16.95M7.05 7.05L4.93 4.93" stroke="black" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>

        <div id="result"></div>

        <button id="spin-btn">Aylantiring</button>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const resultDisplay = document.getElementById('result');

        const segments = ["10 000", "5 000", "Zehnly", "10%", "20%", "30%", "Next time"];
        const colors = ["#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a", "#b3770e", "#d4901a"];
        
        const numSegments = segments.length;
        const anglePerSegment = 2 * Math.PI / numSegments;
        let currentRotation = 0;

        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            segments.forEach((text, i) => {
                const angle = i * anglePerSegment;
                
                // Segment
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + anglePerSegment);
                ctx.fill();
                ctx.strokeStyle = "#1c1c1e";
                ctx.lineWidth = 5;
                ctx.stroke();

                // Matn
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + anglePerSegment / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 32px -apple-system";
                ctx.fillText(text, radius - 40, 10);
                ctx.restore();
            });
        }

        drawWheel();

        btn.addEventListener('click', () => {
            btn.disabled = true;
            resultDisplay.innerText = "Omad tilaymiz...";
            
            const randomSpin = Math.floor(Math.random() * 360) + 2880; // Kamida 8 marta aylanish
            currentRotation += randomSpin;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                btn.disabled = false;
                const actualDeg = currentRotation % 360;
                const correctedDeg = (360 - actualDeg + 270) % 360;
                const segmentIndex = Math.floor(correctedDeg / (360 / numSegments));
                
                resultDisplay.innerText = segments[segmentIndex];
                
                // iPhone haptic feedback simulyatsiyasi (faqat vizual)
                resultDisplay.style.transform = "scale(1.2)";
                setTimeout(() => resultDisplay.style.transform = "scale(1)", 200);
            }, 5000);
        });
    </script>
</body>
</html>
