<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingliz tili o'yini</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      background: #000000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h2 {
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stats {
      display: flex;
      gap: 15px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1a1a1a;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #333;
    }

    .coin-icon {
      color: gold;
    }

    /* Game container */
    .game-container {
      padding: 20px;
      max-width: 450px;
      margin: 0 auto;
    }

    .flashcard {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 32px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .flag-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .flag-img {
      width: 45px;
      height: 30px;
      border-radius: 4px;
      object-fit: cover;
    }

    .part-of-speech {
      color: #aaa;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .word-main {
      font-size: 38px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .audio-icon {
      color: #aaa;
      cursor: pointer;
      font-size: 24px;
    }

    .audio-icon:hover {
      color: white;
    }

    .translation-word {
      font-size: 26px;
      font-weight: 700;
    }

    .game-content {
      margin-top: 20px;
    }

    .prompt-text {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 20px;
      border: 2px solid #333;
    }

    .zone {
      min-height: 80px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      border: 2px dashed #444;
    }

    .bank {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip, .token {
      background: #2a2a2a;
      padding: 12px 18px;
      border-radius: 15px;
      border: 1px solid #444;
      font-size: 18px;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }

    .chip:hover, .token:hover {
      background: #3a3a3a;
      transform: scale(1.05);
    }

    .next-btn, .check-btn {
      width: 100%;
      height: 65px;
      background: white;
      color: black;
      border: none;
      border-radius: 24px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .next-btn:disabled, .check-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* Result Panel */
    .result-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      color: black;
      border-radius: 30px 30px 0 0;
      padding: 40px 25px;
      transform: translateY(100%);
      transition: 0.4s;
      z-index: 1000;
    }

    .result-panel.active {
      transform: translateY(0);
    }

    .res-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .res-msg {
      font-size: 18px;
      margin-bottom: 20px;
      color: #444;
    }

    .coin-reward {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    #res-btn {
      background: black !important;
      color: white !important;
      border: none;
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000000;
      display: flex;
      justify-content: space-around;
      padding: 15px 10px;
      border-top: 2px solid #333;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #888;
      text-decoration: none;
      flex: 1;
    }

    .nav-item.active {
      color: white;
    }

    .nav-icon {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .nav-text {
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Header with stats -->
  <div class="header">
    <h2><i class="fas fa-gamepad"></i> O'yin</h2>
    <div class="stats">
      <div class="stat-item"><i class="fas fa-fire"></i> <span id="streakCount">20</span></div>
      <div class="stat-item"><i class="fas fa-coins coin-icon"></i> <span id="coinCount">33</span></div>
    </div>
  </div>

  <!-- Game Container -->
  <div class="game-container">
    <!-- Flashcard qismi -->
    <div id="flashcardSection">
      <div class="flashcard">
        <div class="flag-row">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" class="flag-img">
          <span class="part-of-speech" id="f-pos">OLMOSH</span>
        </div>
        <div class="word-main">
          <span id="f-eng">My</span>
          <i class="fas fa-volume-up audio-icon" onclick="speak()"></i>
        </div>
      </div>
      <div class="flashcard">
        <div class="flag-row">
          <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Flag_of_Uzbekistan.svg" class="flag-img">
        </div>
        <div class="translation-word" id="f-uzb">mening</div>
      </div>
      <button class="next-btn" onclick="nextFlashcard()">
        Keyingi <i class="fas fa-arrow-right"></i>
      </button>
    </div>

    <!-- Word Game qismi -->
    <div id="wordGameSection" style="display: none;">
      <div class="prompt-text" id="g1-prompt"></div>
      <div class="game-content">
        <div class="zone" id="g1-zone"></div>
        <div class="bank" id="g1-bank"></div>
      </div>
      <button class="check-btn" id="g1-check" onclick="checkWordGame()" disabled>Tekshirish</button>
    </div>

    <!-- Sentence Game qismi -->
    <div id="sentenceGameSection" style="display: none;">
      <div class="prompt-text" id="g2-prompt"></div>
      <div class="game-content">
        <div class="zone" id="g2-zone"></div>
        <div class="bank" id="g2-bank"></div>
      </div>
      <button class="check-btn" id="g2-check" onclick="checkSentenceGame()" disabled>Tekshirish</button>
    </div>

    <!-- Final Screen -->
    <div id="finalSection" style="display: none; text-align: center;">
      <i class="fas fa-trophy" style="font-size: 80px; color: gold; margin: 40px 0 20px;"></i>
      <h2 style="margin-bottom: 10px;">Tabriklaymiz!</h2>
      <p style="color: #aaa; margin-bottom: 40px;">Barcha bosqichlar yakunlandi</p>
      <button class="next-btn" onclick="restartGame()">Qaytadan boshlash</button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="darslar.html" class="nav-item">
      <i class="fas fa-home nav-icon"></i>
      <span class="nav-text">Darslar</span>
    </a>
    <a href="oyin.html" class="nav-item active">
      <i class="fas fa-gamepad nav-icon"></i>
      <span class="nav-text">O'yin</span>
    </a>
  </div>

  <!-- Result Panel -->
  <div class="result-panel" id="res-panel">
    <div id="res-title" class="res-title"></div>
    <div id="res-msg" class="res-msg"></div>
    <div id="coinReward" class="coin-reward" style="display: none;">
      <i class="fas fa-coins" style="color: gold; font-size: 24px;"></i>
      <span id="rewardAmount">+1 tanga</span>
    </div>
    <button class="next-btn" id="res-btn">Davom etish</button>
  </div>

  <script>
    // Tangalarni localStorage dan o'qish va saqlash
    let coins = localStorage.getItem('coins') ? parseInt(localStorage.getItem('coins')) : 33;
    let streak = 20;
    
    document.getElementById('coinCount').textContent = coins;
    document.getElementById('streakCount').textContent = streak;

    // Tanga qo'shish funksiyasi
    function addCoins(amount) {
      coins += amount;
      localStorage.setItem('coins', coins);
      document.getElementById('coinCount').textContent = coins;
    }

    // O'yin ma'lumotlari
    const vocabData = [
      { pos: "OLMOSH", eng: "My", uzb: "mening" },
      { pos: "OT", eng: "Name", uzb: "ism" },
      { pos: "FE'L", eng: "is", uzb: "bo‘lmoq" },
      { pos: "OLMOSH", eng: "I", uzb: "men" },
      { pos: "FE'L", eng: "am", uzb: "bo‘lmoq" },
      { pos: "PREDLOG", eng: "from", uzb: "dan" },
      { pos: "FE'L", eng: "live", uzb: "yashaymoq" },
      { pos: "PREDLOG", eng: "in", uzb: "da" },
      { pos: "ARTIKL", eng: "a", uzb: "bir" },
      { pos: "OT", eng: "student", uzb: "talaba" },
      { pos: "FE'L", eng: "have", uzb: "ega bo‘lmoq" },
      { pos: "OT", eng: "family", uzb: "oila" }
    ];

    let wordGameData = [
      { uz: "mening", correct: ["My"] },
      { uz: "ism", correct: ["Name"] },
      { uz: "bo‘lmoq (3-shaxs)", correct: ["is"] },
      { uz: "men", correct: ["I"] },
      { uz: "bo‘lmoq (1-shaxs)", correct: ["am"] },
      { uz: "dan", correct: ["from"] },
      { uz: "yashaymoq", correct: ["live"] },
      { uz: "da", correct: ["in"] },
      { uz: "bir", correct: ["a"] },
      { uz: "talaba", correct: ["student"] },
      { uz: "ega bo‘lmoq", correct: ["have"] },
      { uz: "oila", correct: ["family"] }
    ];

    const sentenceData = [
      { uz: "Mening ismim Aziz.", correct: ["My", "name", "is", "Aziz."] },
      { uz: "Men talabaman.", correct: ["I", "am", "a", "student."] },
      { uz: "Men Toshkentdanman.", correct: ["I", "am", "from", "Tashkent."] },
      { uz: "Men Toshkentda yashayman.", correct: ["I", "live", "in", "Tashkent."] }
    ];

    const distractors = ["You", "He", "She", "We", "They", "the", "at", "on", "book", "car"];

    // O'yin state
    let currentFlash = 0;
    let g1Idx = 0;
    let g2Idx = 0;
    let builtSeq = [];
    let usedFlags = [];
    let currentBank = [];

    // Result panel
    function showResult(title, msg, isCorrect, callback) {
      const panel = document.getElementById('res-panel');
      document.getElementById('res-title').textContent = title;
      document.getElementById('res-msg').textContent = msg;
      
      const rewardDiv = document.getElementById('coinReward');
      if (isCorrect) {
        addCoins(1);
        rewardDiv.style.display = 'flex';
        document.getElementById('rewardAmount').textContent = '+1 tanga';
      } else {
        rewardDiv.style.display = 'none';
      }
      
      panel.classList.add('active');
      document.getElementById('res-btn').onclick = () => {
        panel.classList.remove('active');
        if (callback) callback();
      };
    }

    // O'yin funksiyalari
    function nextFlashcard() {
      if (currentFlash < vocabData.length - 1) {
        currentFlash++;
        const item = vocabData[currentFlash];
        document.getElementById('f-pos').textContent = item.pos;
        document.getElementById('f-eng').textContent = item.eng;
        document.getElementById('f-uzb').textContent = item.uzb;
      } else {
        document.getElementById('flashcardSection').style.display = 'none';
        document.getElementById('wordGameSection').style.display = 'block';
        initWordGame();
      }
    }

    function speak() {
      const text = document.getElementById('f-eng').textContent;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      window.speechSynthesis.speak(u);
    }

    function initWordGame() {
      const curr = wordGameData[g1Idx];
      document.getElementById('g1-prompt').textContent = curr.uz;
      
      let words = [curr.correct[0]];
      let availD = distractors.filter(d => d !== curr.correct[0]);
      for (let i = 0; i < 2; i++) {
        if (availD.length > 0) {
          const rIdx = Math.floor(Math.random() * availD.length);
          words.push(availD[rIdx]);
          availD.splice(rIdx, 1);
        }
      }
      words.sort(() => Math.random() - 0.5);
      
      builtSeq = [];
      usedFlags = new Array(words.length).fill(false);
      currentBank = words;
      renderGame('g1');
    }

    function checkWordGame() {
      const currentItem = wordGameData[g1Idx];
      const correct = currentItem.correct;
      const isCorrect = builtSeq.length === correct.length && builtSeq[0].word === correct[0];
      
      showResult(
        isCorrect ? "Barakalla!" : "Xato!",
        isCorrect ? "To'g'ri javob. +1 tanga" : `To'g'ri javob: ${correct[0]}`,
        isCorrect,
        () => {
          if (!isCorrect) {
            wordGameData.push(currentItem);
          }
          if (g1Idx < wordGameData.length - 1) {
            g1Idx++;
            initWordGame();
          } else {
            document.getElementById('wordGameSection').style.display = 'none';
            document.getElementById('sentenceGameSection').style.display = 'block';
            initSentenceGame();
          }
        }
      );
    }

    function initSentenceGame() {
      const curr = sentenceData[g2Idx];
      document.getElementById('g2-prompt').textContent = curr.uz;
      let words = [...curr.correct].sort(() => Math.random() - 0.5);
      builtSeq = [];
      usedFlags = new Array(words.length).fill(false);
      currentBank = words;
      renderGame('g2');
    }

    function checkSentenceGame() {
      const currentItem = sentenceData[g2Idx];
      const correct = currentItem.correct;
      const isCorrect = builtSeq.length === correct.length && 
                       builtSeq.every((v, i) => v.word === correct[i]);

      showResult(
        isCorrect ? "Zo'r!" : "E'tiborli bo'ling!",
        isCorrect ? "Gap to'g'ri tuzildi. +1 tanga" : `To'g'ri tartib: ${correct.join(' ')}`,
        isCorrect,
        () => {
          if (!isCorrect) {
            sentenceData.push(currentItem);
          }
          if (g2Idx < sentenceData.length - 1) {
            g2Idx++;
            initSentenceGame();
          } else {
            document.getElementById('sentenceGameSection').style.display = 'none';
            document.getElementById('finalSection').style.display = 'block';
          }
        }
      );
    }

    function renderGame(prefix) {
      const zone = document.getElementById(`${prefix}-zone`);
      const bank = document.getElementById(`${prefix}-bank`);
      const btn = document.getElementById(`${prefix}-check`);
      
      zone.innerHTML = '';
      builtSeq.forEach((item, i) => {
        const d = document.createElement('div');
        d.className = 'chip';
        d.textContent = item.word;
        d.onclick = () => {
          usedFlags[item.idx] = false;
          builtSeq.splice(i, 1);
          renderGame(prefix);
        };
        zone.appendChild(d);
      });
      
      bank.innerHTML = '';
      currentBank.forEach((word, i) => {
        if (!usedFlags[i]) {
          const t = document.createElement('div');
          t.className = 'token';
          t.textContent = word;
          t.onclick = () => {
            usedFlags[i] = true;
            builtSeq.push({word, idx: i});
            renderGame(prefix);
          };
          bank.appendChild(t);
        }
      });
      
      btn.disabled = builtSeq.length === 0;
    }

    function restartGame() {
      currentFlash = 0;
      g1Idx = 0;
      g2Idx = 0;
      
      const firstItem = vocabData[0];
      document.getElementById('f-pos').textContent = firstItem.pos;
      document.getElementById('f-eng').textContent = firstItem.eng;
      document.getElementById('f-uzb').textContent = firstItem.uzb;
      
      document.getElementById('finalSection').style.display = 'none';
      document.getElementById('flashcardSection').style.display = 'block';
      document.getElementById('wordGameSection').style.display = 'none';
      document.getElementById('sentenceGameSection').style.display = 'none';
    }

    // Initialize first flashcard
    const firstItem = vocabData[0];
    document.getElementById('f-pos').textContent = firstItem.pos;
    document.getElementById('f-eng').textContent = firstItem.eng;
    document.getElementById('f-uzb').textContent = firstItem.uzb;
  </script>

</body>
</html>
